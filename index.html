function PublicHome({ news, events, setPage, onLoginClick, siteContent }) {
  const sc = siteContent || DEFAULT_SITE_CONTENT;
  const upcomingEvents = events.filter(e=>e.status==="upcoming").sort((a,b)=>a.date.localeCompare(b.date)).slice(0,3);
  const latestNews = news.filter(n=>n.status==="published").sort((a,b)=>b.date.localeCompare(a.date)).slice(0,3);
  const pinned = news.find(n=>n.pinned&&n.status==="published");
  const typeIcon={show:"🏆",drive:"🚗",social:"🥂",charity:"❤️",competition:"🏁"};

  return (
    <div>
      {/* Hero */}
      <div style={{
        minHeight:"88vh", display:"flex", alignItems:"center", justifyContent:"center",
        background:"linear-gradient(160deg, #7a0c10 0%, #a01820 40%, #c0282a 100%)",
        backgroundImage:"radial-gradient(ellipse at 25% 50%, rgba(255,255,255,.08) 0%, transparent 60%), radial-gradient(ellipse at 75% 30%, rgba(212,160,23,.15) 0%, transparent 50%)",
        position:"relative", overflow:"hidden", textAlign:"center", padding:"60px 24px"
      }}>
        {/* Decorative rings */}
        <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:600,height:600,border:"1px solid rgba(255,255,255,.15)",borderRadius:"50%",pointerEvents:"none"}}/>
        <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:400,height:400,border:"1px solid rgba(255,255,255,.2)",borderRadius:"50%",pointerEvents:"none"}}/>

        <div style={{position:"relative",zIndex:1,maxWidth:780}} className="fade-up">
          {/* Emblem */}
          <div style={{width:150,height:150,margin:"0 auto 24px",display:"flex",alignItems:"center",justifyContent:"center",filter:"drop-shadow(0 4px 24px rgba(0,0,0,.5))"}}>
            <img src={CLUB_LOGO} style={{width:150,height:150,objectFit:"contain"}} alt="RCCA logo"/>
          </div>

          <div style={{fontFamily:"var(--font-m)",fontSize:10,color:"rgba(255,255,255,.7)",letterSpacing:"0.25em",textTransform:"uppercase",marginBottom:12}}>Est. 1964</div>
          <h1 style={{fontFamily:"var(--font-d)",fontSize:"clamp(36px,6vw,68px)",fontWeight:700,color:"var(--gold3)",lineHeight:1.05,margin:"0 0 8px"}}>
            Rover Car Club
          </h1>
          <h2 style={{fontFamily:"var(--font-d)",fontSize:"clamp(24px,4vw,44px)",fontWeight:400,color:"var(--gold)",fontStyle:"italic",margin:"0 0 24px"}}>
            of Australia
          </h2>
          <p style={{fontSize:16,color:"var(--text2)",lineHeight:1.7,maxWidth:560,margin:"0 auto 36px"}}>
            {sc.hero.tagline}
          </p>
          <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
            <button onClick={onLoginClick} style={{background:"#ffffff",border:"2px solid #ffffff",borderRadius:8,padding:"14px 32px",color:"var(--burg-xdk)",fontFamily:"var(--font-b)",fontSize:15,fontWeight:700,cursor:"pointer",letterSpacing:"0.03em"}}>
              {sc.hero.ctaLabel}
            </button>
            <button onClick={()=>setPage("about")} style={{background:"none",border:"2px solid var(--gold)",borderRadius:8,padding:"14px 32px",color:"var(--gold3)",fontFamily:"var(--font-b)",fontSize:15,fontWeight:700,cursor:"pointer"}}>
              {sc.hero.ctaSecondary}
            </button>
          </div>
        </div>
      </div>

      {/* Stats bar */}
      <div style={{background:"linear-gradient(135deg,#8f1a1c,#c0282a)",padding:"20px 24px"}}>
        <div style={{maxWidth:1100,margin:"0 auto",display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:0}}>
          {sc.stats.map((s,i)=>(
            <div key={i} style={{textAlign:"center",padding:"8px 0",borderRight:i<3?"1px solid rgba(255,255,255,.15)":"none"}}>
              <div style={{fontFamily:"var(--font-d)",fontSize:22,color:"#ffffff",fontWeight:700}}>{s.value}</div>
              <div style={{fontFamily:"var(--font-m)",fontSize:9.5,color:"rgba(255,255,255,.6)",textTransform:"uppercase",letterSpacing:"0.1em",marginTop:2}}>{s.label}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Pinned news */}
      {pinned && (
        <div style={{background:"var(--bg2)",borderBottom:"1px solid var(--border)"}}>
          <div style={{maxWidth:1100,margin:"0 auto",padding:"20px 24px"}}>
            <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
              <span style={{background:"var(--burg)",color:"#ffffff",fontFamily:"var(--font-m)",fontSize:9,letterSpacing:"0.12em",textTransform:"uppercase",padding:"3px 8px",borderRadius:4,flexShrink:0}}>📌 Latest News</span>
              <span style={{fontFamily:"var(--font-d)",fontSize:15,color:"var(--text)",fontWeight:600,flex:1}}>{pinned.title}</span>
              <span style={{fontSize:12,color:"var(--text3)",fontFamily:"var(--font-m)",flexShrink:0}}>{pinned.date}</span>
              <button onClick={()=>setPage("news")} style={{background:"none",border:"1px solid var(--gold)",borderRadius:4,padding:"4px 12px",color:"var(--gold)",fontFamily:"var(--font-b)",fontSize:11,cursor:"pointer",flexShrink:0}}>Read more →</button>
            </div>
          </div>
        </div>
      )}

      <div style={{maxWidth:1100,margin:"0 auto",padding:"64px 24px"}}>

        {/* About blurb */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:48,marginBottom:64,alignItems:"center"}}>
          <div>
            <div style={{fontFamily:"var(--font-m)",fontSize:10,color:"rgba(255,255,255,.7)",textTransform:"uppercase",letterSpacing:"0.15em",marginBottom:10}}>About the Club</div>
            <h2 style={{fontFamily:"var(--font-d)",fontSize:34,color:"var(--gold3)",fontWeight:700,lineHeight:1.2,marginBottom:16}}>{sc.about.heading}</h2>
            <p style={{fontSize:14,color:"var(--text2)",lineHeight:1.8,marginBottom:14}}>
              {sc.about.para1}
            </p>
            <p style={{fontSize:14,color:"var(--text2)",lineHeight:1.8,marginBottom:20}}>
              {sc.about.para2}
            </p>
            <button onClick={()=>setPage("about")} style={{background:"none",border:"2px solid var(--burg)",borderRadius:8,padding:"10px 22px",color:"var(--burg)",fontFamily:"var(--font-b)",fontSize:13,fontWeight:700,cursor:"pointer"}}>
              Learn More →
            </button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            {[["🚗","All Models Welcome","From pre-war to SD1 and beyond"],["🏆","Biennial National Rove","Our premier yearly gathering"],["🔧","Technical Support","Expert advice from fellow members"],["📖","Club Publications","Viking Torque, Small Torque & manuals"],].map(([icon,title,desc])=>(
              <div key={title} style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:8,padding:18,borderTop:"3px solid var(--burg)"}}>
                <div style={{fontSize:24,marginBottom:8}}>{icon}</div>
                <div style={{fontFamily:"var(--font-d)",fontSize:14,color:"var(--gold3)",fontWeight:600,marginBottom:4}}>{title}</div>
                <div style={{fontSize:11.5,color:"var(--text3)",lineHeight:1.5}}>{desc}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Upcoming events */}
        {upcomingEvents.length>0&&(
          <div style={{marginBottom:64}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
              <div>
                <div style={{fontFamily:"var(--font-m)",fontSize:10,color:"rgba(255,255,255,.7)",textTransform:"uppercase",letterSpacing:"0.15em",marginBottom:6}}>Calendar</div>
                <h2 style={{fontFamily:"var(--font-d)",fontSize:30,color:"var(--gold3)",fontWeight:700,margin:0}}>Upcoming Events</h2>
              </div>
              <button onClick={()=>setPage("events")} style={{background:"none",border:"1px solid var(--border2)",borderRadius:6,padding:"8px 16px",color:"var(--text2)",fontFamily:"var(--font-b)",fontSize:12,cursor:"pointer"}}>View All →</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:16}}>
              {upcomingEvents.map(ev=>(
                <div key={ev.id} style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:8,overflow:"hidden"}}>
                  <div style={{height:5,background:"linear-gradient(90deg,var(--burg),var(--gold))"}}/>
                  <div style={{padding:20}}>
                    <div style={{fontSize:28,marginBottom:10}}>{typeIcon[ev.type]||"★"}</div>
                    <div style={{fontFamily:"var(--font-d)",fontSize:17,color:"var(--gold3)",fontWeight:700,marginBottom:6,lineHeight:1.3}}>{ev.title}</div>
                    <div style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--font-m)",marginBottom:8}}>{ev.date} · {ev.time}</div>
                    <div style={{fontSize:12.5,color:"var(--text2)",marginBottom:10}}>📍 {ev.location}</div>
                    <div style={{fontSize:12,color:"var(--text3)",lineHeight:1.5}}>{ev.description?.slice(0,100)}…</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Latest news */}
        {latestNews.length>0&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
              <div>
                <div style={{fontFamily:"var(--font-m)",fontSize:10,color:"rgba(255,255,255,.7)",textTransform:"uppercase",letterSpacing:"0.15em",marginBottom:6}}>From the Club</div>
                <h2 style={{fontFamily:"var(--font-d)",fontSize:30,color:"var(--gold3)",fontWeight:700,margin:0}}>Latest News</h2>
              </div>
              <button onClick={()=>setPage("news")} style={{background:"none",border:"1px solid var(--border2)",borderRadius:6,padding:"8px 16px",color:"var(--text2)",fontFamily:"var(--font-b)",fontSize:12,cursor:"pointer"}}>All News →</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:16}}>
              {latestNews.map(n=>(
                <div key={n.id} style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:8,padding:20}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                    <div style={{fontSize:24}}>{n.image}</div>
                    <span style={{fontSize:10,color:"var(--text3)",fontFamily:"var(--font-m)"}}>{n.date}</span>
                  </div>
                  <div style={{fontFamily:"var(--font-d)",fontSize:16,color:"var(--gold3)",fontWeight:700,lineHeight:1.3,marginBottom:8}}>{n.title}</div>
                  <div style={{fontSize:12.5,color:"var(--text2)",lineHeight:1.6}}>{n.excerpt}</div>
                  <button onClick={()=>setPage("news")} style={{background:"none",border:"none",color:"var(--gold)",fontFamily:"var(--font-b)",fontSize:12,cursor:"pointer",padding:"10px 0 0",display:"block"}}>Read more →</button>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Join CTA */}
        <div style={{marginTop:64,background:"linear-gradient(135deg,var(--burg-dk),var(--burg))",borderRadius:12,padding:"48px 40px",textAlign:"center",border:"1px solid var(--gold)",boxShadow:"0 0 60px rgba(107,26,42,.3)"}}>
          <h2 style={{fontFamily:"var(--font-d)",fontSize:32,color:"var(--gold3)",fontWeight:700,marginBottom:12}}>Become a Member</h2>
          <p style={{fontSize:14,color:"rgba(255,255,255,.75)",lineHeight:1.7,maxWidth:500,margin:"0 auto 28px"}}>
            Join Australia's Rover community. City membership A$54/yr, Country/Interstate A$46/yr. New member joining fee A$20. Access to all club events, the members' portal, marketplace, and shop.
          </p>
          <button onClick={onLoginClick} style={{background:"#ffffff",border:"2px solid #ffffff",borderRadius:8,padding:"14px 36px",color:"var(--burg-xdk)",fontFamily:"var(--font-b)",fontSize:15,fontWeight:700,cursor:"pointer"}}>
            Contact Us to Join
          </button>
        </div>
      </div>
    </div>
  );
}

// ── PUBLIC ABOUT PAGE ─────────────────────────────────────────────────────────
function PublicAbout({ onLoginClick, siteContent }) {
  const sc = siteContent || DEFAULT_SITE_CONTENT;
  const committee = sc.committee;

  return (
    <div>
      {/* Header */}
      <div style={{background:"linear-gradient(160deg,var(--burg-xdk),var(--burg))",padding:"72px 24px 52px",textAlign:"center"}}>
        <div style={{fontFamily:"var(--font-m)",fontSize:10,color:"rgba(255,255,255,.7)",textTransform:"uppercase",letterSpacing:"0.2em",marginBottom:12}}>Who We Are</div>
        <h1 style={{fontFamily:"var(--font-d)",fontSize:48,color:"#ffffff",fontWeight:700,margin:"0 0 16px",lineHeight:1.1}}>About the Club</h1>
        <p style={{fontSize:15,color:"rgba(255,255,255,.85)",maxWidth:580,margin:"0 auto",lineHeight:1.7}}>
          The Rover Car Club of Australia — preserving and celebrating the Rover marque since 1964.
        </p>
      </div>

      <div style={{maxWidth:1000,margin:"0 auto",padding:"60px 24px"}}>

        {/* History */}
        <div style={{marginBottom:56}}>
          <div style={{fontFamily:"var(--font-m)",fontSize:10,color:"rgba(255,255,255,.7)",textTransform:"uppercase",letterSpacing:"0.15em",marginBottom:10}}>Our History</div>
          <h2 style={{fontFamily:"var(--font-d)",fontSize:32,color:"var(--gold3)",fontWeight:700,marginBottom:20,lineHeight:1.2}}>A Club Born from Passion</h2>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:32}}>
            {sc.history.map((h,i)=>(
              <p key={i} style={{fontSize:13.5,color:"var(--text2)",lineHeight:1.8,margin:0}}>{h.para}</p>

          </div>
        </div>

        {/* Timeline */}
        <div style={{marginBottom:56,background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:10,padding:28}}>
          <h3 style={{fontFamily:"var(--font-d)",fontSize:22,color:"var(--gold3)",marginBottom:20,fontWeight:600}}>Key Milestones</h3>
          <div style={{position:"relative"}}>
            <div style={{position:"absolute",left:60,top:0,bottom:0,width:2,background:"linear-gradient(180deg,var(--burg),transparent)",borderRadius:1}}/>
            {[
              ["1964","Club founded in Melbourne by 14 members"],
              ["1970","First national meeting held in Sydney"],
              ["1975","Technical library established; first workshop manual reprint"],
              ["1985","Membership reaches 500 nationally"],
              ["1995","Club incorporated as a national body"],
              ["2000","Website launched; online member register introduced"],
              ["2008","Life Member Arthur Pemberton OAM for services to motoring heritage"],
              ["2024","60th anniversary celebrated — largest gathering in club history"],
              [yr,"Members Portal launched — digital management system introduced"],
            ].map(([year,event])=>(
              <div key={year} style={{display:"flex",gap:0,marginBottom:14,alignItems:"flex-start"}}>
                <div style={{width:56,flexShrink:0,fontFamily:"var(--font-m)",fontSize:11,color:"var(--gold2)",fontWeight:700,textAlign:"right",paddingRight:0,paddingTop:1}}>{year}</div>
                <div style={{width:28,display:"flex",justifyContent:"center",flexShrink:0}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:"var(--gold)",border:"2px solid var(--burg-xdk)",marginTop:4,flexShrink:0}}/>
                </div>
                <div style={{fontSize:13,color:"var(--text2)",lineHeight:1.5,flex:1}}>{event}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Committee */}
        <div style={{marginBottom:56}}>
          <div style={{fontFamily:"var(--font-m)",fontSize:10,color:"rgba(255,255,255,.7)",textTransform:"uppercase",letterSpacing:"0.15em",marginBottom:10}}>Leadership</div>
          <h2 style={{fontFamily:"var(--font-d)",fontSize:30,color:"var(--gold3)",fontWeight:700,marginBottom:22}}>Committee {yr}</h2>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:14}}>
            {committee.map(c=>(
              <div key={c.role} style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:8,padding:20,borderTop:"3px solid var(--burg)"}}>
                <div style={{fontFamily:"var(--font-m)",fontSize:9.5,color:"var(--gold)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6}}>{c.role}</div>
                <div style={{fontFamily:"var(--font-d)",fontSize:16,color:"var(--gold3)",fontWeight:700,marginBottom:2}}>{c.name}</div>
                <div style={{fontSize:10.5,color:"var(--text3)",fontFamily:"var(--font-m)",marginBottom:10}}>{c.state}</div>
                <div style={{fontSize:12,color:"var(--text2)",lineHeight:1.6}}>{c.bio}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Membership */}
        <div style={{marginBottom:56}}>
          <div style={{fontFamily:"var(--font-m)",fontSize:10,color:"rgba(255,255,255,.7)",textTransform:"uppercase",letterSpacing:"0.15em",marginBottom:10}}>Join Us</div>
          <h2 style={{fontFamily:"var(--font-d)",fontSize:30,color:"var(--gold3)",fontWeight:700,marginBottom:16}}>Membership</h2>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:20}}>
            {[
              {type:"City Membership",price:"A$54 / year",desc:"For Melbourne metropolitan area members. Full voting rights and all club benefits."},
              {type:"Country & Interstate",price:"A$46 / year",desc:"For members outside the Melbourne metropolitan area. Same benefits as City membership."},
              {type:"Life Membership",price:"By invitation",desc:"Awarded by the committee to members of exceptional service to the club."},
            ].map(m=>(
              <div key={m.type} style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:8,padding:20}}>
                <div style={{fontFamily:"var(--font-d)",fontSize:15,color:"var(--gold3)",fontWeight:700,marginBottom:4}}>{m.type}</div>
                <div style={{fontFamily:"var(--font-m)",fontSize:14,color:"var(--gold2)",fontWeight:700,marginBottom:10}}>{m.price}</div>
                <div style={{fontSize:12.5,color:"var(--text2)",lineHeight:1.6}}>{m.desc}</div>
              </div>
            ))}
          </div>
          <p style={{fontSize:13,color:"var(--text3)",lineHeight:1.7}}>
            To enquire about membership, contact our Secretary at <span style={{color:"var(--gold)"}}>secretary@rcca.com.au</span>. Existing members can log in to the Members Portal to renew.
          </p>
        </div>

        {/* Contact */}
        <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:10,padding:28}}>
          <h3 style={{fontFamily:"var(--font-d)",fontSize:22,color:"var(--gold3)",marginBottom:20,fontWeight:600}}>Contact the Club</h3>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,fontSize:13.5,color:"var(--text2)"}}>
            {[
              ["General Enquiries", sc.contact.general],
              ["Membership",        sc.contact.membership],
              ["Technical Queries", sc.contact.technical],
              ["Merchandise & Shop",sc.contact.merchandise],
              ["Nationals & Events",sc.contact.events],
              ["Postal Address",    sc.contact.postal],
              ...(sc.contact.phone?[["Phone",sc.contact.phone]]:[]),
            ].map(([k,v])=>(
              <div key={k}>
                <div style={{fontFamily:"var(--font-m)",fontSize:9.5,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:3}}>{k}</div>
                <div style={{color:"var(--gold)"}}>{v}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── PUBLIC NEWS PAGE ──────────────────────────────────────────────────────────
function PublicNews({ news, selectedArticle, setSelectedArticle }) {
  const published = news.filter(n=>n.status==="published").sort((a,b)=>b.date.localeCompare(a.date));
  const catColour = { event:"var(--burg2)", news:"var(--blue2)", merchandise:"var(--green2)", technical:"var(--gold)" };
  const catLabel = { event:"Event", news:"Club News", merchandise:"Merchandise", technical:"Technical" };

  if (selectedArticle) {
    const art = news.find(n=>n.id===selectedArticle);
    if (!art) { setSelectedArticle(null); return null; }
    return (
      <div>
        <div style={{background:"linear-gradient(160deg,var(--burg-xdk),#0a0608)",padding:"48px 24px 36px"}}>
          <div style={{maxWidth:760,margin:"0 auto"}}>
            <button onClick={()=>setSelectedArticle(null)} style={{background:"none",border:"none",color:"var(--text3)",fontFamily:"var(--font-b)",fontSize:13,cursor:"pointer",marginBottom:16,display:"flex",alignItems:"center",gap:6}}>← Back to News</button>
            <div style={{display:"flex",gap:10,marginBottom:12}}>
              <span style={{background:catColour[art.category]||"var(--burg)",color:"white",fontSize:10,fontFamily:"var(--font-m)",padding:"3px 8px",borderRadius:4,textTransform:"uppercase",letterSpacing:"0.08em"}}>{catLabel[art.category]||art.category}</span>
              {art.pinned&&<span style={{background:"var(--gold)",color:"var(--burg-xdk)",fontSize:10,fontFamily:"var(--font-m)",padding:"3px 8px",borderRadius:4,textTransform:"uppercase",letterSpacing:"0.08em"}}>📌 Featured</span>}
            </div>
            <h1 style={{fontFamily:"var(--font-d)",fontSize:36,color:"var(--gold3)",fontWeight:700,lineHeight:1.15,margin:"0 0 12px"}}>{art.title}</h1>
            <div style={{fontSize:12,color:"var(--text3)",fontFamily:"var(--font-m)"}}>By {art.authorName} · {art.date}</div>
          </div>
        </div>
        <div style={{maxWidth:760,margin:"0 auto",padding:"40px 24px"}}>
          <div style={{fontSize:34,marginBottom:20,textAlign:"center"}}>{art.image}</div>
          <div style={{fontSize:15,color:"var(--text2)",lineHeight:1.9,whiteSpace:"pre-wrap"}}>{art.body}</div>
        </div>
      </div>
    );
  }

  return (
    <div>
      <div style={{background:"linear-gradient(160deg,var(--burg-xdk),var(--burg))",padding:"72px 24px 52px",textAlign:"center"}}>
        <div style={{fontFamily:"var(--font-m)",fontSize:10,color:"rgba(255,255,255,.7)",textTransform:"uppercase",letterSpacing:"0.2em",marginBottom:12}}>From the Club</div>
        <h1 style={{fontFamily:"var(--font-d)",fontSize:48,color:"#ffffff",fontWeight:700,margin:"0 0 16px"}}>News &amp; Announcements</h1>
        <p style={{fontSize:14,color:"rgba(255,255,255,.85)",maxWidth:480,margin:"0 auto",lineHeight:1.7}}>The latest from the Rover Car Club of Australia — events, member news, and club announcements.</p>
      </div>

      <div style={{maxWidth:1000,margin:"0 auto",padding:"52px 24px"}}>
        {/* Featured article */}
        {published.find(n=>n.pinned) && (() => {
          const featured = published.find(n=>n.pinned);
          return (
            <div style={{background:"linear-gradient(135deg,var(--burg-dk),var(--bg2))",border:"1px solid var(--gold)",borderRadius:10,padding:28,marginBottom:32,cursor:"pointer"}} onClick={()=>setSelectedArticle(featured.id)}>
              <div style={{display:"flex",gap:10,marginBottom:10}}>
                <span style={{background:"var(--gold)",color:"var(--burg-xdk)",fontSize:10,fontFamily:"var(--font-m)",padding:"3px 8px",borderRadius:4,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em"}}>📌 Featured</span>
                <span style={{background:catColour[featured.category]||"var(--burg)",color:"white",fontSize:10,fontFamily:"var(--font-m)",padding:"3px 8px",borderRadius:4,textTransform:"uppercase"}}>{catLabel[featured.category]}</span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:20,alignItems:"center"}}>
                <div>
                  <h2 style={{fontFamily:"var(--font-d)",fontSize:26,color:"var(--gold3)",fontWeight:700,marginBottom:10,lineHeight:1.2}}>{featured.title}</h2>
                  <p style={{fontSize:13.5,color:"var(--text2)",lineHeight:1.7,marginBottom:12}}>{featured.excerpt}</p>
                  <div style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--font-m)"}}>{featured.authorName} · {featured.date}</div>
                </div>
                <div style={{fontSize:56,opacity:.7}}>{featured.image}</div>
              </div>
            </div>
          );
        })()}

        {/* News grid */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:16}}>
          {published.filter(n=>!n.pinned).map(n=>(

              onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                <div style={{fontSize:28}}>{n.image}</div>
                <span style={{background:catColour[n.category]||"var(--burg)",color:"white",fontSize:9.5,fontFamily:"var(--font-m)",padding:"2px 7px",borderRadius:3,textTransform:"uppercase"}}>{catLabel[n.category]||n.category}</span>
              </div>
              <h3 style={{fontFamily:"var(--font-d)",fontSize:16,color:"var(--gold3)",fontWeight:700,lineHeight:1.3,marginBottom:8}}>{n.title}</h3>
              <p style={{fontSize:12.5,color:"var(--text2)",lineHeight:1.6,marginBottom:12}}>{n.excerpt}</p>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontSize:10.5,color:"var(--text3)",fontFamily:"var(--font-m)"}}>{n.authorName.split(" ")[0]} · {n.date}</div>
                <span style={{fontSize:12,color:"var(--gold)",fontFamily:"var(--font-b)"}}>Read →</span>
              </div>
            </div>
          ))}
        </div>
        {published.length===0&&(
          <div style={{textAlign:"center",padding:60,color:"var(--text3)",fontFamily:"var(--font-m)",fontSize:12}}>No news published yet.</div>
        )}
      </div>
    </div>
  );
}

// ── NEWS ADMIN (inside portal) ────────────────────────────────────────────────
function NewsAdminSection({ user, news, setNews }) {
  const [modal,setModal]=useState(null); const [form,setForm]=useState({}); const [view,setView]=useState(null);
  function openAdd(){setForm({title:"",category:"news",body:"",excerpt:"",image:"📰",pinned:false,status:"published",authorId:user.id,authorName:user.name,date:today,slug:""});setModal("add");}
  function openEdit(n){setForm({...n});setModal({edit:n});}
  async function handleSave(){
    if(!form.title||!form.body)return alert("Title and body required.");
    const slug=form.slug||form.title.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
    const article={...form,slug,excerpt:form.excerpt||form.body.slice(0,160)+"…"};
    const u=modal==="add"?[...news,{...article,id:uid("N")}]:news.map(n=>n.id===article.id?article:n);
    setNews(u);await dbSet(SK.news,u);setModal(null);
  }
  async function del(id){const u=news.filter(n=>n.id!==id);setNews(u);await dbSet(SK.news,u);setModal(null);setView(null);}
  async function togglePin(id){const u=news.map(n=>n.id===id?{...n,pinned:!n.pinned}:n);setNews(u);await dbSet(SK.news,u);}
  async function toggleStatus(id){const u=news.map(n=>n.id===id?{...n,status:n.status==="published"?"draft":"published"}:n);setNews(u);await dbSet(SK.news,u);}
  const catColour={event:"var(--burg2)",news:"var(--blue2)",merchandise:"var(--green2)",technical:"var(--gold)"};
  const sorted=[...news].sort((a,b)=>b.date.localeCompare(a.date));
  return (
    <div className="fade-up">
      <SectionHeader title="News &amp; Articles" subtitle={`${news.filter(n=>n.status==="published").length} published · ${news.filter(n=>n.status==="draft").length} drafts`}
        action={<Btn onClick={openAdd}>+ Write Article</Btn>}/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:20}}>
        <StatCard label="Published" value={news.filter(n=>n.status==="published").length} colour="var(--green2)" icon="📰"/>
        <StatCard label="Drafts" value={news.filter(n=>n.status==="draft").length} colour="var(--gold2)" icon="✏"/>
        <StatCard label="Pinned" value={news.filter(n=>n.pinned).length} colour="var(--gold2)" icon="📌"/>
      </div>
      <Col gap={10}>
        {sorted.length===0&&<EmptyState icon="📰" text="No articles yet" sub="Click 'Write Article' to get started"/>}
        {sorted.map(n=>(
          <Card key={n.id} style={{padding:"14px 20px",cursor:"pointer"}} onClick={()=>setView(n)}>
            <Row justify="space-between" align="center" wrap gap={12}>
              <Row gap={12} align="center" style={{flex:1,minWidth:0}}>
                <div style={{fontSize:26,flexShrink:0}}>{n.image}</div>
                <div style={{minWidth:0}}>
                  <Row gap={8} align="center" style={{marginBottom:4}}>
                    <div style={{fontFamily:"var(--font-d)",fontSize:15,color:"var(--gold3)",fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{n.title}</div>
                    {n.pinned&&<span style={{fontSize:9,background:"var(--gold)",color:"var(--burg-xdk)",borderRadius:3,padding:"1px 6px",fontFamily:"var(--font-m)",flexShrink:0}}>PINNED</span>}
                    {n.status==="draft"&&<span style={{fontSize:9,background:"var(--bg4)",color:"var(--text3)",border:"1px solid var(--border2)",borderRadius:3,padding:"1px 6px",fontFamily:"var(--font-m)",flexShrink:0}}>DRAFT</span>}
                  </Row>
                  <Row gap={8}>
                    <span style={{fontSize:9.5,background:catColour[n.category]||"var(--burg)",color:"white",borderRadius:3,padding:"1px 6px",fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.06em"}}>{n.category}</span>
                    <span style={{fontSize:10.5,color:"var(--text3)",fontFamily:"var(--font-m)"}}>{n.date} · {n.authorName}</span>
                  </Row>
                </div>
              </Row>
              <Row gap={5} onClick={e=>e.stopPropagation()}>
                <Btn variant="ghost" size="sm" onClick={()=>togglePin(n.id)}>{n.pinned?"Unpin":"Pin"}</Btn>
                <Btn variant="ghost" size="sm" onClick={()=>toggleStatus(n.id)}>{n.status==="published"?"Unpublish":"Publish"}</Btn>
                <Btn variant="ghost" size="sm" onClick={()=>openEdit(n)}>Edit</Btn>
              </Row>
            </Row>
          </Card>
        ))}
      </Col>

      {view&&<Modal title={view.title} onClose={()=>setView(null)} wide>
        <Row gap={8} wrap style={{marginBottom:12}}>
          <span style={{fontSize:9.5,background:catColour[view.category]||"var(--burg)",color:"white",borderRadius:3,padding:"2px 7px",fontFamily:"var(--font-m)",textTransform:"uppercase"}}>{view.category}</span>
          <span style={{fontSize:10,color:"var(--text3)",fontFamily:"var(--font-m)"}}>{view.date} · {view.authorName}</span>
          {view.pinned&&<span style={{fontSize:9,background:"var(--gold)",color:"var(--burg-xdk)",borderRadius:3,padding:"2px 7px",fontFamily:"var(--font-m)"}}>📌 PINNED</span>}
        </Row>
        <div style={{fontSize:28,textAlign:"center",marginBottom:12}}>{view.image}</div>
        <p style={{fontSize:13,color:"var(--text2)",fontStyle:"italic",marginBottom:14,lineHeight:1.6,borderLeft:"3px solid var(--burg2)",paddingLeft:12}}>{view.excerpt}</p>
        <div style={{fontSize:13.5,color:"var(--text2)",lineHeight:1.8,whiteSpace:"pre-wrap",maxHeight:300,overflowY:"auto",background:"var(--bg3)",borderRadius:6,padding:14,marginBottom:14}}>{view.body}</div>
        <Row gap={8} justify="flex-end">
          <Btn variant="danger" size="sm" onClick={()=>setModal({confirm:{msg:"Delete this article?",fn:()=>del(view.id)}})}>Delete</Btn>
          <Btn variant="ghost" size="sm" onClick={()=>{setView(null);openEdit(view);}}>Edit</Btn>
        </Row>
      </Modal>}

      {(modal==="add"||modal?.edit)&&<Modal title={modal==="add"?"Write Article":"Edit Article"} onClose={()=>setModal(null)} wide>
        <Field label="Headline"><Input value={form.title||""} onChange={e=>setForm({...form,title:e.target.value})} placeholder="Article headline…"/></Field>
        <Row gap={12} wrap style={{justifyContent:"space-between"}}>
          <Field label="Category" half>
            <Select value={form.category||"news"} onChange={e=>setForm({...form,category:e.target.value})}>
              {["news","event","merchandise","technical"].map(c=><option key={c}>{c}</option>)}
            </Select>
          </Field>
          <Field label="Date" half><Input type="date" value={form.date||""} onChange={e=>setForm({...form,date:e.target.value})}/></Field>
        </Row>
        <Field label="Excerpt (shown in listings — leave blank to auto-generate)"><Textarea value={form.excerpt||""} onChange={e=>setForm({...form,excerpt:e.target.value})} style={{minHeight:60}} placeholder="Brief summary shown on news cards…"/></Field>
        <Field label="Full Article Body"><Textarea value={form.body||""} onChange={e=>setForm({...form,body:e.target.value})} style={{minHeight:200}} placeholder="Full article text…"/></Field>
        <Row gap={12} wrap style={{justifyContent:"space-between"}}>
          <Field label="Emoji Icon" half><Input value={form.image||""} onChange={e=>setForm({...form,image:e.target.value})} placeholder="📰"/></Field>
          <Field label="Status" half><Select value={form.status||"published"} onChange={e=>setForm({...form,status:e.target.value})}><option value="published">Published</option><option value="draft">Draft</option></Select></Field>
        </Row>
        <Field label="Pin to top of news page?">
          <Select value={form.pinned?"yes":"no"} onChange={e=>setForm({...form,pinned:e.target.value==="yes"})}>
            <option value="no">No</option><option value="yes">Yes — Feature this article</option>
          </Select>
        </Field>
        <Row gap={8} justify="flex-end"><Btn variant="ghost" onClick={()=>setModal(null)}>Cancel</Btn><Btn onClick={handleSave}>Save Article</Btn></Row>
      </Modal>}
      {modal?.confirm&&<Confirm message={modal.confirm.msg} onConfirm={modal.confirm.fn} onCancel={()=>setModal(null)}/>}
    </div>
  );
}

// MEMBERSHIP APPLICATION FORM (public)
// ══════════════════════════════════════════════════════════════════════════════
function MembershipApplicationForm({ onBack }) {
  const BLANK = {
    firstName:"", lastName:"", email:"", phone:"", dob:"",
    address:"", suburb:"", state:"VIC", postcode:"", country:"Australia",
    memberType:"City Membership",
    vehicleMake:"", vehicleModel:"", vehicleYear:"", vehicleNotes:"",
    howHeard:"", comments:"",
    agreeRules:false, agreeAge:false,
  };
  const [form, setForm] = useState(BLANK);
  const [submitted, setSubmitted] = useState(false);
  const [refNum, setRefNum] = useState("");
  const [errors, setErrors] = useState({});

  function validate() {
    const e = {};
    if(!form.firstName.trim()) e.firstName = "Required";
    if(!form.lastName.trim()) e.lastName = "Required";
    if(!form.email.trim()||!/\S+@\S+\.\S+/.test(form.email)) e.email = "Valid email required";
    if(!form.phone.trim()) e.phone = "Required";
    if(!form.address.trim()) e.address = "Required";
    if(!form.suburb.trim()) e.suburb = "Required";
    if(!form.postcode.trim()) e.postcode = "Required";
    if(!form.agreeRules) e.agreeRules = "You must agree to the club rules";
    if(!form.agreeAge) e.agreeAge = "You must confirm you are 18 or over";
    return e;
  }

  async function handleSubmit() {
    const e = validate();
    if(Object.keys(e).length) { setErrors(e); return; }
    const ref = "APP-" + Date.now().toString(36).toUpperCase();
    const application = {
      id: ref, status:"pending", submitted: new Date().toISOString().split("T")[0],
      firstName:form.firstName, lastName:form.lastName,
      name:`${form.firstName} ${form.lastName}`,
      email:form.email, phone:form.phone, dob:form.dob,
      address:`${form.address}, ${form.suburb} ${form.state} ${form.postcode} ${form.country}`,
      memberType:form.memberType,
      vehicle: form.vehicleMake ? `${form.vehicleYear} ${form.vehicleMake} ${form.vehicleModel}`.trim() : "",
      vehicleNotes:form.vehicleNotes,
      howHeard:form.howHeard, comments:form.comments,
    };
    const existing = await window.storage.get("rcca:applications").catch(()=>null);
    const apps = existing ? JSON.parse(existing.value) : [];
    apps.push(application);
    await window.storage.set("rcca:applications", JSON.stringify(apps));
    setRefNum(ref);
    setSubmitted(true);
  }

  function f(key, val) { setForm(p=>({...p,[key]:val})); setErrors(p=>({...p,[key]:undefined})); }

  const inputSt = (k) => ({
    width:"100%", background:"#ffffff", border:`1px solid ${errors[k]?"#c0282a":"var(--border2)"}`,
    borderRadius:6, padding:"10px 12px", color:"var(--text)", fontFamily:"var(--font-b)",
    fontSize:14, outline:"none",

  const sectionSt = { background:"#ffffff", border:"1px solid var(--border)", borderRadius:10, padding:24, marginBottom:20 };
  const headingSt = { fontFamily:"var(--font-d)", fontSize:18, fontWeight:700, color:"var(--text)", marginBottom:18, paddingBottom:10, borderBottom:"1px solid var(--border)" };

  if(submitted) return (
    <div style={{maxWidth:620,margin:"60px auto",padding:"0 24px"}}>
      <div style={{background:"#ffffff",border:"2px solid var(--burg)",borderRadius:12,padding:40,textAlign:"center",boxShadow:"0 4px 24px rgba(0,0,0,.08)"}}>
        <div style={{fontSize:56,marginBottom:16}}>✅</div>
        <h2 style={{fontFamily:"var(--font-d)",fontSize:26,fontWeight:700,color:"var(--text)",marginBottom:8}}>Application Submitted!</h2>
        <div style={{fontFamily:"var(--font-m)",fontSize:13,color:"var(--burg)",fontWeight:700,marginBottom:16}}>Reference: {refNum}</div>
        <p style={{fontSize:14,color:"var(--text2)",lineHeight:1.7,marginBottom:24}}>
          Thank you for applying to join the Rover Car Club of Australia. Your application has been received and will be reviewed by our committee. We will be in touch at <strong>{form.email}</strong> within 5–7 business days.
        </p>
        <div style={{background:"var(--bg3)",borderRadius:8,padding:16,fontSize:13,color:"var(--text3)",marginBottom:24,textAlign:"left"}}>
          <div style={{fontWeight:700,color:"var(--text)",marginBottom:6}}>What happens next?</div>
          <div style={{marginBottom:4}}>1. Committee reviews your application</div>
          <div style={{marginBottom:4}}>2. You will receive an approval email with payment details</div>
          <div style={{marginBottom:4}}>3. Once payment is received, your membership is activated</div>
          <div>4. You will receive your member number and login details</div>
        </div>
        <div style={{fontSize:12,color:"var(--text4)"}}>Questions? Email <span style={{color:"var(--burg)"}}>membership@rcca.com.au</span></div>
        <button onClick={onBack} style={{marginTop:20,background:"none",border:"1px solid var(--border2)",borderRadius:6,padding:"10px 24px",color:"var(--text3)",fontFamily:"var(--font-b)",fontSize:13,cursor:"pointer"}}>← Back to Membership</button>
      </div>
    </div>
  );

  return (

      <button onClick={onBack} style={{background:"none",border:"none",color:"var(--burg)",fontFamily:"var(--font-b)",fontSize:13,cursor:"pointer",marginBottom:20,fontWeight:600}}>← Back to Membership</button>

      <p style={{fontSize:14,color:"var(--text3)",marginBottom:32}}>Complete the form below. Fields marked * are required. Your application will be reviewed by the committee before activation.</p>

        <div style={headingSt}>Personal Details</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
          <div>
            <label style={labelSt}>First Name *</label>
            <input style={inputSt("firstName")} value={form.firstName} onChange={e=>f("firstName",e.target.value)} placeholder="e.g. Geoffrey"/>
            {errors.firstName&&<div style={errSt}>{errors.firstName}</div>}
          </div>
          <div>
            <label style={labelSt}>Last Name *</label>
            <input style={inputSt("lastName")} value={form.lastName} onChange={e=>f("lastName",e.target.value)} placeholder="e.g. Harrington"/>
            {errors.lastName&&<div style={errSt}>{errors.lastName}</div>}
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
          <div>
            <label style={labelSt}>Email Address *</label>
            <input style={inputSt("email")} type="email" value={form.email} onChange={e=>f("email",e.target.value)} placeholder="your@email.com"/>
            {errors.email&&<div style={errSt}>{errors.email}</div>}
          </div>
          <div>
            <label style={labelSt}>Phone *</label>
            <input style={inputSt("phone")} value={form.phone} onChange={e=>f("phone",e.target.value)} placeholder="04xx xxx xxx"/>
            {errors.phone&&<div style={errSt}>{errors.phone}</div>}
          </div>
        </div>
        <div style={{marginBottom:16}}>
          <label style={labelSt}>Date of Birth</label>
          <input style={{...inputSt("dob"),width:"50%"}} type="date" value={form.dob} onChange={e=>f("dob",e.target.value)}/>
        </div>
        <div style={{marginBottom:16}}>
          <label style={labelSt}>Street Address *</label>
          <input style={inputSt("address")} value={form.address} onChange={e=>f("address",e.target.value)} placeholder="123 Example Street"/>
          {errors.address&&<div style={errSt}>{errors.address}</div>}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:16,marginBottom:16}}>
          <div>
            <label style={labelSt}>Suburb *</label>

            <label style={labelSt}>State</label>

            {errors.postcode&&<div style={errSt}>{errors.postcode}</div>}
          </div>

      </div>

      {/* Membership Type */}
      <div style={sectionSt}>
        <div style={headingSt}>Membership Type</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          {[
            {id:"City Membership",price:"A$54/year",desc:"Melbourne metropolitan area"},
            {id:"Country & Interstate",price:"A$46/year",desc:"Outside Melbourne metro"},
          ].map(m=>(
            <label key={m.id} style={{display:"flex",gap:12,padding:16,border:`2px solid ${form.memberType===m.id?"var(--burg)":"var(--border)"}`,borderRadius:8,cursor:"pointer",background:form.memberType===m.id?"#fff5f5":"#ffffff"}}>

              <div>
                <div style={{fontWeight:700,fontSize:14,color:"var(--text)"}}>{m.id}</div>
                <div style={{fontSize:13,color:"var(--burg)",fontWeight:600}}>{m.price}</div>
                <div style={{fontSize:12,color:"var(--text3)"}}>{m.desc}</div>

      {/* Vehicle Details (optional) */}
      <div style={sectionSt}>
        <div style={headingSt}>Vehicle Details <span style={{fontSize:13,fontWeight:400,color:"var(--text3)"}}>— optional</span></div>
        <p style={{fontSize:13,color:"var(--text3)",marginBottom:16}}>Tell us about your Rover(s). You can add more vehicles later through the members portal.</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16,marginBottom:16}}>

      <div style={sectionSt}>

      {/* Agreement */}
      <div style={sectionSt}>

          <label style={{display:"flex",gap:12,cursor:"pointer",alignItems:"flex-start"}}>

    </div>
  );

// APPLICATIONS ADMIN SECTION (portal)
// ══════════════════════════════════════════════════════════════════════════════
function ApplicationsSection({ applications, setApplications, members, setMembers, dues, setDues }) {
  const [view, setView] = useState(null);
  const [declineNote, setDeclineNote] = useState("");
  const pending = applications.filter(a=>a.status==="pending");
  const processed = applications.filter(a=>a.status!=="pending");

  async function approve(app) {
    const mNum = String(members.length+1).padStart(3,"0");
    const newMember = {
      id: uid("M"), name:app.name, email:app.email, phone:app.phone,
      joined:today, status:"active", memberType:app.memberType,
      role:"member", bio:"", state:app.address?.split(" ").slice(-3,-2)[0]||"",
      memberNumber:mNum, password:"changeme123",
      avatar: app.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase(),
    };
    const newDue = { id:uid("D"), memberId:newMember.id, year:yr, paid:false,
      amount:app.memberType==="City Membership"?54:46, type:app.memberType, dueDate:`${yr}-07-01` };
    const updatedApps = applications.map(a=>a.id===app.id?{...a,status:"approved",approvedDate:today}:a);
    const updatedMembers = [...members, newMember];
    const updatedDues = [...dues, newDue];
    setApplications(updatedApps); setMembers(updatedMembers); setDues(updatedDues);
    await dbSet(SK.applications, updatedApps);
    await dbSet(SK.members, updatedMembers);
    await dbSet(SK.dues, updatedDues);
    setView(null);
    alert(`✅ ${app.name} approved! Member #${mNum} created.
Temporary password: changeme123
Please notify them at ${app.email}`);
  }

  async function decline(app) {
    const updatedApps = applications.map(a=>a.id===app.id?{...a,status:"declined",declineNote,declinedDate:today}:a);
    setApplications(updatedApps);
    await dbSet(SK.applications, updatedApps);
    setView(null); setDeclineNote("");
    alert(`Application from ${app.name} has been declined.`);
  }

  const inputSt = { width:"100%",background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:6,padding:"8px 12px",color:"var(--text)",fontFamily:"var(--font-b)",fontSize:13,outline:"none" };

  return (
    <div className="fade-up">
      <SectionHeader title="Membership Applications"
        subtitle={`${pending.length} pending review`}/>

      {pending.length===0&&processed.length===0&&(
        <div style={{textAlign:"center",padding:"60px 0",color:"var(--text3)",fontFamily:"var(--font-m)",fontSize:13}}>No applications received yet.</div>
      )}

      {pending.length>0&&(
        <div style={{marginBottom:32}}>
          <div style={{fontFamily:"var(--font-m)",fontSize:11,color:"var(--burg)",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:14}}>Pending Review ({pending.length})</div>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {pending.map(app=>(
              <div key={app.id} style={{background:"#ffffff",border:"2px solid #f0d080",borderRadius:10,padding:20,cursor:"pointer"}} onClick={()=>setView(app)}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style={{fontFamily:"var(--font-d)",fontSize:17,fontWeight:700,color:"var(--text)",marginBottom:4}}>{app.name}</div>
                    <div style={{fontSize:13,color:"var(--text3)",marginBottom:4}}>{app.email} · {app.phone}</div>
                    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                      <span style={{fontSize:11,background:"#fdecd0",color:"#7a4010",border:"1px solid #f0c890",fontFamily:"var(--font-m)",padding:"2px 8px",borderRadius:3,fontWeight:700}}>{app.memberType}</span>
                      {app.vehicle&&<span style={{fontSize:11,background:"#d0e8fc",color:"#1a3a6a",border:"1px solid #90c0f0",fontFamily:"var(--font-m)",padding:"2px 8px",borderRadius:3}}>{app.vehicle}</span>}
                    </div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontFamily:"var(--font-m)",fontSize:10,color:"var(--text4)"}}>Submitted</div>
                    <div style={{fontFamily:"var(--font-m)",fontSize:12,color:"var(--text3)"}}>{app.submitted}</div>
                    <div style={{marginTop:8,fontSize:11,color:"var(--burg)",fontWeight:600}}>Click to review →</div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {processed.length>0&&(
        <div>
          <div style={{fontFamily:"var(--font-m)",fontSize:11,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:14}}>Processed ({processed.length})</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {[...processed].reverse().map(app=>(
              <div key={app.id} style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:8,padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}} onClick={()=>setView(app)}>
                <div>
                  <span style={{fontWeight:600,color:"var(--text)",marginRight:12}}>{app.name}</span>
                  <span style={{fontSize:12,color:"var(--text3)"}}>{app.email}</span>
                </div>
                <div style={{display:"flex",gap:10,alignItems:"center"}}>
                  <span style={{fontSize:11,fontFamily:"var(--font-m)",color:"var(--text4)"}}>{app.submitted}</span>
                  <span style={{fontSize:10,fontFamily:"var(--font-m)",fontWeight:700,padding:"2px 8px",borderRadius:3,
                    background:app.status==="approved"?"#d4f0e0":"#fdd8d8",
                    color:app.status==="approved"?"#1a6040":"#8f1a1a",
                    border:`1px solid ${app.status==="approved"?"#a0d8b8":"#f0a8a8"}`
                  }}>{app.status.toUpperCase()}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {view&&(
        <Modal title={`Application — ${view.name}`} onClose={()=>{setView(null);setDeclineNote("");}} wide>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:18,fontSize:13}}>
            {[
              ["Full Name",view.name], ["Email",view.email], ["Phone",view.phone],
              ["Address",view.address], ["Membership Type",view.memberType],
              ["Vehicle",view.vehicle||"Not provided"],
              ["How they heard",view.howHeard||"Not specified"],
              ["Submitted",view.submitted], ["Ref",view.id],
            ].map(([k,v])=>(
              <div key={k}>
                <div style={{fontFamily:"var(--font-m)",fontSize:10,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:2}}>{k}</div>
                <div style={{color:"var(--text)",fontWeight:600}}>{v}</div>
              </div>
            ))}
          </div>
          {view.vehicleNotes&&<div style={{background:"var(--bg3)",borderRadius:6,padding:12,fontSize:13,color:"var(--text2)",marginBottom:14}}><strong>Vehicle notes:</strong> {view.vehicleNotes}</div>}
          {view.comments&&<div style={{background:"var(--bg3)",borderRadius:6,padding:12,fontSize:13,color:"var(--text2)",marginBottom:14}}><strong>Comments:</strong> {view.comments}</div>}
          {view.status==="pending"&&(
            <div>
              <div style={{borderTop:"1px solid var(--border)",paddingTop:16,marginBottom:14}}>
                <div style={{fontFamily:"var(--font-m)",fontSize:11,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Decline note (optional)</div>
                <textarea value={declineNote} onChange={e=>setDeclineNote(e.target.value)}
                  style={{...inputSt,minHeight:70}} placeholder="Reason for declining (will be recorded for admin purposes)"/>
              </div>
              <Row gap={10} justify="flex-end">
                <Btn variant="danger" onClick={()=>decline(view)}>✗ Decline</Btn>
                <Btn onClick={()=>approve(view)}>✓ Approve & Create Member</Btn>
              </Row>
            </div>
          )}
          {view.status==="approved"&&<div style={{background:"#d4f0e0",border:"1px solid #a0d8b8",borderRadius:8,padding:12,fontSize:13,color:"#1a6040",fontWeight:600}}>✓ Approved on {view.approvedDate}</div>}
          {view.status==="declined"&&<div style={{background:"#fdd8d8",border:"1px solid #f0a8a8",borderRadius:8,padding:12,fontSize:13,color:"#8f1a1a"}}>✗ Declined on {view.declinedDate}{view.declineNote&&` — ${view.declineNote}`}</div>}
        </Modal>
      )}
    </div>
  );
}

            </button>
            {saved && <span style={{fontSize:13,color:"var(--green2)",fontFamily:"var(--font-m)"}}>✓ Saved — public site updated</span>}
            <button onClick={()=>setLocal(JSON.parse(JSON.stringify(siteContent)))} style={{background:"none",border:"1px solid var(--border2)",borderRadius:6,padding:"10px 18px",color:"var(--text3)",fontFamily:"var(--font-b)",fontSize:12,cursor:"pointer"}}>
              Discard Changes
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ROOT
// ══════════════════════════════════════════════════════════════════════════════
function App() {
  const [loading,setLoading]=useState(true);
  const [user,setUser]=useState(null);
  const [tab,setTab]=useState("dashboard");
  // Public site state
  const [publicPage,setPublicPage]=useState("home");
  const [showLogin,setShowLogin]=useState(false);
  const [selectedArticle,setSelectedArticle]=useState(null);
  // Data
  const [members,setMembers]=useState([]);
  const [cars,setCars]=useState([]);
  const [transfers,setTransfers]=useState([]);
  const [meetings,setMeetings]=useState([]);
  const [events,setEvents]=useState([]);
  const [tasks,setTasks]=useState([]);
  const [dues,setDues]=useState([]);
  const [rsvps,setRsvps]=useState([]);
  const [listings,setListings]=useState([]);
  const [shopItems,setShopItems]=useState([]);
  const [orders,setOrders]=useState([]);
  const [news,setNews]=useState([]);
  const [siteContent,setSiteContent]=useState(DEFAULT_SITE_CONTENT);
  const [applications,setApplications]=useState([]);
  const [expenses,setExpenses]=useState([]);
  const [finSettings,setFinSettings]=useState(null);
  const [permits,setPermits]=useState([]);
  const [tripLogs,setTripLogs]=useState([]);
  const [showApplicationForm,setShowApplicationForm]=useState(false);

  useEffect(()=>{
    (async()=>{
      const [m,c,tr,mt,ev,tk,d,r,li,si,or,nw,sc,ap,ex,fs,pm,tl]=await Promise.all([
        dbGet(SK.members),dbGet(SK.cars),dbGet(SK.transfers),dbGet(SK.meetings),dbGet(SK.events),
        dbGet(SK.tasks),dbGet(SK.dues),dbGet(SK.rsvps),dbGet(SK.listings),dbGet(SK.shopItems),dbGet(SK.orders),dbGet(SK.news),dbGet(SK.siteContent),dbGet(SK.applications),
        dbGet(SK.expenses),dbGet(SK.finSettings),dbGet(SK.permits),dbGet(SK.tripLogs)
      ]);
      const fm=m||SEED_MEMBERS; setMembers(fm);
      setCars(c||SEED_CARS); setTransfers(tr||[]); setMeetings(mt||SEED_MEETINGS);
      setEvents(ev||SEED_EVENTS); setTasks(tk||SEED_TASKS); setDues(d||SEED_DUES);
      setRsvps(r||SEED_RSVPS); setListings(li||SEED_LISTINGS);
      setShopItems(si||SEED_SHOP); setOrders(or||[]); setNews(nw||SEED_NEWS);
      if(sc)setSiteContent(sc);
      if(ap)setApplications(ap);
      if(ex)setExpenses(ex);
      if(fs)setFinSettings(fs);
      if(pm)setPermits(pm);
      if(tl)setTripLogs(tl);
      if(!m)await dbSet(SK.members,SEED_MEMBERS);
      if(!c)await dbSet(SK.cars,SEED_CARS);
      if(!d)await dbSet(SK.dues,SEED_DUES);
      if(!mt)await dbSet(SK.meetings,SEED_MEETINGS);
      if(!ev)await dbSet(SK.events,SEED_EVENTS);
      if(!tk)await dbSet(SK.tasks,SEED_TASKS);
      if(!r)await dbSet(SK.rsvps,SEED_RSVPS);
      if(!li)await dbSet(SK.listings,SEED_LISTINGS);
      if(!si)await dbSet(SK.shopItems,SEED_SHOP);
      if(!nw)await dbSet(SK.news,SEED_NEWS);
      setLoading(false);
    })();
  },[]);

  useEffect(()=>{
    if(user){const fresh=members.find(m=>m.id===user.id);if(fresh&&JSON.stringify(fresh)!==JSON.stringify(user))setUser(fresh);}
  },[members]);

  const notifs={
    dues: user?.role==="admin"?dues.filter(d=>d.year===yr&&!d.paid).length:0,
    tasks: tasks.filter(t=>t.assigneeId===user?.id&&t.status!=="done").length,
    news: user?.role==="admin"?news.filter(n=>n.status==="draft").length:0,

<script type="text/babel" data-presets="react">

function PhotoManager({ car, cars, setCars }) {
  const MAX=20, photos=car.photos||[];
  const [newUrl,setNewUrl]=useState(""), [caption,setCaption]=useState(""), [preview,setPreview]=useState(null), [err,setErr]=useState("");
  async function save(list){const u=cars.map(c=>c.id===car.id?{...c,photos:list}:c);setCars(u);await dbSet(SK.cars,u);}
  function add(){
    const u=newUrl.trim();
    if(!u){setErr("Enter a URL.");return;}
    if(!u.startsWith("http://")&&!u.startsWith("https://")){setErr("Must start with http:// or https://");return;}
    if(photos.length>=MAX){setErr("Max "+MAX+" photos.");return;}
    setErr("");save([...photos,{id:uid("PH"),url:u,caption:caption.trim(),added:today}]);setNewUrl("");setCaption("");
  }
  function move(idx,dir){const a=[...photos],s=idx+dir;if(s<0||s>=a.length)return;[a[idx],a[s]]=[a[s],a[idx]];save(a);}
  return (
    <div>
      {photos.length===0
        ?<div style={{textAlign:"center",padding:"16px",color:"var(--text3)",fontSize:12,border:"2px dashed var(--border2)",borderRadius:8,marginBottom:8}}>No photos. Add URLs below.</div>
        :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(100px,1fr))",gap:6,marginBottom:8}}>
          {photos.map((p,i)=>(
            <div key={p.id} style={{position:"relative",aspectRatio:"4/3",borderRadius:6,overflow:"hidden",cursor:"pointer",border:"1px solid var(--border)"}} onClick={()=>setPreview(i)}>
              <img src={p.url} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>{e.target.style.display="none";}}/>
              <div style={{position:"absolute",top:2,right:2,display:"flex",gap:2}} onClick={ev=>ev.stopPropagation()}>
                {i>0&&<button onClick={()=>move(i,-1)} style={{background:"rgba(0,0,0,.6)",border:"none",color:"#fff",width:16,height:16,borderRadius:2,cursor:"pointer",fontSize:9,padding:0}}>{"<"}</button>}
                {i<photos.length-1&&<button onClick={()=>move(i,1)} style={{background:"rgba(0,0,0,.6)",border:"none",color:"#fff",width:16,height:16,borderRadius:2,cursor:"pointer",fontSize:9,padding:0}}>{">"}</button>}
                <button onClick={()=>save(photos.filter(ph=>ph.id!==p.id))} style={{background:"rgba(180,30,30,.8)",border:"none",color:"#fff",width:16,height:16,borderRadius:2,cursor:"pointer",fontSize:10,padding:0}}>x</button>
              </div>
            </div>
          ))}
        </div>
      }
      <div style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:6,padding:10}}>
        <div style={{fontSize:10,color:"var(--text3)",marginBottom:6}}>ADD PHOTO ({photos.length}/{MAX})</div>
        <input style={{width:"100%",marginBottom:6,background:"var(--bg)",border:"1px solid var(--border2)",borderRadius:6,padding:"7px 10px",color:"var(--text)",fontSize:12,outline:"none",boxSizing:"border-box"}} value={newUrl} onChange={e=>{setNewUrl(e.target.value);setErr("");}} placeholder="https://example.com/photo.jpg"/>
        {err&&<div style={{fontSize:11,color:"var(--burg)",marginBottom:4}}>{err}</div>}
        <div style={{display:"flex",gap:6}}>
          <input style={{flex:1,background:"var(--bg)",border:"1px solid var(--border2)",borderRadius:6,padding:"7px 10px",color:"var(--text)",fontSize:12,outline:"none"}} value={caption} onChange={e=>setCaption(e.target.value)} placeholder="Caption (optional)"/>
          <button onClick={add} style={{background:"var(--burg)",border:"none",borderRadius:6,padding:"7px 14px",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:12}}>+ Add</button>
        </div>
      </div>
      {preview!==null&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.9)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setPreview(null)}>
          <div style={{maxWidth:"85vw",textAlign:"center"}} onClick={ev=>ev.stopPropagation()}>
            <img src={photos[preview].url} alt="" style={{maxHeight:"80vh",maxWidth:"85vw",objectFit:"contain",borderRadius:8}}/>
            {photos[preview].caption&&<div style={{color:"#fff",marginTop:8,fontSize:13}}>{photos[preview].caption}</div>}
            <div style={{color:"rgba(255,255,255,.5)",fontSize:11,marginTop:4}}>{preview+1} / {photos.length}</div>
            <div style={{display:"flex",gap:16,justifyContent:"center",marginTop:12}}>
              {preview>0&&<button onClick={()=>setPreview(preview-1)} style={{background:"rgba(255,255,255,.2)",border:"none",color:"#fff",padding:"8px 20px",borderRadius:6,cursor:"pointer"}}>Prev</button>}
              {preview<photos.length-1&&<button onClick={()=>setPreview(preview+1)} style={{background:"rgba(255,255,255,.2)",border:"none",color:"#fff",padding:"8px 20px",borderRadius:6,cursor:"pointer"}}>Next</button>}
            </div>
          </div>
        </div>
      )}
