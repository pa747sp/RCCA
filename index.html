// MEETINGS
// ══════════════════════════════════════════════════════════════════════════════
function MeetingsSection({ user, members, meetings, setMeetings, rsvps, setRsvps }) {
  const isAdmin=user.role==="admin";
  const [modal,setModal]=useState(null); const [form,setForm]=useState({}); const [view,setView]=useState(null);
  const sorted=[...meetings].sort((a,b)=>b.date.localeCompare(a.date));
  function openAdd(){setForm({title:"",date:today,time:"19:00",location:"",type:"general",status:"upcoming",agenda:"",minutes:"",organiser:user.id});setModal("add");}
  async function handleSave(){
    if(!form.title||!form.date)return alert("Title and date required.");
    const u=modal==="add"?[...meetings,{...form,id:uid("MT")}]:meetings.map(m=>m.id===form.id?{...form}:m);
    setMeetings(u);await dbSet(SK.meetings,u);setModal(null);
  }
  async function del(id){const u=meetings.filter(m=>m.id!==id);setMeetings(u);await dbSet(SK.meetings,u);setModal(null);setView(null);}
  const myR=eid=>rsvps.find(r=>r.eventId===eid&&r.memberId===user.id);
  async function rsvp(eid,status){
    const ex=rsvps.find(r=>r.eventId===eid&&r.memberId===user.id);
    const u=ex?rsvps.map(r=>r.id===ex.id?{...r,status}:r):[...rsvps,{id:uid("R"),eventId:eid,memberId:user.id,status,created:today}];
    setRsvps(u);await dbSet(SK.rsvps,u);
  }
  const cnt=(eid,s)=>rsvps.filter(r=>r.eventId===eid&&r.status===s).length;
  const orgName=id=>members.find(m=>m.id===id)?.name||"Unknown";
  return (
    <div className="fade-up">
      <SectionHeader title="Meetings" subtitle={`${meetings.filter(m=>m.status==="upcoming").length} upcoming`}
        action={isAdmin&&<Btn onClick={openAdd}>+ Schedule Meeting</Btn>}/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14}}>
        {sorted.length===0&&<EmptyState icon="◆" text="No meetings scheduled"/>}
        {sorted.map(m=>{
          const r=myR(m.id);
          return (<Card key={m.id} className="hover-lift" style={{padding:18,cursor:"pointer",borderTop:`3px solid ${m.status==="upcoming"?"var(--gold)":"var(--border)"}`}} onClick={()=>setView(m)}>
            <Row justify="space-between" align="flex-start" style={{marginBottom:10}}>
              <div><div style={{fontFamily:"var(--font-d)",fontSize:16,fontWeight:600,color:"var(--text)"}}>{m.title}</div><div style={{fontSize:10.5,color:"var(--text3)",fontFamily:"var(--font-m)",marginTop:3}}>{m.date} · {m.time}</div></div>
              <Col gap={4} align="flex-end"><Badge status={m.status}/><Badge status={m.type}/></Col>
            </Row>
            <div style={{fontSize:12,color:"var(--text2)",marginBottom:10}}>📍 {m.location}</div>
            <Row gap={12} style={{fontSize:10.5,color:"var(--text3)",fontFamily:"var(--font-m)",marginBottom:10}}>
              <span>✓ {cnt(m.id,"attending")}</span><span>? {cnt(m.id,"maybe")}</span><span>✗ {cnt(m.id,"declined")}</span>
              <span>Org: {orgName(m.organiser).split(" ")[0]}</span>
            </Row>
            {m.status==="upcoming"&&<Row gap={5} onClick={e=>e.stopPropagation()}>
              {["attending","maybe","declined"].map(s=><Btn key={s} variant={r?.status===s?"primary":"ghost"} size="sm" onClick={()=>rsvp(m.id,s)}>{s==="attending"?"✓ Going":s==="maybe"?"? Maybe":"✗ Can't"}</Btn>)}
            </Row>}
          </Card>);
        })}
      </div>
      {view&&<Modal title={view.title} onClose={()=>setView(null)} wide>
        <Row gap={8} wrap style={{marginBottom:14}}><Badge status={view.status}/><Badge status={view.type}/><span style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--font-m)"}}>{view.date} · {view.time} · {view.location}</span></Row>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:16}}>
          {[["Agenda",view.agenda||"No agenda set"],["Minutes",view.minutes||"No minutes yet"]].map(([label,val])=>(
            <div key={label}><div style={{fontSize:9.5,color:"var(--text3)",fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6}}>{label}</div>
            <div style={{background:"var(--bg3)",borderRadius:6,padding:"12px",fontSize:12.5,color:"var(--text2)",whiteSpace:"pre-wrap",minHeight:80,lineHeight:1.6}}>{val}</div></div>
          ))}
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:9.5,color:"var(--text3)",fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>RSVPs</div>
          <Row gap={6} wrap>
            {rsvps.filter(r=>r.eventId===view.id).map(r=>{const m2=members.find(m=>m.id===r.memberId);return m2?<Row key={r.id} gap={6} align="center" style={{background:"var(--bg3)",borderRadius:6,padding:"5px 10px"}}><Avatar name={m2.name} size={20}/><span style={{fontSize:12,color:"var(--text2)"}}>{m2.name.split(" ")[0]}</span><Badge status={r.status}/></Row>:null;})}
            {rsvps.filter(r=>r.eventId===view.id).length===0&&<span style={{color:"var(--text3)",fontSize:12,fontFamily:"var(--font-m)"}}>No RSVPs yet</span>}
          </Row>
        </div>
        {isAdmin&&<Row gap={8} justify="flex-end"><Btn variant="danger" size="sm" onClick={()=>setModal({confirm:{msg:"Delete meeting?",fn:()=>del(view.id)}})}>Delete</Btn><Btn variant="ghost" size="sm" onClick={()=>{setView(null);setForm({...view});setModal({edit:view});}}>Edit</Btn></Row>}
      </Modal>}
      {(modal==="add"||modal?.edit)&&<Modal title={modal==="add"?"Schedule Meeting":"Edit Meeting"} onClose={()=>setModal(null)} wide>
        <Field label="Title"><Input value={form.title||""} onChange={e=>setForm({...form,title:e.target.value})} placeholder="Annual General Meeting"/></Field>
        <Row gap={12} wrap style={{justifyContent:"space-between"}}><Field label="Date" half><Input type="date" value={form.date||""} onChange={e=>setForm({...form,date:e.target.value})}/></Field><Field label="Time" half><Input type="time" value={form.time||""} onChange={e=>setForm({...form,time:e.target.value})}/></Field></Row>
        <Field label="Location"><Input value={form.location||""} onChange={e=>setForm({...form,location:e.target.value})} placeholder="The Rover Rooms, Melbourne VIC"/></Field>
        <Row gap={12} wrap style={{justifyContent:"space-between"}}>
          <Field label="Type" half><Select value={form.type||"general"} onChange={e=>setForm({...form,type:e.target.value})}>{["general","committee","extraordinary","social"].map(t=><option key={t}>{t}</option>)}</Select></Field>
          <Field label="Status" half><Select value={form.status||"upcoming"} onChange={e=>setForm({...form,status:e.target.value})}>{["upcoming","past","cancelled"].map(s=><option key={s}>{s}</option>)}</Select></Field>
        </Row>
        <Field label="Agenda"><Textarea value={form.agenda||""} onChange={e=>setForm({...form,agenda:e.target.value})} style={{minHeight:100}}/></Field>
        <Field label="Minutes"><Textarea value={form.minutes||""} onChange={e=>setForm({...form,minutes:e.target.value})} style={{minHeight:100}}/></Field>
        <Row gap={8} justify="flex-end"><Btn variant="ghost" onClick={()=>setModal(null)}>Cancel</Btn><Btn onClick={handleSave}>Save</Btn></Row>
      </Modal>}
      {modal?.confirm&&<Confirm message={modal.confirm.msg} onConfirm={modal.confirm.fn} onCancel={()=>setModal(null)}/>}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// EVENTS
// ══════════════════════════════════════════════════════════════════════════════
function EventsSection({ user, members, cars, events, setEvents, rsvps, setRsvps }) {
  const isAdmin=user.role==="admin";
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({});
  const [view,setView]=useState(null);
  const [rsvpForm,setRsvpForm]=useState({guests:0,dietary:"None",requirements:"",vehicleId:""});
  const [confirmation,setConfirmation]=useState(null);
  const sorted=[...events].sort((a,b)=>a.date.localeCompare(b.date));
  const myCars=cars.filter(c=>c.ownerId===user.id&&c.status==="active");

  function openAdd(){setForm({title:"",date:today,time:"10:00",location:"",type:"show",status:"upcoming",description:"",organiser:user.id,maxAttendees:"",catering:false});setModal("add");}
  async function handleSave(){
    if(!form.title||!form.date)return alert("Title and date required.");
    const u=modal==="add"?[...events,{...form,id:uid("EV")}]:events.map(e=>e.id===form.id?{...form}:e);
    setEvents(u);await dbSet(SK.events,u);setModal(null);
  }
  async function del(id){const u=events.filter(e=>e.id!==id);setEvents(u);await dbSet(SK.events,u);setModal(null);setView(null);}

  const myR=eid=>rsvps.find(r=>r.eventId===eid&&r.memberId===user.id);

  function openRsvp(ev){
    const ex=rsvps.find(r=>r.eventId===ev.id&&r.memberId===user.id);
    setRsvpForm({guests:ex?.guests||0,dietary:ex?.dietary||"None",requirements:ex?.requirements||"",vehicleId:ex?.vehicleId||""});
    setModal({rsvp:ev});
  }

  async function submitRsvp(ev){
    const ex=rsvps.find(r=>r.eventId===ev.id&&r.memberId===user.id);
    const entry={id:ex?.id||uid("R"),eventId:ev.id,memberId:user.id,status:"attending",
      created:ex?.created||today,guests:Number(rsvpForm.guests)||0,
      dietary:rsvpForm.dietary||"None",requirements:rsvpForm.requirements||"",
      vehicleId:rsvpForm.vehicleId||""};
    const u=ex?rsvps.map(r=>r.id===ex.id?entry:r):[...rsvps,entry];
    setRsvps(u);await dbSet(SK.rsvps,u);
    setModal(null);
    setConfirmation({ev,entry});
  }

  async function cancelRsvp(eid){
    const ex=rsvps.find(r=>r.eventId===eid&&r.memberId===user.id);
    if(!ex)return;
    const u=rsvps.map(r=>r.id===ex.id?{...r,status:"declined"}:r);
    setRsvps(u);await dbSet(SK.rsvps,u);
  }

  const att=eid=>rsvps.filter(r=>r.eventId===eid&&r.status==="attending");
  const attCount=eid=>att(eid).length;
  const orgName=id=>members.find(m=>m.id===id)?.name||"Unknown";
  const typeIcon={show:"🏆",drive:"🚗",social:"🥂",charity:"❤️",competition:"🏁"};
  const isFull=ev=>ev.maxAttendees>0&&attCount(ev.id)>=ev.maxAttendees;
  const carLabel=c=>c.year+" "+c.make+" "+c.model+(c.reg?" ("+c.reg+")":"");

  function exportCSV(ev){
    const rows=att(ev.id).map(r=>{
      const m2=members.find(m=>m.id===r.memberId);
      const vc=r.vehicleId?cars.find(c=>c.id===r.vehicleId):null;
      return [
        m2?m2.name:"Unknown",
        m2?m2.email:"",
        m2?m2.phone:"",
        m2?m2.memberNumber:"",
        r.guests>0?"+"+r.guests:"0",
        ev.catering?(r.dietary||"None"):"N/A",
        vc?carLabel(vc):"None",
        r.requirements||"",
        r.created
      ];
    });
    const headers=["Name","Email","Phone","Member No","Guests","Dietary","Vehicle Bringing","Requirements","Registered"];
    const csv=[headers,...rows].map(row=>row.map(v=>'"'+(String(v||"").replace(/"/g,'""'))+'"').join(",")).join("\n");
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
    a.download="registrations_"+ev.title.replace(/[^a-z0-9]/gi,"_")+"_"+ev.date+".csv";
    a.click();
  }

  return (
    <div className="fade-up">
      <SectionHeader title="Events & Shows" subtitle={`${events.filter(e=>e.status==="upcoming").length} upcoming`}
        action={isAdmin&&<Btn onClick={openAdd}>+ Create Event</Btn>}/>
      {isAdmin&&<div style={{marginBottom:16,display:"flex",gap:10,flexWrap:"wrap"}}>
        <div style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:8,padding:"10px 18px",fontSize:13}}>
          <span style={{color:"var(--text3)",fontFamily:"var(--font-m)",fontSize:10,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:2}}>Upcoming</span>
          <span style={{fontWeight:700,fontSize:20}}>{events.filter(e=>e.status==="upcoming").length}</span>
        </div>
        <div style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:8,padding:"10px 18px",fontSize:13}}>
          <span style={{color:"var(--text3)",fontFamily:"var(--font-m)",fontSize:10,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:2}}>Total Registrations</span>
          <span style={{fontWeight:700,fontSize:20,color:"var(--burg)"}}>{rsvps.filter(r=>r.status==="attending").length}</span>
        </div>
      </div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:16}}>
        {sorted.length===0&&<EmptyState icon="★" text="No events scheduled"/>}
        {sorted.map(ev=>{
          const r=myR(ev.id); const a=attCount(ev.id);
          const going=r?.status==="attending";
          const full=isFull(ev);
          const evAtt=att(ev.id);
          return (<Card key={ev.id} className="hover-lift" style={{overflow:"hidden",cursor:"pointer"}} onClick={()=>setView(ev)}>
            <div style={{height:5,background:ev.status==="upcoming"?"linear-gradient(90deg,var(--burg),var(--burg2))":"var(--border2)"}}/>
            <div style={{padding:18}}>
              <Row justify="space-between" align="flex-start" style={{marginBottom:8}}>
                <div style={{fontSize:24}}>{typeIcon[ev.type]||"★"}</div><Badge status={ev.status}/>
              </Row>
              <div style={{fontFamily:"var(--font-d)",fontSize:16,fontWeight:700,color:"var(--text)",marginBottom:5}}>{ev.title}</div>
              <div style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--font-m)",marginBottom:6}}>{ev.date} · {ev.time}</div>
              <div style={{fontSize:12,color:"var(--text2)",marginBottom:10}}>📍 {ev.location}</div>
              <div style={{fontSize:12,color:"var(--text2)",marginBottom:12,lineHeight:1.5}}>{ev.description?.slice(0,100)}{ev.description?.length>100?"…":""}</div>
              <Row justify="space-between" align="center" style={{marginBottom:isAdmin&&evAtt.length>0?8:12}}>
                <Row gap={6}><Badge status={ev.type}/>{ev.catering&&<span style={{fontSize:10,background:"#e8f5ee",color:"var(--green)",border:"1px solid var(--green2)",fontFamily:"var(--font-m)",padding:"2px 7px",borderRadius:3,textTransform:"uppercase",letterSpacing:"0.06em"}}>🍽 Catering</span>}</Row>
                <span style={{fontSize:11,color:full?"var(--red2)":"var(--text3)",fontFamily:"var(--font-m)",fontWeight:full?700:400}}>
                  {a}{ev.maxAttendees?"/"+ev.maxAttendees:""} attending{full?" — FULL":""}
                </span>
              </Row>
              {isAdmin&&evAtt.length>0&&(
                <div style={{marginBottom:10,borderTop:"1px solid var(--border)",paddingTop:8}} onClick={e=>e.stopPropagation()}>
                  <div style={{fontSize:10,color:"var(--text3)",fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>Registered ({evAtt.length})</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                    {evAtt.slice(0,6).map(rv=>{
                      const m2=members.find(m=>m.id===rv.memberId);
                      return m2?<div key={rv.id} style={{display:"flex",alignItems:"center",gap:4,background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:20,padding:"2px 8px 2px 2px",fontSize:11}}>
                        <Avatar name={m2.name} size={16}/><span style={{color:"var(--text2)"}}>{m2.name.split(" ")[0]}</span>
                        {rv.guests>0&&<span style={{color:"var(--text3)",fontSize:10}}>+{rv.guests}</span>}
                      </div>:null;
                    })}
                    {evAtt.length>6&&<div style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:20,padding:"2px 8px",fontSize:11,color:"var(--text3)"}}>+{evAtt.length-6} more</div>}
                  </div>
                </div>
              )}
              {ev.status==="upcoming"&&<div onClick={e=>e.stopPropagation()}>
                {going
                  ? <Row gap={8}>
                      <div style={{flex:1,background:"#e8f5ee",border:"1px solid var(--green2)",borderRadius:6,padding:"7px 12px",fontSize:13,color:"var(--green)",fontWeight:700,textAlign:"center"}}>✓ You're registered</div>
                      <Btn variant="ghost" size="sm" onClick={()=>openRsvp(ev)}>Edit</Btn>
                      <Btn variant="ghost" size="sm" onClick={()=>cancelRsvp(ev.id)}>Cancel</Btn>
                    </Row>
                  : <Btn style={{width:"100%"}} onClick={()=>openRsvp(ev)} disabled={full}>{full?"Event Full":"Register for this Event"}</Btn>
                }
              </div>}
            </div>
          </Card>);
        })}
      </div>

      {/* Event detail modal */}
      {view&&<Modal title={view.title} onClose={()=>setView(null)} wide>
        <Row gap={8} wrap style={{marginBottom:12}}><Badge status={view.status}/><Badge status={view.type}/></Row>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14,fontSize:13}}>
          {[["Date",view.date],["Time",view.time],["Location",view.location],["Organiser",orgName(view.organiser)],
            ["Capacity",view.maxAttendees?`${attCount(view.id)}/${view.maxAttendees}`:"Unlimited"],
            ["Catering",view.catering?"Yes — dietary info collected":"No"],
            ["Attending",attCount(view.id)]].map(([k,v])=>(
            <div key={k}><span style={{color:"var(--text3)",fontFamily:"var(--font-m)",fontSize:10,textTransform:"uppercase",letterSpacing:"0.08em"}}>{k}: </span><span style={{color:"var(--text2)",fontWeight:600}}>{v}</span></div>
          ))}
        </div>
        <div style={{background:"var(--bg3)",borderRadius:6,padding:14,fontSize:14,color:"var(--text2)",lineHeight:1.7,marginBottom:16}}>{view.description||"No description."}</div>

        {/* Attendee list */}
        <div style={{marginBottom:16}}>
          <Row justify="space-between" align="center" style={{marginBottom:10}}>
            <div style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.1em"}}>
              Registered Attendees ({attCount(view.id)})
            </div>
            {isAdmin&&attCount(view.id)>0&&<Btn variant="ghost" size="sm" onClick={()=>exportCSV(view)}>⬇ Export CSV</Btn>}
          </Row>
          {isAdmin
            ? <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead><tr style={{borderBottom:"2px solid var(--border)",background:"var(--bg3)"}}>
                    {["Member","Email","Phone","Guests","Dietary","Vehicle","Requirements","Registered"].map(h=>(
                      <th key={h} style={{textAlign:"left",padding:"6px 10px",fontFamily:"var(--font-m)",fontSize:10,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.06em",whiteSpace:"nowrap"}}>{h}</th>
                    ))}
                  </tr></thead>
                  <tbody>
                    {att(view.id).map(r=>{
                      const m2=members.find(m=>m.id===r.memberId);
                      const vc=r.vehicleId?cars.find(c=>c.id===r.vehicleId):null;
                      return m2?(<tr key={r.id} style={{borderBottom:"1px solid var(--border)"}}>
                        <td style={{padding:"8px 10px",whiteSpace:"nowrap"}}><Row gap={6} align="center"><Avatar name={m2.name} size={20}/><span style={{fontWeight:600}}>{m2.name}</span></Row></td>
                        <td style={{padding:"8px 10px",color:"var(--text2)",fontSize:11}}>{m2.email}</td>
                        <td style={{padding:"8px 10px",color:"var(--text2)",fontSize:11,whiteSpace:"nowrap"}}>{m2.phone||"—"}</td>
                        <td style={{padding:"8px 10px",color:"var(--text2)",textAlign:"center"}}>{r.guests>0?"+"+r.guests:"—"}</td>
                        <td style={{padding:"8px 10px",color:"var(--text2)"}}>{r.dietary||"—"}</td>
                        <td style={{padding:"8px 10px",color:"var(--text2)",fontSize:11}}>{vc?<span style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:4,padding:"1px 6px",whiteSpace:"nowrap"}}>{carLabel(vc)}</span>:"—"}</td>
                        <td style={{padding:"8px 10px",color:"var(--text2)",maxWidth:140,fontSize:11}}>{r.requirements||"—"}</td>
                        <td style={{padding:"8px 10px",color:"var(--text3)",fontFamily:"var(--font-m)",fontSize:11,whiteSpace:"nowrap"}}>{r.created}</td>
                      </tr>):null;
                    })}
                    {attCount(view.id)===0&&<tr><td colSpan={8} style={{padding:"16px 10px",color:"var(--text3)",fontFamily:"var(--font-m)",fontSize:12,textAlign:"center"}}>No registrations yet</td></tr>}
                  </tbody>
                </table>
              </div>
            : <Row gap={6} wrap>
                {att(view.id).map(r=>{const m2=members.find(m=>m.id===r.memberId);return m2?<Row key={r.id} gap={6} align="center" style={{background:"var(--bg3)",borderRadius:6,padding:"5px 10px"}}><Avatar name={m2.name} size={20}/><span style={{fontSize:12,color:"var(--text2)"}}>{m2.name.split(" ")[0]}</span></Row>:null;})}
                {attCount(view.id)===0&&<span style={{color:"var(--text3)",fontSize:13,fontFamily:"var(--font-m)"}}>No registrations yet</span>}
              </Row>
          }
        </div>

        {view.status==="upcoming"&&<Row gap={8} justify="space-between" align="center">
          <div>
            {myR(view.id)?.status==="attending"
              ? <Row gap={8}><span style={{color:"var(--green)",fontWeight:700,fontSize:14}}>✓ You are registered</span>
                  <Btn variant="ghost" size="sm" onClick={()=>{setView(null);openRsvp(view);}}>Edit registration</Btn>
                  <Btn variant="ghost" size="sm" onClick={()=>cancelRsvp(view.id)}>Cancel</Btn>
                </Row>
              : <Btn onClick={()=>{setView(null);openRsvp(view);}} disabled={isFull(view)}>{isFull(view)?"Event Full":"Register for this Event"}</Btn>
            }
          </div>
          {isAdmin&&<Row gap={8}><Btn variant="danger" size="sm" onClick={()=>setModal({confirm:{msg:"Delete event?",fn:()=>del(view.id)}})}>Delete</Btn><Btn variant="ghost" size="sm" onClick={()=>{setView(null);setForm({...view});setModal({edit:view});}}>Edit</Btn></Row>}
        </Row>}
      </Modal>}

      {/* RSVP / Registration modal */}
      {modal?.rsvp&&<Modal title={`Register — ${modal.rsvp.title}`} onClose={()=>setModal(null)}>
        <div style={{background:"var(--bg3)",borderRadius:8,padding:14,marginBottom:20,fontSize:13,color:"var(--text2)"}}>
          <div style={{fontWeight:700,marginBottom:4,color:"var(--text)"}}>{modal.rsvp.date} · {modal.rsvp.time}</div>
          <div>📍 {modal.rsvp.location}</div>
        </div>
        <Field label="Registering as">
          <div style={{padding:"9px 12px",background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:6,fontSize:13,color:"var(--text2)"}}>{user.name} (Member #{user.memberNumber})</div>
        </Field>
        <Field label="Additional guests (not including yourself)">
          <Select value={rsvpForm.guests} onChange={e=>setRsvpForm({...rsvpForm,guests:e.target.value})}>
            {[0,1,2,3,4,5].map(n=><option key={n} value={n}>{n===0?"Just me":"+"+n+" guest"+(n>1?"s":"")}</option>)}
          </Select>
        </Field>
        {modal.rsvp.catering&&<Field label="Dietary requirements">
          <Select value={rsvpForm.dietary} onChange={e=>setRsvpForm({...rsvpForm,dietary:e.target.value})}>
            {["None","Vegetarian","Vegan","Gluten free","Halal","Kosher","Nut allergy","Dairy free","Other"].map(d=><option key={d}>{d}</option>)}
          </Select>
        </Field>}
        <Field label="Vehicle you're bringing (optional)">
          <Select value={rsvpForm.vehicleId} onChange={e=>setRsvpForm({...rsvpForm,vehicleId:e.target.value})}>
            <option value="">Not bringing a vehicle / not applicable</option>
            {myCars.map(c=><option key={c.id} value={c.id}>{carLabel(c)}</option>)}
          </Select>
          {myCars.length===0&&<div style={{fontSize:11,color:"var(--text3)",marginTop:4}}>No vehicles registered — add them in My Profile.</div>}
        </Field>
        <Field label="Special requirements or notes (optional)">
          <Textarea value={rsvpForm.requirements} onChange={e=>setRsvpForm({...rsvpForm,requirements:e.target.value})}
            placeholder="e.g. wheelchair access needed, late arrival..." style={{minHeight:70}}/>
        </Field>
        <Row gap={10} justify="flex-end">
          <Btn variant="ghost" onClick={()=>setModal(null)}>Cancel</Btn>
          <Btn onClick={()=>submitRsvp(modal.rsvp)}>Confirm Registration</Btn>
        </Row>
      </Modal>}

      {/* Printable confirmation */}
      {confirmation&&<Modal title="Registration Confirmed!" onClose={()=>setConfirmation(null)} wide>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:48,marginBottom:8}}>✅</div>
          <div style={{fontFamily:"var(--font-d)",fontSize:22,fontWeight:700,color:"var(--green)",marginBottom:4}}>You're registered!</div>
          <div style={{fontSize:14,color:"var(--text3)"}}>Keep this confirmation for your records</div>
        </div>
        <div id="print-confirmation" style={{background:"var(--bg3)",border:"2px solid var(--burg)",borderRadius:10,padding:24,marginBottom:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16,paddingBottom:16,borderBottom:"1px solid var(--border)"}}>
            <div>
              <div style={{fontFamily:"var(--font-m)",fontSize:10,color:"var(--burg)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4}}>Event Registration Confirmation</div>
              <div style={{fontFamily:"var(--font-d)",fontSize:20,fontWeight:700,color:"var(--text)",lineHeight:1.2}}>{confirmation.ev.title}</div>
            </div>
            <div style={{fontFamily:"var(--font-m)",fontSize:11,color:"var(--text3)",textAlign:"right"}}>
              <div>Ref: {confirmation.entry.id}</div>
              <div>{new Date().toLocaleDateString("en-AU")}</div>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,fontSize:13}}>
            {[
              ["Member",user.name+" (#"+user.memberNumber+")"],
              ["Date & Time",confirmation.ev.date+" at "+confirmation.ev.time],
              ["Location",confirmation.ev.location],
              ["Guests",confirmation.entry.guests>0?"+"+confirmation.entry.guests+" guest"+(confirmation.entry.guests>1?"s":""):"None"],
              ...(confirmation.ev.catering?[["Dietary",confirmation.entry.dietary||"None"]]:[]),
              ...(confirmation.entry.vehicleId?[["Vehicle Bringing",carLabel(cars.find(c=>c.id===confirmation.entry.vehicleId)||{year:"",make:"",model:""})]]:[]),
              ["Special Requirements",confirmation.entry.requirements||"None"],
            ].filter(x=>x.length===2).map(([k,v])=>(
              <div key={k}>
                <div style={{fontFamily:"var(--font-m)",fontSize:10,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:3}}>{k}</div>
                <div style={{color:"var(--text)",fontWeight:600}}>{v}</div>
              </div>
            ))}
          </div>
          <div style={{marginTop:16,paddingTop:16,borderTop:"1px solid var(--border)",fontSize:12,color:"var(--text3)",fontFamily:"var(--font-m)"}}>
            Rover Car Club of Australia · secretary@rcca.com.au · PO Box 6049 Wantirna VIC 3152
          </div>
        </div>
        <Row gap={10} justify="center">
          <Btn onClick={()=>window.print()}>🖨️ Print Confirmation</Btn>
          <Btn variant="ghost" onClick={()=>setConfirmation(null)}>Close</Btn>
        </Row>
      </Modal>}

      {/* Create/Edit event modal */}
      {(modal==="add"||modal?.edit)&&<Modal title={modal==="add"?"Create Event":"Edit Event"} onClose={()=>setModal(null)} wide>
        <Field label="Event Title"><Input value={form.title||""} onChange={e=>setForm({...form,title:e.target.value})}/></Field>
        <Row gap={12} wrap style={{justifyContent:"space-between"}}><Field label="Date" half><Input type="date" value={form.date||""} onChange={e=>setForm({...form,date:e.target.value})}/></Field><Field label="Time" half><Input type="time" value={form.time||""} onChange={e=>setForm({...form,time:e.target.value})}/></Field></Row>
        <Field label="Location"><Input value={form.location||""} onChange={e=>setForm({...form,location:e.target.value})}/></Field>
        <Row gap={12} wrap style={{justifyContent:"space-between"}}>
          <Field label="Type" half><Select value={form.type||"show"} onChange={e=>setForm({...form,type:e.target.value})}>{["show","drive","social","charity","competition"].map(t=><option key={t}>{t}</option>)}</Select></Field>
          <Field label="Max Attendees" half><Input type="number" value={form.maxAttendees||""} onChange={e=>setForm({...form,maxAttendees:Number(e.target.value)||""})} placeholder="0 = unlimited"/></Field>
        </Row>
        <Row gap={12} wrap style={{justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",fontSize:14,color:"var(--text2)",fontWeight:600}}>
            <input type="checkbox" checked={!!form.catering} onChange={e=>setForm({...form,catering:e.target.checked})}
              style={{width:18,height:18,cursor:"pointer",accentColor:"var(--burg)"}}/>
            Catering provided at this event
          </label>
          {form.catering&&<div style={{fontSize:12,color:"var(--text3)",fontFamily:"var(--font-m)"}}>Dietary questions will appear in registration</div>}
        </Row>
        <Field label="Status"><Select value={form.status||"upcoming"} onChange={e=>setForm({...form,status:e.target.value})}>{["upcoming","past","cancelled"].map(s=><option key={s}>{s}</option>)}</Select></Field>
        <Field label="Description"><Textarea value={form.description||""} onChange={e=>setForm({...form,description:e.target.value})} style={{minHeight:100}}/></Field>
        <Row gap={8} justify="flex-end"><Btn variant="ghost" onClick={()=>setModal(null)}>Cancel</Btn><Btn onClick={handleSave}>Save Event</Btn></Row>
      </Modal>}
      {modal?.confirm&&<Confirm message={modal.confirm.msg} onConfirm={modal.confirm.fn} onCancel={()=>setModal(null)}/>}
    </div>
  );
}


// ══════════════════════════════════════════════════════════════════════════════
// TASKS (Kanban + List)
// ══════════════════════════════════════════════════════════════════════════════
const COLS=[{id:"todo",label:"To Do",colour:"var(--text3)"},{id:"inprogress",label:"In Progress",colour:"var(--blue2)"},{id:"done",label:"Done",colour:"var(--green2)"}];

function TasksSection({ user, members, tasks, setTasks }) {
  const isAdmin=user.role==="admin";
  const [view,setView]=useState("kanban"); const [filterMine,setFilterMine]=useState(false);
  const [modal,setModal]=useState(null); const [form,setForm]=useState({});
  const vis=filterMine?tasks.filter(t=>t.assigneeId===user.id):tasks;
  function openAdd(status="todo"){setForm({title:"",description:"",status,priority:"medium",assigneeId:user.id,createdBy:user.id,created:today,due:"",tags:""});setModal("add");}
  function openEdit(t){setForm({...t,tags:(t.tags||[]).join(",")});setModal({edit:t});}
  async function save2(){
    if(!form.title)return alert("Title required.");
    const t={...form,tags:form.tags?form.tags.split(",").map(s=>s.trim()).filter(Boolean):[]};
    const u=modal==="add"?[...tasks,{...t,id:uid("T")}]:tasks.map(tk=>tk.id===t.id?t:tk);
    setTasks(u);await dbSet(SK.tasks,u);setModal(null);
  }
  async function move(id,status){const u=tasks.map(t=>t.id===id?{...t,status}:t);setTasks(u);await dbSet(SK.tasks,u);}
  async function del(id){const u=tasks.filter(t=>t.id!==id);setTasks(u);await dbSet(SK.tasks,u);setModal(null);}
  const aName=id=>members.find(m=>m.id===id)?.name||"Unassigned";
  const canEdit=t=>isAdmin||t.assigneeId===user.id||t.createdBy===user.id;
  return (
    <div className="fade-up">
      <SectionHeader title="Task Management"
        action={<Row gap={8}><Btn variant="ghost" size="sm" onClick={()=>setView(v=>v==="kanban"?"list":"kanban")}>{view==="kanban"?"List View":"Kanban View"}</Btn><Btn variant="ghost" size="sm" onClick={()=>setFilterMine(!filterMine)}>{filterMine?"All Tasks":"My Tasks"}</Btn><Btn onClick={()=>openAdd()}>+ Add Task</Btn></Row>}/>

      {view==="kanban"?(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14,alignItems:"start"}}>
          {COLS.map(col=>{
            const ct=vis.filter(t=>t.status===col.id);
            return (<div key={col.id}>
              <Row justify="space-between" align="center" style={{marginBottom:10}}>
                <Row gap={8}><div style={{width:9,height:9,borderRadius:"50%",background:col.colour}}/><span style={{fontFamily:"var(--font-m)",fontSize:11,color:col.colour,textTransform:"uppercase",letterSpacing:"0.1em"}}>{col.label}</span><span style={{fontFamily:"var(--font-m)",fontSize:9.5,color:"var(--text3)",background:"var(--bg3)",borderRadius:8,padding:"1px 6px"}}>{ct.length}</span></Row>
                <button onClick={()=>openAdd(col.id)} style={{background:"none",border:"1px dashed var(--border2)",color:"var(--text3)",borderRadius:4,padding:"1px 8px",fontSize:16,cursor:"pointer",lineHeight:1}}>+</button>
              </Row>
              <Col gap={10}>
                {ct.map(t=>(
                  <Card key={t.id} style={{padding:13}}>
                    <Row justify="space-between" align="flex-start" style={{marginBottom:7}}><div style={{fontSize:13,fontWeight:700,color:"var(--text)",flex:1,marginRight:8,lineHeight:1.3,fontFamily:"var(--font-d)"}}>{t.title}</div><Badge status={t.priority}/></Row>
                    {t.description&&<p style={{fontSize:11,color:"var(--text3)",marginBottom:8,lineHeight:1.4}}>{t.description}</p>}
                    <Row gap={4} wrap style={{marginBottom:8}}>
                      {(t.tags||[]).map(tag=><span key={tag} style={{fontSize:9,fontFamily:"var(--font-m)",color:"var(--gold)",background:"rgba(201,146,42,.1)",border:"1px solid rgba(201,146,42,.2)",borderRadius:3,padding:"1px 5px"}}>{tag}</span>)}
                    </Row>
                    <Row justify="space-between" align="center" style={{fontSize:10.5,color:"var(--text3)"}}>
                      <Row gap={5} align="center"><Avatar name={aName(t.assigneeId)} size={16}/><span style={{fontFamily:"var(--font-m)"}}>{aName(t.assigneeId).split(" ")[0]}</span></Row>
                      {t.due&&<span style={{fontFamily:"var(--font-m)"}}>📅 {t.due}</span>}
                    </Row>
                    {canEdit(t)&&<Row gap={4} wrap style={{marginTop:9,borderTop:"1px solid var(--border)",paddingTop:8}}>
                      {COLS.filter(c=>c.id!==col.id).map(c=><Btn key={c.id} variant="ghost" size="sm" onClick={()=>move(t.id,c.id)}>→ {c.label}</Btn>)}
                      <Btn variant="ghost" size="sm" onClick={()=>openEdit(t)}>Edit</Btn>
                    </Row>}
                  </Card>
                ))}
                {ct.length===0&&<div style={{border:"1px dashed var(--border)",borderRadius:6,padding:"20px 12px",textAlign:"center",color:"var(--text3)",fontSize:11,fontFamily:"var(--font-m)"}}>No tasks</div>}
              </Col>
            </div>);
          })}
        </div>
      ):(
        <Card style={{overflow:"hidden"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12.5}}>
            <thead><tr style={{background:"var(--bg3)",borderBottom:"1px solid var(--border)"}}>{["Title","Status","Priority","Assigned To","Due","Tags","Actions"].map(h=><th key={h} style={{padding:"10px 12px",textAlign:"left",fontFamily:"var(--font-m)",fontSize:9.5,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.1em",whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
            <tbody>{vis.length===0&&<tr><td colSpan={7}><EmptyState icon="☑" text="No tasks"/></td></tr>}
            {vis.map((t,i)=>(
              <tr key={t.id} style={{borderBottom:"1px solid var(--border)",background:i%2===0?"transparent":"rgba(255,255,255,.01)"}}>
                <td style={{padding:"9px 12px"}}><div style={{fontWeight:700,color:"var(--text)",fontFamily:"var(--font-d)",fontSize:13}}>{t.title}</div><div style={{fontSize:10,color:"var(--text3)",fontFamily:"var(--font-m)",marginTop:2}}>{t.description?.slice(0,50)}{t.description?.length>50?"…":""}</div></td>
                <td style={{padding:"9px 12px"}}><Badge status={t.status}/></td>
                <td style={{padding:"9px 12px"}}><Badge status={t.priority}/></td>
                <td style={{padding:"9px 12px"}}><Row gap={6} align="center"><Avatar name={aName(t.assigneeId)} size={20}/><span style={{color:"var(--text2)"}}>{aName(t.assigneeId)}</span></Row></td>
                <td style={{padding:"9px 12px",fontFamily:"var(--font-m)",fontSize:11,color:"var(--text3)"}}>{t.due||"—"}</td>
                <td style={{padding:"9px 12px"}}><Row gap={4} wrap>{(t.tags||[]).map(tag=><span key={tag} style={{fontSize:9,fontFamily:"var(--font-m)",color:"var(--gold)",background:"rgba(201,146,42,.1)",border:"1px solid rgba(201,146,42,.2)",borderRadius:3,padding:"1px 5px"}}>{tag}</span>)}</Row></td>
                <td style={{padding:"9px 12px"}}>{canEdit(t)&&<Row gap={5}>{COLS.filter(c=>c.id!==t.status).map(c=><Btn key={c.id} variant="ghost" size="sm" onClick={()=>move(t.id,c.id)}>→ {c.label.split(" ")[0]}</Btn>)}<Btn variant="ghost" size="sm" onClick={()=>openEdit(t)}>Edit</Btn></Row>}</td>
              </tr>
            ))}</tbody>
          </table>
        </Card>
      )}

      {(modal==="add"||modal?.edit)&&<Modal title={modal==="add"?"Add Task":"Edit Task"} onClose={()=>setModal(null)}>
        <Field label="Title"><Input value={form.title||""} onChange={e=>setForm({...form,title:e.target.value})}/></Field>
        <Field label="Description"><Textarea value={form.description||""} onChange={e=>setForm({...form,description:e.target.value})}/></Field>
        <Row gap={12} wrap style={{justifyContent:"space-between"}}>
          <Field label="Status" half><Select value={form.status||"todo"} onChange={e=>setForm({...form,status:e.target.value})}>{COLS.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}</Select></Field>
          <Field label="Priority" half><Select value={form.priority||"medium"} onChange={e=>setForm({...form,priority:e.target.value})}>{["high","medium","low"].map(p=><option key={p}>{p}</option>)}</Select></Field>
        </Row>
        <Row gap={12} wrap style={{justifyContent:"space-between"}}>
          <Field label="Assigned To" half><Select value={form.assigneeId||""} onChange={e=>setForm({...form,assigneeId:e.target.value})}>{members.filter(m=>m.status==="active").map(m=><option key={m.id} value={m.id}>{m.name}</option>)}</Select></Field>
          <Field label="Due Date" half><Input type="date" value={form.due||""} onChange={e=>setForm({...form,due:e.target.value})}/></Field>
        </Row>
        <Field label="Tags (comma-separated)"><Input value={form.tags||""} onChange={e=>setForm({...form,tags:e.target.value})} placeholder="admin, events, nationals"/></Field>
        <Row gap={8} justify="space-between">
          {modal?.edit&&<Btn variant="danger" size="sm" onClick={()=>setModal({confirm:{msg:"Delete task?",fn:()=>del(form.id)}})}>Delete</Btn>}
          <Row gap={8} style={{marginLeft:"auto"}}><Btn variant="ghost" onClick={()=>setModal(null)}>Cancel</Btn><Btn onClick={save2}>Save</Btn></Row>
        </Row>
      </Modal>}
      {modal?.confirm&&<Confirm message={modal.confirm.msg} onConfirm={modal.confirm.fn} onCancel={()=>setModal(null)}/>}
    </div>
  );
}

// MARKETPLACE
// ══════════════════════════════════════════════════════════════════════════════
function MarketplaceSection({ user, members, listings, setListings }) {
  const [search,setSearch]=useState(""); const [fType,setFType]=useState("all"); const [fCat,setFCat]=useState("all");
  const [modal,setModal]=useState(null); const [form,setForm]=useState({}); const [view,setView]=useState(null);
  const filtered=listings.filter(l=>{
    const txt=`${l.title} ${l.description} ${l.location}`.toLowerCase();
    return txt.includes(search.toLowerCase())&&(fType==="all"||l.type===fType)&&(fCat==="all"||l.category===fCat)&&l.status==="active";
  });
  const myListings=listings.filter(l=>l.memberId===user.id);
  function openAdd(){setForm({type:"sell",category:"parts",title:"",price:"",negotiable:false,description:"",condition:"good",location:`${user.state||"VIC"}`,contact:user.email,status:"active",created:today});setModal("add");}
  function openEdit(l){setForm({...l});setModal({edit:l});}
  async function handleSave(){
    if(!form.title||!form.description)return alert("Title and description required.");
    const l={...form,price:form.type==="wanted"?null:(Number(form.price)||null),memberId:form.memberId||user.id};
    const u=modal==="add"?[...listings,{...l,id:uid("L")}]:listings.map(x=>x.id===l.id?l:x);
    setListings(u);await dbSet(SK.listings,u);setModal(null);
  }
  async function markSold(id){const u=listings.map(l=>l.id===id?{...l,status:"sold"}:l);setListings(u);await dbSet(SK.listings,u);setView(null);}
  async function del(id){const u=listings.filter(l=>l.id!==id);setListings(u);await dbSet(SK.listings,u);setModal(null);setView(null);}
  const sellerName=id=>members.find(m=>m.id===id)?.name||"Unknown";
  const catIcon={car:"🚗",parts:"🔧",memorabilia:"🏅",manuals:"📖",tools:"🛠",other:"📦"};
  return (
    <div className="fade-up">
      <SectionHeader title="Members' Marketplace" subtitle="Buy, sell & wanted — cars, parts, memorabilia"
        action={<Btn onClick={openAdd}>+ Post Listing</Btn>}/>

      {/* My listings strip */}
      {myListings.filter(l=>l.status==="active").length>0&&(
        <Card style={{padding:14,marginBottom:16,background:"rgba(107,26,42,.15)",borderColor:"var(--burg)"}}>
          <div style={{fontSize:10.5,color:"var(--gold)",fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Your Active Listings ({myListings.filter(l=>l.status==="active").length})</div>
          <Row gap={8} wrap>
            {myListings.filter(l=>l.status==="active").map(l=>(
              <div key={l.id} style={{background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:6,padding:"8px 14px",cursor:"pointer"}} onClick={()=>setView(l)}>
                <div style={{fontSize:13,color:"var(--text)",fontWeight:700}}>{l.title.slice(0,40)}{l.title.length>40?"…":""}</div>
                <Row gap={6} style={{marginTop:4}}><Badge status={l.type}/><Badge status={l.category}/>{l.price&&<span style={{fontSize:11,color:"var(--gold2)",fontFamily:"var(--font-m)"}}>A${l.price.toLocaleString()}</span>}</Row>
              </div>
            ))}
          </Row>
        </Card>
      )}

      <Row gap={10} style={{marginBottom:16,flexWrap:"wrap"}}>
        <Input placeholder="Search listings…" value={search} onChange={e=>setSearch(e.target.value)} style={{maxWidth:260}}/>
        <Select value={fType} onChange={e=>setFType(e.target.value)} style={{width:"auto"}}>
          <option value="all">All Types</option><option value="sell">For Sale</option><option value="wanted">Wanted</option>
        </Select>
        <Select value={fCat} onChange={e=>setFCat(e.target.value)} style={{width:"auto"}}>
          <option value="all">All Categories</option>{["car","parts","memorabilia","manuals","tools","other"].map(c=><option key={c} value={c}>{c}</option>)}
        </Select>
      </Row>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14}}>
        {filtered.length===0&&<div style={{gridColumn:"1/-1"}}><EmptyState icon="⟳" text="No listings found" sub="Be the first to post something"/></div>}
        {filtered.map(l=>(
          <Card key={l.id} className="hover-lift" style={{padding:0,overflow:"hidden",cursor:"pointer",borderTop:`3px solid ${l.type==="sell"?"var(--green2)":"var(--gold)"}`}} onClick={()=>setView(l)}>
            <div style={{padding:18}}>
              <Row justify="space-between" align="flex-start" style={{marginBottom:10}}>
                <div style={{fontSize:24,lineHeight:1}}>{catIcon[l.category]||"📦"}</div>
                <Row gap={5}><Badge status={l.type} label={l.type==="sell"?"FOR SALE":"WANTED"}/><Badge status={l.category}/></Row>
              </Row>
              <div style={{fontFamily:"var(--font-d)",fontSize:16,fontWeight:700,color:"var(--text)",marginBottom:6,lineHeight:1.3}}>{l.title}</div>
              <div style={{fontSize:12,color:"var(--text2)",marginBottom:12,lineHeight:1.5,height:54,overflow:"hidden"}}>{l.description}</div>
              <Row justify="space-between" align="center">
                <div>
                  {l.price?<div style={{fontFamily:"var(--font-m)",fontSize:17,color:"var(--gold2)",fontWeight:700}}>A${l.price.toLocaleString()}{l.negotiable&&<span style={{fontSize:11,color:"var(--text3)",fontWeight:400}}> ONO</span>}</div>
                    :<div style={{fontFamily:"var(--font-m)",fontSize:13,color:"var(--gold)",fontStyle:"italic"}}>Price on request</div>}
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:11,color:"var(--text2)"}}>{sellerName(l.memberId)}</div>
                  <div style={{fontSize:10,color:"var(--text3)",fontFamily:"var(--font-m)"}}>{l.location}</div>
                </div>
              </Row>
              {l.condition&&<div style={{marginTop:8}}><Badge status={l.condition}/></div>}
            </div>
          </Card>
        ))}
      </div>

      {view&&<Modal title={view.title} onClose={()=>setView(null)} wide>
        <Row gap={8} wrap style={{marginBottom:14}}><Badge status={view.type} label={view.type==="sell"?"FOR SALE":"WANTED"}/><Badge status={view.category}/>{view.condition&&<Badge status={view.condition}/>}</Row>
        {view.price?<div style={{fontFamily:"var(--font-m)",fontSize:22,color:"var(--gold2)",fontWeight:700,marginBottom:4}}>A${view.price.toLocaleString()}{view.negotiable&&<span style={{fontSize:13,color:"var(--text3)",fontWeight:400}}> — Negotiable</span>}</div>
          :<div style={{fontFamily:"var(--font-m)",fontSize:15,color:"var(--gold)",marginBottom:4}}>Price on request</div>}
        <Divider/>
        <div style={{fontSize:13.5,color:"var(--text2)",lineHeight:1.7,marginBottom:16,whiteSpace:"pre-wrap"}}>{view.description}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16,fontSize:12.5}}>
          {[["Posted by",sellerName(view.memberId)],["Location",view.location],["Contact",view.contact],["Listed",view.created]].map(([k,v])=>(
            <div key={k}><span style={{color:"var(--text3)",fontFamily:"var(--font-m)",fontSize:9.5,textTransform:"uppercase",letterSpacing:"0.08em"}}>{k}: </span><span style={{color:"var(--text)"}}>{v}</span></div>
          ))}
        </div>
        {(user.role==="admin"||view.memberId===user.id)&&(
          <Row gap={8} justify="flex-end">
            <Btn variant="danger" size="sm" onClick={()=>setModal({confirm:{msg:"Delete listing?",fn:()=>del(view.id)}})}>Delete</Btn>
            {view.type==="sell"&&view.status==="active"&&<Btn variant="ghost" size="sm" onClick={()=>markSold(view.id)}>Mark Sold</Btn>}
            <Btn variant="ghost" size="sm" onClick={()=>{setView(null);openEdit(view);}}>Edit</Btn>
          </Row>
        )}
      </Modal>}

      {(modal==="add"||modal?.edit)&&<Modal title={modal==="add"?"Post Listing":"Edit Listing"} onClose={()=>setModal(null)}>
        <Row gap={12} wrap style={{justifyContent:"space-between"}}>
          <Field label="Type" half><Select value={form.type||"sell"} onChange={e=>setForm({...form,type:e.target.value})}><option value="sell">For Sale</option><option value="wanted">Wanted</option></Select></Field>
          <Field label="Category" half><Select value={form.category||"parts"} onChange={e=>setForm({...form,category:e.target.value})}>{["car","parts","memorabilia","manuals","tools","other"].map(c=><option key={c}>{c}</option>)}</Select></Field>
        </Row>
        <Field label="Title"><Input value={form.title||""} onChange={e=>setForm({...form,title:e.target.value})} placeholder="1972 Rover P6 — Project Car"/></Field>
        <Field label="Description"><Textarea value={form.description||""} onChange={e=>setForm({...form,description:e.target.value})} style={{minHeight:100}} placeholder="Full description…"/></Field>
        {form.type!=="wanted"&&<Row gap={12} wrap style={{justifyContent:"space-between"}}>
          <Field label="Price (A$)" half><Input type="number" value={form.price||""} onChange={e=>setForm({...form,price:e.target.value})}/></Field>
          <Field label="Condition" half><Select value={form.condition||"good"} onChange={e=>setForm({...form,condition:e.target.value})}>{["excellent","good","fair","project","parts only"].map(c=><option key={c}>{c}</option>)}</Select></Field>
        </Row>}
        <Row gap={12} wrap style={{justifyContent:"space-between"}}>
          <Field label="Location" half><Input value={form.location||""} onChange={e=>setForm({...form,location:e.target.value})} placeholder="Melbourne, VIC"/></Field>
          <Field label="Contact Email" half><Input value={form.contact||""} onChange={e=>setForm({...form,contact:e.target.value})}/></Field>
        </Row>
        <Field label="Negotiable?"><Select value={form.negotiable?"yes":"no"} onChange={e=>setForm({...form,negotiable:e.target.value==="yes"})}><option value="no">Fixed Price</option><option value="yes">Negotiable / ONO</option></Select></Field>
        <Row gap={8} justify="flex-end"><Btn variant="ghost" onClick={()=>setModal(null)}>Cancel</Btn><Btn onClick={handleSave}>Post Listing</Btn></Row>
      </Modal>}
      {modal?.confirm&&<Confirm message={modal.confirm.msg} onConfirm={modal.confirm.fn} onCancel={()=>setModal(null)}/>}
    </div>
  );
}

// SHOP
// ══════════════════════════════════════════════════════════════════════════════
function ShopSection({ user, shopItems, setShopItems, orders, setOrders }) {
  const isAdmin=user.role==="admin";
  const [cart,setCart]=useState({});
  const [tab2,setTab2]=useState("shop");
  const [modal,setModal]=useState(null); const [form,setForm]=useState({});
  const [view,setView]=useState(null);
  const [selVariant,setSelVariant]=useState({});
  const cartCount=Object.values(cart).reduce((s,v)=>s+(v.qty||0),0);
  const cartTotal=Object.entries(cart).reduce((s,[id,{qty}])=>{const item=shopItems.find(x=>x.id===id);return s+(item?item.price*qty:0);},0);

  function addToCart(item,variant=""){
    const key=item.id+(variant?"_"+variant:"");
    setCart(c=>({...c,[key]:{itemId:item.id,variant,qty:(c[key]?.qty||0)+1}}));
  }
  function removeFromCart(key){setCart(c=>{const n={...c};delete n[key];return n;});}
  function adjustQty(key,delta){setCart(c=>{const n={...c};if(!n[key])return n;n[key]={...n[key],qty:Math.max(0,n[key].qty+delta)};if(n[key].qty===0)delete n[key];return n;});}

  async function placeOrder(){
    if(cartCount===0)return;
    const items=Object.entries(cart).map(([key,{itemId,variant,qty}])=>{const item=shopItems.find(x=>x.id===itemId);return{itemId,itemName:item?.name||itemId,variant,qty,unitPrice:item?.price||0};});
    const order={id:uid("ORD"),memberId:user.id,memberName:user.name,items,total:cartTotal,status:"pending",placed:today,notes:""};
    const u=[...orders,order]; setOrders(u); await dbSet(SK.orders,u);
    // Deduct stock
    const updatedShop=shopItems.map(item=>{const sold=items.filter(x=>x.itemId===item.id).reduce((s,x)=>s+x.qty,0);return sold>0?{...item,stock:Math.max(0,item.stock-sold)}:item;});
    setShopItems(updatedShop); await dbSet(SK.shopItems,updatedShop);
    setCart({}); setModal({orderPlaced:order});
  }

  async function handleSaveItem(){
    if(!form.name||!form.price)return alert("Name and price required.");
    const u=modal==="addItem"?[...shopItems,{...form,id:uid("S"),price:Number(form.price),stock:Number(form.stock)||0,variants:form.variants?form.variants.split(",").map(s=>s.trim()).filter(Boolean):[]}]
      :shopItems.map(x=>x.id===form.id?{...form,price:Number(form.price),stock:Number(form.stock)||0,variants:form.variants?form.variants.split(",").map(s=>s.trim()).filter(Boolean):x.variants}:x);
    setShopItems(u);await dbSet(SK.shopItems,u);setModal(null);
  }

  async function updateOrderStatus(id,status){const u=orders.map(o=>o.id===id?{...o,status}:o);setOrders(u);await dbSet(SK.orders,u);}

  const myOrders=orders.filter(o=>o.memberId===user.id);
  const cats=[...new Set(shopItems.map(x=>x.category))];

  const STATUS_ORDER_COL={pending:"var(--gold)",processing:"var(--blue2)",dispatched:"var(--green2)",delivered:"var(--green2)",cancelled:"var(--red2)"};

  return (
    <div className="fade-up">
      <Row justify="space-between" align="center" style={{marginBottom:22}}>
        <div>
          <h2 style={{fontFamily:"var(--font-d)",fontSize:26,color:"var(--gold3)",fontWeight:700,margin:0,lineHeight:1}}>Club Shop</h2>
          <p style={{margin:"5px 0 0",fontSize:11,color:"var(--text3)",fontFamily:"var(--font-m)"}}>Official RCCA merchandise & publications</p>
        </div>
        <Row gap={10} align="center">
          {cartCount>0&&<button onClick={()=>setTab2("cart")} style={{background:"var(--burg)",border:"1px solid var(--burg2)",borderRadius:6,padding:"8px 16px",cursor:"pointer",color:"#ffffff",fontFamily:"var(--font-b)",fontWeight:700,fontSize:13}}>
            🛒 Cart ({cartCount}) — A${cartTotal.toFixed(2)}
          </button>}
          {isAdmin&&<Btn variant="ghost" size="sm" onClick={()=>setTab2("orders")}>Orders</Btn>}
          <Btn variant="ghost" size="sm" onClick={()=>setTab2("myorders")}>My Orders</Btn>
          {isAdmin&&<Btn size="sm" onClick={()=>{setForm({name:"",description:"",price:"",stock:"",category:"merchandise",sku:"",image:"📦",variants:"",status:"active"});setModal("addItem");}}>+ Add Item</Btn>}
        </Row>
      </Row>

      {/* Sub-tabs */}
      <Row gap={0} style={{marginBottom:20,borderBottom:"1px solid var(--border)"}}>
        {[{id:"shop",label:"Shop"},{id:"cart",label:`Cart (${cartCount})`},{id:"myorders",label:"My Orders"},{...(isAdmin?{id:"orders",label:"All Orders"}:{id:null})}].filter(x=>x.id).map(t=>(
          <button key={t.id} onClick={()=>setTab2(t.id)} style={{background:"none",border:"none",borderBottom:tab2===t.id?"2px solid var(--gold)":"2px solid transparent",color:tab2===t.id?"var(--gold2)":"var(--text3)",padding:"8px 18px",fontFamily:"var(--font-b)",fontSize:13,cursor:"pointer",marginBottom:-1,fontWeight:tab2===t.id?700:400}}>
            {t.label}
          </button>
        ))}
      </Row>

      {tab2==="shop"&&(
        <>
          {cats.map(cat=>{
            const catItems=shopItems.filter(x=>x.category===cat&&x.status==="active");
            if(!catItems.length)return null;
            return (<div key={cat} style={{marginBottom:28}}>
              <div style={{fontFamily:"var(--font-m)",fontSize:10.5,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:12,paddingBottom:6,borderBottom:"1px solid var(--border)"}}>{cat}</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:12}}>
                {catItems.map(item=>{
                  const sv=selVariant[item.id]||"";
                  return (
                    <Card key={item.id} className="hover-lift" style={{padding:16,display:"flex",flexDirection:"column",gap:10}}>
                      <div style={{textAlign:"center",fontSize:44,lineHeight:1,marginBottom:4}}>{item.image}</div>
                      <div>
                        <div style={{fontFamily:"var(--font-d)",fontSize:14.5,fontWeight:700,color:"var(--text)",lineHeight:1.3,marginBottom:4}}>{item.name}</div>
                        <div style={{fontSize:11,color:"var(--text3)",lineHeight:1.5}}>{item.description}</div>
                      </div>
                      <div style={{marginTop:"auto"}}>
                        <Row justify="space-between" align="center" style={{marginBottom:8}}>
                          <span style={{fontFamily:"var(--font-m)",fontSize:18,color:"var(--gold2)",fontWeight:700}}>A${item.price}</span>
                          <span style={{fontSize:10.5,color:item.stock>0?"var(--green2)":"var(--red2)",fontFamily:"var(--font-m)"}}>{item.stock>0?`${item.stock} in stock`:"Out of stock"}</span>
                        </Row>
                        {item.variants?.length>0&&<Select value={sv} onChange={e=>setSelVariant({...selVariant,[item.id]:e.target.value})} style={{marginBottom:8,fontSize:12}}>
                          <option value="">Select size/variant…</option>
                          {item.variants.map(v=><option key={v} value={v}>{v}</option>)}
                        </Select>}
                        <Row gap={6}>
                          <Btn onClick={()=>{if(item.variants?.length>0&&!sv){alert("Please select a variant.");return;}addToCart(item,sv);}} style={{flex:1,justifyContent:"center"}} size="sm" variant={item.stock>0?"primary":"ghost"} disabled={item.stock===0}>
                            {item.stock>0?"Add to Cart":"Unavailable"}
                          </Btn>
                          {isAdmin&&<Btn variant="ghost" size="sm" onClick={()=>{setForm({...item,variants:(item.variants||[]).join(",")});setModal({editItem:item});}}>✏</Btn>}
                        </Row>
                      </div>
                    </Card>
                  );
                })}
              </div>
            </div>);
          })}
        </>
      )}

      {tab2==="cart"&&(
        <div style={{maxWidth:600}}>
          {cartCount===0?<EmptyState icon="🛒" text="Your cart is empty" sub="Browse the shop and add items"/>:(
            <>
              <Col gap={10} style={{marginBottom:20}}>
                {Object.entries(cart).map(([key,{itemId,variant,qty}])=>{
                  const item=shopItems.find(x=>x.id===itemId);
                  if(!item)return null;
                  return (
                    <Card key={key} style={{padding:"14px 18px"}}>
                      <Row justify="space-between" align="center">
                        <Row gap={12} align="center">
                          <span style={{fontSize:28}}>{item.image}</span>

                    <div style={{fontFamily:"var(--font-m)",fontSize:10,color:"var(--text3)",marginTop:4}}>Order {o.id} · {o.placed}</div>
                  </div>
                  <Row gap={10} align="center">
                    <span style={{fontFamily:"var(--font-m)",fontSize:18,color:"var(--gold2)",fontWeight:700}}>A${o.total.toFixed(2)}</span>
                    <Select value={o.status} onChange={e=>updateOrderStatus(o.id,e.target.value)} style={{width:"auto",fontSize:11,padding:"4px 8px"}}>
                      {["pending","processing","dispatched","delivered","cancelled"].map(s=><option key={s} value={s}>{s}</option>)}
                    </Select>

                </Row>
                <Col gap={4}>
                  {o.items.map((x,i)=>(
                    <div key={i} style={{fontSize:12,color:"var(--text2)"}}>{x.qty}× {x.itemName}{x.variant?` (${x.variant})`:""} — A${(x.qty*x.unitPrice).toFixed(2)}</div>
                  ))}
                </Col>
              </Card>
            ))

      )}

      {(modal==="addItem"||modal?.editItem)&&<Modal title={modal==="addItem"?"Add Shop Item":"Edit Shop Item"} onClose={()=>setModal(null)}>

        <Field label="Description"><Textarea value={form.description||""} onChange={e=>setForm({...form,description:e.target.value})}/></Field>
        <Row gap={12} wrap style={{justifyContent:"space-between"}}>

        <Field label="Status"><Select value={form.status||"active"} onChange={e=>setForm({...form,status:e.target.value})}><option value="active">Active</option><option value="inactive">Inactive</option></Select></Field>

function ProfileSection({ user, setUser, members, setMembers, dues, cars, setCars }) {
  const [form,setForm]=useState({...user}); const [saved,setSaved]=useState(false);
  const [carModal,setCarModal]=useState(null); const [carForm,setCarForm]=useState({});
  const myDues=dues.filter(d=>d.memberId===user.id).sort((a,b)=>b.year-a.year);
  const myCars=cars.filter(c=>c.ownerId===user.id);
  async function handleSave(){
    if(!form.name||!form.email)return alert("Name and email required.");
    const final={...form,password:form.newPassword||form.password};delete final.newPassword;
    const u=members.map(m=>m.id===user.id?{...final}:m);
    setMembers(u);await dbSet(SK.members,u);setUser({...final});setSaved(true);setTimeout(()=>setSaved(false),2500);
  }
  async function saveCar(){
    if(!carForm.make||!carForm.model)return alert("Make and model required.");
    const updated=carModal==="add"?[...cars,{...carForm,id:uid("C"),ownerId:user.id,registered:today,photos:[]}]:cars.map(c=>c.id===carForm.id?{...carForm}:c);
    setCars(updated);await dbSet(SK.cars,updated);setCarModal(null);
  }
  async function removeCar(id){const u=cars.map(c=>c.id===id?{...c,status:"sold"}:c);setCars(u);await dbSet(SK.cars,u);}
  return (
    <div className="fade-up" style={{maxWidth:680}}>
      <SectionHeader title="My Profile" subtitle="Manage your account and membership details"/>
      <div style={{display:"grid",gridTemplateColumns:"auto 1fr",gap:24,marginBottom:24,alignItems:"start"}}>
        <Avatar name={user.name} size={80}/>
        <div>
          <div style={{fontFamily:"var(--font-d)",fontSize:24,fontWeight:700,color:"var(--gold3)"}}>{user.name}</div>
          <Row gap={6} style={{marginTop:7}} wrap><Badge status={user.role}/><Badge status={user.status}/></Row>
          <div style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--font-m)",marginTop:8}}>Member No. {user.memberNumber||user.id} · Joined {user.joined} · {user.state}</div>
        </div>
      </div>
      <Card style={{padding:22,marginBottom:16}}>
        <div style={{fontFamily:"var(--font-d)",fontSize:16,color:"var(--gold3)",marginBottom:16,fontWeight:600}}>Personal Details</div>
        <Row gap={12} wrap style={{justifyContent:"space-between"}}><Field label="Full Name" half><Input value={form.name||""} onChange={e=>setForm({...form,name:e.target.value})}/></Field><Field label="Email" half><Input type="email" value={form.email||""} onChange={e=>setForm({...form,email:e.target.value})}/></Field></Row>
        <Row gap={12} wrap style={{justifyContent:"space-between"}}><Field label="Phone" half><Input value={form.phone||""} onChange={e=>setForm({...form,phone:e.target.value})}/></Field><Field label="State" half><Select value={form.state||"VIC"} onChange={e=>setForm({...form,state:e.target.value})}>{["ACT","NSW","NT","QLD","SA","TAS","VIC","WA"].map(s=><option key={s}>{s}</option>)}</Select></Field></Row>
        <Field label="New Password"><Input type="password" value={form.newPassword||""} onChange={e=>setForm({...form,newPassword:e.target.value})} placeholder="leave blank to keep current"/></Field>
        <Field label="Bio"><Textarea value={form.bio||""} onChange={e=>setForm({...form,bio:e.target.value})} placeholder="Tell us about yourself and your Rovers"/></Field>
        <Row gap={10} align="center"><Btn onClick={handleSave}>Save Changes</Btn>{saved&&<span style={{fontSize:12,color:"var(--green2)"}}>Saved</span>}</Row>
      </Card>
      <Card style={{padding:22,marginBottom:16}}>
        <Row justify="space-between" align="center" style={{marginBottom:12}}>
          <div style={{fontFamily:"var(--font-d)",fontSize:16,color:"var(--gold3)",fontWeight:600}}>My Vehicles ({myCars.length})</div>
          <Btn size="sm" onClick={()=>{setCarForm({make:"Rover",model:"",year:new Date().getFullYear(),colour:"",reg:"",chassis:"",status:"active",notes:""});setCarModal("add");}}>+ Add</Btn>
        </Row>
        {myCars.length===0?<EmptyState icon="car" text="No vehicles registered"/>:myCars.map(car=>(
          <div key={car.id} style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:8,padding:12,marginBottom:8,borderLeft:"3px solid var(--green2)"}}>
            <Row justify="space-between">
              <div><div style={{fontWeight:700,fontFamily:"var(--font-d)"}}>{car.year} {car.make} {car.model}</div><div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>{car.colour}{car.reg?" · "+car.reg:""}</div></div>
              <Row gap={5}><Btn variant="ghost" size="sm" onClick={()=>{setCarForm({...car});setCarModal(car);}}>Edit</Btn><Btn variant="ghost" size="sm" onClick={()=>removeCar(car.id)}>Remove</Btn></Row>
            </Row>
          </div>
        ))}
      </Card>
      <Card style={{padding:22}}>
        <div style={{fontFamily:"var(--font-d)",fontSize:16,color:"var(--gold3)",marginBottom:14,fontWeight:600}}>Dues History</div>
        {myDues.length===0?<EmptyState icon="dues" text="No dues records"/>:myDues.map(d=>(
          <Row key={d.id} justify="space-between" style={{padding:"9px 14px",background:"var(--bg3)",borderRadius:6,marginBottom:8}}>
            <span style={{fontFamily:"var(--font-m)",fontSize:12,color:"var(--text2)"}}>{d.year}</span>
            <span style={{fontFamily:"var(--font-m)",fontSize:13,color:"var(--gold2)",fontWeight:700}}>A${d.amount}</span>
            <Badge status={d.paid?"paid":"overdue"} label={d.paid?"PAID":"OUTSTANDING"}/>
            <span style={{fontSize:11,color:"var(--text3)"}}>{d.paidDate||"—"}</span>
          </Row>
        ))}
      </Card>
      {carModal&&<Modal title={carModal==="add"?"Add Vehicle":"Edit Vehicle"} onClose={()=>setCarModal(null)}>
        <Row gap={12} wrap style={{justifyContent:"space-between"}}><Field label="Make" half><Input value={carForm.make||""} onChange={e=>setCarForm({...carForm,make:e.target.value})}/></Field><Field label="Model" half><Input value={carForm.model||""} onChange={e=>setCarForm({...carForm,model:e.target.value})}/></Field></Row>
        <Row gap={12} wrap style={{justifyContent:"space-between"}}><Field label="Year" half><Input type="number" value={carForm.year||""} onChange={e=>setCarForm({...carForm,year:Number(e.target.value)})}/></Field><Field label="Colour" half><Input value={carForm.colour||""} onChange={e=>setCarForm({...carForm,colour:e.target.value})}/></Field></Row>
        <Row gap={12} wrap style={{justifyContent:"space-between"}}><Field label="Rego" half><Input value={carForm.reg||""} onChange={e=>setCarForm({...carForm,reg:e.target.value})}/></Field><Field label="Chassis" half><Input value={carForm.chassis||""} onChange={e=>setCarForm({...carForm,chassis:e.target.value})}/></Field></Row>
        <Field label="Status"><Select value={carForm.status||"active"} onChange={e=>setCarForm({...carForm,status:e.target.value})}><option value="active">active</option><option value="sold">sold</option><option value="destroyed">destroyed</option></Select></Field>
        <Field label="Notes"><Textarea value={carForm.notes||""} onChange={e=>setCarForm({...carForm,notes:e.target.value})}/></Field>
        <div style={{borderTop:"1px solid var(--border)",paddingTop:14,marginTop:4,marginBottom:14}}>
          <div style={{fontSize:11,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.08em",color:"var(--text3)",marginBottom:10}}>Club Permit Scheme</div>
          <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",fontSize:14,color:"var(--text2)",fontWeight:600,marginBottom:12}}>
            <input type="checkbox" checked={!!carForm.onPermit} onChange={e=>setCarForm({...carForm,onPermit:e.target.checked})} style={{width:18,height:18,accentColor:"var(--burg)"}}/>
            This vehicle is on the VicRoads Club Permit Scheme
          </label>
          {carForm.onPermit&&<div>
            <Row gap={12}><Field label="Permit Number" half><Input value={carForm.permitNumber||""} onChange={e=>setCarForm({...carForm,permitNumber:e.target.value})} placeholder="e.g. CP123456"/></Field>
            <Field label="Permit Type" half><Select value={carForm.permitDays||90} onChange={e=>setCarForm({...carForm,permitDays:Number(e.target.value)})}><option value={45}>45 days/year</option><option value={90}>90 days/year</option></Select></Field></Row>
            <Field label="Renewal / Expiry Date"><Input type="date" value={carForm.permitExpiry||""} onChange={e=>setCarForm({...carForm,permitExpiry:e.target.value})}/></Field>
          </div>}
        </div>
        <Row gap={8} justify="flex-end"><Btn variant="ghost" onClick={()=>setCarModal(null)}>Cancel</Btn><Btn onClick={saveCar}>{carModal==="add"?"Add":"Save"}</Btn></Row>
      </Modal>}
    </div>
  );
}
