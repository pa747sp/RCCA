  );
}

function BulkImportSection({ members, setMembers, cars, setCars, dues, setDues }) {
  const [tab,setTab]=useState("members"), [stage,setStage]=useState("upload");
  const [rows,setRows]=useState([]), [mergeMode,setMergeMode]=useState("add");
  const [importing,setImporting]=useState(false), [result,setResult]=useState(null);
  const fileRef=React.useRef();
  function dlTemplate(type){
    const csv=(type==="members"?"name,email,phone,memberType,status,state,joined,memberNumber,password\n\"Jane Smith\",\"jane@example.com\",\"0412345678\",\"City Membership\",\"active\",\"VIC\",\"2024-01-15\",\"005\",\"changeme123\"":"make,model,year,colour,reg,chassis,status,notes,ownerEmail,registered\n\"Rover\",\"P6 3500S\",\"1972\",\"Zircon Blue\",\"ABC-123\",\"35D2BH321C\",\"active\",\"Notes\",\"jane@example.com\",\"2024-03-01\"");
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download="rcca_"+type+"_template.csv";a.click();
  }
  function parseCSV(text){
    const lines=text.trim().split("\n");
    const headers=lines[0].split(",").map(h=>h.trim().replace(/"/g,"").toLowerCase());
    return lines.slice(1).filter(l=>l.trim()).map(line=>{
      const vals=[];let cur="",inQ=false;
      for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"')inQ=!inQ;else if(ch===","&&!inQ){vals.push(cur);cur="";}else cur+=ch;}
      vals.push(cur);const obj={};headers.forEach((h,i)=>{obj[h]=(vals[i]||"").trim();});return obj;
    });
  }
  async function handleFile(e){
    const file=e.target.files[0];if(!file)return;
    setStage("upload");setRows([]);setResult(null);
    const ext=file.name.split(".").pop().toLowerCase();
    let rawRows=[];
    if(ext==="csv"){rawRows=parseCSV(await file.text());}
    else if(ext==="xlsx"||ext==="xls"){
      if(!window.XLSX){await new Promise((res,rej)=>{const s=document.createElement("script");s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
      const wb=window.XLSX.read(await file.arrayBuffer(),{type:"array"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      rawRows=window.XLSX.utils.sheet_to_json(ws,{defval:""}).map(row=>{const obj={};Object.keys(row).forEach(k=>{obj[k.toLowerCase().trim()]=String(row[k]).trim();});return obj;});
    }else{alert("Use .csv, .xlsx or .xls");return;}
    if(!rawRows.length){alert("No data found.");return;}
    const req=tab==="members"?["name","email"]:["make","model","year"];
    const validated=rawRows.map((row,i)=>{
      const errs=[];
      req.forEach(f=>{if(!row[f])errs.push("Missing: "+f);});
      if(tab==="members"&&row.email&&members.find(m=>m.email.toLowerCase()===row.email.toLowerCase()))errs.push("Email exists");
      if(tab==="vehicles"&&row.reg&&cars.find(c=>c.reg&&c.reg.toLowerCase()===row.reg.toLowerCase()))errs.push("Rego exists");
      return {...row,_row:i+2,_errs:errs,_skip:errs.length>0};
    });
    setRows(validated);setStage("preview");
    if(fileRef.current)fileRef.current.value="";
  }
  async function runImport(){
    setImporting(true);
    const good=rows.filter(r=>!r._skip);
    if(tab==="members"){
      const newM=good.map((row,i)=>({id:uid("M"),name:row.name,email:row.email,phone:row.phone||"",memberType:row.membertype||"City Membership",status:row.status||"active",state:row.state||"VIC",joined:row.joined||today,memberNumber:row.membernumber||String(members.length+i+1).padStart(3,"0"),password:row.password||"changeme123",bio:"",role:"member",avatar:(row.name||"M").split(" ").map(w=>w[0]||"").join("").slice(0,2).toUpperCase()}));
      const newD=newM.map(m=>({id:uid("D"),memberId:m.id,year:yr,amount:54,paid:false,paidDate:null,method:null}));
      const um=mergeMode==="replace"?newM:[...members,...newM];const ud=mergeMode==="replace"?newD:[...dues,...newD];
      setMembers(um);await dbSet(SK.members,um);setDues(ud);await dbSet(SK.dues,ud);
    }else{
      const newC=good.map(row=>{const email=(row.owneremail||"").toLowerCase();const owner=members.find(m=>m.email&&m.email.toLowerCase()===email);return{id:uid("C"),make:row.make||"Rover",model:row.model||"",year:Number(row.year)||new Date().getFullYear(),colour:row.colour||"",reg:row.reg||"",chassis:row.chassis||"",status:row.status||"active",notes:row.notes||"",ownerId:owner?owner.id:"",registered:row.registered||today,photos:[]};});
      const uc=mergeMode==="replace"?newC:[...cars,...newC];setCars(uc);await dbSet(SK.cars,uc);
    }
    setResult({added:good.length,skipped:rows.filter(r=>r._skip).length});setStage("done");setImporting(false);
  }
  function reset(){setStage("upload");setRows([]);setResult(null);}
  const pCols=tab==="members"?["name","email","membertype","state"]:["make","model","year","reg"];
  const tdS={padding:"7px 10px",fontSize:12,borderBottom:"1px solid var(--border)"};
  return (
    <div className="fade-up">
      <SectionHeader title="Bulk Import" subtitle="Import members or vehicles from Excel or CSV"/>
      <Row gap={0} style={{marginBottom:20,background:"var(--bg3)",borderRadius:8,padding:4,width:"fit-content"}}>
        {["members","vehicles"].map(t=>(
          <button key={t} onClick={()=>{setTab(t);reset();}} style={{background:tab===t?"#fff":"none",border:"none",borderRadius:6,padding:"8px 18px",fontFamily:"var(--font-b)",fontSize:13,fontWeight:tab===t?700:400,color:tab===t?"var(--burg)":"var(--text3)",cursor:"pointer"}}>{t==="members"?"Members":"Vehicles"}</button>
        ))}
      </Row>
      {stage==="upload"&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:16}}>
          <Card style={{padding:22}}>
            <div style={{fontFamily:"var(--font-d)",fontSize:16,fontWeight:700,marginBottom:8}}>1. Download Template</div>
            <p style={{fontSize:13,color:"var(--text3)",lineHeight:1.7,marginBottom:14}}>Get a CSV template. Fill it in Excel or Google Sheets.</p>
            <Btn variant="ghost" onClick={()=>dlTemplate(tab)}>Download {tab} template</Btn>
            <div style={{marginTop:8,fontSize:11,color:"var(--text3)"}}>{tab==="members"?"Required: name, email":"Required: make, model, year"}</div>
          </Card>
          <Card style={{padding:22}}>
            <div style={{fontFamily:"var(--font-d)",fontSize:16,fontWeight:700,marginBottom:8}}>2. Upload File</div>
            <p style={{fontSize:13,color:"var(--text3)",lineHeight:1.7,marginBottom:14}}>Accepts .xlsx, .xls or .csv files.</p>
            <div style={{border:"2px dashed var(--border2)",borderRadius:8,padding:16,textAlign:"center",background:"var(--bg3)"}}>
              <div style={{fontSize:28,marginBottom:8}}>&#128194;</div>
              <input ref={fileRef} type="file" accept=".csv,.xlsx,.xls" onChange={handleFile} style={{width:"100%",fontSize:13,cursor:"pointer"}}/>
            </div>
          </Card>
        </div>
      )}
      {stage==="preview"&&(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}}>
            <div style={{background:"#d4f0e0",border:"1px solid #a0d8b8",borderRadius:8,padding:12,textAlign:"center"}}><div style={{fontSize:24,fontWeight:700,color:"var(--green2)"}}>{rows.filter(r=>!r._skip).length}</div><div style={{fontSize:10,color:"var(--green2)"}}>READY</div></div>
            <div style={{background:"#fdd8d8",border:"1px solid #f0a8a8",borderRadius:8,padding:12,textAlign:"center"}}><div style={{fontSize:24,fontWeight:700,color:"var(--burg)"}}>{rows.filter(r=>r._skip).length}</div><div style={{fontSize:10,color:"var(--burg)"}}>SKIPPED</div></div>
            <div style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:8,padding:12,textAlign:"center"}}><div style={{fontSize:24,fontWeight:700}}>{rows.length}</div><div style={{fontSize:10,color:"var(--text3)"}}>TOTAL</div></div>
          </div>
          <Card style={{padding:12,marginBottom:12}}>
            <div style={{fontSize:10,color:"var(--text3)",marginBottom:6}}>IMPORT MODE</div>
            <Row gap={20}>
              {[["add","Add to existing (safe)"],["replace","Replace all data"]].map(([v,l])=>(
                <label key={v} style={{display:"flex",gap:8,cursor:"pointer",fontSize:13,color:v==="replace"?"var(--burg)":"inherit"}}>
                  <input type="radio" name="mm" value={v} checked={mergeMode===v} onChange={()=>setMergeMode(v)} style={{accentColor:"var(--burg)"}}/>{l}
                </label>
              ))}
            </Row>
          </Card>
          <Card style={{overflow:"hidden",marginBottom:12}}>
            <div style={{overflowX:"auto",maxHeight:300,overflowY:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr style={{background:"var(--bg3)",position:"sticky",top:0}}><th style={{...tdS,textAlign:"left",fontSize:10,color:"var(--text3)"}}>Row</th><th style={{...tdS,textAlign:"left",fontSize:10,color:"var(--text3)"}}>Status</th>{pCols.map(h=><th key={h} style={{...tdS,textAlign:"left",fontSize:10,color:"var(--text3)"}}>{h}</th>)}</tr></thead>
                <tbody>{rows.map((row,i)=>(
                  <tr key={i} style={{background:row._skip?"#fff8f8":"#fff",opacity:row._skip?.6:1}}>
                    <td style={tdS}>{row._row}</td>
                    <td style={tdS}>{row._skip?<span style={{fontSize:10,background:"#fdd8d8",color:"#8f1a1a",padding:"2px 6px",borderRadius:3}}>{row._errs.join(", ")}</span>:<span style={{fontSize:10,background:"#d4f0e0",color:"#1a6040",padding:"2px 6px",borderRadius:3}}>OK</span>}</td>
                    {pCols.map(h=><td key={h} style={tdS}>{row[h]||"—"}</td>)}
                  </tr>
                ))}</tbody>
              </table>
            </div>
          </Card>
          <Row gap={10} justify="flex-end">
            <Btn variant="ghost" onClick={reset}>Start Over</Btn>
            <Btn onClick={runImport} disabled={importing||!rows.filter(r=>!r._skip).length}>{importing?"Importing...":"Import "+rows.filter(r=>!r._skip).length+" "+tab}</Btn>
          </Row>
        </div>
      )}
      {stage==="done"&&result&&(
        <div style={{textAlign:"center",padding:"48px 24px"}}>
          <div style={{fontSize:48,marginBottom:12}}>&#10003;</div>
          <div style={{fontFamily:"var(--font-d)",fontSize:24,fontWeight:700,marginBottom:8}}>Import Complete</div>
          <div style={{fontSize:14,color:"var(--text3)",marginBottom:20}}>{result.added} {tab} imported{result.skipped?", "+result.skipped+" skipped":""}.</div>
          <Btn onClick={reset}>Import Another File</Btn>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// FINANCE SECTION
// ══════════════════════════════════════════════════════════════════════════════
const DEFAULT_FIN_SETTINGS = {
  bankName:"", accountName:"Rover Car Club of Australia",
  bsb:"", accountNumber:"", paymentRef:"Please use your member number as reference",
  paymentDays:14, gstRegistered:false, abn:"", invoicePrefix:"RCCA",
  nextInvoiceNum:1001,
};
const EXPENSE_CATS=["Hall Hire","Printing","Insurance","Trophies & Awards","Catering","Postage","Website","Administration","Equipment","Other"];

function FinanceSection({ members, dues, orders, rsvps, events, expenses, setExpenses, finSettings, setFinSettings, cars }) {
  const fs = finSettings || DEFAULT_FIN_SETTINGS;
  const [tab,setTab]=useState("dashboard");
  const [modal,setModal]=useState(null);
  const [expForm,setExpForm]=useState({date:today,amount:"",category:"Hall Hire",description:"",reference:""});
  const [settForm,setSettForm]=useState(fs);
  const [invView,setInvView]=useState(null);

  const fyStart = ()=>{ const d=new Date(); return d.getMonth()>=6?d.getFullYear():d.getFullYear()-1; };
  const fyLabel = ()=>{ const s=fyStart(); return `${s}–${s+1}`; };
  const inFY = dt=>{ const s=fyStart(); const d=new Date(dt); return d>=new Date(s,6,1)&&d<new Date(s+1,6,1); };

  // Build income ledger from dues, orders, event rsvps
  const incomeItems = [
    ...dues.filter(d=>d.paid&&inFY(d.paidDate||d.year+"-07-01")).map(d=>{
      const m=members.find(x=>x.id===d.memberId);
      return {id:"D-"+d.id,type:"dues",date:d.paidDate||d.year+"-07-01",amount:d.amount||54,description:"Membership Dues "+d.year,member:m?.name||"Unknown",memberId:d.memberId,ref:d.id};
    }),
    ...orders.filter(o=>inFY(o.date)).map(o=>{
      const m=members.find(x=>x.id===o.memberId);
      const total=o.items?o.items.reduce((s,i)=>s+i.price*i.qty,0):0;
      return {id:"O-"+o.id,type:"shop",date:o.date,amount:total,description:"Shop Order #"+o.id.slice(-4),member:m?.name||"Unknown",memberId:o.memberId,ref:o.id};
    }),
  ].sort((a,b)=>b.date.localeCompare(a.date));

  const expItems = expenses.filter(e=>inFY(e.date)).sort((a,b)=>b.date.localeCompare(a.date));
  const totalIncome = incomeItems.reduce((s,i)=>s+Number(i.amount),0);
  const totalExpenses = expItems.reduce((s,e)=>s+Number(e.amount),0);
  const surplus = totalIncome - totalExpenses;

  async function saveExpense(){
    if(!expForm.amount||!expForm.description)return alert("Amount and description required.");
    const entry={...expForm,id:uid("EX"),amount:Number(expForm.amount)};
    const u=modal?.edit?expenses.map(e=>e.id===modal.edit.id?entry:{...e}):[ ...expenses,entry];
    setExpenses(u); await dbSet(SK.expenses,u); setModal(null);
    setExpForm({date:today,amount:"",category:"Hall Hire",description:"",reference:""});
  }
  async function delExpense(id){ const u=expenses.filter(e=>e.id!==id); setExpenses(u); await dbSet(SK.expenses,u); setModal(null); }
  async function saveSettings(){
    setFinSettings(settForm); await dbSet(SK.finSettings,settForm); setModal(null);
  }

  function buildInvoice(item){
    const m=members.find(x=>x.id===item.memberId)||{name:item.member,email:"",address:""};
    const num=(fs.invoicePrefix||"RCCA")+"-"+String((fs.nextInvoiceNum||1001)+incomeItems.indexOf(item)).padStart(4,"0");
    const issued=item.date; 
    const due=new Date(new Date(issued).getTime()+((fs.paymentDays||14)*86400000)).toISOString().slice(0,10);
    return {num,issued,due,member:m,item,fs};
  }

  function exportCSV(){
    const all=[
      ...incomeItems.map(i=>["Income",i.date,i.description,i.member,"",i.amount.toFixed(2)]),
      ...expItems.map(e=>["Expense",e.date,e.description,"",e.category,e.amount.toFixed(2)]),
    ].sort((a,b)=>b[1].localeCompare(a[1]));
    const rows=[["Type","Date","Description","Member","Category","Amount"],...all];
    const csv=rows.map(r=>r.map(v=>'"'+String(v||"").replace(/"/g,'""')+'"').join(",")).join("\n");
    const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
    a.download="RCCA_Finance_"+fyLabel().replace("–","-")+".csv"; a.click();
  }

  const tabs2=[{id:"dashboard",label:"Dashboard"},{id:"income",label:"Income"},{id:"expenses",label:"Expenses"},{id:"settings",label:"Settings"}];

  return (
    <div className="fade-up">
      <SectionHeader title="Finance" subtitle={`FY ${fyLabel()}`} action={<Btn variant="ghost" onClick={exportCSV}>⬇ Export CSV</Btn>}/>
      <Row gap={8} style={{marginBottom:20,flexWrap:"wrap"}}>
        {tabs2.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"7px 18px",borderRadius:6,border:"1px solid var(--border)",background:tab===t.id?"var(--burg)":"var(--bg2)",color:tab===t.id?"#fff":"var(--text2)",fontWeight:600,cursor:"pointer",fontSize:13}}>{t.label}</button>)}
      </Row>

      {tab==="dashboard"&&(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:14,marginBottom:24}}>
            {[["Total Income","$"+totalIncome.toFixed(2),"var(--green)"],["Total Expenses","$"+totalExpenses.toFixed(2),"var(--red2)"],["Surplus / Deficit",(surplus>=0?"$":"-$")+Math.abs(surplus).toFixed(2),surplus>=0?"var(--green)":"var(--red2)"],["Transactions",(incomeItems.length+expItems.length),"var(--burg)"]].map(([k,v,c])=>(
              <Card key={k} style={{padding:18}}>
                <div style={{fontSize:10,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.08em",color:"var(--text3)",marginBottom:6}}>{k}</div>
                <div style={{fontSize:26,fontWeight:700,color:c}}>{v}</div>
              </Card>
            ))}
          </div>
          <Card style={{padding:18,marginBottom:16}}>
            <div style={{fontSize:11,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.08em",color:"var(--text3)",marginBottom:12}}>Income by Category — FY {fyLabel()}</div>
            {[["Membership Dues",dues.filter(d=>d.paid&&inFY(d.paidDate||d.year+"-07-01")).reduce((s,d)=>s+(d.amount||54),0),"var(--green)"],
              ["Club Shop",orders.filter(o=>inFY(o.date)).reduce((s,o)=>s+(o.items?o.items.reduce((x,i)=>x+i.price*i.qty,0):0),0),"var(--blue)"]].map(([k,v,c])=>{
              const pct=totalIncome>0?Math.round(v/totalIncome*100):0;
              return <div key={k} style={{marginBottom:10}}>
                <Row justify="space-between" style={{marginBottom:4,fontSize:13}}><span>{k}</span><span style={{fontWeight:700}}>${v.toFixed(2)} <span style={{color:"var(--text3)",fontWeight:400,fontSize:11}}>({pct}%)</span></span></Row>
                <div style={{height:8,background:"var(--bg3)",borderRadius:4}}><div style={{height:8,borderRadius:4,background:c,width:pct+"%",transition:"width .4s"}}/></div>
              </div>;
            })}
          </Card>
          <Card style={{padding:18}}>
            <div style={{fontSize:11,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.08em",color:"var(--text3)",marginBottom:12}}>Expenses by Category — FY {fyLabel()}</div>
            {EXPENSE_CATS.map(cat=>{
              const amt=expItems.filter(e=>e.category===cat).reduce((s,e)=>s+Number(e.amount),0);
              if(amt===0)return null;
              const pct=totalExpenses>0?Math.round(amt/totalExpenses*100):0;
              return <div key={cat} style={{marginBottom:10}}>
                <Row justify="space-between" style={{marginBottom:4,fontSize:13}}><span>{cat}</span><span style={{fontWeight:700}}>${amt.toFixed(2)} <span style={{color:"var(--text3)",fontWeight:400,fontSize:11}}>({pct}%)</span></span></Row>
                <div style={{height:8,background:"var(--bg3)",borderRadius:4}}><div style={{height:8,borderRadius:4,background:"var(--burg)",width:pct+"%",transition:"width .4s"}}/></div>
              </div>;
            })}
            {expItems.length===0&&<div style={{color:"var(--text3)",fontSize:13,fontFamily:"var(--font-m)"}}>No expenses recorded this FY</div>}
          </Card>
        </div>
      )}

      {tab==="income"&&(
        <div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr style={{borderBottom:"2px solid var(--border)",background:"var(--bg3)"}}>
                {["Date","Description","Member","Amount","Invoice"].map(h=><th key={h} style={{textAlign:"left",padding:"8px 12px",fontFamily:"var(--font-m)",fontSize:10,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.06em"}}>{h}</th>)}
              </tr></thead>
              <tbody>
                {incomeItems.map(item=>(
                  <tr key={item.id} style={{borderBottom:"1px solid var(--border)"}}>
                    <td style={{padding:"9px 12px",fontFamily:"var(--font-m)",fontSize:11,color:"var(--text3)"}}>{item.date}</td>
                    <td style={{padding:"9px 12px"}}>{item.description}</td>
                    <td style={{padding:"9px 12px",color:"var(--text2)"}}>{item.member}</td>
                    <td style={{padding:"9px 12px",fontWeight:700,color:"var(--green)"}}>${Number(item.amount).toFixed(2)}</td>
                    <td style={{padding:"9px 12px"}}><Btn variant="ghost" size="sm" onClick={()=>setInvView(buildInvoice(item))}>View Invoice</Btn></td>
                  </tr>
                ))}
                {incomeItems.length===0&&<tr><td colSpan={5} style={{padding:"20px",textAlign:"center",color:"var(--text3)",fontFamily:"var(--font-m)",fontSize:12}}>No income recorded this FY</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {tab==="expenses"&&(
        <div>
          <Row justify="flex-end" style={{marginBottom:14}}>
            <Btn onClick={()=>{ setExpForm({date:today,amount:"",category:"Hall Hire",description:"",reference:""}); setModal({addExp:true}); }}>+ Add Expense</Btn>
          </Row>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr style={{borderBottom:"2px solid var(--border)",background:"var(--bg3)"}}>
                {["Date","Description","Category","Reference","Amount",""].map(h=><th key={h} style={{textAlign:"left",padding:"8px 12px",fontFamily:"var(--font-m)",fontSize:10,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.06em"}}>{h}</th>)}
              </tr></thead>
              <tbody>
                {expItems.map(e=>(
                  <tr key={e.id} style={{borderBottom:"1px solid var(--border)"}}>
                    <td style={{padding:"9px 12px",fontFamily:"var(--font-m)",fontSize:11,color:"var(--text3)"}}>{e.date}</td>
                    <td style={{padding:"9px 12px"}}>{e.description}</td>
                    <td style={{padding:"9px 12px"}}><Badge status={e.category}/></td>
                    <td style={{padding:"9px 12px",color:"var(--text3)",fontSize:11,fontFamily:"var(--font-m)"}}>{e.reference||"—"}</td>
                    <td style={{padding:"9px 12px",fontWeight:700,color:"var(--red2)"}}>${Number(e.amount).toFixed(2)}</td>
                    <td style={{padding:"9px 12px"}}><Row gap={6}>
                      <Btn variant="ghost" size="sm" onClick={()=>{ setExpForm({...e}); setModal({edit:e}); }}>Edit</Btn>
                      <Btn variant="danger" size="sm" onClick={()=>setModal({confirmDel:e})}>Del</Btn>
                    </Row></td>
                  </tr>
                ))}
                {expItems.length===0&&<tr><td colSpan={6} style={{padding:"20px",textAlign:"center",color:"var(--text3)",fontFamily:"var(--font-m)",fontSize:12}}>No expenses this FY — add one above</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {tab==="settings"&&(
        <Card style={{padding:24,maxWidth:600}}>
          <div style={{fontFamily:"var(--font-d)",fontSize:17,fontWeight:700,marginBottom:18}}>Finance Settings</div>
          <Field label="Account Name"><Input value={settForm.accountName||""} onChange={e=>setSettForm({...settForm,accountName:e.target.value})}/></Field>
          <Row gap={12}><Field label="Bank Name" half><Input value={settForm.bankName||""} onChange={e=>setSettForm({...settForm,bankName:e.target.value})}/></Field>
          <Field label="BSB" half><Input value={settForm.bsb||""} onChange={e=>setSettForm({...settForm,bsb:e.target.value})} placeholder="000-000"/></Field></Row>
          <Field label="Account Number"><Input value={settForm.accountNumber||""} onChange={e=>setSettForm({...settForm,accountNumber:e.target.value})}/></Field>
          <Field label="Payment Reference Instructions"><Input value={settForm.paymentRef||""} onChange={e=>setSettForm({...settForm,paymentRef:e.target.value})}/></Field>
          <Row gap={12}><Field label="Payment Due (days)" half><Input type="number" value={settForm.paymentDays||14} onChange={e=>setSettForm({...settForm,paymentDays:Number(e.target.value)})}/></Field>
          <Field label="ABN" half><Input value={settForm.abn||""} onChange={e=>setSettForm({...settForm,abn:e.target.value})} placeholder="XX XXX XXX XXX"/></Field></Row>
          <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",fontSize:14,color:"var(--text2)",fontWeight:600,marginBottom:16}}>
            <input type="checkbox" checked={!!settForm.gstRegistered} onChange={e=>setSettForm({...settForm,gstRegistered:e.target.checked})} style={{width:18,height:18,accentColor:"var(--burg)"}}/>
            GST Registered (10% GST shown on invoices)
          </label>
          <Row gap={12}><Field label="Invoice Prefix" half><Input value={settForm.invoicePrefix||"RCCA"} onChange={e=>setSettForm({...settForm,invoicePrefix:e.target.value})}/></Field>
          <Field label="Next Invoice Number" half><Input type="number" value={settForm.nextInvoiceNum||1001} onChange={e=>setSettForm({...settForm,nextInvoiceNum:Number(e.target.value)})}/></Field></Row>
          <Btn onClick={saveSettings}>Save Settings</Btn>
        </Card>
      )}

      {/* Add/Edit Expense Modal */}
      {(modal?.addExp||modal?.edit)&&<Modal title={modal?.edit?"Edit Expense":"Add Expense"} onClose={()=>setModal(null)}>
        <Row gap={12}><Field label="Date" half><Input type="date" value={expForm.date} onChange={e=>setExpForm({...expForm,date:e.target.value})}/></Field>
        <Field label="Amount ($)" half><Input type="number" value={expForm.amount} onChange={e=>setExpForm({...expForm,amount:e.target.value})} placeholder="0.00"/></Field></Row>
        <Field label="Category"><Select value={expForm.category} onChange={e=>setExpForm({...expForm,category:e.target.value})}>{EXPENSE_CATS.map(c=><option key={c}>{c}</option>)}</Select></Field>
        <Field label="Description"><Input value={expForm.description} onChange={e=>setExpForm({...expForm,description:e.target.value})}/></Field>
        <Field label="Reference / Receipt No (optional)"><Input value={expForm.reference} onChange={e=>setExpForm({...expForm,reference:e.target.value})}/></Field>
        <Row gap={10} justify="flex-end"><Btn variant="ghost" onClick={()=>setModal(null)}>Cancel</Btn><Btn onClick={saveExpense}>Save</Btn></Row>
      </Modal>}
      {modal?.confirmDel&&<Confirm message="Delete this expense?" onConfirm={()=>delExpense(modal.confirmDel.id)} onCancel={()=>setModal(null)}/>}

      {/* Invoice Viewer */}
      {invView&&<Modal title="Invoice" onClose={()=>setInvView(null)} wide>
        <div id="inv-print" style={{background:"#fff",border:"1px solid var(--border)",borderRadius:8,padding:32,fontFamily:"var(--font-b)",fontSize:13,color:"#1a1210",maxWidth:680,margin:"0 auto"}}>
          <Row justify="space-between" align="flex-start" style={{marginBottom:24,paddingBottom:20,borderBottom:"3px solid var(--burg)"}}>
            <div>
              <div style={{fontFamily:"var(--font-d)",fontSize:22,fontWeight:700,color:"var(--burg)",marginBottom:2}}>Rover Car Club of Australia</div>
              <div style={{fontSize:11,color:"#666"}}>PO Box 6049, Wantirna VIC 3152</div>
              <div style={{fontSize:11,color:"#666"}}>secretary@rcca.com.au</div>
              {invView.fs?.abn&&<div style={{fontSize:11,color:"#666",marginTop:2}}>ABN: {invView.fs.abn}</div>}
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontFamily:"var(--font-m)",fontSize:11,color:"#999",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}}>Invoice</div>
              <div style={{fontFamily:"var(--font-d)",fontSize:18,fontWeight:700}}>{invView.num}</div>
              <div style={{fontSize:11,color:"#666",marginTop:6}}>Issued: {invView.issued}</div>
              <div style={{fontSize:11,color:"#666"}}>Due: {invView.due}</div>
            </div>
          </Row>
          <Row justify="space-between" align="flex-start" style={{marginBottom:24}}>
            <div>
              <div style={{fontSize:10,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.08em",color:"#999",marginBottom:4}}>Bill To</div>
              <div style={{fontWeight:700,fontSize:14}}>{invView.member.name}</div>
              {invView.member.email&&<div style={{fontSize:12,color:"#666"}}>{invView.member.email}</div>}
              {invView.member.memberNumber&&<div style={{fontSize:12,color:"#666"}}>Member #{invView.member.memberNumber}</div>}
            </div>
          </Row>
          <table style={{width:"100%",borderCollapse:"collapse",marginBottom:20}}>
            <thead><tr style={{background:"var(--burg)",color:"#fff"}}>
              <th style={{padding:"10px 14px",textAlign:"left",fontSize:11,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.06em"}}>Description</th>
              <th style={{padding:"10px 14px",textAlign:"right",fontSize:11,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.06em"}}>Amount</th>
            </tr></thead>
            <tbody>
              <tr style={{borderBottom:"1px solid #eee"}}>
                <td style={{padding:"12px 14px"}}>{invView.item.description}</td>
                <td style={{padding:"12px 14px",textAlign:"right",fontWeight:700}}>${Number(invView.item.amount).toFixed(2)}</td>
              </tr>
              {invView.fs?.gstRegistered&&<tr style={{borderBottom:"1px solid #eee"}}>
                <td style={{padding:"8px 14px",color:"#666",fontSize:12}}>GST included (10%)</td>
                <td style={{padding:"8px 14px",textAlign:"right",color:"#666",fontSize:12}}>${(Number(invView.item.amount)/11).toFixed(2)}</td>
              </tr>}
            </tbody>
            <tfoot>
              <tr style={{background:"var(--bg3)"}}>
                <td style={{padding:"12px 14px",fontWeight:700,fontSize:14}}>TOTAL DUE</td>
                <td style={{padding:"12px 14px",textAlign:"right",fontWeight:700,fontSize:16,color:"var(--burg)"}}>${Number(invView.item.amount).toFixed(2)}</td>
              </tr>
            </tfoot>
          </table>
          {(invView.fs?.bsb||invView.fs?.accountNumber)&&<div style={{background:"#f0f8f4",border:"1px solid #b3d9c4",borderRadius:8,padding:16,marginBottom:16}}>
            <div style={{fontSize:11,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.08em",color:"#1e6840",marginBottom:10,fontWeight:700}}>Payment by Bank Transfer</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,fontSize:12}}>
              {[["Account Name",invView.fs.accountName],["Bank",invView.fs.bankName],["BSB",invView.fs.bsb],["Account Number",invView.fs.accountNumber]].filter(([,v])=>v).map(([k,v])=>(
                <div key={k}><div style={{color:"#666",fontSize:10,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:2}}>{k}</div><div style={{fontWeight:700}}>{v}</div></div>
              ))}
            </div>
            {invView.fs?.paymentRef&&<div style={{marginTop:10,fontSize:12,color:"#1e6840"}}>📌 {invView.fs.paymentRef}</div>}
          </div>}
          <div style={{fontSize:11,color:"#999",textAlign:"center",borderTop:"1px solid #eee",paddingTop:12}}>Rover Car Club of Australia Inc. · Thank you for your membership!</div>
        </div>
        <Row gap={10} justify="center" style={{marginTop:16}}>
          <Btn onClick={()=>window.print()}>🖨️ Print Invoice</Btn>
          <Btn variant="ghost" onClick={()=>setInvView(null)}>Close</Btn>
        </Row>
      </Modal>}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// CLUB PERMIT SECTION
// ══════════════════════════════════════════════════════════════════════════════
function ClubPermitSection({ user, members, cars, setCars, permits, setPermits, tripLogs, setTripLogs }) {
  const isAdmin = user.role==="admin";
  const [modal,setModal]=useState(null);
  const [tripForm,setTripForm]=useState({date:today,startOdo:"",endOdo:"",purpose:"",destination:""});
  const [permitForm,setPermitForm]=useState({});

  // Permit year resets on permit anniversary - use calendar year for simplicity
  const thisYear = new Date().getFullYear();

  // Cars on permit scheme - either all (admin) or just mine (member)
  const permitCars = cars.filter(c=>c.onPermit);
  const myCars = cars.filter(c=>c.ownerId===user.id);
  const myPermitCars = myCars.filter(c=>c.onPermit);

  const carLabel = c=>c.year+" "+c.make+" "+c.model+(c.reg?" ("+c.reg+")":"");
  const ownerOf = c=>members.find(m=>m.id===c.ownerId);

  // Days used this year for a car
  const daysUsed = carId=>{
    const logs = tripLogs.filter(t=>t.carId===carId&&t.date.startsWith(thisYear+""));
    return logs.length;
  };
  const tripsForCar = carId=>tripLogs.filter(t=>t.carId===carId).sort((a,b)=>b.date.localeCompare(a.date));

  // Days remaining
  const allowance = c=>(c.permitDays===45?45:90);
  const daysLeft = c=>Math.max(0,allowance(c)-daysUsed(c.id));
  const pctUsed = c=>Math.min(100,Math.round(daysUsed(c.id)/allowance(c)*100));

  async function saveTrip(carId){
    if(!tripForm.date||!tripForm.purpose)return alert("Date and purpose required.");
    const entry={id:uid("TL"),carId,memberId:user.id,date:tripForm.date,
      startOdo:tripForm.startOdo?Number(tripForm.startOdo):null,
      endOdo:tripForm.endOdo?Number(tripForm.endOdo):null,
      km:(tripForm.startOdo&&tripForm.endOdo)?Number(tripForm.endOdo)-Number(tripForm.startOdo):null,
      purpose:tripForm.purpose,destination:tripForm.destination};
    const u=[...tripLogs,entry]; setTripLogs(u); await dbSet(SK.tripLogs,u);
    setModal(null); setTripForm({date:today,startOdo:"",endOdo:"",purpose:"",destination:""});
  }
  async function deleteTrip(id){ const u=tripLogs.filter(t=>t.id!==id); setTripLogs(u); await dbSet(SK.tripLogs,u); }

  async function saveCarPermit(car){
    const u=cars.map(c=>c.id===car.id?{...c,...permitForm,onPermit:true}:c);
    setCars(u); await dbSet(SK.cars,u); setModal(null);
  }
  async function removePermit(carId){
    const u=cars.map(c=>c.id===carId?{...c,onPermit:false,permitNumber:"",permitExpiry:"",permitDays:90}:c);
    setCars(u); await dbSet(SK.cars,u);
  }

  const expiryStatus = c=>{
    if(!c.permitExpiry)return "unknown";
    const days=Math.round((new Date(c.permitExpiry)-new Date())/(1000*60*60*24));
    if(days<0)return "expired";
    if(days<=60)return "soon";
    return "ok";
  };
  const expiryColour = s=>({expired:"var(--red2)",soon:"#b45309",ok:"var(--green)",unknown:"var(--text3)"}[s]);

  return (
    <div className="fade-up">
      <SectionHeader title="Club Permits" subtitle={isAdmin?`${permitCars.length} vehicles on scheme`:"VicRoads Club Permit Scheme"}/>

      {/* Info banner */}
      <div style={{background:"linear-gradient(90deg,#f0f4ff,#e8f5ee)",border:"1px solid #c5d8f0",borderRadius:8,padding:"12px 16px",marginBottom:20,fontSize:13,color:"var(--text2)"}}>
        <span style={{fontWeight:700}}>Victoria Club Permit Scheme</span> — Vehicles 25+ years old may be driven up to <strong>45 or 90 days per year</strong> on public roads. RCCA is an approved club with VicRoads. A logbook must be maintained. Contact the Club Permit Officer for new applications.
      </div>

      {isAdmin?(
        <div>
          {/* Admin: renewal alerts */}
          {permitCars.filter(c=>["expired","soon"].includes(expiryStatus(c))).length>0&&(
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.08em",color:"var(--text3)",marginBottom:8}}>Renewal Alerts</div>
              {permitCars.filter(c=>["expired","soon"].includes(expiryStatus(c))).map(c=>{
                const s=expiryStatus(c); const owner=ownerOf(c);
                return <div key={c.id} style={{background:s==="expired"?"#fff0f0":"#fffbeb",border:"1px solid "+(s==="expired"?"var(--red2)":"#f59e0b"),borderRadius:6,padding:"10px 14px",marginBottom:6,fontSize:13,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div><span style={{fontWeight:700,color:expiryColour(s)}}>{s==="expired"?"⚠ EXPIRED":"⏰ Expiring Soon"}</span> — {carLabel(c)} · {owner?.name||"Unknown"}</div>
                  <div style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--font-m)"}}>{c.permitExpiry||"No date set"}</div>
                </div>;
              })}
            </div>
          )}

          {/* Admin: full permit table */}
          <Card style={{padding:0,overflow:"hidden"}}>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead><tr style={{borderBottom:"2px solid var(--border)",background:"var(--bg3)"}}>
                  {["Owner","Vehicle","Permit No","Type","Expiry","Days Used","Status",""].map(h=><th key={h} style={{textAlign:"left",padding:"10px 12px",fontFamily:"var(--font-m)",fontSize:10,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.06em",whiteSpace:"nowrap"}}>{h}</th>)}
                </tr></thead>
                <tbody>
                  {permitCars.map(c=>{
                    const owner=ownerOf(c); const used=daysUsed(c.id); const allow=allowance(c); const s=expiryStatus(c);
                    return <tr key={c.id} style={{borderBottom:"1px solid var(--border)"}}>
                      <td style={{padding:"10px 12px"}}><Row gap={6} align="center"><Avatar name={owner?.name||"?"} size={22}/><span style={{fontWeight:600}}>{owner?.name||"Unknown"}</span></Row></td>
                      <td style={{padding:"10px 12px",color:"var(--text2)"}}>{carLabel(c)}</td>
                      <td style={{padding:"10px 12px",fontFamily:"var(--font-m)",fontSize:11}}>{c.permitNumber||"—"}</td>
                      <td style={{padding:"10px 12px"}}><span style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:4,padding:"2px 8px",fontSize:11,fontFamily:"var(--font-m)"}}>{allow} days</span></td>
                      <td style={{padding:"10px 12px",color:expiryColour(s),fontWeight:s!=="ok"?700:400,fontSize:11,fontFamily:"var(--font-m)"}}>{c.permitExpiry||"—"}</td>
                      <td style={{padding:"10px 12px"}}>
                        <div style={{fontSize:11,marginBottom:4}}>{used}/{allow} days</div>
                        <div style={{height:6,background:"var(--bg3)",borderRadius:3,width:80}}><div style={{height:6,borderRadius:3,background:pctUsed(c)>80?"var(--red2)":"var(--green)",width:pctUsed(c)+"%"}}/></div>
                      </td>
                      <td style={{padding:"10px 12px"}}><span style={{fontSize:11,fontFamily:"var(--font-m)",fontWeight:700,color:expiryColour(s)}}>{s==="expired"?"Expired":s==="soon"?"Expiring Soon":s==="ok"?"Active":"Unknown"}</span></td>
                      <td style={{padding:"10px 12px"}}><Btn variant="ghost" size="sm" onClick={()=>{setPermitForm({permitNumber:c.permitNumber||"",permitExpiry:c.permitExpiry||"",permitDays:c.permitDays||90});setModal({editPermit:c});}}>Edit</Btn></td>
                    </tr>;
                  })}
                  {permitCars.length===0&&<tr><td colSpan={8} style={{padding:"24px",textAlign:"center",color:"var(--text3)",fontFamily:"var(--font-m)",fontSize:12}}>No vehicles on the Club Permit Scheme</td></tr>}
                </tbody>
              </table>
            </div>
          </Card>
        </div>
      ):(
        <div>
          {myPermitCars.length===0&&<div style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:8,padding:20,fontSize:13,color:"var(--text2)",marginBottom:16}}>
            You have no vehicles on the Club Permit Scheme. To add a vehicle, go to <strong>My Profile → Vehicles</strong> and enable "Club Permit" on an eligible vehicle (25+ years old).
          </div>}
          {myPermitCars.map(c=>{
            const used=daysUsed(c.id); const allow=allowance(c); const left=daysLeft(c); const pct=pctUsed(c); const s=expiryStatus(c);
            const trips=tripsForCar(c.id);
            return <Card key={c.id} style={{marginBottom:20,overflow:"hidden"}}>
              <div style={{height:4,background:pct>80?"linear-gradient(90deg,var(--red2),#f87171)":"linear-gradient(90deg,var(--green),#34d399)"}}/>
              <div style={{padding:20}}>
                <Row justify="space-between" align="flex-start" style={{marginBottom:14}}>
                  <div>
                    <div style={{fontFamily:"var(--font-d)",fontSize:16,fontWeight:700,marginBottom:3}}>{carLabel(c)}</div>
                    <Row gap={12} style={{fontSize:12,color:"var(--text3)",fontFamily:"var(--font-m)"}}>
                      <span>Permit: {c.permitNumber||"Not set"}</span>
                      <span>Type: {allow} day</span>
                      <span style={{color:expiryColour(s),fontWeight:s!=="ok"?700:400}}>Expires: {c.permitExpiry||"Not set"} {s==="expired"?"⚠":s==="soon"?"⏰":""}</span>
                    </Row>
                  </div>
                  <Btn variant="ghost" size="sm" onClick={()=>{setTripForm({date:today,startOdo:"",endOdo:"",purpose:"",destination:""});setModal({addTrip:c});}}>+ Log Trip</Btn>
                </Row>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}}>
                  {[["Days Used",used,"var(--burg)"],["Days Remaining",left,left<=10?"var(--red2)":"var(--green)"],["Allowance",allow+" days","var(--text2)"]].map(([k,v,col])=>(
                    <div key={k} style={{background:"var(--bg3)",borderRadius:6,padding:"10px 14px",textAlign:"center"}}>
                      <div style={{fontSize:10,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.08em",color:"var(--text3)",marginBottom:4}}>{k}</div>
                      <div style={{fontSize:22,fontWeight:700,color:col}}>{v}</div>
                    </div>
                  ))}
                </div>
                <div style={{marginBottom:4,fontSize:11,color:"var(--text3)",fontFamily:"var(--font-m)"}}>Usage {thisYear} — {used}/{allow} days ({pct}%)</div>
                <div style={{height:10,background:"var(--bg3)",borderRadius:5,marginBottom:16}}>
                  <div style={{height:10,borderRadius:5,background:pct>80?"var(--red2)":"var(--green)",width:pct+"%",transition:"width .4s"}}/>
                </div>
                <div style={{fontSize:11,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.08em",color:"var(--text3)",marginBottom:8}}>Trip Logbook ({trips.length} entries)</div>
                {trips.length===0&&<div style={{fontSize:13,color:"var(--text3)",fontFamily:"var(--font-m)"}}>No trips logged yet. Use "+ Log Trip" to record each outing.</div>}
                {trips.slice(0,10).map(t=>(
                  <div key={t.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--border)",fontSize:13}}>
                    <div>
                      <span style={{fontFamily:"var(--font-m)",fontSize:11,color:"var(--text3)",marginRight:10}}>{t.date}</span>
                      <span style={{fontWeight:600}}>{t.purpose}</span>
                      {t.destination&&<span style={{color:"var(--text3)",marginLeft:6}}>→ {t.destination}</span>}
                    </div>
                    <Row gap={10} align="center">
                      {t.km&&<span style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--font-m)"}}>{t.km}km</span>}
                      <button onClick={()=>setModal({confirmDelTrip:t})} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text3)",fontSize:14,padding:"2px 6px"}}>×</button>
                    </Row>
                  </div>
                ))}
                {trips.length>10&&<div style={{fontSize:12,color:"var(--text3)",fontFamily:"var(--font-m)",textAlign:"center",paddingTop:8}}>Showing 10 of {trips.length} trips</div>}
              </div>
            </Card>;
          })}
        </div>
      )}

      {/* Admin edit permit modal */}
      {modal?.editPermit&&<Modal title={"Edit Permit — "+carLabel(modal.editPermit)} onClose={()=>setModal(null)}>
        <Field label="Permit Number"><Input value={permitForm.permitNumber||""} onChange={e=>setPermitForm({...permitForm,permitNumber:e.target.value})} placeholder="e.g. CP123456"/></Field>
        <Field label="Permit Type">
          <Select value={permitForm.permitDays||90} onChange={e=>setPermitForm({...permitForm,permitDays:Number(e.target.value)})}>
            <option value={45}>45 days per year</option>
            <option value={90}>90 days per year</option>
          </Select>
        </Field>
        <Field label="Renewal / Expiry Date"><Input type="date" value={permitForm.permitExpiry||""} onChange={e=>setPermitForm({...permitForm,permitExpiry:e.target.value})}/></Field>
        <Row gap={10} justify="space-between">
          <Btn variant="danger" size="sm" onClick={()=>{removePermit(modal.editPermit.id);setModal(null);}}>Remove from Scheme</Btn>
          <Row gap={10}><Btn variant="ghost" onClick={()=>setModal(null)}>Cancel</Btn><Btn onClick={()=>saveCarPermit(modal.editPermit)}>Save</Btn></Row>
        </Row>
      </Modal>}

      {/* Log Trip modal */}
      {modal?.addTrip&&<Modal title={"Log Trip — "+carLabel(modal.addTrip)} onClose={()=>setModal(null)}>
        <div style={{background:"#fffbeb",border:"1px solid #f59e0b",borderRadius:6,padding:"10px 14px",marginBottom:16,fontSize:12,color:"#92400e"}}>
          Each day you use your Club Permit vehicle counts as one day toward your annual allowance ({allowance(modal.addTrip)} days). Log each outing even if multiple trips happen in one day — or log once per calendar day used.
        </div>
        <Row gap={12}><Field label="Date" half><Input type="date" value={tripForm.date} onChange={e=>setTripForm({...tripForm,date:e.target.value})}/></Field>
        <Field label="Purpose / Occasion" half><Input value={tripForm.purpose} onChange={e=>setTripForm({...tripForm,purpose:e.target.value})} placeholder="e.g. Club run, Display day"/></Field></Row>
        <Field label="Destination (optional)"><Input value={tripForm.destination} onChange={e=>setTripForm({...tripForm,destination:e.target.value})} placeholder="e.g. Yarra Valley"/></Field>
        <Row gap={12}><Field label="Start Odometer (optional)" half><Input type="number" value={tripForm.startOdo} onChange={e=>setTripForm({...tripForm,startOdo:e.target.value})}/></Field>
        <Field label="End Odometer (optional)" half><Input type="number" value={tripForm.endOdo} onChange={e=>setTripForm({...tripForm,endOdo:e.target.value})}/></Field></Row>
        {tripForm.startOdo&&tripForm.endOdo&&Number(tripForm.endOdo)>Number(tripForm.startOdo)&&<div style={{fontSize:13,color:"var(--green)",fontWeight:700,marginBottom:12}}>Distance: {Number(tripForm.endOdo)-Number(tripForm.startOdo)} km</div>}
        <Row gap={10} justify="flex-end"><Btn variant="ghost" onClick={()=>setModal(null)}>Cancel</Btn><Btn onClick={()=>saveTrip(modal.addTrip.id)}>Save Trip</Btn></Row>
      </Modal>}

      {modal?.confirmDelTrip&&<Confirm message="Delete this trip log entry?" onConfirm={()=>{deleteTrip(modal.confirmDelTrip.id);setModal(null);}} onCancel={()=>setModal(null)}/>}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));

</script>

</body>
</html>
