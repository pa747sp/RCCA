// CLUB PERMIT SECTION
// ══════════════════════════════════════════════════════════════════════════════
function ClubPermitSection({ user, members, cars, setCars, permits, setPermits, tripLogs, setTripLogs }) {
  const isAdmin = user.role==="admin";
  const [modal,setModal]=useState(null);
  const [tripForm,setTripForm]=useState({date:today,startOdo:"",endOdo:"",purpose:"",destination:""});
  const [permitForm,setPermitForm]=useState({});

  // Permit year resets on permit anniversary - use calendar year for simplicity
  const thisYear = new Date().getFullYear();

  // Cars on permit scheme - either all (admin) or just mine (member)
  const permitCars = (cars||[]).filter(c=>c.onPermit);
  const myCars = cars.filter(c=>c.ownerId===user.id);
  const myPermitCars = myCars.filter(c=>c.onPermit);

  const carLabel = c=>c.year+" "+c.make+" "+c.model+(c.reg?" ("+c.reg+")":"");
  const ownerOf = c=>members.find(m=>m.id===c.ownerId);

  // Days used this year for a car
  const daysUsed = carId=>{
    const logs = (tripLogs||[]).filter(t=>t.carId===carId&&t.date.startsWith(thisYear+""));
    return logs.length;
  };
  const tripsForCar = carId=>(tripLogs||[]).filter(t=>t.carId===carId).sort((a,b)=>b.date.localeCompare(a.date));

  // Days remaining
  const allowance = c=>(c.permitDays===45?45:90);
  const daysLeft = c=>Math.max(0,allowance(c)-daysUsed(c.id));
  const pctUsed = c=>Math.min(100,Math.round(daysUsed(c.id)/allowance(c)*100));

  async function saveTrip(carId){
    if(!tripForm.date||!tripForm.purpose)return alert("Date and purpose required.");
    const entry={id:uid("TL"),carId,memberId:user.id,date:tripForm.date,
      startOdo:tripForm.startOdo?Number(tripForm.startOdo):null,
      endOdo:tripForm.endOdo?Number(tripForm.endOdo):null,
      km:(tripForm.startOdo&&tripForm.endOdo)?Number(tripForm.endOdo)-Number(tripForm.startOdo):null,
      purpose:tripForm.purpose,destination:tripForm.destination};
    const u=[...(tripLogs||[]),entry]; setTripLogs(u); await dbSet(SK.tripLogs,u);
    setModal(null); setTripForm({date:today,startOdo:"",endOdo:"",purpose:"",destination:""});
  }
  async function deleteTrip(id){ const u=(tripLogs||[]).filter(t=>t.id!==id); setTripLogs(u); await dbSet(SK.tripLogs,u); }

  async function saveCarPermit(car){
    const u=cars.map(c=>c.id===car.id?{...c,...permitForm,onPermit:true}:c);
    setCars(u); await dbSet(SK.cars,u); setModal(null);
  }
  async function removePermit(carId){
    const u=cars.map(c=>c.id===carId?{...c,onPermit:false,permitNumber:"",permitExpiry:"",permitDays:90}:c);
    setCars(u); await dbSet(SK.cars,u);
  }

  const expiryStatus = c=>{
    if(!c.permitExpiry)return "unknown";
    const days=Math.round((new Date(c.permitExpiry)-new Date())/(1000*60*60*24));
    if(days<0)return "expired";
    if(days<=60)return "soon";
    return "ok";
  };
  const expiryColour = s=>({expired:"var(--red2)",soon:"#b45309",ok:"var(--green)",unknown:"var(--text3)"}[s]);

  return (
    <div className="fade-up">
      <SectionHeader title="Club Permits" subtitle={isAdmin?`${permitCars.length} vehicles on scheme`:"VicRoads Club Permit Scheme"}/>

      {/* Info banner */}
      <div style={{background:"linear-gradient(90deg,#f0f4ff,#e8f5ee)",border:"1px solid #c5d8f0",borderRadius:8,padding:"12px 16px",marginBottom:20,fontSize:13,color:"var(--text2)"}}>
        <span style={{fontWeight:700}}>Victoria Club Permit Scheme</span> — Vehicles 25+ years old may be driven up to <strong>45 or 90 days per year</strong> on public roads. RCCA is an approved club with VicRoads. A logbook must be maintained. Contact the Club Permit Officer for new applications.
      </div>

      {isAdmin?(
        <div>
          {/* Admin: renewal alerts */}
          {permitCars.filter(c=>["expired","soon"].includes(expiryStatus(c))).length>0&&(
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.08em",color:"var(--text3)",marginBottom:8}}>Renewal Alerts</div>
              {permitCars.filter(c=>["expired","soon"].includes(expiryStatus(c))).map(c=>{
                const s=expiryStatus(c); const owner=ownerOf(c);
                return <div key={c.id} style={{background:s==="expired"?"#fff0f0":"#fffbeb",border:"1px solid "+(s==="expired"?"var(--red2)":"#f59e0b"),borderRadius:6,padding:"10px 14px",marginBottom:6,fontSize:13,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div><span style={{fontWeight:700,color:expiryColour(s)}}>{s==="expired"?"⚠ EXPIRED":"⏰ Expiring Soon"}</span> — {carLabel(c)} · {owner?.name||"Unknown"}</div>
                  <div style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--font-m)"}}>{c.permitConditions?c.permitConditions+" · ":""}{c.permitExpiry||"No date set"}{c.permitNumber?" · #"+c.permitNumber:""}</div>
                </div>;
              })}
            </div>
          )}

          {/* Admin: full permit table */}
          <Card style={{padding:0,overflow:"hidden"}}>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead><tr style={{borderBottom:"2px solid var(--border)",background:"var(--bg3)"}}>
                  {["Owner","Vehicle","Permit No","Type","Issued","Expiry","Days Used","Payment","Status",""].map(h=><th key={h} style={{textAlign:"left",padding:"10px 12px",fontFamily:"var(--font-m)",fontSize:10,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.06em",whiteSpace:"nowrap"}}>{h}</th>)}
                </tr></thead>
                <tbody>
                  {permitCars.map(c=>{
                    const owner=ownerOf(c); const used=daysUsed(c.id); const allow=allowance(c); const s=expiryStatus(c);
                    return <tr key={c.id} style={{borderBottom:"1px solid var(--border)"}}>
                      <td style={{padding:"10px 12px"}}><Row gap={6} align="center"><Avatar name={owner?.name||"?"} size={22}/><span style={{fontWeight:600}}>{owner?.name||"Unknown"}</span></Row></td>
                      <td style={{padding:"10px 12px",color:"var(--text2)"}}>{carLabel(c)}</td>
                      <td style={{padding:"10px 12px",fontFamily:"var(--font-m)",fontSize:11}}>{c.permitNumber||"—"}</td>
                      <td style={{padding:"10px 12px"}}><span style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:4,padding:"2px 8px",fontSize:11,fontFamily:"var(--font-m)"}}>{allow} days</span></td>
                      <td style={{padding:"10px 12px",fontFamily:"var(--font-m)",fontSize:11,color:"var(--text3)"}}>{c.permitIssued||"—"}</td>
                      <td style={{padding:"10px 12px",fontFamily:"var(--font-m)",fontSize:11,color:"var(--text3)"}}>{c.permitIssued||"—"}</td>
                      <td style={{padding:"10px 12px",color:expiryColour(s),fontWeight:s!=="ok"?700:400,fontSize:11,fontFamily:"var(--font-m)"}}>{c.permitExpiry||"—"}</td>
                      <td style={{padding:"10px 12px"}}>
                        <div style={{fontSize:11,marginBottom:4}}>{used}/{allow} days</div>
                        <div style={{height:6,background:"var(--bg3)",borderRadius:3,width:80}}><div style={{height:6,borderRadius:3,background:pctUsed(c)>80?"var(--red2)":"var(--green)",width:pctUsed(c)+"%"}}/></div>
                      </td>
                      <td style={{padding:"10px 12px"}}>
                        {c.paymentStatus==="paid"
                          ?<span style={{fontSize:10,background:"#d4f0e0",color:"#1a6040",border:"1px solid #a0d8b8",padding:"2px 8px",borderRadius:3,fontFamily:"var(--font-m)",fontWeight:700}}>✓ PAID{c.paymentDate?" "+c.paymentDate:""}</span>
                          :c.paymentStatus==="waived"
                          ?<span style={{fontSize:10,background:"#ede8e0",color:"#5a4838",border:"1px solid #ccc4b8",padding:"2px 8px",borderRadius:3,fontFamily:"var(--font-m)",fontWeight:700}}>WAIVED</span>
                          :c.invoiceRef
                          ?<span style={{fontSize:10,background:"#fdecd0",color:"#7a4010",border:"1px solid #f0c890",padding:"2px 8px",borderRadius:3,fontFamily:"var(--font-m)",fontWeight:700}}>INVOICED</span>
                          :<span style={{fontSize:10,color:"var(--text4)",fontFamily:"var(--font-m)"}}>—</span>
                        }
                        {c.invoiceRef&&<div style={{fontSize:9.5,color:"var(--text3)",fontFamily:"var(--font-m)",marginTop:2}}>{c.invoiceRef}</div>}
                      </td>
                      <td style={{padding:"10px 12px"}}><span style={{fontSize:11,fontFamily:"var(--font-m)",fontWeight:700,color:expiryColour(s)}}>{s==="expired"?"Expired":s==="soon"?"Expiring Soon":s==="ok"?"Active":"Unknown"}</span></td>
                      <td style={{padding:"10px 12px"}}><Btn variant="ghost" size="sm" onClick={()=>{setPermitForm({permitNumber:c.permitNumber||"",permitExpiry:c.permitExpiry||"",permitDays:c.permitDays||90,permitIssued:c.permitIssued||"",invoiceRef:c.invoiceRef||"",invoiceDate:c.invoiceDate||"",invoiceAmount:c.invoiceAmount||"",paymentStatus:c.paymentStatus||"unpaid",paymentDate:c.paymentDate||"",paymentMethod:c.paymentMethod||"",notes:c.notes||""});setModal({editPermit:c});}}>Edit</Btn></td>
                    </tr>;
                  })}
                  {permitCars.length===0&&<tr><td colSpan={8} style={{padding:"24px",textAlign:"center",color:"var(--text3)",fontFamily:"var(--font-m)",fontSize:12}}>No vehicles on the Club Permit Scheme</td></tr>}
                </tbody>
              </table>
            </div>
          </Card>
        </div>
      ):(
        <div>
          {myPermitCars.length===0&&<div style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:8,padding:20,fontSize:13,color:"var(--text2)",marginBottom:16}}>
            You have no vehicles on the Club Permit Scheme. To add a vehicle, go to <strong>My Profile → Vehicles</strong> and enable "Club Permit" on an eligible vehicle (25+ years old).
          </div>}
          {myPermitCars.map(c=>{
            const used=daysUsed(c.id); const allow=allowance(c); const left=daysLeft(c); const pct=pctUsed(c); const s=expiryStatus(c);
            const trips=tripsForCar(c.id);
            return <Card key={c.id} style={{marginBottom:20,overflow:"hidden"}}>
              <div style={{height:4,background:pct>80?"linear-gradient(90deg,var(--red2),#f87171)":"linear-gradient(90deg,var(--green),#34d399)"}}/>
              <div style={{padding:20}}>
                <Row justify="space-between" align="flex-start" style={{marginBottom:14}}>
                  <div>
                    <div style={{fontFamily:"var(--font-d)",fontSize:16,fontWeight:700,marginBottom:3}}>{carLabel(c)}</div>
                    <Row gap={12} wrap style={{fontSize:12,color:"var(--text3)",fontFamily:"var(--font-m)",marginTop:2}}>
                      {c.permitNumber&&<span style={{fontFamily:"var(--font-m)",fontWeight:600,color:"var(--text2)"}}>#{c.permitNumber}</span>}
                      <span>{allow}-day permit</span>
                      {c.permitIssued&&<span>Issued: {c.permitIssued}</span>}
                      <span style={{color:expiryColour(s),fontWeight:s!=="ok"?700:400}}>Expires: {c.permitExpiry||"Not set"} {s==="expired"?"⚠":s==="soon"?"⏰":""}</span>
                    </Row>
                    <Row gap={8} style={{marginTop:6}}>
                      {c.paymentStatus==="paid"
                        ?<span style={{fontSize:10,background:"#d4f0e0",color:"#1a6040",border:"1px solid #a0d8b8",padding:"2px 8px",borderRadius:3,fontFamily:"var(--font-m)",fontWeight:700}}>✓ Fees paid{c.paymentDate?" "+c.paymentDate:""}</span>
                        :c.paymentStatus==="waived"
                        ?<span style={{fontSize:10,background:"#ede8e0",color:"#5a4838",border:"1px solid #ccc4b8",padding:"2px 8px",borderRadius:3,fontFamily:"var(--font-m)",fontWeight:700}}>Fees waived</span>
                        :c.invoiceRef
                        ?<span style={{fontSize:10,background:"#fdecd0",color:"#7a4010",border:"1px solid #f0c890",padding:"2px 8px",borderRadius:3,fontFamily:"var(--font-m)",fontWeight:700}}>⏳ Invoice pending — {c.invoiceRef}{c.invoiceAmount?" A$"+Number(c.invoiceAmount).toFixed(2):""}</span>
                        :<span style={{fontSize:10,color:"var(--text4)",fontFamily:"var(--font-m)"}}>No invoice on file</span>
                      }
                    </Row>
                  </div>
                  <Btn variant="ghost" size="sm" onClick={()=>{setTripForm({date:today,startOdo:"",endOdo:"",purpose:"",destination:""});setModal({addTrip:c});}}>+ Log Trip</Btn>
                </Row>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}}>
                  {[["Days Used",used,"var(--burg)"],["Days Remaining",left,left<=10?"var(--red2)":"var(--green)"],["Allowance",allow+" days","var(--text2)"]].map(([k,v,col])=>(
                    <div key={k} style={{background:"var(--bg3)",borderRadius:6,padding:"10px 14px",textAlign:"center"}}>
                      <div style={{fontSize:10,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.08em",color:"var(--text3)",marginBottom:4}}>{k}</div>
                      <div style={{fontSize:22,fontWeight:700,color:col}}>{v}</div>
                    </div>
                  ))}
                </div>
                <div style={{marginBottom:4,fontSize:11,color:"var(--text3)",fontFamily:"var(--font-m)"}}>Usage {thisYear} — {used}/{allow} days ({pct}%)</div>
                <div style={{height:10,background:"var(--bg3)",borderRadius:5,marginBottom:16}}>
                  <div style={{height:10,borderRadius:5,background:pct>80?"var(--red2)":"var(--green)",width:pct+"%",transition:"width .4s"}}/>
                </div>
                <div style={{fontSize:11,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.08em",color:"var(--text3)",marginBottom:8}}>Trip Logbook ({trips.length} entries)</div>
                {trips.length===0&&<div style={{fontSize:13,color:"var(--text3)",fontFamily:"var(--font-m)"}}>No trips logged yet. Use "+ Log Trip" to record each outing.</div>}
                {trips.slice(0,10).map(t=>(
                  <div key={t.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--border)",fontSize:13}}>
                    <div>
                      <span style={{fontFamily:"var(--font-m)",fontSize:11,color:"var(--text3)",marginRight:10}}>{t.date}</span>
                      <span style={{fontWeight:600}}>{t.purpose}</span>
                      {t.destination&&<span style={{color:"var(--text3)",marginLeft:6}}>→ {t.destination}</span>}
                    </div>
                    <Row gap={10} align="center">
                      {t.km&&<span style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--font-m)"}}>{t.km}km</span>}
                      <button onClick={()=>setModal({confirmDelTrip:t})} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text3)",fontSize:14,padding:"2px 6px"}}>×</button>
                    </Row>
                  </div>
                ))}
                {trips.length>10&&<div style={{fontSize:12,color:"var(--text3)",fontFamily:"var(--font-m)",textAlign:"center",paddingTop:8}}>Showing 10 of {trips.length} trips</div>}
              </div>
            </Card>;
          })}
        </div>
      )}

      {/* Admin edit permit modal */}
      {modal?.editPermit&&<Modal title={"Edit Permit — "+carLabel(modal.editPermit)} onClose={()=>setModal(null)} wide>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:4}}>
          <div>
            <div style={{fontSize:10,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.08em",color:"var(--text3)",marginBottom:10}}>Permit Details</div>
            <Field label="Permit Number"><Input value={permitForm.permitNumber||""} onChange={e=>setPermitForm({...permitForm,permitNumber:e.target.value})} placeholder="e.g. CP123456"/></Field>
            <Field label="Permit Type">
              <Select value={permitForm.permitDays||90} onChange={e=>setPermitForm({...permitForm,permitDays:Number(e.target.value)})}>
                <option value={45}>45 days per year</option>
                <option value={90}>90 days per year</option>
              </Select>
            </Field>
            <Row gap={12}>
              <Field label="Date of Issue" half><Input type="date" value={permitForm.permitIssued||""} onChange={e=>setPermitForm({...permitForm,permitIssued:e.target.value})}/></Field>
              <Field label="Expiry Date" half><Input type="date" value={permitForm.permitExpiry||""} onChange={e=>setPermitForm({...permitForm,permitExpiry:e.target.value})}/></Field>
            </Row>
          </div>
          <div>
            <div style={{fontSize:10,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.08em",color:"var(--text3)",marginBottom:10}}>Payment Record</div>
            <Field label="Invoice Number / Reference"><Input value={permitForm.invoiceRef||""} onChange={e=>setPermitForm({...permitForm,invoiceRef:e.target.value})} placeholder="e.g. RCCA-CP-2025-042"/></Field>
            <Field label="Invoice Date"><Input type="date" value={permitForm.invoiceDate||""} onChange={e=>setPermitForm({...permitForm,invoiceDate:e.target.value})}/></Field>
            <Field label="Invoice Amount (A$)"><Input type="number" value={permitForm.invoiceAmount||""} onChange={e=>setPermitForm({...permitForm,invoiceAmount:e.target.value})} placeholder="0.00"/></Field>
            <Row gap={12} style={{marginBottom:4}}>
              <Field label="Payment Status" half>
                <Select value={permitForm.paymentStatus||"unpaid"} onChange={e=>setPermitForm({...permitForm,paymentStatus:e.target.value})}>
                  <option value="unpaid">Unpaid</option>
                  <option value="paid">Paid</option>
                  <option value="waived">Waived</option>
                </Select>
              </Field>
              <Field label="Payment Date" half><Input type="date" value={permitForm.paymentDate||""} onChange={e=>setPermitForm({...permitForm,paymentDate:e.target.value})} disabled={permitForm.paymentStatus!=="paid"}/></Field>
            </Row>
            <Field label="Payment Method"><Select value={permitForm.paymentMethod||""} onChange={e=>setPermitForm({...permitForm,paymentMethod:e.target.value})} disabled={permitForm.paymentStatus!=="paid"}>
              <option value="">— Select —</option>
              {["Bank Transfer","Cash","Cheque","Card"].map(m=><option key={m}>{m}</option>)}
            </Select></Field>
          </div>
        </div>
        <Field label="Notes"><Textarea value={permitForm.notes||""} onChange={e=>setPermitForm({...permitForm,notes:e.target.value})} placeholder="Any notes about this permit application or payment…" style={{minHeight:60}}/></Field>
        <Row gap={10} justify="space-between">
          <Btn variant="danger" size="sm" onClick={()=>{removePermit(modal.editPermit.id);setModal(null);}}>Remove from Scheme</Btn>
          <Row gap={10}><Btn variant="ghost" onClick={()=>setModal(null)}>Cancel</Btn><Btn onClick={()=>saveCarPermit(modal.editPermit)}>Save</Btn></Row>
        </Row>
      </Modal>}

      {/* Log Trip modal */}
      {modal?.addTrip&&<Modal title={"Log Trip — "+carLabel(modal.addTrip)} onClose={()=>setModal(null)}>
        <div style={{background:"#fffbeb",border:"1px solid #f59e0b",borderRadius:6,padding:"10px 14px",marginBottom:16,fontSize:12,color:"#92400e"}}>
          Each day you use your Club Permit vehicle counts as one day toward your annual allowance ({allowance(modal.addTrip)} days). Log each outing even if multiple trips happen in one day — or log once per calendar day used.
        </div>
        <Row gap={12}><Field label="Date" half><Input type="date" value={tripForm.date} onChange={e=>setTripForm({...tripForm,date:e.target.value})}/></Field>
        <Field label="Purpose / Occasion" half><Input value={tripForm.purpose} onChange={e=>setTripForm({...tripForm,purpose:e.target.value})} placeholder="e.g. Club run, Display day"/></Field></Row>
        <Field label="Destination (optional)"><Input value={tripForm.destination} onChange={e=>setTripForm({...tripForm,destination:e.target.value})} placeholder="e.g. Yarra Valley"/></Field>
        <Row gap={12}><Field label="Start Odometer (optional)" half><Input type="number" value={tripForm.startOdo} onChange={e=>setTripForm({...tripForm,startOdo:e.target.value})}/></Field>
        <Field label="End Odometer (optional)" half><Input type="number" value={tripForm.endOdo} onChange={e=>setTripForm({...tripForm,endOdo:e.target.value})}/></Field></Row>
        {tripForm.startOdo&&tripForm.endOdo&&Number(tripForm.endOdo)>Number(tripForm.startOdo)&&<div style={{fontSize:13,color:"var(--green)",fontWeight:700,marginBottom:12}}>Distance: {Number(tripForm.endOdo)-Number(tripForm.startOdo)} km</div>}
        <Row gap={10} justify="flex-end"><Btn variant="ghost" onClick={()=>setModal(null)}>Cancel</Btn><Btn onClick={()=>saveTrip(modal.addTrip.id)}>Save Trip</Btn></Row>
      </Modal>}

      {modal?.confirmDelTrip&&<Confirm message="Delete this trip log entry?" onConfirm={()=>{deleteTrip(modal.confirmDelTrip.id);setModal(null);}} onCancel={()=>setModal(null)}/>}
    </div>
  );
}

</script>
<script type="text/babel" data-presets="react">

// ── PARTS INVENTORY SECTION ──────────────────────────────────────────────────
function PartsInventorySection({user,parts,setParts,partsInventory,setPartsInventory,shopItems,setShopItems}) {
  const isAdmin = user&&user.role==="admin";
  const [view,setView]=React.useState("inventory");
  const [modal,setModal]=React.useState(null);
  const [form,setForm]=React.useState({name:"",model:"",description:"",condition:"Good",qty:1,costPrice:0,memberPrice:0,publicPrice:0,availability:"both",category:"parts",sku:""});

  const saveInv = async(items)=>{setParts(items);await dbSet(SK.partsInventory,items);};
  const addPart = async()=>{
    if(!form.name.trim())return;
    const np={...form,id:uid("PT"),createdAt:new Date().toISOString()};
    const updated=[...(parts||[]),np]; await saveInv(updated); setModal(null);
    setForm({name:"",model:"",description:"",condition:"Good",qty:1,costPrice:0,memberPrice:0,publicPrice:0,availability:"both",category:"parts",sku:""});
  };
  const deletePart=async(id)=>{await saveInv((parts||[]).filter(p=>p.id!==id));};
  const publishToShop=async(part)=>{
    const existing=(shopItems||[]).find(s=>s.partId===part.id);
    if(existing){alert("Already in shop");return;}
    const si={id:uid("SI"),partId:part.id,name:part.name,description:part.description,
      price:part.publicPrice||0,memberPrice:part.memberPrice||0,
      availability:part.availability||"both",category:"parts",
      model:part.model,condition:part.condition,qty:part.qty,stock:part.qty,image:""};
    const updated=[...(shopItems||[]),si];
    setShopItems(updated);await dbSet(SK.shopItems,updated);
    alert("Published to shop!");
  };

  const conditions=["New","Excellent","Good","Fair","Poor","Unknown"];
  const avail={"both":"Members & Public","members":"Members Only","public":"Public Only"};

  return (
    <div style={{padding:"24px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:8}}>
        <h2 style={{fontFamily:"var(--font-d)",fontSize:22,color:"var(--burg)",margin:0}}>Parts Inventory</h2>
        <div style={{display:"flex",gap:8}}>
          {["inventory","shop"].map(v=>(
            <button key={v} onClick={()=>setView(v)} style={{padding:"6px 16px",borderRadius:6,border:"1px solid var(--burg)",background:view===v?"var(--burg)":"white",color:view===v?"white":"var(--burg)",cursor:"pointer",fontWeight:600,textTransform:"capitalize"}}>{v==="inventory"?"Inventory":"Shop Items"}</button>
          ))}
          {isAdmin&&<button onClick={()=>setModal("add")} style={{padding:"6px 16px",borderRadius:6,border:"none",background:"var(--burg)",color:"white",cursor:"pointer",fontWeight:700}}>+ Add Part</button>}
        </div>
      </div>

      {view==="inventory"&&(
        <div>
          {(!parts||parts.length===0)&&<div style={{padding:40,textAlign:"center",color:"var(--text3)"}}>No parts in inventory yet.{isAdmin&&" Click + Add Part to get started."}</div>}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:16}}>
            {(parts||[]).map(p=>(
              <div key={p.id} style={{background:"white",borderRadius:8,border:"1px solid var(--border)",padding:16,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                  <div>
                    <div style={{fontWeight:700,color:"var(--text)",fontSize:14}}>{p.name}</div>
                    {p.model&&<div style={{fontSize:12,color:"var(--text3)"}}>{p.model}</div>}
                  </div>
                  <span style={{background:p.qty>0?"var(--green)":"#dc2626",color:"white",borderRadius:12,padding:"2px 8px",fontSize:11,fontWeight:700}}>{p.qty>0?`${p.qty} in stock`:"Out of stock"}</span>
                </div>
                {p.description&&<div style={{fontSize:12,color:"var(--text2)",marginBottom:8,lineHeight:1.5}}>{p.description}</div>}
                <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
                  <span style={{background:"var(--bg3)",padding:"2px 8px",borderRadius:10,fontSize:11}}>{p.condition}</span>
                  <span style={{background:"var(--bg3)",padding:"2px 8px",borderRadius:10,fontSize:11,color:"var(--burg)"}}>{avail[p.availability]||p.availability}</span>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"var(--text3)",marginBottom:10}}>
                  <span>Member: <b style={{color:"var(--green)"}}>A${p.memberPrice||0}</b></span>
                  {p.availability!=="members"&&<span>Public: <b>A${p.publicPrice||0}</b></span>}
                </div>
                {isAdmin&&(
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>publishToShop(p)} style={{flex:1,padding:"5px 0",background:"var(--burg)",color:"white",border:"none",borderRadius:5,cursor:"pointer",fontSize:12,fontWeight:600}}>Publish to Shop</button>
                    <button onClick={()=>deletePart(p.id)} style={{padding:"5px 10px",background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:5,cursor:"pointer",fontSize:12}}>✕</button>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      )}

      {view==="shop"&&(
        <div>
          <div style={{marginBottom:12,color:"var(--text3)",fontSize:13}}>Parts currently listed in the club shop:</div>
          {(shopItems||[]).filter(s=>s.partId).length===0&&<div style={{padding:40,textAlign:"center",color:"var(--text3)"}}>No parts published to shop yet. Go to Inventory and click "Publish to Shop".</div>}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:12}}>
            {(shopItems||[]).filter(s=>s.partId).map(s=>(
              <div key={s.id} style={{background:"white",borderRadius:8,border:"1px solid var(--border)",padding:14}}>
                <div style={{fontWeight:700,fontSize:13,marginBottom:4}}>{s.name}</div>
                {s.model&&<div style={{fontSize:11,color:"var(--text3)",marginBottom:4}}>{s.model}</div>}
                <div style={{display:"flex",gap:8,fontSize:12,marginTop:6}}>
                  <span style={{color:"var(--green)",fontWeight:700}}>Members: A${s.memberPrice||0}</span>
                  {s.availability!=="members"&&<span style={{color:"var(--text2)"}}>Public: A${s.price||0}</span>}
                </div>
                <span style={{fontSize:11,background:"var(--bg3)",padding:"2px 8px",borderRadius:10,marginTop:6,display:"inline-block"}}>{avail[s.availability]||s.availability}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {modal==="add"&&(
        <Modal onClose={()=>setModal(null)} title="Add Part to Inventory">
          <div style={{display:"flex",flexDirection:"column",gap:12,maxWidth:480}}>
            {[["Part Name *","name","text"],["Rover Model(s)","model","text"],["SKU / Part No.","sku","text"]].map(([lbl,key,type])=>(
              <div key={key}><label style={{fontSize:12,fontWeight:600,color:"var(--text2)",display:"block",marginBottom:4}}>{lbl}</label>
              <input type={type} value={form[key]} onChange={e=>setForm({...form,[key]:e.target.value})} style={{width:"100%",padding:"8px 10px",borderRadius:6,border:"1px solid var(--border)",fontSize:13,boxSizing:"border-box"}}/></div>
            ))}
            <div><label style={{fontSize:12,fontWeight:600,color:"var(--text2)",display:"block",marginBottom:4}}>Description</label>
            <textarea value={form.description} onChange={e=>setForm({...form,description:e.target.value})} rows={3} style={{width:"100%",padding:"8px 10px",borderRadius:6,border:"1px solid var(--border)",fontSize:13,boxSizing:"border-box",resize:"vertical"}}/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div><label style={{fontSize:12,fontWeight:600,color:"var(--text2)",display:"block",marginBottom:4}}>Condition</label>
              <select value={form.condition} onChange={e=>setForm({...form,condition:e.target.value})} style={{width:"100%",padding:"8px 10px",borderRadius:6,border:"1px solid var(--border)",fontSize:13}}>
                {conditions.map(c=><option key={c}>{c}</option>)}</select></div>
              <div><label style={{fontSize:12,fontWeight:600,color:"var(--text2)",display:"block",marginBottom:4}}>Qty in Stock</label>
              <input type="number" min="0" value={form.qty} onChange={e=>setForm({...form,qty:parseInt(e.target.value)||0})} style={{width:"100%",padding:"8px 10px",borderRadius:6,border:"1px solid var(--border)",fontSize:13}}/></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div><label style={{fontSize:12,fontWeight:600,color:"var(--text2)",display:"block",marginBottom:4}}>Member Price (A$)</label>
              <input type="number" min="0" step="0.01" value={form.memberPrice} onChange={e=>setForm({...form,memberPrice:parseFloat(e.target.value)||0})} style={{width:"100%",padding:"8px 10px",borderRadius:6,border:"1px solid var(--border)",fontSize:13}}/></div>
              <div><label style={{fontSize:12,fontWeight:600,color:"var(--text2)",display:"block",marginBottom:4}}>Public Price (A$)</label>
              <input type="number" min="0" step="0.01" value={form.publicPrice} onChange={e=>setForm({...form,publicPrice:parseFloat(e.target.value)||0})} style={{width:"100%",padding:"8px 10px",borderRadius:6,border:"1px solid var(--border)",fontSize:13}}/></div>
            </div>
            <div><label style={{fontSize:12,fontWeight:600,color:"var(--text2)",display:"block",marginBottom:4}}>Availability</label>
            <select value={form.availability} onChange={e=>setForm({...form,availability:e.target.value})} style={{width:"100%",padding:"8px 10px",borderRadius:6,border:"1px solid var(--border)",fontSize:13}}>
              <option value="both">Available to Members & Public (member price lower)</option>
              <option value="members">Members Only (not visible to public)</option>
              <option value="public">Public (same price for all)</option>
            </select></div>
            <div style={{display:"flex",gap:10,marginTop:8}}>
              <button onClick={addPart} style={{flex:1,padding:"10px 0",background:"var(--burg)",color:"white",border:"none",borderRadius:6,fontWeight:700,cursor:"pointer"}}>Add to Inventory</button>
              <button onClick={()=>setModal(null)} style={{padding:"10px 16px",background:"var(--bg3)",border:"none",borderRadius:6,cursor:"pointer"}}>Cancel</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── SUPPLIERS SECTION ─────────────────────────────────────────────────────────
function SuppliersSection({user,suppliers,setSuppliers,members}) {
  const isAdmin = user&&user.role==="admin";
  const [modal,setModal]=React.useState(null);
  const [form,setForm]=React.useState({name:"",category:"Parts",phone:"",email:"",website:"",address:"",notes:"",usedBy:""});
  const [search,setSearch]=React.useState("");

  const save=async(items)=>{setSuppliers(items);await dbSet(SK.suppliers,items);};
  const addSupplier=async()=>{
    if(!form.name.trim())return;
    const ns={...form,id:uid("SUP"),createdAt:new Date().toISOString(),reviews:[]};
    await save([...(suppliers||[]),ns]); setModal(null);
    setForm({name:"",category:"Parts",phone:"",email:"",website:"",address:"",notes:"",usedBy:""});
  };
  const addReview=async(id,review)=>{
    const updated=(suppliers||[]).map(s=>s.id===id?{...s,reviews:[...(s.reviews||[]),{text:review,by:user.name,date:new Date().toISOString()}]}:s);
    await save(updated);
  };
  const deleteSupplier=async(id)=>{ await save((suppliers||[]).filter(s=>s.id!==id));};

  const cats=["Parts","Engineering","Repairs","Upholstery","Electrical","Tyres","Paint","Other"];
  const filtered=(suppliers||[]).filter(s=>!search||s.name.toLowerCase().includes(search.toLowerCase())||s.category.toLowerCase().includes(search.toLowerCase()));

  return (
    <div style={{padding:"24px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:8}}>
        <h2 style={{fontFamily:"var(--font-d)",fontSize:22,color:"var(--burg)",margin:0}}>Suppliers Directory</h2>
        <div style={{display:"flex",gap:8}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search suppliers..." style={{padding:"6px 12px",borderRadius:6,border:"1px solid var(--border)",fontSize:13,width:200}}/>
          {isAdmin&&<button onClick={()=>setModal("add")} style={{padding:"6px 16px",borderRadius:6,border:"none",background:"var(--burg)",color:"white",cursor:"pointer",fontWeight:700}}>+ Add Supplier</button>}
        </div>
      </div>
      {filtered.length===0&&<div style={{padding:40,textAlign:"center",color:"var(--text3)"}}>No suppliers found.</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:16}}>
        {filtered.map(s=>(
          <div key={s.id} style={{background:"white",borderRadius:8,border:"1px solid var(--border)",padding:16,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div>
                <div style={{fontWeight:700,fontSize:15,color:"var(--text)"}}>{s.name}</div>
                <span style={{background:"var(--burg)",color:"white",borderRadius:10,padding:"2px 8px",fontSize:11,fontWeight:600}}>{s.category}</span>
              </div>
              {isAdmin&&<button onClick={()=>deleteSupplier(s.id)} style={{background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:4,padding:"2px 8px",cursor:"pointer",fontSize:12}}>✕</button>}
            </div>
            {s.address&&<div style={{fontSize:12,color:"var(--text3)",marginBottom:6}}>📍 {s.address}</div>}
            <div style={{display:"flex",gap:12,flexWrap:"wrap",fontSize:12,marginBottom:8}}>
              {s.phone&&<a href={`tel:${s.phone}`} style={{color:"var(--burg)",textDecoration:"none"}}>📞 {s.phone}</a>}
              {s.email&&<a href={`mailto:${s.email}`} style={{color:"var(--burg)",textDecoration:"none"}}>✉ {s.email}</a>}
              {s.website&&<a href={s.website} target="_blank" rel="noopener noreferrer" style={{color:"var(--blue)",textDecoration:"none"}}>🔗 Website</a>}
            </div>
            {s.notes&&<div style={{fontSize:12,color:"var(--text2)",marginBottom:8,background:"var(--bg3)",borderRadius:4,padding:"6px 8px"}}>{s.notes}</div>}
            {s.usedBy&&<div style={{fontSize:11,color:"var(--text3)",marginBottom:8,fontStyle:"italic"}}>Used by: {s.usedBy}</div>}
            {(s.reviews||[]).length>0&&(
              <div style={{marginTop:8,borderTop:"1px solid var(--border)",paddingTop:8}}>
                <div style={{fontSize:11,fontWeight:700,color:"var(--text3)",marginBottom:4}}>Member notes:</div>
                {(s.reviews||[]).map((r,i)=>(
                  <div key={i} style={{fontSize:11,color:"var(--text2)",marginBottom:4,paddingLeft:8,borderLeft:"2px solid var(--burg)"}}>
                    "{r.text}" — {r.by}
                  </div>
                ))}
              </div>
            )}

// ── QUALITY SYSTEM SECTION ───────────────────────────────────────────────────
function QualitySystemSection({user,qualityDocs,setQualityDocs}) {
  const isAdmin = user&&user.role==="admin";
  const [view,setView]=React.useState("docs");
  const [filterStatus,setFilterStatus]=React.useState("all");
  const [filterVis,setFilterVis]=React.useState("all");
  const [selected,setSelected]=React.useState(null);
  const [showForm,setShowForm]=React.useState(false);
  const [commentText,setCommentText]=React.useState("");
  const [form,setForm]=React.useState({title:"",docType:"Procedure",description:"",visibility:"admin",content:""});

  const docTypes=["Constitution","Code of Conduct","Position Description","Procedure","Policy","Risk Management Plan","Event Template","Financial Procedure","Privacy Policy","Other"];
  const visLabels={admin:"Admin Only",members:"Members",public:"Public"};
  const statusColours={Draft:"#b06010",Review:"#1a4a7a",Approved:"#1e6840",Superseded:"#7a6a58"};

  const save=async(docs)=>{setQualityDocs(docs);await dbSet(SK.qualityDocs,docs);};

  const addDoc=async()=>{
    if(!form.title.trim())return;
    const nd={...form,id:uid("QD"),version:1,status:"Draft",
      createdAt:new Date().toISOString(),createdBy:user.name,
      updatedAt:new Date().toISOString(),comments:[],revisions:[]};
    await save([...(qualityDocs||[]),nd]);
    setShowForm(false);
    setForm({title:"",docType:"Procedure",description:"",visibility:"admin",content:""});
  };

  const updateStatus=async(id,status)=>{
    const updated=(qualityDocs||[]).map(d=>{
      if(d.id!==id)return d;
      const rev={version:d.version,status:d.status,date:new Date().toISOString(),by:user.name,note:`Status changed to ${status}`};
      return {...d,status,updatedAt:new Date().toISOString(),revisions:[...(d.revisions||[]),rev]};
    });
    await save(updated);
    if(selected&&selected.id===id)setSelected(updated.find(d=>d.id===id));
  };

  const addComment=async(id)=>{
    if(!commentText.trim())return;
    const updated=(qualityDocs||[]).map(d=>{
      if(d.id!==id)return d;
      const c={id:uid("CM"),text:commentText,by:user.name,date:new Date().toISOString()};
      return {...d,comments:[...(d.comments||[]),c]};
    });
    await save(updated);
    setCommentText("");
    if(selected&&selected.id===id)setSelected(updated.find(d=>d.id===id));
  };

  const deleteDoc=async(id)=>{ await save((qualityDocs||[]).filter(d=>d.id!==id)); setSelected(null);};

  const newVersion=async(id)=>{
    const updated=(qualityDocs||[]).map(d=>{
      if(d.id!==id)return d;
      const rev={version:d.version,status:d.status,date:new Date().toISOString(),by:user.name,note:"New version created"};
      return {...d,version:d.version+1,status:"Draft",updatedAt:new Date().toISOString(),
        revisions:[...(d.revisions||[]),rev]};
    });
    await save(updated);
    if(selected&&selected.id===id)setSelected(updated.find(d=>d.id===id));
  };

  const docs=(qualityDocs||[]);
  const filtered=docs.filter(d=>{
    if(filterStatus!=="all"&&d.status!==filterStatus)return false;
    if(filterVis!=="all"&&d.visibility!==filterVis)return false;
    return true;
  });

  if(selected){
    return (
      <div style={{padding:"24px",maxWidth:860,margin:"0 auto"}}>
        <button onClick={()=>setSelected(null)} style={{marginBottom:16,background:"none",border:"1px solid var(--border)",borderRadius:6,padding:"6px 14px",cursor:"pointer",fontSize:13,color:"var(--text2)"}}>← Back to Documents</button>
        <div style={{background:"white",borderRadius:10,border:"1px solid var(--border)",padding:24,boxShadow:"0 2px 8px rgba(0,0,0,.07)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12,marginBottom:16}}>
            <div>
              <h2 style={{fontFamily:"var(--font-d)",fontSize:20,color:"var(--burg)",margin:"0 0 6px"}}>{selected.title}</h2>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <span style={{background:"var(--bg3)",padding:"3px 10px",borderRadius:10,fontSize:12,fontWeight:600}}>{selected.docType}</span>
                <span style={{background:statusColours[selected.status]||"#666",color:"white",padding:"3px 10px",borderRadius:10,fontSize:12,fontWeight:600}}>{selected.status}</span>
                <span style={{background:"var(--bg3)",padding:"3px 10px",borderRadius:10,fontSize:12}}>v{selected.version} · {visLabels[selected.visibility]}</span>
              </div>
            </div>
            {isAdmin&&(
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {selected.status==="Draft"&&<button onClick={()=>updateStatus(selected.id,"Review")} style={{padding:"6px 14px",background:"#1a4a7a",color:"white",border:"none",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:600}}>Send for Review</button>}
                {selected.status==="Review"&&<button onClick={()=>updateStatus(selected.id,"Approved")} style={{padding:"6px 14px",background:"var(--green)",color:"white",border:"none",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:600}}>Approve</button>}
                {selected.status==="Approved"&&<button onClick={()=>newVersion(selected.id)} style={{padding:"6px 14px",background:"var(--burg)",color:"white",border:"none",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:600}}>New Version</button>}
                {selected.status==="Approved"&&<button onClick={()=>updateStatus(selected.id,"Superseded")} style={{padding:"6px 14px",background:"#7a6a58",color:"white",border:"none",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:600}}>Supersede</button>}
                <button onClick={()=>deleteDoc(selected.id)} style={{padding:"6px 14px",background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:6,cursor:"pointer",fontSize:12}}>Delete</button>
              </div>
            )}
          </div>
          {selected.description&&<p style={{color:"var(--text2)",fontSize:14,lineHeight:1.7,marginBottom:16,paddingBottom:16,borderBottom:"1px solid var(--border)"}}>{selected.description}</p>}
          {selected.content&&(
            <div style={{background:"var(--bg3)",borderRadius:8,padding:16,marginBottom:20,fontSize:13,lineHeight:1.8,color:"var(--text)",whiteSpace:"pre-wrap"}}>{selected.content}</div>
          )}
          <div style={{fontSize:12,color:"var(--text3)",marginBottom:20}}>
            Created by {selected.createdBy} · Last updated {new Date(selected.updatedAt).toLocaleDateString('en-AU')}

          {/* Revision history */}
          {(selected.revisions||[]).length>0&&(

              <h4 style={{fontSize:13,fontWeight:700,color:"var(--text2)",marginBottom:8}}>Revision History</h4>
              <div style={{borderLeft:"2px solid var(--border)",paddingLeft:12}}>
                {(selected.revisions||[]).slice().reverse().map((r,i)=>(
                  <div key={i} style={{marginBottom:8,fontSize:12,color:"var(--text3)"}}>
                    <span style={{fontWeight:700,color:"var(--text2)"}}>v{r.version}</span> · {r.note} · {r.by} · {new Date(r.date).toLocaleDateString('en-AU')}
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Comments */}
          <div>
            <h4 style={{fontSize:13,fontWeight:700,color:"var(--text2)",marginBottom:12}}>Comments & Discussion ({(selected.comments||[]).length})</h4>
            {(selected.comments||[]).length===0&&<div style={{color:"var(--text3)",fontSize:13,marginBottom:12}}>No comments yet.</div>}
            <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
              {(selected.comments||[]).map(c=>(
                <div key={c.id} style={{background:"var(--bg3)",borderRadius:8,padding:"10px 14px"}}>
                  <div style={{fontSize:12,color:"var(--text3)",marginBottom:4}}><b style={{color:"var(--text)"}}>{c.by}</b> · {new Date(c.date).toLocaleDateString('en-AU')}</div>
                  <div style={{fontSize:13,color:"var(--text2)",lineHeight:1.6}}>{c.text}</div>
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:8}}>
              <textarea value={commentText} onChange={e=>setCommentText(e.target.value)}
                placeholder="Add a comment or suggestion..." rows={2}
                style={{flex:1,padding:"8px 10px",borderRadius:6,border:"1px solid var(--border)",fontSize:13,resize:"vertical"}}/>
              <button onClick={()=>addComment(selected.id)} style={{padding:"8px 16px",background:"var(--burg)",color:"white",border:"none",borderRadius:6,cursor:"pointer",fontWeight:700,alignSelf:"flex-end"}}>Post</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{padding:"24px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:10}}>
        <div>
          <h2 style={{fontFamily:"var(--font-d)",fontSize:22,color:"var(--burg)",margin:"0 0 4px"}}>Quality System</h2>
          <div style={{fontSize:13,color:"var(--text3)"}}>Club governance, policy, and procedure documents</div>
        </div>
        {isAdmin&&<button onClick={()=>setShowForm(true)} style={{padding:"8px 18px",background:"var(--burg)",color:"white",border:"none",borderRadius:6,fontWeight:700,cursor:"pointer"}}>+ Add Document</button>}

          <div key={label} style={{background:"white",borderRadius:8,border:`1px solid ${col}22`,padding:"12px 16px",textAlign:"center",cursor:"pointer"}}
            onClick={()=>setFilterStatus(filterStatus===label?'all':label)}>

            style={{padding:"4px 12px",borderRadius:20,border:"1px solid var(--border)",background:filterStatus===s?"var(--burg)":"white",color:filterStatus===s?"white":"var(--text2)",cursor:"pointer",fontSize:12,fontWeight:600,textTransform:s==="all"?"capitalize":"none"}}>
            {s==="all"?"All Status":s}

        <div style={{marginLeft:"auto",display:"flex",gap:6}}>
          {["all","admin","members","public"].map(v=>(

      {filtered.length===0&&<div style={{padding:40,textAlign:"center",color:"var(--text3)"}}>No documents found.{isAdmin&&" Click + Add Document to get started."}</div>}
