function LibrarySection({ user, members, books, setBooks }) {
  const isAdmin = user.role === "admin";
  const today = new Date().toISOString().slice(0,10);

  // Auto-mark overdue: borrowed > 30 days ago
  React.useEffect(()=>{
    const updated = (books||[]).map(b=>{
      if(b.status==="borrowed" && b.dueDate && b.dueDate < today) {
        return {...b, status:"overdue"};
      }
      return b;
    });
    const changed = updated.some((b,i)=>b.status !== (books||[])[i]?.status);
    if(changed){ setBooks(updated); dbSet(SK.books, updated); }
  },[books]);

  const dueDate = ()=>{ const d=new Date(); d.setDate(d.getDate()+30); return d.toISOString().slice(0,10); };

  const [tab,setTab] = useState("catalogue");
  const [search,setSearch] = useState("");
  const [filterStatus,setFilterStatus] = useState("all");
  const [filterCat,setFilterCat] = useState("all");
  const [modal,setModal] = useState(null);
  const [form,setForm] = useState({});
  const [importText,setImportText] = useState("");
  const [importResult,setImportResult] = useState(null);
  const [bulkModal,setBulkModal] = useState(false);

  const BLANK = {title:"",author:"",category:"History",isbn:"",year:"",publisher:"",description:"",copies:1,status:"available",borrowedBy:null,borrowedDate:null,dueDate:null,requestedBy:null,notes:""};
  const CATS = ["History","Technical","Biography","Racing","Restoration","Club Archive","Magazine","Other"];
  const STATUS_COLOURS = {available:"var(--green)",requested:"#b87a00",borrowed:"var(--burg)",overdue:"#8f1a1c",returned:"var(--text3)"};
  const STATUS_LABELS = {available:"Available",requested:"Requested",borrowed:"On Loan",overdue:"OVERDUE",returned:"Returned"};

  const allBooks = books||[];
  const cats = [...new Set(allBooks.map(b=>b.category))];
  const all_cats = [...new Set([...CATS,...cats])];

  const visible = allBooks.filter(b=>{
    const q = search.toLowerCase();
    const matchQ = !q || b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q) || (b.isbn||"").includes(q);
    const matchS = filterStatus==="all" || b.status===filterStatus;
    const matchC = filterCat==="all" || b.category===filterCat;
    return matchQ && matchS && matchC;
  });

  // My loans (for members)
  const myBooks = allBooks.filter(b=>b.borrowedBy===user.id||b.requestedBy===user.id);
  const overdueBooksAdmin = allBooks.filter(b=>b.status==="overdue");
  const requestedBooks = allBooks.filter(b=>b.status==="requested");

  const borrowerName = id=>members.find(m=>m.id===id)?.name||"Unknown";

  async function save(){
    const updated = modal==="add"
      ? [...allBooks,{...form,id:uid("BK")}]
      : allBooks.map(b=>b.id===form.id?{...form}:b);
    setBooks(updated); await dbSet(SK.books,updated); setModal(null);
  }

  async function requestBook(book){
    if(book.requestedBy===user.id){ alert("You have already requested this book."); return; }
    if(book.status!=="available"){ alert("This book is not currently available."); return; }
    const updated = allBooks.map(b=>b.id===book.id?{...b,status:"requested",requestedBy:user.id}:b);
    setBooks(updated); await dbSet(SK.books,updated);
  }

  async function approveRequest(book){
    const updated = allBooks.map(b=>b.id===book.id?{...b,status:"borrowed",borrowedBy:book.requestedBy,borrowedDate:today,dueDate:dueDate(),requestedBy:null}:b);
    setBooks(updated); await dbSet(SK.books,updated);
  }

  async function markReturned(book){
    const updated = allBooks.map(b=>b.id===book.id?{...b,status:"available",borrowedBy:null,borrowedDate:null,dueDate:null,requestedBy:null}:b);
    setBooks(updated); await dbSet(SK.books,updated);
  }

  async function cancelRequest(book){
    const updated = allBooks.map(b=>b.id===book.id?{...b,status:"available",requestedBy:null}:b);
    setBooks(updated); await dbSet(SK.books,updated);
  }

  async function deleteBook(id){
    const updated = allBooks.filter(b=>b.id!==id);
    setBooks(updated); await dbSet(SK.books,updated); setModal(null);
  }

  // Bulk import CSV
  function parseImport(){
    const lines = importText.trim().split(/\n/);
    if(!lines.length){ setImportResult({error:"No data found."}); return; }
    // Try to detect header
    const header = lines[0].toLowerCase();
    const hasHeader = header.includes("title");
    const dataLines = hasHeader ? lines.slice(1) : lines;
    const imported = [];
    const errors = [];
    dataLines.forEach((line,i)=>{
      const cols = line.split(",").map(c=>c.trim().replace(/^"|"$/g,""));
      if(cols.length < 2){ errors.push(`Row ${i+2}: too few columns`); return; }
      imported.push({
        id:uid("BK"),
        title: cols[0]||"",
        author: cols[1]||"",
        category: cols[2]||"Other",
        isbn: cols[3]||"",
        year: cols[4]||"",
        publisher: cols[5]||"",
        description: cols[6]||"",
        copies: parseInt(cols[7])||1,
        status:"available",
        borrowedBy:null,borrowedDate:null,dueDate:null,requestedBy:null,notes:""
      });
    });
    setImportResult({imported,errors});
  }

  async function confirmImport(){
    if(!importResult?.imported?.length) return;
    const updated = [...allBooks,...importResult.imported];
    setBooks(updated); await dbSet(SK.books,updated);
    setImportText(""); setImportResult(null); setBulkModal(false);
    alert(importResult.imported.length+" book(s) imported successfully.");
  }

  const StatusBadge = ({status})=>(
    <span style={{display:"inline-block",padding:"2px 9px",borderRadius:10,fontSize:10,fontFamily:"var(--font-m)",fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",color:"#fff",background:STATUS_COLOURS[status]||"var(--text3)"}}>
      {STATUS_LABELS[status]||status}
    </span>
  );

  return (
    <div className="fade-up">
      <SectionHeader title="Club Library" subtitle="Borrow books from the RCCA collection"
        action={isAdmin&&<Row gap={8}><Btn variant="ghost" onClick={()=>setBulkModal(true)}>↑ Bulk Import</Btn><Btn onClick={()=>{setForm({...BLANK});setModal("add");}}>+ Add Book</Btn></Row>}/>

      {/* Tab bar */}
      <Row gap={0} style={{marginBottom:18,background:"var(--bg3)",borderRadius:8,padding:4,width:"fit-content"}}>
        {[["catalogue","📚 Catalogue"],
          isAdmin&&requestedBooks.length?["requests","📬 Requests"+(requestedBooks.length?" ("+requestedBooks.length+")":"")]:["requests","📬 Requests"],
          isAdmin&&["loans","📋 On Loan"],
          isAdmin&&overdueBooksAdmin.length?["overdue","⚠ Overdue"+(overdueBooksAdmin.length?" ("+overdueBooksAdmin.length+")":"")]:isAdmin&&["overdue","⚠ Overdue"],
          !isAdmin&&["myloans","My Loans"],
        ].filter(Boolean).map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{background:tab===id?"var(--burg)":"none",color:tab===id?"#fff":"var(--text3)",border:"none",borderRadius:6,padding:"7px 16px",fontSize:12,fontFamily:"var(--font-m)",fontWeight:600,cursor:"pointer",transition:"all .15s"}}>{label}</button>
        ))}
      </Row>

      {/* ── CATALOGUE TAB ── */}
      {tab==="catalogue"&&(
        <div>
          <Row gap={10} style={{marginBottom:16}} wrap>
            <Input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search title, author, ISBN…" style={{maxWidth:280}}/>
            <Select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={{width:"auto"}}>
              <option value="all">All Statuses</option>
              {Object.keys(STATUS_LABELS).map(s=><option key={s} value={s}>{STATUS_LABELS[s]}</option>)}
            </Select>
            <Select value={filterCat} onChange={e=>setFilterCat(e.target.value)} style={{width:"auto"}}>
              <option value="all">All Categories</option>
              {all_cats.map(c=><option key={c} value={c}>{c}</option>)}
            </Select>
            <span style={{marginLeft:"auto",fontSize:12,color:"var(--text3)",fontFamily:"var(--font-m)",alignSelf:"center"}}>{visible.length} book{visible.length!==1?"s":""}</span>
          </Row>

          {visible.length===0&&<EmptyState icon="📚" text="No books found" sub="Try adjusting your search or filters"/>}

          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:14}}>
            {visible.map(b=>{
              const isMyRequest = b.requestedBy===user.id;
              const isMyLoan = b.borrowedBy===user.id;
              return (
                <Card key={b.id} style={{padding:18,display:"flex",flexDirection:"column",gap:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
                    <div style={{flex:1}}>
                      <div style={{fontFamily:"var(--font-d)",fontSize:15,fontWeight:700,color:"var(--text)",marginBottom:3,lineHeight:1.3}}>{b.title}</div>
                      <div style={{fontSize:12,color:"var(--text3)",marginBottom:6}}>{b.author}{b.year?" · "+b.year:""}</div>
                      <Row gap={6} wrap>
                        <StatusBadge status={b.status}/>
                        <span style={{fontSize:10,background:"var(--bg3)",border:"1px solid var(--border)",color:"var(--text3)",padding:"2px 7px",borderRadius:8,fontFamily:"var(--font-m)",fontWeight:600}}>{b.category}</span>
                      </Row>
                    </div>
                    <div style={{fontSize:32,opacity:.5,flexShrink:0}}>📖</div>
                  </div>
                  {b.description&&<div style={{fontSize:12,color:"var(--text2)",lineHeight:1.6}}>{b.description.slice(0,120)}{b.description.length>120?"…":""}</div>}
                  {(b.status==="borrowed"||b.status==="overdue")&&(
                    <div style={{fontSize:11,color:b.status==="overdue"?"var(--burg)":"var(--text3)",fontFamily:"var(--font-m)",background:b.status==="overdue"?"rgba(192,40,42,.07)":"var(--bg3)",padding:"5px 8px",borderRadius:5}}>
                      {isAdmin||isMyLoan?<span>Borrowed by: {borrowerName(b.borrowedBy)} · Due: {b.dueDate}</span>:<span>Due back: {b.dueDate}</span>}
                    </div>
                  )}
                  {b.status==="requested"&&(isAdmin||isMyRequest)&&(
                    <div style={{fontSize:11,color:"#b87a00",fontFamily:"var(--font-m)",background:"rgba(184,122,0,.07)",padding:"5px 8px",borderRadius:5}}>
                      Requested by: {isAdmin?borrowerName(b.requestedBy):"you"}
                    </div>
                  )}
                  <Row gap={8} justify="flex-end" style={{marginTop:4}}>
                    {isAdmin&&<>
                      {b.status==="requested"&&<Btn variant="success" size="sm" onClick={()=>approveRequest(b)}>✓ Mark Collected</Btn>}
                      {(b.status==="borrowed"||b.status==="overdue")&&<Btn variant="ghost" size="sm" onClick={()=>markReturned(b)}>↩ Mark Returned</Btn>}
                      <Btn variant="ghost" size="sm" onClick={()=>{setForm({...b});setModal("edit");}}>Edit</Btn>
                      <Btn variant="danger" size="sm" onClick={()=>setModal({confirm:{msg:"Delete \""+b.title+"\"?",fn:()=>deleteBook(b.id)}})}>✕</Btn>
                    </>}
                    {!isAdmin&&<>
                      {b.status==="available"&&<Btn size="sm" onClick={()=>requestBook(b)}>Request to Borrow</Btn>}
                      {isMyRequest&&b.status==="requested"&&<Btn variant="ghost" size="sm" onClick={()=>cancelRequest(b)}>Cancel Request</Btn>}
                      {isMyLoan&&<span style={{fontSize:11,fontFamily:"var(--font-m)",color:"var(--text3)"}}>Due: {b.dueDate}</span>}
                    </>}
                  </Row>
                </Card>
              );
            })}
          </div>
        </div>
      )}

      {/* ── REQUESTS TAB (admin) ── */}
      {tab==="requests"&&isAdmin&&(
        <div>
          {requestedBooks.length===0&&<EmptyState icon="📬" text="No pending requests" sub="Members can request books from the catalogue"/>}
          {requestedBooks.map(b=>(
            <Card key={b.id} style={{padding:18,marginBottom:12}}>
              <Row justify="space-between" align="flex-start" gap={12}>
                <div style={{flex:1}}>
                  <div style={{fontFamily:"var(--font-d)",fontSize:15,fontWeight:700,color:"var(--text)",marginBottom:4}}>{b.title}</div>
                  <div style={{fontSize:12,color:"var(--text3)",marginBottom:8}}>{b.author}{b.year?" · "+b.year:""}</div>
                  <div style={{fontSize:12,color:"var(--text)",background:"var(--bg3)",padding:"6px 10px",borderRadius:6,display:"inline-block"}}>
                    <span style={{color:"var(--text3)"}}>Requested by: </span><strong>{borrowerName(b.requestedBy)}</strong>
                  </div>
                </div>
                <Row gap={8} style={{flexShrink:0}}>
                  <Btn variant="success" size="sm" onClick={()=>approveRequest(b)}>✓ Mark Collected</Btn>
                  <Btn variant="danger" size="sm" onClick={()=>cancelRequest(b)}>✕ Decline</Btn>
                </Row>
              </Row>
            </Card>
          ))}
        </div>
      )}

      {/* ── ON LOAN TAB (admin) ── */}
      {tab==="loans"&&isAdmin&&(
        <div>
          {allBooks.filter(b=>b.status==="borrowed"||b.status==="overdue").length===0&&<EmptyState icon="📋" text="No books currently on loan"/>}
          {allBooks.filter(b=>b.status==="borrowed"||b.status==="overdue").sort((a,b)=>a.dueDate?.localeCompare(b.dueDate||"")||0).map(b=>(
            <Card key={b.id} style={{padding:18,marginBottom:12,borderLeft:"3px solid "+(b.status==="overdue"?"var(--burg)":"var(--border)")}}>
              <Row justify="space-between" align="center" gap={12}>
                <div style={{flex:1}}>
                  <Row gap={8} style={{marginBottom:6}}><StatusBadge status={b.status}/><span style={{fontFamily:"var(--font-d)",fontSize:15,fontWeight:700,color:"var(--text)"}}>{b.title}</span></Row>
                  <div style={{fontSize:12,color:"var(--text3)",marginBottom:6}}>{b.author}</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,fontSize:12}}>
                    {[["Borrowed by",borrowerName(b.borrowedBy)],["Borrowed",b.borrowedDate||"—"],["Due back",b.dueDate||"—"]].map(([k,v])=>(
                      <div key={k}><span style={{color:"var(--text3)",fontFamily:"var(--font-m)",fontSize:10,textTransform:"uppercase"}}>{k}: </span><span style={{fontWeight:600,color:k==="Due back"&&b.status==="overdue"?"var(--burg)":"var(--text)"}}>{v}</span></div>
                    ))}
                  </div>
                </div>
                <Btn variant="ghost" size="sm" onClick={()=>markReturned(b)}>↩ Mark Returned</Btn>
              </Row>
            </Card>
          ))}
        </div>
      )}

      {/* ── OVERDUE TAB (admin) ── */}
      {tab==="overdue"&&isAdmin&&(
        <div>
          {overdueBooksAdmin.length===0&&<EmptyState icon="✅" text="No overdue books" sub="All borrowed books are within their loan period"/>}
          {overdueBooksAdmin.map(b=>{
            const daysSince = b.dueDate?Math.floor((new Date(today)-new Date(b.dueDate))/(1000*60*60*24)):0;
            return (
              <Card key={b.id} style={{padding:18,marginBottom:12,border:"2px solid var(--burg)",background:"rgba(192,40,42,.04)"}}>
                <Row justify="space-between" align="center" gap={12}>
                  <div style={{flex:1}}>
                    <div style={{fontFamily:"var(--font-d)",fontSize:15,fontWeight:700,color:"var(--text)",marginBottom:4}}>{b.title}</div>
                    <div style={{fontSize:12,color:"var(--text3)",marginBottom:6}}>{b.author}</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,fontSize:12}}>
                      {[["Borrowed by",borrowerName(b.borrowedBy)],["Due",b.dueDate||"—"],["Overdue by",daysSince+" day"+(daysSince!==1?"s":"")]].map(([k,v])=>(
                        <div key={k}><span style={{color:"var(--text3)",fontFamily:"var(--font-m)",fontSize:10,textTransform:"uppercase"}}>{k}: </span><span style={{fontWeight:600,color:k==="Overdue by"?"var(--burg)":"var(--text)"}}>{v}</span></div>
                      ))}
                    </div>
                  </div>
                  <Btn variant="ghost" size="sm" onClick={()=>markReturned(b)}>↩ Mark Returned</Btn>
                </Row>
              </Card>
            );
          })}
        </div>
      )}

      {/* ── MY LOANS TAB (member) ── */}
      {tab==="myloans"&&!isAdmin&&(
        <div>
          {myBooks.length===0&&<EmptyState icon="📚" text="No active loans" sub="Browse the catalogue to request a book"/>}
          {myBooks.map(b=>(
            <Card key={b.id} style={{padding:18,marginBottom:12,borderLeft:"3px solid "+(b.status==="overdue"?"var(--burg)":b.status==="requested"?"#b87a00":"var(--green)")}}>
              <Row justify="space-between" align="center" gap={12}>
                <div style={{flex:1}}>
                  <Row gap={8} style={{marginBottom:6}}><StatusBadge status={b.status}/><span style={{fontFamily:"var(--font-d)",fontSize:15,fontWeight:700,color:"var(--text)"}}>{b.title}</span></Row>
                  <div style={{fontSize:12,color:"var(--text3)",marginBottom:6}}>{b.author}</div>
                  {b.status==="requested"&&<div style={{fontSize:12,color:"#b87a00"}}>Awaiting collection — admin will confirm when ready</div>}
                  {(b.status==="borrowed"||b.status==="overdue")&&<div style={{fontSize:12,color:b.status==="overdue"?"var(--burg)":"var(--text3)"}}>Due back: {b.dueDate||"—"}</div>}
                </div>
                {b.status==="requested"&&<Btn variant="ghost" size="sm" onClick={()=>cancelRequest(b)}>Cancel</Btn>}
              </Row>
            </Card>
          ))}
        </div>
      )}

      {/* ── ADD/EDIT MODAL ── */}
      {(modal==="add"||modal==="edit")&&<Modal title={modal==="add"?"Add Book":"Edit Book"} onClose={()=>setModal(null)} wide>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Field label="Title" style={{gridColumn:"1/-1"}}><Input value={form.title||""} onChange={e=>setForm({...form,title:e.target.value})} placeholder="Full book title"/></Field>
          <Field label="Author"><Input value={form.author||""} onChange={e=>setForm({...form,author:e.target.value})} placeholder="Author name"/></Field>
          <Field label="Category"><Select value={form.category||"Other"} onChange={e=>setForm({...form,category:e.target.value})}>{CATS.map(c=><option key={c}>{c}</option>)}</Select></Field>
          <Field label="ISBN"><Input value={form.isbn||""} onChange={e=>setForm({...form,isbn:e.target.value})} placeholder="978-…"/></Field>
          <Field label="Year Published"><Input type="number" value={form.year||""} onChange={e=>setForm({...form,year:e.target.value})} placeholder="e.g. 2001"/></Field>
          <Field label="Publisher"><Input value={form.publisher||""} onChange={e=>setForm({...form,publisher:e.target.value})}/></Field>
          <Field label="Copies"><Input type="number" min="1" value={form.copies||1} onChange={e=>setForm({...form,copies:Number(e.target.value)})}/></Field>
          <Field label="Description" style={{gridColumn:"1/-1"}}><Textarea value={form.description||""} onChange={e=>setForm({...form,description:e.target.value})} rows={3} placeholder="Brief description…"/></Field>
          <Field label="Notes (internal)" style={{gridColumn:"1/-1"}}><Input value={form.notes||""} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="Condition, location, etc."/></Field>
          {modal==="edit"&&<Field label="Status"><Select value={form.status} onChange={e=>setForm({...form,status:e.target.value})}>{Object.keys(STATUS_LABELS).map(s=><option key={s} value={s}>{STATUS_LABELS[s]}</option>)}</Select></Field>}
        </div>
        <Row gap={8} justify="flex-end" style={{marginTop:16}}>
          <Btn variant="ghost" onClick={()=>setModal(null)}>Cancel</Btn>
          <Btn onClick={save}>Save</Btn>
        </Row>
      </Modal>}

      {/* ── BULK IMPORT MODAL ── */}
      {bulkModal&&<Modal title="Bulk Import Books" onClose={()=>{setBulkModal(false);setImportText("");setImportResult(null);}} wide>
        <div style={{marginBottom:12,fontSize:13,color:"var(--text2)",lineHeight:1.6}}>
          Paste CSV data below. One book per line. Columns:<br/>
          <code style={{fontSize:11,background:"var(--bg3)",padding:"2px 6px",borderRadius:4,fontFamily:"var(--font-m)"}}>Title, Author, Category, ISBN, Year, Publisher, Description, Copies</code><br/>
          <span style={{fontSize:11,color:"var(--text3)"}}>First row can be a header — it will be skipped automatically. Category is optional (defaults to "Other").</span>
        </div>
        <Textarea value={importText} onChange={e=>setImportText(e.target.value)} rows={8} placeholder={"The Rover Story, Graham Robson, History, 978-1-84584-199-5, 2007, Veloce, Complete story of Rover, 1\nRover P6 Technical Guide, James Taylor, Technical, , 2009, Crowood, , 2"} style={{fontFamily:"var(--font-m)",fontSize:12}}/>
        {importResult&&(
          <div style={{marginTop:12}}>
            {importResult.error&&<div style={{color:"var(--burg)",fontSize:13}}>{importResult.error}</div>}
            {importResult.imported&&<div style={{fontSize:13,color:"var(--green)",marginBottom:6}}>✓ Ready to import {importResult.imported.length} book{importResult.imported.length!==1?"s":""}</div>}
            {importResult.errors?.length>0&&<div style={{fontSize:12,color:"#b87a00",marginBottom:6}}>{importResult.errors.length} row{importResult.errors.length!==1?"s":""} skipped: {importResult.errors[0]}</div>}
            {importResult.imported?.length>0&&(
              <div style={{maxHeight:160,overflowY:"auto",background:"var(--bg3)",borderRadius:6,padding:10,marginBottom:8}}>
                {importResult.imported.map((b,i)=>(
                  <div key={i} style={{fontSize:12,color:"var(--text2)",paddingBottom:4,borderBottom:"1px solid var(--border)",marginBottom:4}}>{b.title} — {b.author} ({b.category})</div>
                ))}
              </div>
            )}
          </div>
        )}
        <Row gap={8} justify="flex-end" style={{marginTop:12}}>
          <Btn variant="ghost" onClick={()=>{setBulkModal(false);setImportText("");setImportResult(null);}}>Cancel</Btn>
          {!importResult&&<Btn variant="ghost" onClick={parseImport}>Preview</Btn>}
          {importResult?.imported?.length>0&&<Btn onClick={confirmImport}>Import {importResult.imported.length} Book{importResult.imported.length!==1?"s":""}</Btn>}
          {importResult&&<Btn variant="ghost" onClick={()=>setImportResult(null)}>Edit</Btn>}
        </Row>
      </Modal>}

      {modal?.confirm&&<Confirm message={modal.confirm.msg} onConfirm={modal.confirm.fn} onCancel={()=>setModal(null)}/>}
    </div>
  );
}

const CAT_META = {
  memberType:   {label:"Membership Types",        desc:"Types shown when adding members & in the application form"},
  eventType:    {label:"Event Types",              desc:"Types available when creating events"},
  meetingType:  {label:"Meeting Types",            desc:"Types available when creating meetings"},
  taskPriority: {label:"Task Priorities",          desc:"Priority levels available on tasks"},
  listingType:  {label:"Marketplace Listing Types",desc:"Sell / Wanted / Swap etc."},
  listingCat:   {label:"Marketplace Categories",   desc:"Item categories in the marketplace"},
  shopCat:      {label:"Shop Categories",          desc:"Product categories in the club shop"},
  expenseCat:   {label:"Expense Categories",       desc:"Categories used in Finance > Expenses"},
  dietary:      {label:"Dietary Requirements",     desc:"Options shown on event registration forms"},
  vehicleStatus:{label:"Vehicle Statuses",         desc:"Status options in the vehicle register"},
  taskTag:      {label:"Task Tags",                desc:"Tags that can be applied to tasks"},
};

function CategoriesSection({ categories, setCategories }) {
  const cats = getCats(categories);
  const keys = Object.keys(CAT_META);
  const [active,setActive] = useState(keys[0]);
  const [newItem,setNewItem] = useState("");
  const [editing,setEditing] = useState(null);
  const [saved,setSaved] = useState(false);

  function flash(){ setSaved(true); setTimeout(()=>setSaved(false),2000); }

  async function persist(updated){ setCategories(updated); await dbSet(SK.categories,updated); flash(); }

  async function addItem(){
    const v=newItem.trim(); if(!v)return;
    const list=cats[active]||[];
    if(list.map(x=>x.toLowerCase()).includes(v.toLowerCase()))return alert("That item already exists.");
    await persist({...cats,[active]:[...list,v]});
    setNewItem("");
  }
  async function removeItem(i){ await persist({...cats,[active]:(cats[active]||[]).filter((_,n)=>n!==i)}); }
  async function saveEdit(){
    if(!editing)return;
    const v=editing.val.trim(); if(!v)return;
    const list=[...(cats[active]||[])]; list[editing.idx]=v;
    await persist({...cats,[active]:list}); setEditing(null);
  }
  async function moveItem(i,dir){
    const list=[...(cats[active]||[])]; const j=i+dir;
    if(j<0||j>=list.length)return;
    [list[i],list[j]]=[list[j],list[i]];
    await persist({...cats,[active]:list});
  }
  async function resetKey(){ await persist({...cats,[active]:[...DEFAULT_CATEGORIES[active]]}); }

  const items = cats[active]||[];

  return (
    <div className="fade-up">
      <SectionHeader title="Categories" subtitle="Manage dropdown options used across the site"/>
      <div style={{display:"grid",gridTemplateColumns:"210px 1fr",gap:18,alignItems:"flex-start"}}>

        {/* Left: category picker */}
        <Card style={{padding:0,overflow:"hidden"}}>
          {keys.map(key=>(
            <button key={key} onClick={()=>{setActive(key);setNewItem("");setEditing(null);}} style={{
              display:"block",width:"100%",textAlign:"left",padding:"10px 15px",
              background:active===key?"var(--burg)":"none",
              border:"none",borderBottom:"1px solid var(--border)",
              color:active===key?"#fff":"var(--text2)",
              fontSize:12.5,fontFamily:"var(--font-b)",cursor:"pointer",fontWeight:active===key?700:400,
            }}>
              <div>{CAT_META[key].label}</div>
              <div style={{fontSize:10,opacity:.7,fontFamily:"var(--font-m)",marginTop:1}}>{(cats[key]||[]).length} items</div>
            </button>
          ))}
        </Card>

        {/* Right: edit items */}
        <Card style={{padding:22}}>
          <Row justify="space-between" align="flex-start" style={{marginBottom:4}}>
            <div>
              <div style={{fontFamily:"var(--font-d)",fontSize:17,fontWeight:700,color:"var(--text)"}}>{CAT_META[active].label}</div>
              <div style={{fontSize:12,color:"var(--text3)",marginTop:3}}>{CAT_META[active].desc}</div>
            </div>
            <Row gap={8} align="center">
              {saved&&<span style={{fontSize:11,color:"var(--green2)",fontFamily:"var(--font-m)",fontWeight:700}}>✓ Saved</span>}
              <Btn variant="ghost" size="sm" onClick={resetKey}>↺ Reset defaults</Btn>
            </Row>
          </Row>

          <div style={{borderTop:"1px solid var(--border)",paddingTop:14,marginTop:12}}>
            {items.length===0&&<div style={{color:"var(--text3)",fontSize:13,fontFamily:"var(--font-m)",padding:"10px 0"}}>No items yet — add one below.</div>}
            {items.map((item,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:"1px solid var(--border)"}}>
                {editing?.idx===i ? (
                  <>
                    <Input value={editing.val} onChange={e=>setEditing({...editing,val:e.target.value})}
                      onKeyDown={e=>e.key==="Enter"&&saveEdit()} style={{flex:1,fontSize:13}}/>
                    <Btn size="sm" onClick={saveEdit}>Save</Btn>
                    <Btn variant="ghost" size="sm" onClick={()=>setEditing(null)}>Cancel</Btn>
                  </>
                ) : (
                  <>
                    <div style={{flex:1,fontSize:13,color:"var(--text)",fontWeight:500}}>{item}</div>
                    <button onClick={()=>moveItem(i,-1)} disabled={i===0} title="Move up"
                      style={{background:"none",border:"none",cursor:"pointer",color:"var(--text3)",fontSize:14,padding:"2px 5px",opacity:i===0?.3:1}}>↑</button>
                    <button onClick={()=>moveItem(i,1)} disabled={i===items.length-1} title="Move down"
                      style={{background:"none",border:"none",cursor:"pointer",color:"var(--text3)",fontSize:14,padding:"2px 5px",opacity:i===items.length-1?.3:1}}>↓</button>
                    <Btn variant="ghost" size="sm" onClick={()=>setEditing({idx:i,val:item})}>✏</Btn>
                    <Btn variant="danger" size="sm" onClick={()=>removeItem(i)}>×</Btn>
                  </>
                )}
              </div>
            ))}
          </div>

          <Row gap={8} style={{marginTop:16}}>
            <Input value={newItem} onChange={e=>setNewItem(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&addItem()}
              placeholder={"Add to " + CAT_META[active].label + "…"} style={{flex:1}}/>
            <Btn onClick={addItem}>+ Add</Btn>
          </Row>
          <div style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--font-m)",marginTop:10}}>
            Changes apply immediately. Removing an item won't affect existing records that already use it.
          </div>
        </Card>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// FINANCE SECTION
// ══════════════════════════════════════════════════════════════════════════════
const DEFAULT_FIN_SETTINGS = {
  bankName:"", accountName:"Rover Car Club of Australia",
  bsb:"", accountNumber:"", paymentRef:"Please use your member number as reference",
  paymentDays:14, gstRegistered:false, abn:"", invoicePrefix:"RCCA",
  nextInvoiceNum:1001,
};
const EXPENSE_CATS=getCats(null).expenseCat;

function FinanceSection({ members, dues, orders, rsvps, events, expenses, setExpenses, finSettings, setFinSettings, cars }) {
  const fs = finSettings || DEFAULT_FIN_SETTINGS;
  const [tab,setTab]=useState("dashboard");
  const [modal,setModal]=useState(null);
  const [expForm,setExpForm]=useState({date:today,amount:"",category:"Hall Hire",description:"",reference:""});
  const [settForm,setSettForm]=useState(fs);
  const [invView,setInvView]=useState(null);

  const fyStart = ()=>{ const d=new Date(); return d.getMonth()>=6?d.getFullYear():d.getFullYear()-1; };
  const fyLabel = ()=>{ const s=fyStart(); return `${s}–${s+1}`; };
  const inFY = dt=>{ const s=fyStart(); const d=new Date(dt); return d>=new Date(s,6,1)&&d<new Date(s+1,6,1); };

  // Build income ledger from dues, orders, event rsvps
  const incomeItems = [
    ...(dues||[]).filter(d=>d.paid&&inFY(d.paidDate||d.year+"-07-01")).map(d=>{
      const m=members.find(x=>x.id===d.memberId);
      return {id:"D-"+d.id,type:"dues",date:d.paidDate||d.year+"-07-01",amount:d.amount||54,description:"Membership Dues "+d.year,member:m?.name||"Unknown",memberId:d.memberId,ref:d.id};
    }),
    ...(orders||[]).filter(o=>inFY(o.date)).map(o=>{
      const m=members.find(x=>x.id===o.memberId);
      const total=o.items?o.items.reduce((s,i)=>s+i.price*i.qty,0):0;
      return {id:"O-"+o.id,type:"shop",date:o.date,amount:total,description:"Shop Order #"+o.id.slice(-4),member:m?.name||"Unknown",memberId:o.memberId,ref:o.id};
    }),
  ].sort((a,b)=>b.date.localeCompare(a.date));

  const expItems = (expenses||[]).filter(e=>inFY(e.date)).sort((a,b)=>b.date.localeCompare(a.date));
  const totalIncome = incomeItems.reduce((s,i)=>s+Number(i.amount),0);
  const totalExpenses = expItems.reduce((s,e)=>s+Number(e.amount),0);
  const surplus = totalIncome - totalExpenses;

  async function saveExpense(){
    if(!expForm.amount||!expForm.description)return alert("Amount and description required.");
    const entry={...expForm,id:uid("EX"),amount:Number(expForm.amount)};
    const u=modal?.edit?(expenses||[]).map(e=>e.id===modal.edit.id?entry:{...e}):[...(expenses||[]),entry];
    setExpenses(u); await dbSet(SK.expenses,u); setModal(null);
    setExpForm({date:today,amount:"",category:"Hall Hire",description:"",reference:""});
  }
  async function delExpense(id){ const u=(expenses||[]).filter(e=>e.id!==id); setExpenses(u); await dbSet(SK.expenses,u); setModal(null); }
  async function saveSettings(){
    setFinSettings(settForm); await dbSet(SK.finSettings,settForm); setModal(null);
  }

  function buildInvoice(item){
    const m=members.find(x=>x.id===item.memberId)||{name:item.member,email:"",address:""};
    const num=(fs.invoicePrefix||"RCCA")+"-"+String((fs.nextInvoiceNum||1001)+incomeItems.indexOf(item)).padStart(4,"0");
    const issued=item.date; 
    const due=new Date(new Date(issued).getTime()+((fs.paymentDays||14)*86400000)).toISOString().slice(0,10);
    return {num,issued,due,member:m,item,fs};
  }

  function exportCSV(){
    const all=[
      ...incomeItems.map(i=>["Income",i.date,i.description,i.member,"",i.amount.toFixed(2)]),
      ...expItems.map(e=>["Expense",e.date,e.description,"",e.category,e.amount.toFixed(2)]),
    ].sort((a,b)=>b[1].localeCompare(a[1]));
    const rows=[["Type","Date","Description","Member","Category","Amount"],...all];
    const csv=rows.map(r=>r.map(v=>'"'+String(v||"").replace(/"/g,'""')+'"').join(",")).join("\n");
    const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
    a.download="RCCA_Finance_"+fyLabel().replace("–","-")+".csv"; a.click();
  }

  const [adhocForm,setAdhocForm]=useState({memberSearch:"",memberName:"",memberEmail:"",memberNumber:"",lines:[{description:"",amount:""}],notes:"",issueDate:today,dueDate:""});

  function calcDue(issue){ const d=new Date(issue); d.setDate(d.getDate()+(fs.paymentDays||14)); return d.toISOString().slice(0,10); }

  function openAdhoc(){
    setAdhocForm({memberSearch:"",memberName:"",memberEmail:"",memberNumber:"",lines:[{description:"",amount:""}],notes:"",issueDate:today,dueDate:calcDue(today)});
    setModal({adhoc:true});
  }
  function pickMember(m){ setAdhocForm(f=>({...f,memberName:m.name,memberEmail:m.email||"",memberNumber:m.memberNumber||"",memberSearch:m.name})); }
  function addLine(){ setAdhocForm(f=>({...f,lines:[...f.lines,{description:"",amount:""}]})); }
  function updateLine(i,field,val){ setAdhocForm(f=>({...f,lines:f.lines.map((l,n)=>n===i?{...l,[field]:val}:l)})); }
  function removeLine(i){ setAdhocForm(f=>({...f,lines:f.lines.filter((_,n)=>n!==i)})); }

  function printAdhocInvoice(){
    if(!adhocForm.memberName)return alert("Please enter a recipient name.");
    if(!adhocForm.lines.some(l=>l.description&&l.amount))return alert("Please add at least one line item.");
    const num=(fs.invoicePrefix||"RCCA")+"-ADH-"+String(Date.now()).slice(-5);
    const total=adhocForm.lines.reduce((s,l)=>s+(Number(l.amount)||0),0);
    const w=window.open("","_blank","width=800,height=700");
    const rows=adhocForm.lines.filter(l=>l.description).map(l=>`<tr><td style="padding:8px 12px;border-bottom:1px solid #eee">${l.description}</td><td style="padding:8px 12px;border-bottom:1px solid #eee;text-align:right">A$${Number(l.amount||0).toFixed(2)}</td></tr>`).join("");
    const gstLine=fs.gstRegistered?`<tr><td style="padding:6px 12px;color:#666;font-size:12px">GST included (10%)</td><td style="padding:6px 12px;text-align:right;color:#666;font-size:12px">A$${(total/11).toFixed(2)}</td></tr>`:"";
    w.document.write(`<!DOCTYPE html><html><body style="font-family:sans-serif;max-width:680px;margin:40px auto;color:#1a1210">
      <div style="display:flex;justify-content:space-between;border-bottom:3px solid #c0282a;padding-bottom:16px;margin-bottom:24px">
        <div><div style="font-size:20px;font-weight:700;color:#c0282a">Rover Car Club of Australia</div>
        <div style="font-size:12px;color:#666">PO Box 6049, Wantirna VIC 3152 · secretary@rcca.com.au</div>
        ${fs.abn?`<div style="font-size:12px;color:#666">ABN: ${fs.abn}</div>`:""}
        </div>
        <div style="text-align:right"><div style="font-size:11px;color:#999;text-transform:uppercase;letter-spacing:.1em">Invoice</div>
        <div style="font-size:18px;font-weight:700">${num}</div>
        <div style="font-size:11px;color:#666">Issued: ${adhocForm.issueDate}</div>
        <div style="font-size:11px;color:#c0282a;font-weight:600">Due: ${adhocForm.dueDate}</div></div>
      </div>
      <div style="margin-bottom:24px;font-size:13px">
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#999;margin-bottom:4px">Bill To</div>
        <div style="font-weight:700;font-size:15px">${adhocForm.memberName}</div>
        ${adhocForm.memberEmail?`<div style="color:#666">${adhocForm.memberEmail}</div>`:""}
        ${adhocForm.memberNumber?`<div style="color:#666">Member #${adhocForm.memberNumber}</div>`:""}
      </div>
      <table style="width:100%;border-collapse:collapse;margin-bottom:20px">
        <thead><tr style="background:#c0282a;color:#fff"><th style="padding:10px 12px;text-align:left;font-size:11px;text-transform:uppercase">Description</th><th style="padding:10px 12px;text-align:right;font-size:11px;text-transform:uppercase">Amount</th></tr></thead>
        <tbody>${rows}${gstLine}</tbody>
        <tfoot><tr style="background:#f8f5f0"><td style="padding:12px;font-weight:700;font-size:15px">TOTAL DUE</td><td style="padding:12px;text-align:right;font-weight:700;font-size:18px;color:#c0282a">A$${total.toFixed(2)}</td></tr></tfoot>
      </table>
      ${adhocForm.notes?`<div style="background:#fff8e1;border:1px solid #ffe082;border-radius:6px;padding:12px;margin-bottom:16px;font-size:12px;color:#5d4037"><strong>Notes:</strong> ${adhocForm.notes}</div>`:""}
      ${(fs.bsb||fs.accountNumber)?`<div style="background:#f0f8f4;border:1px solid #b3d9c4;border-radius:8px;padding:16px;font-size:12px">
        <div style="font-weight:700;color:#1e6840;margin-bottom:8px">Payment by Bank Transfer</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          ${fs.accountName?`<div><div style="color:#666;font-size:10px;text-transform:uppercase">Account Name</div><div style="font-weight:700">${fs.accountName}</div></div>`:""}
          ${fs.bankName?`<div><div style="color:#666;font-size:10px;text-transform:uppercase">Bank</div><div style="font-weight:700">${fs.bankName}</div></div>`:""}
          ${fs.bsb?`<div><div style="color:#666;font-size:10px;text-transform:uppercase">BSB</div><div style="font-weight:700">${fs.bsb}</div></div>`:""}
          ${fs.accountNumber?`<div><div style="color:#666;font-size:10px;text-transform:uppercase">Account Number</div><div style="font-weight:700">${fs.accountNumber}</div></div>`:""}
        </div>
        ${fs.paymentRef?`<div style="margin-top:8px;color:#1e6840">📌 ${fs.paymentRef} — please use ${num} as reference</div>`:""}
      </div>`:""}
      <div style="margin-top:20px;font-size:11px;color:#999;text-align:center;border-top:1px solid #eee;padding-top:12px">Rover Car Club of Australia Inc. · Thank you!</div>
      <script>window.print();window.close();<\/script></body></html>`);
    w.document.close();
    setModal(null);
  }

  const tabs2=[{id:"dashboard",label:"Dashboard"},{id:"income",label:"Income"},{id:"expenses",label:"Expenses"},{id:"settings",label:"Settings"}];

  return (
    <div className="fade-up">
      <SectionHeader title="Finance" subtitle={`FY ${fyLabel()}`} action={<Row gap={8}><Btn onClick={openAdhoc}>+ New Invoice</Btn><Btn variant="ghost" onClick={exportCSV}>⬇ Export CSV</Btn></Row>}/>
      <Row gap={8} style={{marginBottom:20,flexWrap:"wrap"}}>
        {tabs2.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"7px 18px",borderRadius:6,border:"1px solid var(--border)",background:tab===t.id?"var(--burg)":"var(--bg2)",color:tab===t.id?"#fff":"var(--text2)",fontWeight:600,cursor:"pointer",fontSize:13}}>{t.label}</button>)}
      </Row>

      {tab==="dashboard"&&(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:14,marginBottom:24}}>
            {[["Total Income","$"+totalIncome.toFixed(2),"var(--green)"],["Total Expenses","$"+totalExpenses.toFixed(2),"var(--red2)"],["Surplus / Deficit",(surplus>=0?"$":"-$")+Math.abs(surplus).toFixed(2),surplus>=0?"var(--green)":"var(--red2)"],["Transactions",(incomeItems.length+expItems.length),"var(--burg)"]].map(([k,v,c])=>(
              <Card key={k} style={{padding:18}}>
                <div style={{fontSize:10,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.08em",color:"var(--text3)",marginBottom:6}}>{k}</div>
                <div style={{fontSize:26,fontWeight:700,color:c}}>{v}</div>
              </Card>
            ))}
          </div>
          <Card style={{padding:18,marginBottom:16}}>
            <div style={{fontSize:11,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.08em",color:"var(--text3)",marginBottom:12}}>Income by Category — FY {fyLabel()}</div>
            {[["Membership Dues",(dues||[]).filter(d=>d.paid&&inFY(d.paidDate||d.year+"-07-01")).reduce((s,d)=>s+(d.amount||54),0),"var(--green)"],
              ["Club Shop",(orders||[]).filter(o=>inFY(o.date)).reduce((s,o)=>s+(o.items?o.items.reduce((x,i)=>x+i.price*i.qty,0):0),0),"var(--blue)"]].map(([k,v,c])=>{
              const pct=totalIncome>0?Math.round(v/totalIncome*100):0;
              return <div key={k} style={{marginBottom:10}}>
                <Row justify="space-between" style={{marginBottom:4,fontSize:13}}><span>{k}</span><span style={{fontWeight:700}}>${v.toFixed(2)} <span style={{color:"var(--text3)",fontWeight:400,fontSize:11}}>({pct}%)</span></span></Row>
                <div style={{height:8,background:"var(--bg3)",borderRadius:4}}><div style={{height:8,borderRadius:4,background:c,width:pct+"%",transition:"width .4s"}}/></div>
              </div>;
            })}
          </Card>
          <Card style={{padding:18}}>
            <div style={{fontSize:11,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.08em",color:"var(--text3)",marginBottom:12}}>Expenses by Category — FY {fyLabel()}</div>
            {EXPENSE_CATS.map(cat=>{
              const amt=expItems.filter(e=>e.category===cat).reduce((s,e)=>s+Number(e.amount),0);
              if(amt===0)return null;
              const pct=totalExpenses>0?Math.round(amt/totalExpenses*100):0;
              return <div key={cat} style={{marginBottom:10}}>
                <Row justify="space-between" style={{marginBottom:4,fontSize:13}}><span>{cat}</span><span style={{fontWeight:700}}>${amt.toFixed(2)} <span style={{color:"var(--text3)",fontWeight:400,fontSize:11}}>({pct}%)</span></span></Row>
                <div style={{height:8,background:"var(--bg3)",borderRadius:4}}><div style={{height:8,borderRadius:4,background:"var(--burg)",width:pct+"%",transition:"width .4s"}}/></div>
              </div>;
            })}
            {expItems.length===0&&<div style={{color:"var(--text3)",fontSize:13,fontFamily:"var(--font-m)"}}>No expenses recorded this FY</div>}
          </Card>
        </div>
      )}

      {tab==="income"&&(
        <div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr style={{borderBottom:"2px solid var(--border)",background:"var(--bg3)"}}>
                {["Date","Description","Member","Amount","Invoice"].map(h=><th key={h} style={{textAlign:"left",padding:"8px 12px",fontFamily:"var(--font-m)",fontSize:10,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.06em"}}>{h}</th>)}
              </tr></thead>
              <tbody>
                {incomeItems.map(item=>(
                  <tr key={item.id} style={{borderBottom:"1px solid var(--border)"}}>
                    <td style={{padding:"9px 12px",fontFamily:"var(--font-m)",fontSize:11,color:"var(--text3)"}}>{item.date}</td>
                    <td style={{padding:"9px 12px"}}>{item.description}</td>
                    <td style={{padding:"9px 12px",color:"var(--text2)"}}>{item.member}</td>
                    <td style={{padding:"9px 12px",fontWeight:700,color:"var(--green)"}}>${Number(item.amount).toFixed(2)}</td>
                    <td style={{padding:"9px 12px"}}><Btn variant="ghost" size="sm" onClick={()=>setInvView(buildInvoice(item))}>View Invoice</Btn></td>
                  </tr>
                ))}
                {incomeItems.length===0&&<tr><td colSpan={5} style={{padding:"20px",textAlign:"center",color:"var(--text3)",fontFamily:"var(--font-m)",fontSize:12}}>No income recorded this FY</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {tab==="expenses"&&(
        <div>
          <Row justify="flex-end" style={{marginBottom:14}}>
            <Btn onClick={()=>{ setExpForm({date:today,amount:"",category:"Hall Hire",description:"",reference:""}); setModal({addExp:true}); }}>+ Add Expense</Btn>
          </Row>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr style={{borderBottom:"2px solid var(--border)",background:"var(--bg3)"}}>
                {["Date","Description","Category","Reference","Amount",""].map(h=><th key={h} style={{textAlign:"left",padding:"8px 12px",fontFamily:"var(--font-m)",fontSize:10,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.06em"}}>{h}</th>)}
              </tr></thead>
              <tbody>
                {expItems.map(e=>(
                  <tr key={e.id} style={{borderBottom:"1px solid var(--border)"}}>
                    <td style={{padding:"9px 12px",fontFamily:"var(--font-m)",fontSize:11,color:"var(--text3)"}}>{e.date}</td>
                    <td style={{padding:"9px 12px"}}>{e.description}</td>
                    <td style={{padding:"9px 12px"}}><Badge status={e.category}/></td>
                    <td style={{padding:"9px 12px",color:"var(--text3)",fontSize:11,fontFamily:"var(--font-m)"}}>{e.reference||"—"}</td>
                    <td style={{padding:"9px 12px",fontWeight:700,color:"var(--red2)"}}>${Number(e.amount).toFixed(2)}</td>
                    <td style={{padding:"9px 12px"}}><Row gap={6}>
                      <Btn variant="ghost" size="sm" onClick={()=>{ setExpForm({...e}); setModal({edit:e}); }}>Edit</Btn>
                      <Btn variant="danger" size="sm" onClick={()=>setModal({confirmDel:e})}>Del</Btn>
                    </Row></td>
                  </tr>
                ))}
                {expItems.length===0&&<tr><td colSpan={6} style={{padding:"20px",textAlign:"center",color:"var(--text3)",fontFamily:"var(--font-m)",fontSize:12}}>No expenses this FY — add one above</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {tab==="settings"&&(
        <Card style={{padding:24,maxWidth:600}}>
          <div style={{fontFamily:"var(--font-d)",fontSize:17,fontWeight:700,marginBottom:18}}>Finance Settings</div>
          <Field label="Account Name"><Input value={settForm.accountName||""} onChange={e=>setSettForm({...settForm,accountName:e.target.value})}/></Field>
          <Row gap={12}><Field label="Bank Name" half><Input value={settForm.bankName||""} onChange={e=>setSettForm({...settForm,bankName:e.target.value})}/></Field>
          <Field label="BSB" half><Input value={settForm.bsb||""} onChange={e=>setSettForm({...settForm,bsb:e.target.value})} placeholder="000-000"/></Field></Row>
          <Field label="Account Number"><Input value={settForm.accountNumber||""} onChange={e=>setSettForm({...settForm,accountNumber:e.target.value})}/></Field>
          <Field label="Payment Reference Instructions"><Input value={settForm.paymentRef||""} onChange={e=>setSettForm({...settForm,paymentRef:e.target.value})}/></Field>
          <Row gap={12}><Field label="Payment Due (days)" half><Input type="number" value={settForm.paymentDays||14} onChange={e=>setSettForm({...settForm,paymentDays:Number(e.target.value)})}/></Field>
          <Field label="ABN" half><Input value={settForm.abn||""} onChange={e=>setSettForm({...settForm,abn:e.target.value})} placeholder="XX XXX XXX XXX"/></Field></Row>
          <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",fontSize:14,color:"var(--text2)",fontWeight:600,marginBottom:16}}>
            <input type="checkbox" checked={!!settForm.gstRegistered} onChange={e=>setSettForm({...settForm,gstRegistered:e.target.checked})} style={{width:18,height:18,accentColor:"var(--burg)"}}/>
            GST Registered (10% GST shown on invoices)
          </label>
          <Row gap={12}><Field label="Invoice Prefix" half><Input value={settForm.invoicePrefix||"RCCA"} onChange={e=>setSettForm({...settForm,invoicePrefix:e.target.value})}/></Field>
          <Field label="Next Invoice Number" half><Input type="number" value={settForm.nextInvoiceNum||1001} onChange={e=>setSettForm({...settForm,nextInvoiceNum:Number(e.target.value)})}/></Field></Row>
          <Btn onClick={saveSettings}>Save Settings</Btn>
        </Card>
      )}

      {/* Add/Edit Expense Modal */}
      {(modal?.addExp||modal?.edit)&&<Modal title={modal?.edit?"Edit Expense":"Add Expense"} onClose={()=>setModal(null)}>
        <Row gap={12}><Field label="Date" half><Input type="date" value={expForm.date} onChange={e=>setExpForm({...expForm,date:e.target.value})}/></Field>
        <Field label="Amount ($)" half><Input type="number" value={expForm.amount} onChange={e=>setExpForm({...expForm,amount:e.target.value})} placeholder="0.00"/></Field></Row>
        <Field label="Category"><Select value={expForm.category} onChange={e=>setExpForm({...expForm,category:e.target.value})}>{EXPENSE_CATS.map(c=><option key={c}>{c}</option>)}</Select></Field>
        <Field label="Description"><Input value={expForm.description} onChange={e=>setExpForm({...expForm,description:e.target.value})}/></Field>
        <Field label="Reference / Receipt No (optional)"><Input value={expForm.reference} onChange={e=>setExpForm({...expForm,reference:e.target.value})}/></Field>
        <Row gap={10} justify="flex-end"><Btn variant="ghost" onClick={()=>setModal(null)}>Cancel</Btn><Btn onClick={saveExpense}>Save</Btn></Row>
      </Modal>}
      {modal?.confirmDel&&<Confirm message="Delete this expense?" onConfirm={()=>delExpense(modal.confirmDel.id)} onCancel={()=>setModal(null)}/>}

      {/* Ad-hoc Invoice Modal */}
      {modal?.adhoc&&<Modal title="New Invoice" onClose={()=>setModal(null)} wide>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:4}}>
          <div>
            <div style={{fontSize:11,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.08em",color:"var(--text3)",marginBottom:10}}>Bill To</div>
            <Field label="Search member (optional)">
              <Select value={adhocForm.memberSearch} onChange={e=>{const m=members.find(x=>x.name===e.target.value);if(m)pickMember(m);else setAdhocForm(f=>({...f,memberSearch:e.target.value}));}}>
                <option value="">— Select a member or enter manually —</option>
                {members.filter(m=>m.status==="active").map(m=><option key={m.id} value={m.name}>{m.name} #{m.memberNumber}</option>)}
              </Select>
            </Field>
            <Field label="Name"><Input value={adhocForm.memberName} onChange={e=>setAdhocForm(f=>({...f,memberName:e.target.value}))}/></Field>
            <Field label="Email (optional)"><Input value={adhocForm.memberEmail} onChange={e=>setAdhocForm(f=>({...f,memberEmail:e.target.value}))}/></Field>
          </div>
          <div>
            <div style={{fontSize:11,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.08em",color:"var(--text3)",marginBottom:10}}>Invoice Details</div>
            <Field label="Issue Date"><Input type="date" value={adhocForm.issueDate} onChange={e=>setAdhocForm(f=>({...f,issueDate:e.target.value,dueDate:calcDue(e.target.value)}))}/></Field>
            <Field label="Due Date"><Input type="date" value={adhocForm.dueDate} onChange={e=>setAdhocForm(f=>({...f,dueDate:e.target.value}))}/></Field>
          </div>
        </div>

        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.08em",color:"var(--text3)",marginBottom:10}}>Line Items</div>
          {adhocForm.lines.map((line,i)=>(
            <Row key={i} gap={8} align="flex-start" style={{marginBottom:8}}>
              <div style={{flex:3}}><Input value={line.description} onChange={e=>updateLine(i,"description",e.target.value)} placeholder="Description"/></div>
              <div style={{width:110}}><Input type="number" value={line.amount} onChange={e=>updateLine(i,"amount",e.target.value)} placeholder="A$0.00"/></div>
              {adhocForm.lines.length>1&&<button onClick={()=>removeLine(i)} style={{background:"none",border:"none",color:"var(--red2)",cursor:"pointer",fontSize:18,padding:"8px 4px"}}>×</button>}
            </Row>
          ))}
          <Btn variant="ghost" size="sm" onClick={addLine}>+ Add Line</Btn>
          <div style={{textAlign:"right",fontFamily:"var(--font-m)",fontSize:16,fontWeight:700,color:"var(--burg)",marginTop:10}}>
            Total: A${adhocForm.lines.reduce((s,l)=>s+(Number(l.amount)||0),0).toFixed(2)}
            {fs.gstRegistered&&<span style={{fontSize:11,color:"var(--text3)",fontWeight:400,marginLeft:8}}>(incl. A${(adhocForm.lines.reduce((s,l)=>s+(Number(l.amount)||0),0)/11).toFixed(2)} GST)</span>}
          </div>
        </div>

        <Field label="Notes (optional — appears on invoice)"><Textarea value={adhocForm.notes} onChange={e=>setAdhocForm(f=>({...f,notes:e.target.value}))} placeholder="e.g. Payment for special event registration, equipment hire..." style={{minHeight:60}}/></Field>
        {(!fs.bsb&&!fs.accountNumber)&&<div style={{background:"#fffbeb",border:"1px solid #f59e0b",borderRadius:6,padding:"10px 14px",fontSize:12,color:"#92400e",marginBottom:12}}>⚠ Bank details not set — go to Finance → Settings to add them so they appear on invoices.</div>}
        <Row gap={10} justify="flex-end">
          <Btn variant="ghost" onClick={()=>setModal(null)}>Cancel</Btn>
          <Btn onClick={printAdhocInvoice}>🖨 Generate & Print Invoice</Btn>
        </Row>
      </Modal>}

      {/* Invoice Viewer */}
      {invView&&<Modal title="Invoice" onClose={()=>setInvView(null)} wide>
        <div id="inv-print" style={{background:"#fff",border:"1px solid var(--border)",borderRadius:8,padding:32,fontFamily:"var(--font-b)",fontSize:13,color:"#1a1210",maxWidth:680,margin:"0 auto"}}>
          <Row justify="space-between" align="flex-start" style={{marginBottom:24,paddingBottom:20,borderBottom:"3px solid var(--burg)"}}>
            <div>
              <div style={{fontFamily:"var(--font-d)",fontSize:22,fontWeight:700,color:"var(--burg)",marginBottom:2}}>Rover Car Club of Australia</div>
              <div style={{fontSize:11,color:"#666"}}>PO Box 6049, Wantirna VIC 3152</div>
              <div style={{fontSize:11,color:"#666"}}>secretary@rcca.com.au</div>
              {invView.fs?.abn&&<div style={{fontSize:11,color:"#666",marginTop:2}}>ABN: {invView.fs.abn}</div>}
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontFamily:"var(--font-m)",fontSize:11,color:"#999",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}}>Invoice</div>
              <div style={{fontFamily:"var(--font-d)",fontSize:18,fontWeight:700}}>{invView.num}</div>
              <div style={{fontSize:11,color:"#666",marginTop:6}}>Issued: {invView.issued}</div>
              <div style={{fontSize:11,color:"#666"}}>Due: {invView.due}</div>
            </div>
          </Row>
          <Row justify="space-between" align="flex-start" style={{marginBottom:24}}>
            <div>
              <div style={{fontSize:10,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.08em",color:"#999",marginBottom:4}}>Bill To</div>
              <div style={{fontWeight:700,fontSize:14}}>{invView.member.name}</div>
              {invView.member.email&&<div style={{fontSize:12,color:"#666"}}>{invView.member.email}</div>}
              {invView.member.memberNumber&&<div style={{fontSize:12,color:"#666"}}>Member #{invView.member.memberNumber}</div>}
            </div>
          </Row>
          <table style={{width:"100%",borderCollapse:"collapse",marginBottom:20}}>
            <thead><tr style={{background:"var(--burg)",color:"#fff"}}>
              <th style={{padding:"10px 14px",textAlign:"left",fontSize:11,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.06em"}}>Description</th>
              <th style={{padding:"10px 14px",textAlign:"right",fontSize:11,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.06em"}}>Amount</th>
            </tr></thead>
            <tbody>
              <tr style={{borderBottom:"1px solid #eee"}}>
                <td style={{padding:"12px 14px"}}>{invView.item.description}</td>
                <td style={{padding:"12px 14px",textAlign:"right",fontWeight:700}}>${Number(invView.item.amount).toFixed(2)}</td>
              </tr>
              {invView.fs?.gstRegistered&&<tr style={{borderBottom:"1px solid #eee"}}>
                <td style={{padding:"8px 14px",color:"#666",fontSize:12}}>GST included (10%)</td>
                <td style={{padding:"8px 14px",textAlign:"right",color:"#666",fontSize:12}}>${(Number(invView.item.amount)/11).toFixed(2)}</td>
              </tr>}
            </tbody>
            <tfoot>
              <tr style={{background:"var(--bg3)"}}>
                <td style={{padding:"12px 14px",fontWeight:700,fontSize:14}}>TOTAL DUE</td>
                <td style={{padding:"12px 14px",textAlign:"right",fontWeight:700,fontSize:16,color:"var(--burg)"}}>${Number(invView.item.amount).toFixed(2)}</td>
              </tr>
            </tfoot>
          </table>
          {(invView.fs?.bsb||invView.fs?.accountNumber)&&<div style={{background:"#f0f8f4",border:"1px solid #b3d9c4",borderRadius:8,padding:16,marginBottom:16}}>
            <div style={{fontSize:11,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.08em",color:"#1e6840",marginBottom:10,fontWeight:700}}>Payment by Bank Transfer</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,fontSize:12}}>
              {[["Account Name",invView.fs.accountName],["Bank",invView.fs.bankName],["BSB",invView.fs.bsb],["Account Number",invView.fs.accountNumber]].filter(([,v])=>v).map(([k,v])=>(
                <div key={k}><div style={{color:"#666",fontSize:10,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:2}}>{k}</div><div style={{fontWeight:700}}>{v}</div></div>
              ))}
            </div>
            {invView.fs?.paymentRef&&<div style={{marginTop:10,fontSize:12,color:"#1e6840"}}>📌 {invView.fs.paymentRef}</div>}
          </div>}
          <div style={{fontSize:11,color:"#999",textAlign:"center",borderTop:"1px solid #eee",paddingTop:12}}>Rover Car Club of Australia Inc. · Thank you for your membership!</div>
        </div>
        <Row gap={10} justify="center" style={{marginTop:16}}>
          <Btn onClick={()=>window.print()}>🖨️ Print Invoice</Btn>
          <Btn variant="ghost" onClick={()=>setInvView(null)}>Close</Btn>
        </Row>
      </Modal>}
    </div>
  );
}
