// ── UI Primitives ─────────────────────────────────────────────────────────────
const iStyle = {
  width:"100%", background:"var(--bg3)", border:"1px solid var(--border2)",
  borderRadius:"var(--r)", padding:"9px 13px", color:"var(--text)", fontSize:13,
  fontFamily:"var(--font-b)", outline:"none", transition:"border-color .15s",
};

function Input({ style={}, ...p }) {
  const [focus, setFocus] = useState(false);
  return <input style={{...iStyle, ...(focus?{borderColor:"var(--gold)"}:{}), ...style}}
    onFocus={()=>setFocus(true)} onBlur={()=>setFocus(false)} {...p}/>;
}
function Select({ children, style={}, ...p }) {
  return <select style={{...iStyle, ...style}} {...p}>{children}</select>;
}
function Textarea({ style={}, ...p }) {
  const [focus, setFocus] = useState(false);
  return <textarea style={{...iStyle, minHeight:80, resize:"vertical", ...(focus?{borderColor:"var(--gold)"}:{}), ...style}}
    onFocus={()=>setFocus(true)} onBlur={()=>setFocus(false)} {...p}/>;
}

function Btn({ children, variant="primary", size="md", style={}, ...p }) {
  const base = { borderRadius:"var(--r)", fontFamily:"var(--font-b)", fontWeight:700,
    cursor:"pointer", border:"none", transition:"all .15s", letterSpacing:"0.03em" };
  const sizes = { sm:{padding:"5px 12px",fontSize:11}, md:{padding:"9px 18px",fontSize:13}, lg:{padding:"13px 28px",fontSize:15} };
  const vars = {
    primary: { background:"var(--burg)", color:"#ffffff" },
    burg:    { background:"linear-gradient(135deg,var(--burg),var(--burg2))", color:"#ffffff" },
    danger:  { background:"linear-gradient(135deg,var(--red),var(--red2))",   color:"#ffe0e0" },
    ghost:   { background:"none", color:"var(--text2)", border:"1px solid var(--border2)" },
    success: { background:"linear-gradient(135deg,var(--green),var(--green2))", color:"#d0ffe8" },
    outline: { background:"none", color:"var(--gold)", border:"1px solid var(--gold)" },
  };
  return <button style={{...base, ...sizes[size||"md"], ...vars[variant||"primary"], ...style}} {...p}>{children}</button>;
}

function Card({ children, style={}, className="", onClick }) {
  return (
    <div onClick={onClick} className={className} style={{
      background:"var(--bg2)", border:"1px solid var(--border)",
      borderRadius:"var(--r)", ...style
    }}>{children}</div>
  );
}

function Modal({ title, subtitle, onClose, children, wide=false, extraWide=false }) {
  React.useEffect(() => {
    const prev = document.body.style.overflow;
    document.body.style.overflow = "hidden";
    const onKey = e => { if(e.key==="Escape") onClose(); };
    document.addEventListener("keydown", onKey);
    return () => { document.body.style.overflow = prev; document.removeEventListener("keydown", onKey); };
  }, []);

  return ReactDOM.createPortal(
    <div style={{
      position:"fixed",inset:0,zIndex:9999,display:"flex",
      alignItems:"flex-start",justifyContent:"center",
      padding:"24px 16px 40px",overflowY:"auto",
      background:"rgba(0,0,0,.85)",backdropFilter:"blur(4px)"
    }} className="fade-in" onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <Card style={{
        width:"100%", maxWidth: extraWide?940:wide?680:520,
        flexShrink:0, display:"flex", flexDirection:"column",
        boxShadow:"0 32px 100px rgba(0,0,0,.8), inset 0 1px 0 rgba(201,146,42,.15)",
        marginTop:0
      }} className="fade-up" onClick={e=>e.stopPropagation()}>
        <div style={{
          padding:"18px 24px", borderBottom:"1px solid var(--border)",
          flexShrink:0, background:"linear-gradient(135deg,var(--bg3),var(--bg2))",
          borderRadius:"10px 10px 0 0"
        }}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <h3 style={{fontFamily:"var(--font-d)",fontSize:20,color:"var(--gold3)",fontWeight:600,margin:0}}>{title}</h3>
              {subtitle && <p style={{margin:"3px 0 0",fontSize:11,color:"var(--text3)",fontFamily:"var(--font-m)"}}>{subtitle}</p>}
            </div>
            <button onClick={onClose} style={{background:"none",border:"none",color:"var(--text3)",fontSize:26,cursor:"pointer",lineHeight:1,padding:"0 4px",transition:"color .15s"}}
              onMouseEnter={e=>e.target.style.color="var(--text)"} onMouseLeave={e=>e.target.style.color="var(--text3)"}>&times;</button>
          </div>
        </div>
        <div style={{padding:"20px 24px",overflowY:"auto",flex:1}}>{children}</div>
      </Card>
    </div>,
    document.body
  );
}

function Field({ label, children, half=false, third=false }) {
  return (
    <div style={{marginBottom:14, width: third?"calc(33.3% - 8px)":half?"calc(50% - 6px)":"100%"}}>
      <label style={{display:"block",fontSize:10,fontFamily:"var(--font-m)",color:"var(--text3)",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.12em"}}>{label}</label>
      {children}
    </div>
  );
}

function Row({ children, gap=8, wrap=false, align="center", justify="flex-start", style={} }) {
  return <div style={{display:"flex",gap,flexWrap:wrap?"wrap":"nowrap",alignItems:align,justifyContent:justify,...style}}>{children}</div>;
}
function Col({ children, gap=8, style={} }) {
  return <div style={{display:"flex",flexDirection:"column",gap,...style}}>{children}</div>;
}

function Divider({ style={} }) { return <hr style={{border:"none",borderTop:"1px solid var(--border)",margin:"14px 0",...style}}/>; }

function EmptyState({ icon, text, sub }) {
  return (
    <div style={{textAlign:"center",padding:"52px 20px",color:"var(--text3)"}}>
      <div style={{fontSize:42,marginBottom:12,opacity:.5}}>{icon}</div>
      <div style={{fontFamily:"var(--font-d)",fontSize:17,color:"var(--text4)",marginBottom:6}}>{text}</div>
      {sub && <div style={{fontSize:12,fontFamily:"var(--font-m)",color:"var(--text4)"}}>{sub}</div>}
    </div>
  );
}

function Confirm({ message, onConfirm, onCancel, confirmLabel="Confirm", variant="danger" }) {
  return (
    <Modal title="Confirm Action" onClose={onCancel}>
      <p style={{color:"var(--text2)",marginBottom:20,lineHeight:1.6}}>{message}</p>
      <Row gap={8} justify="flex-end">
        <Btn variant="ghost" onClick={onCancel}>Cancel</Btn>
        <Btn variant={variant} onClick={onConfirm}>{confirmLabel}</Btn>
      </Row>
    </Modal>
  );
}

function Badge({ status, label }) {
  const s = BADGE_STYLES[status] || BADGE_STYLES.member;
  const lbl = label || (status==="inprogress"?"IN PROGRESS":status?.toUpperCase());
  return (
    <span style={{
      background:s.bg, color:s.text, border:`1px solid ${s.border}`,
      fontSize:9.5, fontFamily:"var(--font-m)", padding:"2px 8px",
      borderRadius:4, letterSpacing:"0.1em", whiteSpace:"nowrap", fontWeight:500
    }}>{lbl}</span>
  );
}

// ── Avatar ────────────────────────────────────────────────────────────────────
function Avatar({ name="?", size=36 }) {
  const i = name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  const h = name.charCodeAt(0)%4;
  const grads = [
    ["#6b1a2a","#3a0a10"],["#8b2a0a","#4a1200"],
    ["#1a2a6b","#0a103a"],["#1a6b2a","#0a3a10"]
  ];
  return (
    <div style={{
      width:size,height:size,borderRadius:"50%",flexShrink:0,
      background:`linear-gradient(135deg,${grads[h][0]},${grads[h][1]})`,
      border:"2px solid var(--border2)",
      display:"flex",alignItems:"center",justifyContent:"center",
      fontSize:size*.36,fontFamily:"var(--font-m)",color:"#ffffff",fontWeight:700
    }}>{i}</div>
  );
}

function StatCard({ label, value, colour="var(--text)", icon, sub }) {
  return (
    <Card style={{padding:"16px 20px",textAlign:"center",background:"linear-gradient(135deg,var(--bg2),var(--bg3))"}}>
      {icon && <div style={{fontSize:20,marginBottom:6,opacity:.7}}>{icon}</div>}
      <div style={{fontSize:26,fontWeight:700,fontFamily:"var(--font-m)",color:colour,lineHeight:1}}>{value}</div>
      <div style={{fontSize:9.5,color:"var(--text3)",fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.12em",marginTop:5}}>{label}</div>
      {sub && <div style={{fontSize:10,color:"var(--gold)",fontFamily:"var(--font-m)",marginTop:3}}>{sub}</div>}
    </Card>
  );
}

function SectionHeader({ title, subtitle, action }) {
  return (

        <h2 style={{fontFamily:"var(--font-d)",fontSize:26,color:"var(--gold3)",fontWeight:700,margin:0,lineHeight:1}}>{title}</h2>

  );
}

function LoginScreen({ members, onLogin }) {
  const [email,setEmail]=useState(""); const [pw,setPw]=useState(""); const [err,setErr]=useState("");
  function go() {
    const m=members.find(m=>m.email.toLowerCase()===email.toLowerCase()&&m.password===pw);
    if (!m) { setErr("Invalid email or password."); return; }
    if (m.status==="suspended") { setErr("Your account has been suspended. Contact an administrator."); return; }
    onLogin(m);
  }
  return (
    <div style={{
      minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",
      background:"var(--bg)",
      backgroundImage:"radial-gradient(ellipse at 30% 60%, rgba(107,26,42,.18) 0%, transparent 55%), radial-gradient(ellipse at 70% 20%, rgba(201,146,42,.07) 0%, transparent 50%)"
    }}>
      <div style={{width:"100%",maxWidth:420,padding:24}} className="fade-up">
        {/* Header emblem */}
        <div style={{textAlign:"center",marginBottom:36}}>
          <div style={{
            width:90,height:90,borderRadius:"50%",margin:"0 auto 16px",
            border:"3px solid var(--gold)",overflow:"hidden",
            boxShadow:"0 0 40px rgba(201,146,42,.2)"
          }}>
            <RccaLogo size={48}/>
          </div>
          <h1 style={{fontFamily:"var(--font-d)",fontSize:24,fontWeight:700,color:"var(--gold3)",margin:"0 0 4px",lineHeight:1.2}}>
            Rover Car Club
          </h1>
          <div style={{fontFamily:"var(--font-d)",fontSize:18,color:"var(--gold)",fontStyle:"italic",marginBottom:6}}>of Australia</div>
          <div style={{fontFamily:"var(--font-m)",fontSize:10,color:"var(--text4)",letterSpacing:"0.15em",textTransform:"uppercase"}}>Members Portal</div>
        </div>

        <Card style={{padding:28,background:"linear-gradient(135deg,var(--bg2),var(--bg3))",boxShadow:"0 20px 80px rgba(0,0,0,.7), inset 0 1px 0 rgba(201,146,42,.1)"}}>
          <Field label="Email Address">
            <Input type="email" value={email} onChange={e=>{setEmail(e.target.value);setErr("");}}
              placeholder="member@rcca.com.au" onKeyDown={e=>e.key==="Enter"&&go()}/>
          </Field>
          <Field label="Password">
            <Input type="password" value={pw} onChange={e=>{setPw(e.target.value);setErr("");}}
              placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&go()}/>
          </Field>
          {err && <div style={{color:"var(--red2)",fontSize:12,fontFamily:"var(--font-m)",marginBottom:12,padding:"8px 12px",background:"rgba(180,40,40,.1)",border:"1px solid rgba(180,40,40,.2)",borderRadius:6}}>{err}</div>}
          <Btn onClick={go} size="lg" style={{width:"100%",letterSpacing:"0.05em"}}>Sign In to Members Portal</Btn>
          <Divider/>
          <div style={{fontSize:10,color:"var(--text4)",fontFamily:"var(--font-m)",textAlign:"center",lineHeight:1.8}}>
            Demo Admin: admin@rcca.com.au / admin123<br/>
            Demo Member: patricia@rcca.com.au / member123
          </div>
        </Card>
      </div>
    </div>
  );
}

function MembersSection({ user, members, setMembers, cars, dues, setDues }) {
  const [search,setSearch]=useState(""); const [modal,setModal]=useState(null); const [form,setForm]=useState({});
  const filtered=members.filter(m=>`${m.name} ${m.email} ${m.memberNumber}`.toLowerCase().includes(search.toLowerCase()));
  function openAdd(){setForm({name:"",email:"",password:"",phone:"",memberType:"Full",status:"active",role:"member",joined:today,bio:"",state:"VIC",memberNumber:String(members.length+1).padStart(3,"0")});setModal("add");}
  function openEdit(m){setForm({...m});setModal({edit:m});}
  async function handleSave(){
    if(!form.name||!form.email)return alert("Name and email required.");
    if(modal==="add"&&!form.password)return alert("Password required.");
    let updated;
    if(modal==="add"){
      const nm={...form,id:uid("M"),avatar:form.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase()};
      updated=[...members,nm];
      const nd=[...dues,{id:uid("D"),memberId:nm.id,year:yr,amount:nm.memberType==="Full"?150:100,paid:false,paidDate:null,method:null}];
      setDues(nd); await dbSet(SK.dues,nd);
    } else { updated=members.map(m=>m.id===form.id?{...form}:m); }
    setMembers(updated); await dbSet(SK.members,updated); setModal(null);
  }
  async function toggleStatus(m,status){const u=members.map(x=>x.id===m.id?{...x,status}:x);setMembers(u);await dbSet(SK.members,u);setModal(null);}
  async function toggleRole(m){const u=members.map(x=>x.id===m.id?{...x,role:m.role==="admin"?"member":"admin"}:x);setMembers(u);await dbSet(SK.members,u);}
  const mDues=id=>dues.find(d=>d.memberId===id&&d.year===yr);
  const mCars=id=>cars.filter(c=>c.ownerId===id&&c.status==="active").length;
  return (
    <div className="fade-up">
      <SectionHeader title="Members" subtitle={`${members.filter(m=>m.status==="active").length} active · ${members.length} total registered`}
        action={<Btn onClick={openAdd}>+ Add Member</Btn>}/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:20}}>
        <StatCard label="Total" value={members.length} icon="◉"/>
        <StatCard label="Active" value={members.filter(m=>m.status==="active").length} colour="var(--green2)" icon="●"/>
        <StatCard label="Admins" value={members.filter(m=>m.role==="admin").length} colour="var(--gold2)" icon="★"/>
        <StatCard label="Suspended" value={members.filter(m=>m.status==="suspended").length} colour="var(--red2)" icon="◑"/>
      </div>
      <Row gap={10} style={{marginBottom:14}}><Input placeholder="Search members…" value={search} onChange={e=>setSearch(e.target.value)} style={{maxWidth:320}}/></Row>
      <Card style={{overflow:"hidden"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12.5}}>
          <thead><tr style={{background:"var(--bg3)",borderBottom:"1px solid var(--border)"}}>
            {["No.","Member","Contact","State","Type","Role","Dues","Cars","Status","Actions"].map(h=>(
              <th key={h} style={{padding:"10px 12px",textAlign:"left",fontFamily:"var(--font-m)",fontSize:9.5,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.1em",whiteSpace:"nowrap"}}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {filtered.length===0&&<tr><td colSpan={10}><EmptyState icon="◉" text="No members found"/></td></tr>}
            {filtered.map((m,i)=>{
              const d=mDues(m.id);
              return (<tr key={m.id} style={{borderBottom:"1px solid var(--border)",background:i%2===0?"transparent":"rgba(255,255,255,.01)"}}>
                <td style={{padding:"9px 12px",fontFamily:"var(--font-m)",color:"var(--text3)",fontSize:11}}>{m.memberNumber||m.id}</td>
                <td style={{padding:"9px 12px"}}><Row gap={9}><Avatar name={m.name} size={28}/><div><div style={{fontWeight:700,color:"var(--text)",fontFamily:"var(--font-d)",fontSize:14}}>{m.name}</div><div style={{fontSize:9.5,color:"var(--text3)",fontFamily:"var(--font-m)"}}>{m.id}</div></div></Row></td>
                <td style={{padding:"9px 12px",color:"var(--text2)",fontSize:11}}>{m.email}</td>
                <td style={{padding:"9px 12px",color:"var(--text3)",fontFamily:"var(--font-m)",fontSize:11}}>{m.state||"—"}</td>
                <td style={{padding:"9px 12px"}}><Badge status="member" label={m.memberType?.toUpperCase()}/></td>
                <td style={{padding:"9px 12px"}}><Badge status={m.role}/></td>
                <td style={{padding:"9px 12px"}}>{d?<Badge status={d.paid?"paid":"overdue"} label={d.paid?"PAID":"OVERDUE"}/>:"—"}</td>
                <td style={{padding:"9px 12px",fontFamily:"var(--font-m)",color:"var(--text2)"}}>{mCars(m.id)}</td>
                <td style={{padding:"9px 12px"}}><Badge status={m.status}/></td>
                <td style={{padding:"9px 12px"}}>
                  <Row gap={5} wrap>
                    <Btn variant="ghost" size="sm" onClick={()=>openEdit(m)}>Edit</Btn>
                    {m.id!==user.id&&<>
                      {m.status==="active"?<Btn variant="ghost" size="sm" onClick={()=>setModal({confirm:{msg:`Suspend ${m.name}?`,fn:()=>toggleStatus(m,"suspended")}})}>Suspend</Btn>
                        :<Btn variant="success" size="sm" onClick={()=>toggleStatus(m,"active")}>Reinstate</Btn>}
                      <Btn variant="ghost" size="sm" onClick={()=>toggleRole(m)}>{m.role==="admin"?"Demote":"Promote"}</Btn>
                    </>}
                  </Row>
                </td>
              </tr>);
            })}
          </tbody>
        </table>
      </Card>
      {(modal==="add"||modal?.edit)&&(
        <Modal title={modal==="add"?"Add Member":"Edit Member"} onClose={()=>setModal(null)}>
          <Row gap={12} wrap style={{justifyContent:"space-between"}}>
            <Field label="Full Name" half><Input value={form.name||""} onChange={e=>setForm({...form,name:e.target.value})} placeholder="John Smith"/></Field>
            <Field label="Member No." half><Input value={form.memberNumber||""} onChange={e=>setForm({...form,memberNumber:e.target.value})}/></Field>
          </Row>
          <Row gap={12} wrap style={{justifyContent:"space-between"}}>
            <Field label="Email" half><Input type="email" value={form.email||""} onChange={e=>setForm({...form,email:e.target.value})}/></Field>
            <Field label="Password" half><Input type="password" value={form.password||""} onChange={e=>setForm({...form,password:e.target.value})} placeholder={modal?.edit?"Leave blank to keep":""}/></Field>
          </Row>
          <Row gap={12} wrap style={{justifyContent:"space-between"}}>
            <Field label="Phone" half><Input value={form.phone||""} onChange={e=>setForm({...form,phone:e.target.value})}/></Field>
            <Field label="State" half>
              <Select value={form.state||"VIC"} onChange={e=>setForm({...form,state:e.target.value})}>
                {["ACT","NSW","NT","QLD","SA","TAS","VIC","WA"].map(s=><option key={s}>{s}</option>)}
              </Select>
            </Field>
          </Row>
          <Row gap={12} wrap style={{justifyContent:"space-between"}}>
            <Field label="Type" half><Select value={form.memberType||"Full"} onChange={e=>setForm({...form,memberType:e.target.value})}>{["Full","Associate","Honorary","Junior","Life"].map(t=><option key={t}>{t}</option>)}</Select></Field>
            <Field label="Role" half><Select value={form.role||"member"} onChange={e=>setForm({...form,role:e.target.value})}><option value="member">Member</option><option value="admin">Admin</option></Select></Field>
          </Row>
          <Row gap={12} wrap style={{justifyContent:"space-between"}}>
            <Field label="Status" half><Select value={form.status||"active"} onChange={e=>setForm({...form,status:e.target.value})}>{["active","suspended","resigned"].map(s=><option key={s}>{s}</option>)}</Select></Field>
            <Field label="Join Date" half><Input type="date" value={form.joined||""} onChange={e=>setForm({...form,joined:e.target.value})}/></Field>
          </Row>
          <Field label="Bio"><Textarea value={form.bio||""} onChange={e=>setForm({...form,bio:e.target.value})} placeholder="Member bio…"/></Field>
          <Row gap={8} justify="flex-end"><Btn variant="ghost" onClick={()=>setModal(null)}>Cancel</Btn><Btn onClick={handleSave}>Save Member</Btn></Row>
        </Modal>
      )}
      {modal?.confirm&&<Confirm message={modal.confirm.msg} onConfirm={modal.confirm.fn} onCancel={()=>setModal(null)}/>}
    </div>
  );
}

function PhotoManager({ car, cars, setCars }) {
  var MAX=20;
  var photos=car.photos||[];
  var pState=useState(""); var newUrl=pState[0]; var setNewUrl=pState[1];
  var cState=useState(""); var caption=cState[0]; var setCaption=cState[1];
  var pvState=useState(null); var preview=pvState[0]; var setPreview=pvState[1];
  var eState=useState(""); var err=eState[0]; var setErr=eState[1];
  async function save(list){
    var updated=cars.map(function(c){return c.id===car.id?Object.assign({},c,{photos:list}):c;});
    setCars(updated);await dbSet(SK.cars,updated);
  }
  function add(){
    var u=newUrl.trim();
    if(!u){setErr("Enter a URL.");return;}
    if(u.indexOf("http://")!==0&&u.indexOf("https://")!==0){setErr("Must start with http:// or https://");return;}
    if(photos.length>=MAX){setErr("Max "+MAX+" photos.");return;}
    setErr("");
    save(photos.concat([{id:uid("PH"),url:u,caption:caption.trim(),added:today}]));
    setNewUrl("");setCaption("");
  }
  function remove(id){save(photos.filter(function(p){return p.id!==id;}));}
  return (
    <div>
      <div style={{marginBottom:8,fontSize:11,color:"var(--text3)"}}>Photos: {photos.length}/{MAX}</div>
      {photos.length>0&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(100px,1fr))",gap:6,marginBottom:10}}>
          {photos.map(function(p,i){
            return (
              <div key={p.id} style={{position:"relative",aspectRatio:"4/3",borderRadius:6,overflow:"hidden",border:"1px solid var(--border)"}}>
                <img src={p.url} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                <button onClick={function(){remove(p.id);}} style={{position:"absolute",top:2,right:2,background:"rgba(180,30,30,.8)",border:"none",color:"#fff",width:16,height:16,borderRadius:2,cursor:"pointer",fontSize:10,padding:0}}>x</button>
              </div>
            );
          })}
        </div>
      )}
      {photos.length<MAX&&(
        <div style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:6,padding:10}}>
          <input style={{width:"100%",marginBottom:6,background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:6,padding:"8px 10px",color:"var(--text)",fontSize:13,outline:"none",boxSizing:"border-box"}}
            value={newUrl} onChange={function(e){setNewUrl(e.target.value);setErr("");}}
            placeholder="https://i.imgur.com/..."/>
          {err&&<div style={{fontSize:11,color:"var(--burg)",marginBottom:4}}>{err}</div>}
          <div style={{display:"flex",gap:6}}>
            <input style={{flex:1,background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:6,padding:"8px 10px",color:"var(--text)",fontSize:13,outline:"none"}}
              value={caption} onChange={function(e){setCaption(e.target.value);}}
              placeholder="Caption (optional)"/>
            <button onClick={add} style={{background:"var(--burg)",border:"none",borderRadius:6,padding:"8px 14px",color:"#fff",fontFamily:"var(--font-b)",fontWeight:700,cursor:"pointer",fontSize:12}}>+ Add</button>
          </div>
        </div>
      )}
    </div>
  );
}

function CarsSection({ user, cars, setCars, members, setTransfers }) {
  var isAdmin=user.role==="admin";
  var sState=useState(""); var search=sState[0]; var setSearch=sState[1];
  var fsState=useState("all"); var fs=fsState[0]; var setFs=fsState[1];
  var mState=useState(null); var modal=mState[0]; var setModal=mState[1];
  var fState=useState({}); var form=fState[0]; var setForm=fState[1];
  var spState=useState({}); var showPhotos=spState[0]; var setShowPhotos=spState[1];
  var vis=isAdmin?cars:cars.filter(function(c){return c.ownerId===user.id;});
  var filtered=vis.filter(function(c){
    return (c.reg+" "+c.make+" "+c.model+" "+c.year).toLowerCase().includes(search.toLowerCase())&&(fs==="all"||c.status===fs);
  });
  function ownerName(id){var m=members.find(function(m){return m.id===id;});return m?m.name:"Unknown";}
  function openAdd(){setForm({reg:"",make:"Rover",model:"",year:new Date().getFullYear(),colour:"",chassis:"",ownerId:isAdmin?members[0]?.id:user.id,status:"active",registered:today,notes:""});setModal("add");}
  function openEdit(c){setForm(Object.assign({},c));setModal({edit:c});}
  function openTransfer(c){setForm({carId:c.id,toMemberId:""});setModal({transfer:c});}
  async function handleSave(){
    if(!form.reg||!form.make||!form.model)return alert("Reg, Make and Model required.");
    var updated=modal==="add"?cars.concat([Object.assign({},form,{id:uid("C"),photos:[]})]):cars.map(function(c){return c.id===form.id?Object.assign({},form):c;});
    setCars(updated);await dbSet(SK.cars,updated);setModal(null);
  }
  async function sc(id,st){var u=cars.map(function(c){return c.id===id?Object.assign({},c,{status:st}):c;});setCars(u);await dbSet(SK.cars,u);setModal(null);}
  async function handleTransfer(){
    if(!form.toMemberId)return alert("Select recipient.");
    var car=cars.find(function(c){return c.id===form.carId;});
    if(car.ownerId===form.toMemberId)return alert("Same member.");
    var t={id:uid("T"),carId:car.id,carDesc:car.year+" "+car.make+" "+car.model,fromId:car.ownerId,fromName:ownerName(car.ownerId),toId:form.toMemberId,toName:ownerName(form.toMemberId),date:today};
    var uc=cars.map(function(c){return c.id===car.id?Object.assign({},c,{ownerId:form.toMemberId}):c;});
    setCars(uc);await dbSet(SK.cars,uc);
    setTransfers(function(p){var tr=p.concat([t]);dbSet(SK.transfers,tr);return tr;});
    setModal(null);
  }
  return (
    <div className="fade-up">
      <SectionHeader title={isAdmin?"Vehicle Register":"My Vehicles"} subtitle={filtered.filter(function(c){return c.status==="active";}).length+" active Rovers"} action={<Btn onClick={openAdd}>+ Register Vehicle</Btn>}/>
      {isAdmin&&<div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:20}}>
        <StatCard label="Total" value={cars.length}/>
        <StatCard label="Active" value={cars.filter(function(c){return c.status==="active";}).length} colour="var(--green2)"/>
        <StatCard label="Sold" value={cars.filter(function(c){return c.status==="sold";}).length} colour="var(--blue2)"/>
        <StatCard label="Destroyed" value={cars.filter(function(c){return c.status==="destroyed";}).length} colour="var(--red2)"/>
      </div>}
      <Row gap={10} style={{marginBottom:16,flexWrap:"wrap"}}>
        <Input placeholder="Search vehicles" value={search} onChange={function(e){setSearch(e.target.value);}} style={{maxWidth:280}}/>
        <Select value={fs} onChange={function(e){setFs(e.target.value);}} style={{width:"auto"}}>
          <option value="all">All</option>
          <option value="active">Active</option>
          <option value="sold">Sold</option>
          <option value="destroyed">Destroyed</option>
        </Select>
      </Row>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:14}}>
        {filtered.length===0&&<div style={{gridColumn:"1/-1"}}><EmptyState icon="car" text="No vehicles found"/></div>}
        {filtered.map(function(c){
          var pc=(c.photos||[]).length;
          var hero=(c.photos||[])[0];
          var open=showPhotos[c.id];
          return (
            <Card key={c.id} style={{padding:0,overflow:"hidden",opacity:c.status==="active"?1:.7,borderTop:"3px solid "+(c.status==="active"?"var(--burg)":"var(--border)")}}>
              {hero
                ?<div style={{height:120,overflow:"hidden"}}><img src={hero.url} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}} onError={function(e){e.target.parentNode.style.display="none";}}/></div>
                :<div style={{height:50,display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg3)",color:"var(--text4)",fontSize:22}}>&#128664;</div>
              }
              <div style={{padding:14}}>
                <Row justify="space-between" style={{marginBottom:8}}>
                  <div>
                    <div style={{fontFamily:"var(--font-d)",fontSize:15,fontWeight:700}}>{c.year} {c.make}</div>
                    <div style={{fontSize:13,color:"var(--burg)"}}>{c.model}</div>
                  </div>
                  <Badge status={c.status}/>
                </Row>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px 8px",fontSize:11,marginBottom:10}}>
                  {[["Rego",c.reg],["Colour",c.colour],["Owner",ownerName(c.ownerId)],["Chassis",c.chassis||"n/a"]].map(function(pair){
                    return <div key={pair[0]}><span style={{color:"var(--text4)",fontSize:9,textTransform:"uppercase"}}>{pair[0]}: </span><span>{pair[1]||"n/a"}</span></div>;
                  })}
                </div>
                {c.notes&&<div style={{fontSize:11,color:"var(--text3)",fontStyle:"italic",marginBottom:8}}>{c.notes}</div>}
                <Row gap={5} wrap style={{marginBottom:6}}>
                  {(isAdmin||c.ownerId===user.id)&&<>
                    <Btn variant="ghost" size="sm" onClick={function(){openEdit(c);}}>Edit</Btn>
                    {c.status==="active"&&<>
                      <Btn variant="ghost" size="sm" onClick={function(){openTransfer(c);}}>Transfer</Btn>
                      <Btn variant="ghost" size="sm" onClick={function(){setModal({confirm:{msg:"Mark as sold?",fn:function(){sc(c.id,"sold");}}});}}>Sold</Btn>
                      <Btn variant="danger" size="sm" onClick={function(){setModal({confirm:{msg:"Mark destroyed?",fn:function(){sc(c.id,"destroyed");}}});}}>Destroyed</Btn>

function DuesSection({ members, dues, setDues }) {
  const [selYr,setSelYr]=useState(yr); const [modal,setModal]=useState(null); const [form,setForm]=useState({});
  const [showReminder,setShowReminder]=useState(null);
  const years=Array.from({length:5},(_,i)=>yr-i);
  const enriched=members.filter(m=>m.status!=="resigned").map(m=>({member:m,due:dues.find(d=>d.memberId===m.id&&d.year===selYr)||null}));
  const paid=enriched.filter(e=>e.due?.paid).length;
  const unpaid=enriched.filter(e=>!e.due?.paid).length;
  const collected=enriched.filter(e=>e.due?.paid).reduce((s,e)=>s+(e.due?.amount||0),0);
  const expected=enriched.reduce((s,e)=>s+(e.due?.amount||(e.member.memberType==="Full"?150:100)),0);
  async function handleSavePay(){
    let updated;
    if(dues.find(d=>d.id===form.id))updated=dues.map(d=>d.id===form.id?{...form}:d);
    else updated=[...dues,{...form,id:uid("D")}];
    setDues(updated);await dbSet(SK.dues,updated);setModal(null);
  }
  function genReminder(m,d){
    return `Dear ${m.name.split(" ")[0]},\n\nThis is a friendly reminder that your ${selYr} membership dues for the Rover Car Club of Australia are currently outstanding.\n\nAmount due: A$${d.amount}\nMembership type: ${m.memberType}\nMember number: ${m.memberNumber||m.id}\n\nPlease arrange payment at your earliest convenience by bank transfer to:\nBSB: 063-123\nAccount: 1234 5678\nReference: RCCA-${m.memberNumber||m.id}-${selYr}\n\nIf you have already made payment, please disregard this notice.\n\nKind regards,\nThe RCCA Treasurer\nRover Car Club of Australia`;
  }
  return (
    <div className="fade-up">
      <SectionHeader title="Dues & Renewals" subtitle="Annual membership fee management"/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:20}}>
        <StatCard label="Paid" value={paid} colour="var(--green2)" icon="✓"/>
        <StatCard label="Outstanding" value={unpaid} colour={unpaid>0?"var(--red2)":"var(--green2)"} icon="!"/>
        <StatCard label="Expected" value={`A$${expected}`} colour="var(--gold2)" icon="$" sub={`${selYr}`}/>
        <StatCard label="Collected" value={`A$${collected}`} colour="var(--green2)" icon="✓"/>
      </div>
      <Row gap={10} style={{marginBottom:14}}>
        <label style={{fontSize:12,color:"var(--text2)",fontFamily:"var(--font-m)"}}>Year:</label>
        <Select value={selYr} onChange={e=>setSelYr(Number(e.target.value))} style={{width:"auto"}}>{years.map(y=><option key={y} value={y}>{y}</option>)}</Select>
      </Row>
      <Card style={{overflow:"hidden"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12.5}}>
          <thead><tr style={{background:"var(--bg3)",borderBottom:"1px solid var(--border)"}}>
            {["Member","Type","Amount","Status","Date Paid","Method","Actions"].map(h=><th key={h} style={{padding:"10px 12px",textAlign:"left",fontFamily:"var(--font-m)",fontSize:9.5,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.1em",whiteSpace:"nowrap"}}>{h}</th>)}
          </tr></thead>
          <tbody>{enriched.map(({member:m,due:d},i)=>(
            <tr key={m.id} style={{borderBottom:"1px solid var(--border)",background:i%2===0?"transparent":"rgba(255,255,255,.01)"}}>
              <td style={{padding:"9px 12px"}}><Row gap={9}><Avatar name={m.name} size={26}/><div><div style={{fontWeight:700,color:"var(--text)",fontFamily:"var(--font-d)",fontSize:14}}>{m.name}</div><div style={{fontSize:10,color:"var(--text3)",fontFamily:"var(--font-m)"}}>{m.email}</div></div></Row></td>
              <td style={{padding:"9px 12px"}}><Badge status="member" label={m.memberType?.toUpperCase()}/></td>
              <td style={{padding:"9px 12px",fontFamily:"var(--font-m)",color:"var(--gold2)",fontWeight:700}}>A${d?.amount||(m.memberType==="Full"?150:100)}</td>
              <td style={{padding:"9px 12px"}}><Badge status={d?.paid?"paid":"overdue"} label={d?.paid?"PAID":"OUTSTANDING"}/></td>
              <td style={{padding:"9px 12px",fontFamily:"var(--font-m)",fontSize:11,color:"var(--text3)"}}>{d?.paidDate||"—"}</td>
              <td style={{padding:"9px 12px",color:"var(--text2)",fontSize:12}}>{d?.method||"—"}</td>
              <td style={{padding:"9px 12px"}}>
                <Row gap={5}>
                  {!d?.paid&&<Btn variant="success" size="sm" onClick={()=>{setForm({id:uid("D"),memberId:m.id,year:selYr,amount:m.memberType==="Full"?150:100,paid:true,paidDate:today,method:"Bank Transfer",...(d||{})});setModal("pay");}}>Mark Paid</Btn>}
                  {d?.paid&&<Btn variant="ghost" size="sm" onClick={()=>{setForm({...d});setModal("pay");}}>Edit</Btn>}
                  {!d?.paid&&<Btn variant="outline" size="sm" onClick={()=>setShowReminder({m,d:{amount:m.memberType==="Full"?150:100,...(d||{})}})}>Email</Btn>}
                </Row>
              </td>
            </tr>
          ))}</tbody>
        </table>
      </Card>
      {modal==="pay"&&<Modal title="Record Payment" onClose={()=>setModal(null)}>
        <Row gap={12} wrap style={{justifyContent:"space-between"}}>
          <Field label="Amount (A$)" half><Input type="number" value={form.amount||""} onChange={e=>setForm({...form,amount:Number(e.target.value)})}/></Field>
          <Field label="Payment Date" half><Input type="date" value={form.paidDate||""} onChange={e=>setForm({...form,paidDate:e.target.value})}/></Field>
        </Row>
        <Field label="Payment Method"><Select value={form.method||"Bank Transfer"} onChange={e=>setForm({...form,method:e.target.value})}>{["Bank Transfer","Cheque","Cash","Card","PayID"].map(m=><option key={m}>{m}</option>)}</Select></Field>
        <Field label="Paid?"><Select value={form.paid?"yes":"no"} onChange={e=>setForm({...form,paid:e.target.value==="yes"})}><option value="yes">Yes — Paid</option><option value="no">No — Outstanding</option></Select></Field>
        <Row gap={8} justify="flex-end"><Btn variant="ghost" onClick={()=>setModal(null)}>Cancel</Btn><Btn onClick={handleSavePay}>Save</Btn></Row>
      </Modal>}
      {showReminder&&<Modal title="Email Reminder" subtitle={`Draft reminder for ${showReminder.m.name}`} onClose={()=>setShowReminder(null)} wide>
        <p style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--font-m)",marginBottom:12}}>Copy and send via your email client:</p>
        <div style={{background:"var(--bg)",border:"1px solid var(--border2)",borderRadius:6,padding:16,fontFamily:"var(--font-m)",fontSize:12,color:"var(--text2)",whiteSpace:"pre-wrap",lineHeight:1.7,maxHeight:360,overflowY:"auto"}}>{genReminder(showReminder.m,showReminder.d)}</div>
        <Row gap={8} justify="flex-end" style={{marginTop:12}}>
          <Btn variant="ghost" onClick={()=>setShowReminder(null)}>Close</Btn>
          <Btn onClick={()=>{navigator.clipboard?.writeText(genReminder(showReminder.m,showReminder.d)).then(()=>alert("Copied to clipboard!"));}}>Copy to Clipboard</Btn>
        </Row>
      </Modal>}
    </div>
  );
}

// Migrate flat agenda/minutes string into structured agendaItems array
function migrateAgendaItems(meeting) {
  if (meeting.agendaItems) return meeting.agendaItems;
  const raw = meeting.agenda || "";
  const lines = raw.split(/\n/).map(l => l.replace(/^\d+\.\s*/,"").trim()).filter(Boolean);
  return lines.map((text, i) => ({
    id: "AI" + i,
    category: text,
    notes: "",
    minutes: "",
  }));
}

function MeetingsSection({ user, members, meetings, setMeetings, rsvps, setRsvps }) {
  const isAdmin = user.role === "admin";

  const [form, setForm] = useState({});

  const [agendaItems, setAgendaItems] = useState([]);

  const sorted = [...meetings].sort((a,b) => b.date.localeCompare(a.date));

  function openAdd() {
    setForm({
      title:"", date:today, time:"19:00",

      agendaItems:[
        {id:uid("AI"),category:"Opening & Apologies",notes:"",minutes:""},
        {id:uid("AI"),category:"Confirmation of Previous Minutes",notes:"",minutes:""},
        {id:uid("AI"),category:"Business Arising",notes:"",minutes:""},
        {id:uid("AI"),category:"General Business",notes:"",minutes:""},
        {id:uid("AI"),category:"Any Other Business",notes:"",minutes:""},
        {id:uid("AI"),category:"Next Meeting",notes:"",minutes:""},
        {id:uid("AI"),category:"Close",notes:"",minutes:""},
      ],
    });
    setModal("add");
  }

  function openEdit(m) {
    setForm({...m, agendaItems: migrateAgendaItems(m)});
    setModal({edit:m});
  }

  function openMinutes(m) {
    setAgendaItems(migrateAgendaItems(m));
    setMinutesTab(m.id);
  }

  async function handleSave() {
    if (!form.title || !form.date) return alert("Title and date required.");
    const items = (form.agendaItems||[]).filter(i=>i.category.trim());
    const u = modal==="add"
      ? [...meetings, {...form, agendaItems:items, id:uid("MT")}]
      : meetings.map(m => m.id===form.id ? {...form, agendaItems:items} : m);
    setMeetings(u); await dbSet(SK.meetings, u); setModal(null);
  }

  async function saveMinutes() {
    const u = meetings.map(m => m.id===minutesTab ? {...m, agendaItems} : m);
    setMeetings(u); await dbSet(SK.meetings, u); setMinutesTab(null);
    alert("Minutes saved.");
  }

  async function del(id) {
    const u = meetings.filter(m => m.id!==id);
    setMeetings(u); await dbSet(SK.meetings, u); setModal(null);
  }

  const myR = eid => rsvps.find(r => r.eventId===eid && r.memberId===user.id);
  async function rsvp(eid, status) {
    const ex = rsvps.find(r => r.eventId===eid && r.memberId===user.id);
    const u = ex
      ? rsvps.map(r => r.id===ex.id ? {...r,status} : r)
      : [...rsvps, {id:uid("R"),eventId:eid,memberId:user.id,status}];
    setRsvps(u); await dbSet(SK.rsvps, u);
  }
  const cnt = (eid,s) => rsvps.filter(r=>r.eventId===eid&&r.status===s).length;
  const orgName = id => members.find(m=>m.id===id)?.name||"Unknown";

  // ── AGENDA ITEM editor helpers ──
  function addAgendaItem(items, setItems) {
    setItems([...items, {id:uid("AI"),category:"General Business",notes:"",minutes:""}]);
  }
  function removeAgendaItem(items, setItems, id) {
    setItems(items.filter(i=>i.id!==id));
  }
  function moveItem(items, setItems, idx, dir) {
    const a = [...items];
    const b = idx + dir;
    if (b<0||b>=a.length) return;
    [a[idx],a[b]]=[a[b],a[idx]];
    setItems(a);
  }
  function updateItem(items, setItems, id, field, val) {
    setItems(items.map(i=>i.id===id?{...i,[field]:val}:i));

  // ── PDF EXPORT ──

  // ── AGENDA ITEM editor component (shared between add/edit form) ──
  function AgendaEditor({items, setItems}) {
    return (
      <div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <div style={{fontSize:11,fontFamily:"var(--font-m)",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.06em"}}>Agenda Items</div>
          <button onClick={()=>addAgendaItem(items,setItems)} style={{background:"var(--burg)",color:"#fff",border:"none",borderRadius:5,padding:"4px 10px",fontSize:11,fontFamily:"var(--font-m)",fontWeight:700,cursor:"pointer"}}>+ Add Item</button>
        </div>
        {items.map((item,idx)=>(
          <div key={item.id} style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:6,padding:"10px 12px",marginBottom:7}}>
            <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:item.notes!==undefined?6:0}}>
              <span style={{fontSize:11,fontFamily:"var(--font-m)",fontWeight:700,color:"var(--burg)",minWidth:20}}>{idx+1}.</span>
              <Select value={item.category} onChange={e=>updateItem(items,setItems,item.id,"category",e.target.value)} style={{flex:1,fontSize:12}}>
                {AGENDA_CATEGORIES.map(c=><option key={c}>{c}</option>)}
                {!AGENDA_CATEGORIES.includes(item.category)&&<option value={item.category}>{item.category}</option>}
              </Select>
              <button onClick={()=>moveItem(items,setItems,idx,-1)} disabled={idx===0} style={{background:"none",border:"1px solid var(--border)",borderRadius:4,padding:"3px 7px",cursor:"pointer",color:"var(--text3)",fontSize:11}}>↑</button>
              <button onClick={()=>moveItem(items,setItems,idx,1)} disabled={idx===items.length-1} style={{background:"none",border:"1px solid var(--border)",borderRadius:4,padding:"3px 7px",cursor:"pointer",color:"var(--text3)",fontSize:11}}>↓</button>
              <button onClick={()=>removeAgendaItem(items,setItems,item.id)} style={{background:"none",border:"none",color:"var(--text3)",cursor:"pointer",fontSize:16,padding:"0 4px",lineHeight:1}}>&times;</button>
            </div>
            <Input value={item.notes||""} onChange={e=>updateItem(items,setItems,item.id,"notes",e.target.value)} placeholder="Optional notes for this item…" style={{fontSize:11,marginLeft:26}}/>
          </div>
        ))}
        {items.length===0&&<div style={{color:"var(--text3)",fontSize:12,fontStyle:"italic",padding:"8px 0"}}>No agenda items yet. Click + Add Item.</div>}
      </div>
    );
  }

  // ── MINUTES EDITOR (per-item) ──
  if (minutesTab) {
    const meeting = meetings.find(m=>m.id===minutesTab);
    if (!meeting) { setMinutesTab(null); return null; }
    return (
      <div className="fade-up">
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:22}}>
          <button onClick={()=>setMinutesTab(null)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text3)",fontSize:13,fontFamily:"var(--font-m)",padding:0}}>← Back</button>
          <div style={{flex:1}}>
            <h2 style={{fontFamily:"var(--font-d)",fontSize:20,fontWeight:700,color:"var(--gold3)",margin:0}}>{meeting.title}</h2>
            <div style={{fontSize:12,color:"var(--text3)",marginTop:2}}>{meeting.date}{meeting.time?" · "+meeting.time:""} · {meeting.location}</div>
          </div>
          <Btn variant="ghost" onClick={()=>exportPDF({...meeting,agendaItems})}>↗ Export PDF</Btn>
          <Btn onClick={saveMinutes}>Save Minutes</Btn>
        </div>
        <div style={{marginBottom:16,padding:"10px 14px",background:"rgba(192,40,42,.06)",border:"1px solid rgba(192,40,42,.2)",borderRadius:6,fontSize:12,color:"var(--text2)"}}>
          Enter minutes for each agenda item below. Leave blank if not discussed.
        </div>
        {agendaItems.map((item,idx)=>(
          <Card key={item.id} style={{padding:16,marginBottom:12}}>
            <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:8}}>
              <span style={{fontSize:11,fontFamily:"var(--font-m)",fontWeight:700,color:"var(--burg)",minWidth:22}}>{idx+1}.</span>
              <span style={{fontFamily:"var(--font-d)",fontSize:15,fontWeight:600,color:"var(--text)"}}>{item.category}</span>
              {item.notes&&<span style={{fontSize:12,color:"var(--text3)",fontStyle:"italic"}}>— {item.notes}</span>}
            </div>
            <Textarea
              value={item.minutes||""}
              onChange={e=>setAgendaItems(agendaItems.map(i=>i.id===item.id?{...i,minutes:e.target.value}:i))}
              rows={3}
              placeholder={`Minutes for "${item.category}"…`}
              style={{marginLeft:30,fontSize:12.5}}
            />
          </Card>
        ))}
        {agendaItems.length===0&&<EmptyState icon="◆" text="No agenda items" sub="Edit the meeting to add agenda items first"/>}
        <Row gap={8} justify="flex-end" style={{marginTop:8}}>
          <Btn variant="ghost" onClick={()=>exportPDF({...meeting,agendaItems})}>↗ Export PDF</Btn>
          <Btn onClick={saveMinutes}>Save Minutes</Btn>
        </Row>
      </div>
    );
  }

  // ── VIEW MODAL ──
  function ViewModal({m}) {
    const items = migrateAgendaItems(m);
    const hasMinutes = items.some(i=>i.minutes&&i.minutes.trim());
    const myRsvp = myR(m.id);
    return (
      <Modal title={m.title} onClose={()=>setView(null)} wide>
        <Row gap={8} wrap style={{marginBottom:14}}>
          <Badge status={m.status}/><Badge status={m.type}/>
          <span style={{fontSize:12,color:"var(--text3)",fontFamily:"var(--font-m)"}}>{m.date}{m.time?" · "+m.time:""}</span>
          <span style={{fontSize:12,color:"var(--text3)"}}>📍 {m.location}</span>
        </Row>

        {/* Agenda + Minutes */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:10,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.08em",color:"var(--text3)",marginBottom:8}}>
            {hasMinutes?"Agenda & Minutes":"Agenda"}
          </div>
          {items.map((item,idx)=>(
            <div key={item.id} style={{marginBottom:10,paddingBottom:10,borderBottom:"1px solid var(--border)"}}>
              <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:hasMinutes&&item.minutes?5:0}}>
                <span style={{fontSize:11,fontFamily:"var(--font-m)",fontWeight:700,color:"var(--burg)",minWidth:20}}>{idx+1}.</span>
                <span style={{fontWeight:600,fontSize:13,color:"var(--text)"}}>{item.category}</span>
                {item.notes&&<span style={{fontSize:11,color:"var(--text3)",fontStyle:"italic"}}>— {item.notes}</span>}
              </div>
              {item.minutes&&item.minutes.trim()&&(
                <div style={{marginLeft:28,background:"var(--bg3)",borderLeft:"3px solid var(--burg)",padding:"8px 12px",borderRadius:"0 4px 4px 0",fontSize:12.5,color:"var(--text2)",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{item.minutes}</div>
              )}
              {hasMinutes&&(!item.minutes||!item.minutes.trim())&&(
                <div style={{marginLeft:28,fontSize:11,color:"var(--text3)",fontStyle:"italic"}}>No minutes recorded.</div>
              )}
            </div>
          ))}
          {items.length===0&&<div style={{color:"var(--text3)",fontSize:12,fontStyle:"italic"}}>No agenda items set.</div>}
        </div>

        {/* RSVPs */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:10,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.08em",color:"var(--text3)",marginBottom:6}}>RSVPs</div>
          <Row gap={6} wrap>
            {rsvps.filter(r=>r.eventId===m.id).map(r=>{
              const mb=members.find(me=>me.id===r.memberId);
              return mb?<span key={r.id} style={{fontSize:12,background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:4,padding:"2px 8px",color:r.status==="attending"?"var(--green)":r.status==="declined"?"var(--burg)":"var(--text3)"}}>{mb.name.split(" ")[0]} {r.status==="attending"?"✓":r.status==="declined"?"✗":"?"}</span>:null;
            })}
            {rsvps.filter(r=>r.eventId===m.id).length===0&&<span style={{color:"var(--text3)",fontSize:12,fontStyle:"italic"}}>No RSVPs yet.</span>}
          </Row>
        </div>

        <Row gap={8} justify="flex-end">
          <Btn variant="ghost" size="sm" onClick={()=>exportPDF(m)}>↗ Export PDF</Btn>
          {isAdmin&&<>
            <Btn variant="ghost" size="sm" onClick={()=>{setView(null);openMinutes(m);}}>✎ Enter Minutes</Btn>
            <Btn variant="ghost" size="sm" onClick={()=>{setView(null);openEdit(m);}}>Edit</Btn>
            <Btn variant="danger" size="sm" onClick={()=>setModal({confirm:{msg:"Delete this meeting?",fn:()=>del(m.id)}})}>Delete</Btn>
          </>}
        </Row>
        {m.status==="upcoming"&&(
          <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid var(--border)"}}>
            <div style={{fontSize:11,color:"var(--text3)",marginBottom:6,fontFamily:"var(--font-m)"}}>Your RSVP:</div>
            <Row gap={6}>
              {["attending","maybe","declined"].map(s=>(
                <Btn key={s} variant={myRsvp?.status===s?"primary":"ghost"} size="sm" onClick={()=>rsvp(m.id,s)}>
                  {s==="attending"?"✓ Attending":s==="maybe"?"? Maybe":"✗ Decline"}
                </Btn>
              ))}
            </Row>
          </div>
        )}
      </Modal>
    );
  }

  return (
    <div className="fade-up">
      <SectionHeader title="Meetings" subtitle={`${meetings.filter(m=>m.status==="upcoming").length} upcoming`}
        action={isAdmin&&<Btn onClick={openAdd}>+ Schedule Meeting</Btn>}/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14}}>
        {sorted.length===0&&<EmptyState icon="◆" text="No meetings scheduled"/>}
        {sorted.map(m=>{
          const r=myR(m.id);
          const items = migrateAgendaItems(m);
          const hasMinutes = items.some(i=>i.minutes&&i.minutes.trim());
          return (
            <Card key={m.id} className="hover-lift" style={{padding:18,cursor:"pointer",borderTop:`3px solid ${m.status==="upcoming"?"var(--burg)":"var(--border)"}`}} onClick={()=>setView(m)}>
              <Row justify="space-between" align="flex-start" style={{marginBottom:10}}>
                <div>
                  <div style={{fontFamily:"var(--font-d)",fontSize:16,fontWeight:600,color:"var(--text)",marginBottom:4}}>{m.title}</div>
                  <div style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--font-m)"}}>{m.date}{m.time?" · "+m.time:""}</div>
                </div>
                <Col gap={4} align="flex-end"><Badge status={m.status}/><Badge status={m.type}/></Col>
              </Row>
              <div style={{fontSize:12,color:"var(--text2)",marginBottom:8}}>📍 {m.location}</div>
              <div style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--font-m)",marginBottom:10}}>
                {items.length} agenda item{items.length!==1?"s":""}
                {hasMinutes&&<span style={{color:"var(--green)",marginLeft:8}}>✓ Minutes</span>}
              </div>
              <Row gap={12} style={{fontSize:10.5,color:"var(--text3)",fontFamily:"var(--font-m)",marginBottom:m.status==="upcoming"?10:0}}>
                <span>✓ {cnt(m.id,"attending")}</span><span>? {cnt(m.id,"maybe")}</span><span>✗ {cnt(m.id,"declined")}</span>
                <span>Org: {orgName(m.organiser).split(" ")[0]}</span>
              </Row>
              {m.status==="upcoming"&&(
                <Row gap={5} onClick={e=>e.stopPropagation()}>
                  {["attending","maybe","declined"].map(s=>(
                    <Btn key={s} variant={r?.status===s?"primary":"ghost"} size="sm"
                      onClick={e=>{e.stopPropagation();rsvp(m.id,s);}}>
                      {s==="attending"?"✓":s==="maybe"?"?":"✗"}
                    </Btn>
                  ))}
                  {isAdmin&&<Btn variant="ghost" size="sm" style={{marginLeft:"auto"}} onClick={e=>{e.stopPropagation();openMinutes(m);}}>✎ Minutes</Btn>}
                </Row>
              )}
            </Card>
          );
        })}
      </div>

      {view&&<ViewModal m={view}/>}

      {(modal==="add"||modal?.edit)&&(()=>{
        const items = form.agendaItems||[];
        const setItems = newItems => setForm({...form, agendaItems:newItems});
        return (
          <Modal title={modal==="add"?"Schedule Meeting":"Edit Meeting"} onClose={()=>setModal(null)} wide>
            <Field label="Title"><Input value={form.title||""} onChange={e=>setForm({...form,title:e.target.value})} placeholder="e.g. Monthly General Meeting"/></Field>
            <Row gap={12} wrap style={{justifyContent:"space-between"}}>
              <Field label="Date" half><Input type="date" value={form.date||today} onChange={e=>setForm({...form,date:e.target.value})}/></Field>
              <Field label="Time" half><Input type="time" value={form.time||"19:00"} onChange={e=>setForm({...form,time:e.target.value})}/></Field>
            </Row>
            <Field label="Location"><Input value={form.location||""} onChange={e=>setForm({...form,location:e.target.value})} placeholder="Venue name and address"/></Field>
            <Row gap={12} wrap style={{justifyContent:"space-between"}}>
              <Field label="Type" half>
                <Select value={form.type||"general"} onChange={e=>setForm({...form,type:e.target.value})}>
                  {["general","agm","committee","special","social"].map(t=><option key={t}>{t}</option>)}
                </Select>
              </Field>
              <Field label="Status" half>
                <Select value={form.status||"upcoming"} onChange={e=>setForm({...form,status:e.target.value})}>
                  {["upcoming","past","cancelled"].map(s=><option key={s}>{s}</option>)}
                </Select>
              </Field>
            </Row>
            <div style={{marginTop:4}}>
              <AgendaEditor items={items} setItems={setItems}/>
            </div>
            <Row gap={8} justify="flex-end" style={{marginTop:14}}>
              <Btn variant="ghost" onClick={()=>setModal(null)}>Cancel</Btn>
              <Btn onClick={handleSave}>Save Meeting</Btn>
            </Row>
          </Modal>
        );
      })()}

      {modal?.confirm&&<Confirm message={modal.confirm.msg} onConfirm={modal.confirm.fn} onCancel={()=>setModal(null)}/>}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// EVENTS
// ══════════════════════════════════════════════════════════════════════════════
function EventsSection({ user, members, events, setEvents, rsvps, setRsvps }) {
  const isAdmin=user.role==="admin";
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({});
  const [view,setView]=useState(null);
  const [rsvpForm,setRsvpForm]=useState({guests:0,dietary:"None",requirements:""});
  const [confirmation,setConfirmation]=useState(null);
  const sorted=[...events].sort((a,b)=>a.date.localeCompare(b.date));

  function openAdd(){setForm({title:"",date:today,time:"10:00",location:"",type:"show",status:"upcoming",description:"",organiser:user.id,maxAttendees:"",catering:false});setModal("add");}
  async function handleSave(){
    if(!form.title||!form.date)return alert("Title and date required.");
    const u=modal==="add"?[...events,{...form,id:uid("EV")}]:events.map(e=>e.id===form.id?{...form}:e);
    setEvents(u);await dbSet(SK.events,u);setModal(null);
  }
  async function del(id){const u=events.filter(e=>e.id!==id);setEvents(u);await dbSet(SK.events,u);setModal(null);setView(null);}

  const myR=eid=>rsvps.find(r=>r.eventId===eid&&r.memberId===user.id);

  function openRsvp(ev){
    const ex=rsvps.find(r=>r.eventId===ev.id&&r.memberId===user.id);
    setRsvpForm({guests:ex?.guests||0,dietary:ex?.dietary||"None",requirements:ex?.requirements||""});
    setModal({rsvp:ev});
  }

  async function submitRsvp(ev){
    const ex=rsvps.find(r=>r.eventId===ev.id&&r.memberId===user.id);
    const entry={id:ex?.id||uid("R"),eventId:ev.id,memberId:user.id,status:"attending",
      created:ex?.created||today,guests:Number(rsvpForm.guests)||0,
      dietary:rsvpForm.dietary||"None",requirements:rsvpForm.requirements||""};
    const u=ex?rsvps.map(r=>r.id===ex.id?entry:r):[...rsvps,entry];
    setRsvps(u);await dbSet(SK.rsvps,u);
    setModal(null);
    setConfirmation({ev,entry});
  }

  async function cancelRsvp(eid){
    const ex=rsvps.find(r=>r.eventId===eid&&r.memberId===user.id);
    if(!ex)return;
    const u=rsvps.map(r=>r.id===ex.id?{...r,status:"declined"}:r);
    setRsvps(u);await dbSet(SK.rsvps,u);
  }

  const att=eid=>rsvps.filter(r=>r.eventId===eid&&r.status==="attending");
  const attCount=eid=>att(eid).length;
  const orgName=id=>members.find(m=>m.id===id)?.name||"Unknown";
  const typeIcon={show:"🏆",drive:"🚗",social:"🥂",charity:"❤️",competition:"🏁"};

  const isFull=ev=>ev.maxAttendees>0&&attCount(ev.id)>=ev.maxAttendees;

  return (
    <div className="fade-up">
      <SectionHeader title="Events & Shows" subtitle={`${events.filter(e=>e.status==="upcoming").length} upcoming`}
        action={isAdmin&&<Btn onClick={openAdd}>+ Create Event</Btn>}/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:16}}>
        {sorted.length===0&&<EmptyState icon="★" text="No events scheduled"/>}
        {sorted.map(ev=>{
          const r=myR(ev.id); const a=attCount(ev.id);
          const going=r?.status==="attending";
          const full=isFull(ev);
          return (<Card key={ev.id} className="hover-lift" style={{overflow:"hidden",cursor:"pointer"}} onClick={()=>setView(ev)}>
            <div style={{height:5,background:ev.status==="upcoming"?"linear-gradient(90deg,var(--burg),var(--burg2))":"var(--border2)"}}/>
            <div style={{padding:18}}>
              <Row justify="space-between" align="flex-start" style={{marginBottom:8}}>
                <div style={{fontSize:24}}>{typeIcon[ev.type]||"★"}</div><Badge status={ev.status}/>
              </Row>
              <div style={{fontFamily:"var(--font-d)",fontSize:16,fontWeight:700,color:"var(--text)",marginBottom:5}}>{ev.title}</div>
              <div style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--font-m)",marginBottom:6}}>{ev.date} · {ev.time}</div>
              <div style={{fontSize:12,color:"var(--text2)",marginBottom:10}}>📍 {ev.location}</div>
              <div style={{fontSize:12,color:"var(--text2)",marginBottom:12,lineHeight:1.5}}>{ev.description?.slice(0,100)}{ev.description?.length>100?"…":""}</div>
              <Row justify="space-between" align="center" style={{marginBottom:12}}>
                <Row gap={6}><Badge status={ev.type}/>{ev.catering&&<span style={{fontSize:10,background:"#e8f5ee",color:"var(--green)",border:"1px solid var(--green2)",fontFamily:"var(--font-m)",padding:"2px 7px",borderRadius:3,textTransform:"uppercase",letterSpacing:"0.06em"}}>🍽 Catering</span>}</Row>
                <span style={{fontSize:11,color:full?"var(--red2)":"var(--text3)",fontFamily:"var(--font-m)",fontWeight:full?700:400}}>
                  {a}{ev.maxAttendees?`/${ev.maxAttendees}`:""} attending{full?" — FULL":""}
                </span>
              </Row>
              {ev.status==="upcoming"&&<div onClick={e=>e.stopPropagation()}>
                {going
                  ? <Row gap={8}>
                      <div style={{flex:1,background:"#e8f5ee",border:"1px solid var(--green2)",borderRadius:6,padding:"7px 12px",fontSize:13,color:"var(--green)",fontWeight:700,textAlign:"center"}}>✓ You're registered</div>
                      <Btn variant="ghost" size="sm" onClick={()=>openRsvp(ev)}>Edit</Btn>
                      <Btn variant="ghost" size="sm" onClick={()=>cancelRsvp(ev.id)}>Cancel</Btn>
                    </Row>
                  : <Btn style={{width:"100%"}} onClick={()=>openRsvp(ev)} disabled={full}>{full?"Event Full":"Register for this Event"}</Btn>
                }
              </div>}
            </div>
          </Card>);
        })}
      </div>

      {/* Event detail modal */}
      {view&&<Modal title={view.title} onClose={()=>setView(null)} wide>
        <Row gap={8} wrap style={{marginBottom:12}}><Badge status={view.status}/><Badge status={view.type}/></Row>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14,fontSize:13}}>
          {[["Date",view.date],["Time",view.time],["Location",view.location],["Organiser",orgName(view.organiser)],
            ["Capacity",view.maxAttendees?`${attCount(view.id)}/${view.maxAttendees}`:"Unlimited"],
            ["Catering",view.catering?"Yes — dietary info collected":"No"],
            ["Attending",attCount(view.id)]].map(([k,v])=>(
            <div key={k}><span style={{color:"var(--text3)",fontFamily:"var(--font-m)",fontSize:10,textTransform:"uppercase",letterSpacing:"0.08em"}}>{k}: </span><span style={{color:"var(--text2)",fontWeight:600}}>{v}</span></div>
          ))}
        </div>
        <div style={{background:"var(--bg3)",borderRadius:6,padding:14,fontSize:14,color:"var(--text2)",lineHeight:1.7,marginBottom:16}}>{view.description||"No description."}</div>

        {/* Attendee list */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>
            Registered Attendees ({attCount(view.id)})
          </div>
          {isAdmin
            ? <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead><tr style={{borderBottom:"2px solid var(--border)"}}>
                    {["Member","Guests","Dietary","Requirements","Registered"].map(h=>(
                      <th key={h} style={{textAlign:"left",padding:"6px 10px",fontFamily:"var(--font-m)",fontSize:10,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.06em"}}>{h}</th>
                    ))}
                  </tr></thead>
                  <tbody>
                    {att(view.id).map(r=>{
                      const m2=members.find(m=>m.id===r.memberId);
                      return m2?(<tr key={r.id} style={{borderBottom:"1px solid var(--border)"}}>
                        <td style={{padding:"8px 10px"}}><Row gap={8} align="center"><Avatar name={m2.name} size={22}/><span style={{fontWeight:600}}>{m2.name}</span></Row></td>
                        <td style={{padding:"8px 10px",color:"var(--text2)"}}>{r.guests>0?`+${r.guests}`:"-"}</td>
                        <td style={{padding:"8px 10px",color:"var(--text2)"}}>{r.dietary||"-"}</td>
                        <td style={{padding:"8px 10px",color:"var(--text2)",maxWidth:160}}>{r.requirements||"-"}</td>
                        <td style={{padding:"8px 10px",color:"var(--text3)",fontFamily:"var(--font-m)",fontSize:11}}>{r.created}</td>
                      </tr>):null;
                    })}
                    {attCount(view.id)===0&&<tr><td colSpan={5} style={{padding:"16px 10px",color:"var(--text3)",fontFamily:"var(--font-m)",fontSize:12,textAlign:"center"}}>No registrations yet</td></tr>}
                  </tbody>
                </table>
              </div>
            : <Row gap={6} wrap>
                {att(view.id).map(r=>{const m2=members.find(m=>m.id===r.memberId);return m2?<Row key={r.id} gap={6} align="center" style={{background:"var(--bg3)",borderRadius:6,padding:"5px 10px"}}><Avatar name={m2.name} size={20}/><span style={{fontSize:12,color:"var(--text2)"}}>{m2.name.split(" ")[0]}</span></Row>:null;})}
                {attCount(view.id)===0&&<span style={{color:"var(--text3)",fontSize:13,fontFamily:"var(--font-m)"}}>No registrations yet</span>}
              </Row>
          }
        </div>

        {view.status==="upcoming"&&<Row gap={8} justify="space-between" align="center">
          <div>
            {myR(view.id)?.status==="attending"
              ? <Row gap={8}><span style={{color:"var(--green)",fontWeight:700,fontSize:14}}>✓ You are registered</span>
                  <Btn variant="ghost" size="sm" onClick={()=>{setView(null);openRsvp(view);}}>Edit registration</Btn>
                  <Btn variant="ghost" size="sm" onClick={()=>cancelRsvp(view.id)}>Cancel</Btn>
                </Row>
              : <Btn onClick={()=>{setView(null);openRsvp(view);}} disabled={isFull(view)}>{isFull(view)?"Event Full":"Register for this Event"}</Btn>
            }
          </div>
          {isAdmin&&<Row gap={8}><Btn variant="danger" size="sm" onClick={()=>setModal({confirm:{msg:"Delete event?",fn:()=>del(view.id)}})}>Delete</Btn><Btn variant="ghost" size="sm" onClick={()=>{setView(null);setForm({...view});setModal({edit:view});}}>Edit</Btn></Row>}
        </Row>}
      </Modal>}

      {/* RSVP / Registration modal */}
      {modal?.rsvp&&<Modal title={`Register — ${modal.rsvp.title}`} onClose={()=>setModal(null)}>
        <div style={{background:"var(--bg3)",borderRadius:8,padding:14,marginBottom:20,fontSize:13,color:"var(--text2)"}}>
          <div style={{fontWeight:700,marginBottom:4,color:"var(--text)"}}>{modal.rsvp.date} · {modal.rsvp.time}</div>
          <div>📍 {modal.rsvp.location}</div>
        </div>
        <Field label="Registering as">
          <div style={{padding:"9px 12px",background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:6,fontSize:13,color:"var(--text2)"}}>{user.name} (Member #{user.memberNumber})</div>
        </Field>
        <Field label="Additional guests (not including yourself)">
          <Select value={rsvpForm.guests} onChange={e=>setRsvpForm({...rsvpForm,guests:e.target.value})}>
            {[0,1,2,3,4,5].map(n=><option key={n} value={n}>{n===0?"Just me":`+${n} guest${n>1?"s":""}`}</option>)}
          </Select>
        </Field>
        {modal.rsvp.catering&&<Field label="Dietary requirements">
          <Select value={rsvpForm.dietary} onChange={e=>setRsvpForm({...rsvpForm,dietary:e.target.value})}>
            {["None","Vegetarian","Vegan","Gluten free","Halal","Kosher","Nut allergy","Dairy free","Other"].map(d=><option key={d}>{d}</option>)}
          </Select>
        </Field>}
        <Field label="Special requirements or notes (optional)">
          <Textarea value={rsvpForm.requirements} onChange={e=>setRsvpForm({...rsvpForm,requirements:e.target.value})}
            placeholder="e.g. wheelchair access needed, bringing classic car for display..." style={{minHeight:80}}/>
        </Field>
        <Row gap={10} justify="flex-end">
          <Btn variant="ghost" onClick={()=>setModal(null)}>Cancel</Btn>
          <Btn onClick={()=>submitRsvp(modal.rsvp)}>Confirm Registration</Btn>
        </Row>
      </Modal>}

      {/* Printable confirmation */}
      {confirmation&&<Modal title="Registration Confirmed!" onClose={()=>setConfirmation(null)} wide>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:48,marginBottom:8}}>✅</div>
          <div style={{fontFamily:"var(--font-d)",fontSize:22,fontWeight:700,color:"var(--green)",marginBottom:4}}>You're registered!</div>
          <div style={{fontSize:14,color:"var(--text3)"}}>Keep this confirmation for your records</div>
        </div>
        <div id="print-confirmation" style={{background:"var(--bg3)",border:"2px solid var(--burg)",borderRadius:10,padding:24,marginBottom:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16,paddingBottom:16,borderBottom:"1px solid var(--border)"}}>
            <div>
              <div style={{fontFamily:"var(--font-m)",fontSize:10,color:"var(--burg)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4}}>Event Registration Confirmation</div>
              <div style={{fontFamily:"var(--font-d)",fontSize:20,fontWeight:700,color:"var(--text)",lineHeight:1.2}}>{confirmation.ev.title}</div>
            </div>
            <div style={{fontFamily:"var(--font-m)",fontSize:11,color:"var(--text3)",textAlign:"right"}}>
              <div>Ref: {confirmation.entry.id}</div>
              <div>{new Date().toLocaleDateString("en-AU")}</div>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,fontSize:13}}>
            {[
              ["Member",`${user.name} (#${user.memberNumber})`],
              ["Date & Time",`${confirmation.ev.date} at ${confirmation.ev.time}`],
              ["Location",confirmation.ev.location],
              ["Guests",confirmation.entry.guests>0?`+${confirmation.entry.guests} guest${confirmation.entry.guests>1?"s":""}`:"None"],
              ...(confirmation.ev.catering?[["Dietary",confirmation.entry.dietary||"None"]]:[[]]),
              ["Special Requirements",confirmation.entry.requirements||"None"],
            ].map(([k,v])=>(
              <div key={k}>
                <div style={{fontFamily:"var(--font-m)",fontSize:10,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:3}}>{k}</div>
                <div style={{color:"var(--text)",fontWeight:600}}>{v}</div>
              </div>
            ))}
          </div>
          <div style={{marginTop:16,paddingTop:16,borderTop:"1px solid var(--border)",fontSize:12,color:"var(--text3)",fontFamily:"var(--font-m)"}}>
            Rover Car Club of Australia · secretary@rcca.com.au · PO Box 6049 Wantirna VIC 3152
          </div>
        </div>
        <Row gap={10} justify="center">
          <Btn onClick={()=>window.print()}>🖨️ Print Confirmation</Btn>
          <Btn variant="ghost" onClick={()=>setConfirmation(null)}>Close</Btn>
        </Row>
      </Modal>}

      {/* Create/Edit event modal */}
      {(modal==="add"||modal?.edit)&&<Modal title={modal==="add"?"Create Event":"Edit Event"} onClose={()=>setModal(null)} wide>
        <Field label="Event Title"><Input value={form.title||""} onChange={e=>setForm({...form,title:e.target.value})}/></Field>
        <Row gap={12} wrap style={{justifyContent:"space-between"}}><Field label="Date" half><Input type="date" value={form.date||""} onChange={e=>setForm({...form,date:e.target.value})}/></Field><Field label="Time" half><Input type="time" value={form.time||""} onChange={e=>setForm({...form,time:e.target.value})}/></Field></Row>
        <Field label="Location"><Input value={form.location||""} onChange={e=>setForm({...form,location:e.target.value})}/></Field>
        <Row gap={12} wrap style={{justifyContent:"space-between"}}>
          <Field label="Type" half><Select value={form.type||"show"} onChange={e=>setForm({...form,type:e.target.value})}>{["show","drive","social","charity","competition"].map(t=><option key={t}>{t}</option>)}</Select></Field>
          <Field label="Max Attendees" half><Input type="number" value={form.maxAttendees||""} onChange={e=>setForm({...form,maxAttendees:Number(e.target.value)||""})} placeholder="0 = unlimited"/></Field>
        </Row>
        <Row gap={12} wrap style={{justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",fontSize:14,color:"var(--text2)",fontWeight:600}}>
            <input type="checkbox" checked={!!form.catering} onChange={e=>setForm({...form,catering:e.target.checked})}
              style={{width:18,height:18,cursor:"pointer",accentColor:"var(--burg)"}}/>
            Catering provided at this event
          </label>
          {form.catering&&<div style={{fontSize:12,color:"var(--text3)",fontFamily:"var(--font-m)"}}>Dietary questions will appear in registration</div>}
        </Row>
        <Field label="Status"><Select value={form.status||"upcoming"} onChange={e=>setForm({...form,status:e.target.value})}>{["upcoming","past","cancelled"].map(s=><option key={s}>{s}</option>)}</Select></Field>
        <Field label="Description"><Textarea value={form.description||""} onChange={e=>setForm({...form,description:e.target.value})} style={{minHeight:100}}/></Field>
        <Row gap={8} justify="flex-end"><Btn variant="ghost" onClick={()=>setModal(null)}>Cancel</Btn><Btn onClick={handleSave}>Save Event</Btn></Row>
      </Modal>}
      {modal?.confirm&&<Confirm message={modal.confirm.msg} onConfirm={modal.confirm.fn} onCancel={()=>setModal(null)}/>}
    </div>
  );
}
