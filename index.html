// MEMBERSHIP APPLICATION FORM (public)
// ══════════════════════════════════════════════════════════════════════════════
function MembershipApplicationForm({ onBack }) {
  const BLANK = {
    firstName:"", lastName:"", email:"", phone:"", dob:"",
    address:"", suburb:"", state:"VIC", postcode:"", country:"Australia",
    memberType:"City Membership",
    vehicleMake:"", vehicleModel:"", vehicleYear:"", vehicleNotes:"",
    howHeard:"", comments:"",
    agreeRules:false, agreeAge:false,
  };
  const [form, setForm] = useState(BLANK);
  const [submitted, setSubmitted] = useState(false);
  const [refNum, setRefNum] = useState("");
  const [errors, setErrors] = useState({});

  function validate() {
    const e = {};
    if(!form.firstName.trim()) e.firstName = "Required";
    if(!form.lastName.trim()) e.lastName = "Required";
    if(!form.email.trim()||!/\S+@\S+\.\S+/.test(form.email)) e.email = "Valid email required";
    if(!form.phone.trim()) e.phone = "Required";
    if(!form.address.trim()) e.address = "Required";
    if(!form.suburb.trim()) e.suburb = "Required";
    if(!form.postcode.trim()) e.postcode = "Required";
    if(!form.agreeRules) e.agreeRules = "You must agree to the club rules";
    if(!form.agreeAge) e.agreeAge = "You must confirm you are 18 or over";
    return e;
  }

  async function handleSubmit() {
    const e = validate();
    if(Object.keys(e).length) { setErrors(e); return; }
    const ref = "APP-" + Date.now().toString(36).toUpperCase();
    const application = {
      id: ref, status:"pending", submitted: new Date().toISOString().split("T")[0],
      firstName:form.firstName, lastName:form.lastName,
      name:`${form.firstName} ${form.lastName}`,
      email:form.email, phone:form.phone, dob:form.dob,
      address:`${form.address}, ${form.suburb} ${form.state} ${form.postcode} ${form.country}`,
      memberType:form.memberType,
      vehicle: form.vehicleMake ? `${form.vehicleYear} ${form.vehicleMake} ${form.vehicleModel}`.trim() : "",
      vehicleNotes:form.vehicleNotes,
      howHeard:form.howHeard, comments:form.comments,
    };
    const existing = await window.storage.get("rcca:applications").catch(()=>null);
    const apps = existing ? JSON.parse(existing.value) : [];
    apps.push(application);
    await window.storage.set("rcca:applications", JSON.stringify(apps));
    setRefNum(ref);
    setSubmitted(true);
  }

  function f(key, val) { setForm(p=>({...p,[key]:val})); setErrors(p=>({...p,[key]:undefined})); }

  const inputSt = (k) => ({
    width:"100%", background:"#ffffff", border:`1px solid ${errors[k]?"#c0282a":"var(--border2)"}`,
    borderRadius:6, padding:"10px 12px", color:"var(--text)", fontFamily:"var(--font-b)",
    fontSize:14, outline:"none",
  });
  const labelSt = { fontSize:13, fontWeight:600, color:"var(--text2)", marginBottom:5, display:"block" };
  const errSt = { fontSize:11, color:"#c0282a", marginTop:3, fontFamily:"var(--font-m)" };
  const sectionSt = { background:"#ffffff", border:"1px solid var(--border)", borderRadius:10, padding:24, marginBottom:20 };
  const headingSt = { fontFamily:"var(--font-d)", fontSize:18, fontWeight:700, color:"var(--text)", marginBottom:18, paddingBottom:10, borderBottom:"1px solid var(--border)" };

  if(submitted) return (
    <div style={{maxWidth:620,margin:"60px auto",padding:"0 24px"}}>
      <div style={{background:"#ffffff",border:"2px solid var(--burg)",borderRadius:12,padding:40,textAlign:"center",boxShadow:"0 4px 24px rgba(0,0,0,.08)"}}>
        <div style={{fontSize:56,marginBottom:16}}>✅</div>
        <h2 style={{fontFamily:"var(--font-d)",fontSize:26,fontWeight:700,color:"var(--text)",marginBottom:8}}>Application Submitted!</h2>
        <div style={{fontFamily:"var(--font-m)",fontSize:13,color:"var(--burg)",fontWeight:700,marginBottom:16}}>Reference: {refNum}</div>
        <p style={{fontSize:14,color:"var(--text2)",lineHeight:1.7,marginBottom:24}}>
          Thank you for applying to join the Rover Car Club of Australia. Your application has been received and will be reviewed by our committee. We will be in touch at <strong>{form.email}</strong> within 5–7 business days.
        </p>
        <div style={{background:"var(--bg3)",borderRadius:8,padding:16,fontSize:13,color:"var(--text3)",marginBottom:24,textAlign:"left"}}>
          <div style={{fontWeight:700,color:"var(--text)",marginBottom:6}}>What happens next?</div>
          <div style={{marginBottom:4}}>1. Committee reviews your application</div>
          <div style={{marginBottom:4}}>2. You will receive an approval email with payment details</div>
          <div style={{marginBottom:4}}>3. Once payment is received, your membership is activated</div>
          <div>4. You will receive your member number and login details</div>
        </div>
        <div style={{fontSize:12,color:"var(--text4)"}}>Questions? Email <span style={{color:"var(--burg)"}}>membership@rcca.com.au</span></div>
        <button onClick={onBack} style={{marginTop:20,background:"none",border:"1px solid var(--border2)",borderRadius:6,padding:"10px 24px",color:"var(--text3)",fontFamily:"var(--font-b)",fontSize:13,cursor:"pointer"}}>← Back to Membership</button>
      </div>
    </div>
  );

  return (
    <div style={{maxWidth:700,margin:"0 auto",padding:"48px 24px"}}>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>

            <input style={inputSt("email")} type="email" value={form.email} onChange={e=>f("email",e.target.value)} placeholder="your@email.com"/>

          <div>

        </div>
        <div style={{marginBottom:16}}>
          <label style={labelSt}>Date of Birth</label>
          <input style={{...inputSt("dob"),width:"50%"}} type="date" value={form.dob} onChange={e=>f("dob",e.target.value)}/>
        </div>
        <div style={{marginBottom:16}}>
          <label style={labelSt}>Street Address *</label>
          <input style={inputSt("address")} value={form.address} onChange={e=>f("address",e.target.value)} placeholder="123 Example Street"/>
          {errors.address&&<div style={errSt}>{errors.address}</div>}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:16,marginBottom:16}}>
          <div>
            <label style={labelSt}>Suburb *</label>
            <input style={inputSt("suburb")} value={form.suburb} onChange={e=>f("suburb",e.target.value)}/>

          </div>
          <div>
            <label style={labelSt}>State</label>
            <select style={inputSt("state")} value={form.state} onChange={e=>f("state",e.target.value)}>

          <div>
            <label style={labelSt}>Postcode *</label>
            <input style={inputSt("postcode")} value={form.postcode} onChange={e=>f("postcode",e.target.value)} maxLength={4}/>
            {errors.postcode&&<div style={errSt}>{errors.postcode}</div>}
          </div>
        </div>
      </div>

      {/* Membership Type */}
      <div style={sectionSt}>
        <div style={headingSt}>Membership Type</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          {[
            {id:"City Membership",price:"A$54/year",desc:"Melbourne metropolitan area"},
            {id:"Country & Interstate",price:"A$46/year",desc:"Outside Melbourne metro"},
          ].map(m=>(
            <label key={m.id} style={{display:"flex",gap:12,padding:16,border:`2px solid ${form.memberType===m.id?"var(--burg)":"var(--border)"}`,borderRadius:8,cursor:"pointer",background:form.memberType===m.id?"#fff5f5":"#ffffff"}}>
              <input type="radio" name="memberType" value={m.id} checked={form.memberType===m.id} onChange={e=>f("memberType",e.target.value)} style={{marginTop:2,accentColor:"var(--burg)"}}/>
              <div>
                <div style={{fontWeight:700,fontSize:14,color:"var(--text)"}}>{m.id}</div>
                <div style={{fontSize:13,color:"var(--burg)",fontWeight:600}}>{m.price}</div>
                <div style={{fontSize:12,color:"var(--text3)"}}>{m.desc}</div>
              </div>
            </label>
          ))}
        </div>
        <div style={{marginTop:12,fontSize:12,color:"var(--text3)",padding:"10px 14px",background:"var(--bg3)",borderRadius:6}}>
          A once-only joining fee of <strong>A$20</strong> applies. Payment details will be provided after approval.
        </div>
      </div>

      {/* Vehicle Details (optional) */}
      <div style={sectionSt}>
        <div style={headingSt}>Vehicle Details <span style={{fontSize:13,fontWeight:400,color:"var(--text3)"}}>— optional</span></div>
        <p style={{fontSize:13,color:"var(--text3)",marginBottom:16}}>Tell us about your Rover(s). You can add more vehicles later through the members portal.</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16,marginBottom:16}}>
          <div>
            <label style={labelSt}>Make</label>
            <input style={inputSt()} value={form.vehicleMake} onChange={e=>f("vehicleMake",e.target.value)} placeholder="e.g. Rover"/>
          </div>
          <div>
            <label style={labelSt}>Model</label>
            <input style={inputSt()} value={form.vehicleModel} onChange={e=>f("vehicleModel",e.target.value)} placeholder="e.g. P6 3500S"/>
          </div>
          <div>
            <label style={labelSt}>Year</label>
            <input style={inputSt()} value={form.vehicleYear} onChange={e=>f("vehicleYear",e.target.value)} placeholder="e.g. 1972" maxLength={4}/>
          </div>
        </div>
        <div>
          <label style={labelSt}>Notes about your vehicle(s)</label>
          <textarea style={{...inputSt(),minHeight:80,resize:"vertical"}} value={form.vehicleNotes} onChange={e=>f("vehicleNotes",e.target.value)} placeholder="e.g. Also have a Land Rover Series II under restoration..."/>
        </div>
      </div>

      {/* How did you hear */}
      <div style={sectionSt}>
        <div style={headingSt}>A Little More</div>
        <div style={{marginBottom:16}}>
          <label style={labelSt}>How did you hear about the club?</label>
          <select style={inputSt("howHeard")} value={form.howHeard} onChange={e=>f("howHeard",e.target.value)}>
            <option value="">— Please select —</option>
            {["Existing member","National Rove","Internet search","Facebook","Club website","Rover forum / online community","Car show or event","Magazine","Word of mouth","Other"].map(o=><option key={o}>{o}</option>)}
          </select>
        </div>
        <div>
          <label style={labelSt}>Any comments or questions for the committee?</label>
          <textarea style={{...inputSt(),minHeight:80,resize:"vertical"}} value={form.comments} onChange={e=>f("comments",e.target.value)} placeholder="Optional — anything you'd like us to know"/>
        </div>
      </div>

      {/* Agreement */}
      <div style={sectionSt}>
        <div style={headingSt}>Declaration</div>
        <div style={{marginBottom:14}}>
          <label style={{display:"flex",gap:12,cursor:"pointer",alignItems:"flex-start"}}>
            <input type="checkbox" checked={form.agreeRules} onChange={e=>f("agreeRules",e.target.checked)} style={{marginTop:2,width:18,height:18,flexShrink:0,accentColor:"var(--burg)"}}/>
            <span style={{fontSize:13.5,color:"var(--text2)",lineHeight:1.6}}>I agree to abide by the rules and code of conduct of the Rover Car Club of Australia, and understand that membership is subject to committee approval. *</span>
          </label>
          {errors.agreeRules&&<div style={{...errSt,marginLeft:30}}>{errors.agreeRules}</div>}
        </div>
        <div>
          <label style={{display:"flex",gap:12,cursor:"pointer",alignItems:"flex-start"}}>
            <input type="checkbox" checked={form.agreeAge} onChange={e=>f("agreeAge",e.target.checked)} style={{marginTop:2,width:18,height:18,flexShrink:0,accentColor:"var(--burg)"}}/>
            <span style={{fontSize:13.5,color:"var(--text2)",lineHeight:1.6}}>I confirm that I am 18 years of age or older. *</span>
          </label>
          {errors.agreeAge&&<div style={{...errSt,marginLeft:30}}>{errors.agreeAge}</div>}
        </div>
      </div>

      {Object.keys(errors).length>0&&<div style={{background:"#fdd8d8",border:"1px solid #f0a8a8",borderRadius:8,padding:14,marginBottom:20,fontSize:13,color:"#8f1a1a"}}>
        Please fix the errors above before submitting.
      </div>}

      <button onClick={handleSubmit} style={{width:"100%",background:"var(--burg)",border:"none",borderRadius:8,padding:"14px",color:"#ffffff",fontFamily:"var(--font-b)",fontSize:16,fontWeight:700,cursor:"pointer",marginBottom:12}}>
        Submit Application →
      </button>
      <div style={{fontSize:12,color:"var(--text4)",textAlign:"center"}}>Your information is kept confidential and used only for club administration purposes.</div>
    </div>
  );
}

// APPLICATIONS ADMIN SECTION (portal)
// ══════════════════════════════════════════════════════════════════════════════
function ApplicationsSection({ applications, setApplications, members, setMembers, dues, setDues }) {
  const [view, setView] = useState(null);
  const [declineNote, setDeclineNote] = useState("");
  const pending = (applications||[]).filter(a=>a.status==="pending");
  const processed = (applications||[]).filter(a=>a.status!=="pending");

  async function approve(app) {
    const mNum = String(members.length+1).padStart(3,"0");
    const newMember = {
      id: uid("M"), name:app.name, email:app.email, phone:app.phone,
      joined:today, status:"active", memberType:app.memberType,
      role:"member", bio:"", state:app.address?.split(" ").slice(-3,-2)[0]||"",
      memberNumber:mNum, password:"changeme123",
      avatar: app.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase(),
    };
    const newDue = { id:uid("D"), memberId:newMember.id, year:yr, paid:false,
      amount:app.memberType==="City Membership"?54:46, type:app.memberType, dueDate:`${yr}-07-01` };
    const updatedApps = applications.map(a=>a.id===app.id?{...a,status:"approved",approvedDate:today}:a);
    const updatedMembers = [...members, newMember];
    const updatedDues = [...dues, newDue];
    setApplications(updatedApps); setMembers(updatedMembers); setDues(updatedDues);
    await dbSet(SK.applications, updatedApps);
    await dbSet(SK.members, updatedMembers);
    await dbSet(SK.dues, updatedDues);
    setView(null);
    alert(`✅ ${app.name} approved! Member #${mNum} created.
Temporary password: changeme123
Please notify them at ${app.email}`);
  }

  async function decline(app) {
    const updatedApps = applications.map(a=>a.id===app.id?{...a,status:"declined",declineNote,declinedDate:today}:a);
    setApplications(updatedApps);
    await dbSet(SK.applications, updatedApps);
    setView(null); setDeclineNote("");
    alert(`Application from ${app.name} has been declined.`);
  }

  const inputSt = { width:"100%",background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:6,padding:"8px 12px",color:"var(--text)",fontFamily:"var(--font-b)",fontSize:13,outline:"none" };

  return (
    <div className="fade-up">
      <SectionHeader title="Membership Applications"
        subtitle={`${pending.length} pending review`}/>

      {pending.length===0&&processed.length===0&&(
        <div style={{textAlign:"center",padding:"60px 0",color:"var(--text3)",fontFamily:"var(--font-m)",fontSize:13}}>No applications received yet.</div>
      )}

      {pending.length>0&&(
        <div style={{marginBottom:32}}>
          <div style={{fontFamily:"var(--font-m)",fontSize:11,color:"var(--burg)",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:14}}>Pending Review ({pending.length})</div>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {pending.map(app=>(
              <div key={app.id} style={{background:"#ffffff",border:"2px solid #f0d080",borderRadius:10,padding:20,cursor:"pointer"}} onClick={()=>setView(app)}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style={{fontFamily:"var(--font-d)",fontSize:17,fontWeight:700,color:"var(--text)",marginBottom:4}}>{app.name}</div>
                    <div style={{fontSize:13,color:"var(--text3)",marginBottom:4}}>{app.email} · {app.phone}</div>
                    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                      <span style={{fontSize:11,background:"#fdecd0",color:"#7a4010",border:"1px solid #f0c890",fontFamily:"var(--font-m)",padding:"2px 8px",borderRadius:3,fontWeight:700}}>{app.memberType}</span>
                      {app.vehicle&&<span style={{fontSize:11,background:"#d0e8fc",color:"#1a3a6a",border:"1px solid #90c0f0",fontFamily:"var(--font-m)",padding:"2px 8px",borderRadius:3}}>{app.vehicle}</span>}
                    </div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontFamily:"var(--font-m)",fontSize:10,color:"var(--text4)"}}>Submitted</div>
                    <div style={{fontFamily:"var(--font-m)",fontSize:12,color:"var(--text3)"}}>{app.submitted}</div>
                    <div style={{marginTop:8,fontSize:11,color:"var(--burg)",fontWeight:600}}>Click to review →</div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {processed.length>0&&(
        <div>
          <div style={{fontFamily:"var(--font-m)",fontSize:11,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:14}}>Processed ({processed.length})</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {[...processed].reverse().map(app=>(
              <div key={app.id} style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:8,padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}} onClick={()=>setView(app)}>
                <div>
                  <span style={{fontWeight:600,color:"var(--text)",marginRight:12}}>{app.name}</span>
                  <span style={{fontSize:12,color:"var(--text3)"}}>{app.email}</span>
                </div>
                <div style={{display:"flex",gap:10,alignItems:"center"}}>
                  <span style={{fontSize:11,fontFamily:"var(--font-m)",color:"var(--text4)"}}>{app.submitted}</span>
                  <span style={{fontSize:10,fontFamily:"var(--font-m)",fontWeight:700,padding:"2px 8px",borderRadius:3,
                    background:app.status==="approved"?"#d4f0e0":"#fdd8d8",
                    color:app.status==="approved"?"#1a6040":"#8f1a1a",
                    border:`1px solid ${app.status==="approved"?"#a0d8b8":"#f0a8a8"}`
                  }}>{app.status.toUpperCase()}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {view&&(
        <Modal title={`Application — ${view.name}`} onClose={()=>{setView(null);setDeclineNote("");}} wide>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:18,fontSize:13}}>
            {[
              ["Full Name",view.name], ["Email",view.email], ["Phone",view.phone],
              ["Address",view.address], ["Membership Type",view.memberType],
              ["Vehicle",view.vehicle||"Not provided"],
              ["How they heard",view.howHeard||"Not specified"],
              ["Submitted",view.submitted], ["Ref",view.id],
            ].map(([k,v])=>(
              <div key={k}>
                <div style={{fontFamily:"var(--font-m)",fontSize:10,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:2}}>{k}</div>
                <div style={{color:"var(--text)",fontWeight:600}}>{v}</div>
              </div>
            ))}
          </div>
          {view.vehicleNotes&&<div style={{background:"var(--bg3)",borderRadius:6,padding:12,fontSize:13,color:"var(--text2)",marginBottom:14}}><strong>Vehicle notes:</strong> {view.vehicleNotes}</div>}
          {view.comments&&<div style={{background:"var(--bg3)",borderRadius:6,padding:12,fontSize:13,color:"var(--text2)",marginBottom:14}}><strong>Comments:</strong> {view.comments}</div>}
          {view.status==="pending"&&(
            <div>
              <div style={{borderTop:"1px solid var(--border)",paddingTop:16,marginBottom:14}}>
                <div style={{fontFamily:"var(--font-m)",fontSize:11,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Decline note (optional)</div>
                <textarea value={declineNote} onChange={e=>setDeclineNote(e.target.value)}
                  style={{...inputSt,minHeight:70}} placeholder="Reason for declining (will be recorded for admin purposes)"/>
              </div>
              <Row gap={10} justify="flex-end">
                <Btn variant="danger" onClick={()=>decline(view)}>✗ Decline</Btn>
                <Btn onClick={()=>approve(view)}>✓ Approve & Create Member</Btn>
              </Row>
            </div>
          )}
          {view.status==="approved"&&<div style={{background:"#d4f0e0",border:"1px solid #a0d8b8",borderRadius:8,padding:12,fontSize:13,color:"#1a6040",fontWeight:600}}>✓ Approved on {view.approvedDate}</div>}
          {view.status==="declined"&&<div style={{background:"#fdd8d8",border:"1px solid #f0a8a8",borderRadius:8,padding:12,fontSize:13,color:"#8f1a1a"}}>✗ Declined on {view.declinedDate}{view.declineNote&&` — ${view.declineNote}`}</div>}
        </Modal>
      )}
    </div>
  );
}

function BulkImportSection({ members, setMembers, cars, setCars, dues, setDues }) {
  var tState=useState("members"); var tab=tState[0]; var setTab=tState[1];
  var sState=useState("upload"); var stage=sState[0]; var setStage=sState[1];
  var rState=useState([]); var rows=rState[0]; var setRows=rState[1];
  var mState=useState("add"); var mergeMode=mState[0]; var setMergeMode=mState[1];
  var iState=useState(false); var importing=iState[0]; var setImporting=iState[1];
  var resState=useState(null); var result=resState[0]; var setResult=resState[1];
  var fileRef=React.useRef();

  function downloadTemplate(type) {
    var mCols="name,email,phone,memberType,status,state,joined,memberNumber,password";
    var vCols="make,model,year,colour,reg,chassis,status,notes,ownerEmail,registered";
    var mEx='"Jane Smith","jane@example.com","0412345678","City Membership","active","VIC","2024-01-15","005","changeme123"';
    var vEx='"Rover","P6 3500S","1972","Zircon Blue","ABC-123","35D2BH321C","active","Notes","jane@example.com","2024-03-01"';
    var csv=(type==="members"?mCols:vCols)+String.fromCharCode(10)+(type==="members"?mEx:vEx);
    var a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
    a.download="rcca_"+type+"_template.csv";
    a.click();
  }

  async function handleFile(e) {
    var file=e.target.files[0];if(!file)return;
    setStage("upload");setRows([]);setResult(null);
    var ext=file.name.split(".").pop().toLowerCase();
    var rawRows=[];
    if(ext==="csv"){
      var text=await file.text();
      var lines=text.trim().split(/\n/);
      var headers=lines[0].split(",").map(function(h){return h.trim().replace(/"/g,"").toLowerCase();});
      rawRows=lines.slice(1).filter(function(l){return l.trim();}).map(function(line){
        var vals=[];var cur="";var inQ=false;
        for(var i=0;i<line.length;i++){
          var ch=line[i];
          if(ch==='"'){inQ=!inQ;}
          else if(ch===","&&!inQ){vals.push(cur);cur="";}
          else{cur+=ch;}
        }
        vals.push(cur);
        var obj={};
        headers.forEach(function(h,i){obj[h]=(vals[i]||"").trim();});
        return obj;
      });
    } else if(ext==="xlsx"||ext==="xls"){
      if(!window.XLSX){
        await new Promise(function(res,rej){
          var s=document.createElement("script");
          s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
          s.onload=res;s.onerror=rej;
          document.head.appendChild(s);
        });
      }
      var buf=await file.arrayBuffer();
      var wb=window.XLSX.read(buf,{type:"array"});
      var ws=wb.Sheets[wb.SheetNames[0]];
      rawRows=window.XLSX.utils.sheet_to_json(ws,{defval:""}).map(function(row){
        var obj={};
        Object.keys(row).forEach(function(k){obj[k.toLowerCase().trim()]=String(row[k]).trim();});
        return obj;
      });
    } else {
      alert("Please upload .csv, .xlsx or .xls");return;
    }
    if(rawRows.length===0){alert("No data rows found.");return;}
    var required=tab==="members"?["name","email"]:["make","model","year"];
    var validated=rawRows.map(function(row,i){
      var errs=[];
      required.forEach(function(f){if(!row[f])errs.push("Missing: "+f);});
      if(tab==="members"&&row.email){
        if(members.find(function(m){return m.email.toLowerCase()===row.email.toLowerCase();}))errs.push("Email exists");
      }
      if(tab==="vehicles"&&row.reg){
        if(cars.find(function(c){return c.reg&&c.reg.toLowerCase()===row.reg.toLowerCase();}))errs.push("Rego exists");
      }
      return Object.assign({},row,{_row:i+2,_errs:errs,_skip:errs.length>0});
    });
    setRows(validated);setStage("preview");
    if(fileRef.current)fileRef.current.value="";
  }

  async function runImport() {
    setImporting(true);
    var good=rows.filter(function(r){return !r._skip;});
    if(tab==="members"){
      var newM=good.map(function(row,i){
        return {id:uid("M"),name:row.name,email:row.email,phone:row.phone||"",
          memberType:row.membertype||"City Membership",status:row.status||"active",
          state:row.state||"VIC",joined:row.joined||today,
          memberNumber:row.membernumber||String(members.length+i+1).padStart(3,"0"),
          password:row.password||"changeme123",bio:"",role:"member",
          avatar:(row.name||"M").split(" ").map(function(w){return w[0]||"";}).join("").slice(0,2).toUpperCase()};
      });
      var newD=newM.map(function(m){return {id:uid("D"),memberId:m.id,year:yr,amount:54,paid:false,paidDate:null,method:null};});
      var um=mergeMode==="replace"?newM:members.concat(newM);
      var ud=mergeMode==="replace"?newD:dues.concat(newD);
      setMembers(um);await dbSet(SK.members,um);
      setDues(ud);await dbSet(SK.dues,ud);
    } else {
      var newC=good.map(function(row){
        var email=(row.owneremail||"").toLowerCase();
        var owner=members.find(function(m){return m.email&&m.email.toLowerCase()===email;});
        return {id:uid("C"),make:row.make||"Rover",model:row.model||"",
          year:Number(row.year)||new Date().getFullYear(),colour:row.colour||"",
          reg:row.reg||"",chassis:row.chassis||"",status:row.status||"active",
          notes:row.notes||"",ownerId:owner?owner.id:"",registered:row.registered||today,photos:[]};
      });
      var uc=mergeMode==="replace"?newC:cars.concat(newC);
      setCars(uc);await dbSet(SK.cars,uc);
    }
    setResult({added:good.length,skipped:rows.filter(function(r){return r._skip;}).length});
    setStage("done");setImporting(false);
  }

  function reset(){setStage("upload");setRows([]);setResult(null);}

  var pCols=tab==="members"?["name","email","membertype","state"]:["make","model","year","reg"];

  return (
    <div className="fade-up">
      <SectionHeader title="Bulk Import" subtitle="Import members or vehicles from Excel or CSV"/>
      <Row gap={0} style={{marginBottom:24,background:"var(--bg3)",borderRadius:8,padding:4,width:"fit-content"}}>
        {["members","vehicles"].map(function(t){
          return (
            <button key={t} onClick={function(){setTab(t);reset();}} style={{background:tab===t?"#fff":"none",border:"none",borderRadius:6,padding:"8px 20px",fontFamily:"var(--font-b)",fontSize:13,fontWeight:tab===t?700:400,color:tab===t?"var(--burg)":"var(--text3)",cursor:"pointer"}}>
              {t==="members"?"Members":"Vehicles"}
            </button>
          );
        })}
      </Row>

      {stage==="upload"&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:20}}>
          <Card style={{padding:24}}>
            <div style={{fontFamily:"var(--font-d)",fontSize:17,fontWeight:700,marginBottom:8}}>1. Download Template</div>
            <p style={{fontSize:13,color:"var(--text3)",lineHeight:1.7,marginBottom:16}}>Get a sample CSV. Fill it in Excel then upload below.</p>
            <Btn variant="ghost" onClick={function(){downloadTemplate(tab);}}>Download {tab} template</Btn>
            <div style={{marginTop:10,fontSize:11,color:"var(--text4)"}}>{tab==="members"?"Required: name, email":"Required: make, model, year"}</div>
          </Card>
          <Card style={{padding:24}}>
            <div style={{fontFamily:"var(--font-d)",fontSize:17,fontWeight:700,marginBottom:8}}>2. Upload File</div>
            <p style={{fontSize:13,color:"var(--text3)",lineHeight:1.7,marginBottom:16}}>Accepts .xlsx, .xls or .csv</p>
            <div style={{border:"2px dashed var(--border2)",borderRadius:8,padding:20,textAlign:"center",background:"var(--bg3)"}}>
              <input ref={fileRef} type="file" accept=".csv,.xlsx,.xls" onChange={handleFile} style={{width:"100%",fontSize:13,cursor:"pointer"}}/>
            </div>
          </Card>
        </div>
      )}

      {stage==="preview"&&(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}}>
            <div style={{background:"#d4f0e0",border:"1px solid #a0d8b8",borderRadius:8,padding:14,textAlign:"center"}}>
              <div style={{fontSize:26,fontWeight:700,color:"var(--green2)"}}>{rows.filter(function(r){return !r._skip;}).length}</div>
              <div style={{fontSize:10,color:"var(--green2)"}}>READY</div>
            </div>
            <div style={{background:"#fdd8d8",border:"1px solid #f0a8a8",borderRadius:8,padding:14,textAlign:"center"}}>
              <div style={{fontSize:26,fontWeight:700,color:"var(--burg)"}}>{rows.filter(function(r){return r._skip;}).length}</div>
              <div style={{fontSize:10,color:"var(--burg)"}}>SKIPPED</div>
            </div>
            <div style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:8,padding:14,textAlign:"center"}}>
              <div style={{fontSize:26,fontWeight:700}}>{rows.length}</div>
              <div style={{fontSize:10,color:"var(--text3)"}}>TOTAL</div>
            </div>
          </div>
          <Card style={{padding:14,marginBottom:14}}>
            <div style={{fontSize:11,color:"var(--text3)",marginBottom:8}}>IMPORT MODE</div>
            <Row gap={20}>
              <label style={{display:"flex",gap:8,cursor:"pointer"}}>
                <input type="radio" name="mm" value="add" checked={mergeMode==="add"} onChange={function(){setMergeMode("add");}} style={{accentColor:"var(--burg)"}}/>
                <span style={{fontSize:13}}>Add to existing data (safe)</span>
              </label>
              <label style={{display:"flex",gap:8,cursor:"pointer"}}>
                <input type="radio" name="mm" value="replace" checked={mergeMode==="replace"} onChange={function(){setMergeMode("replace");}} style={{accentColor:"var(--burg)"}}/>
                <span style={{fontSize:13,color:"var(--burg)"}}>Replace all existing data</span>
              </label>
            </Row>
          </Card>
          <Card style={{overflow:"hidden",marginBottom:14}}>
            <div style={{overflowX:"auto",maxHeight:300,overflowY:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr style={{background:"var(--bg3)"}}>
                  <th style={{padding:"8px 10px",textAlign:"left",fontSize:10,color:"var(--text3)"}}>Row</th>
                  <th style={{padding:"8px 10px",textAlign:"left",fontSize:10,color:"var(--text3)"}}>Status</th>
                  {pCols.map(function(h){return <th key={h} style={{padding:"8px 10px",textAlign:"left",fontSize:10,color:"var(--text3)"}}>{h}</th>;})}
                </tr></thead>
                <tbody>
                  {rows.map(function(row,i){
                    return (
                      <tr key={i} style={{background:row._skip?"#fff8f8":"#fff",opacity:row._skip?0.6:1}}>
                        <td style={{padding:"8px 10px",fontSize:12,borderBottom:"1px solid var(--border)",color:"var(--text4)"}}>{row._row}</td>
                        <td style={{padding:"8px 10px",fontSize:12,borderBottom:"1px solid var(--border)"}}>
                          {row._skip
                            ?<span style={{fontSize:10,background:"#fdd8d8",color:"#8f1a1a",padding:"2px 6px",borderRadius:3}}>{row._errs.join(", ")}</span>
                            :<span style={{fontSize:10,background:"#d4f0e0",color:"#1a6040",padding:"2px 6px",borderRadius:3}}>OK</span>}
                        </td>
                        {pCols.map(function(h){return <td key={h} style={{padding:"8px 10px",fontSize:12,borderBottom:"1px solid var(--border)"}}>{row[h]||"n/a"}</td>;})}
                      </tr>

          </Card>
          <Row gap={10} justify="flex-end">

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = {error: null}; }
  componentDidCatch(error, info) { console.error("React error:", error, info); }
  static getDerivedStateFromError(error) { return {error}; }
  render() {
    if (this.state.error) {
      const e = this.state.error;
      return React.createElement("div", {style:{fontFamily:"monospace",padding:30,background:"#1a0000",color:"#ff8080",fontSize:13,minHeight:"100vh"}},
        React.createElement("h2", {style:{color:"#ff4444",marginBottom:12}}, "Something went wrong"),
        React.createElement("p", null, React.createElement("b", null, "Error: "), String(e.message||e)),
        React.createElement("pre", {style:{marginTop:16,fontSize:11,color:"#ffaaaa",whiteSpace:"pre-wrap",overflow:"auto"}}, String(e.stack||"")),
        React.createElement("button", {onClick:()=>window.location.reload(), style:{marginTop:20,background:"#c0282a",color:"#fff",border:"none",borderRadius:6,padding:"10px 20px",cursor:"pointer",fontSize:13}}, "Reload Page")
      );
    }
    return this.props.children;
  }
}

      {!isAdmin&&<div style={{background:"linear-gradient(135deg,var(--burg-xdk),var(--burg))",borderRadius:12,padding:20,marginBottom:20,color:"#fff",display:"flex",alignItems:"center",gap:20}}>
        <div style={{textAlign:"center",minWidth:80}}>
          <div style={{fontSize:40,fontWeight:700,fontFamily:"var(--font-d)",color:"var(--gold)"}}>{myTotal}</div>

      {/* Tabs */}
      <div style={{display:"flex",gap:8,marginBottom:20,borderBottom:"2px solid var(--border)"}}>

        leaderboard.map((m,i)=>(
          <div key={m.id} style={{background:"#fff",border:"1px solid var(--border)",borderRadius:10,padding:"14px 18px",marginBottom:10,display:"flex",alignItems:"center",gap:16}}>

            <div style={{flex:1}}>

      {tab==="history"&&<div>
        {(points||[]).length===0?<div style={{textAlign:"center",padding:40,color:"var(--text3)"}}>No awards recorded yet.</div>:
        [...(points||[])].sort((a,b)=>b.date.localeCompare(a.date)).map(p=>(
          <div key={p.id} style={{background:"#fff",border:"1px solid var(--border)",borderRadius:10,padding:"12px 16px",marginBottom:8,display:"flex",alignItems:"center",gap:14}}>
            <div style={{background:"var(--bg3)",borderRadius:8,padding:"8px 12px",textAlign:"center",minWidth:48}}>
              <div style={{fontSize:18,fontWeight:700,color:"var(--burg)"}}>{p.points}</div>
              <div style={{fontSize:9,color:"var(--text3)",fontFamily:"var(--font-m)"}}>PTS</div>
            </div>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:13}}>{p.memberName}</div>
              <div style={{fontSize:12,color:"var(--burg)",fontWeight:600}}>{p.category}</div>
              {p.description&&<div style={{fontSize:12,color:"var(--text3)"}}>{p.description}</div>}
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:11,color:"var(--text3)"}}>{p.date}</div>
              <div style={{fontSize:11,color:"var(--text3)"}}>by {p.awardedBy}</div>

            </div>
          </div>
        ))}

      {tab==="myawards"&&<div>
        <div style={{background:"var(--bg3)",borderRadius:10,padding:16,marginBottom:16,display:"flex",gap:16}}>
          <div style={{textAlign:"center",flex:1}}>
            <div style={{fontSize:28,fontWeight:700,color:"var(--burg)",fontFamily:"var(--font-d)"}}>{myTotal}</div>
            <div style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--font-m)"}}>TOTAL POINTS</div>
          </div>
          <div style={{textAlign:"center",flex:1}}>
            <div style={{fontSize:28,fontWeight:700,color:"var(--burg)",fontFamily:"var(--font-d)"}}>{myPoints.filter(p=>p.year===thisYear).reduce((s,p)=>s+p.points,0)}</div>

          </div>
          <div style={{textAlign:"center",flex:1}}>

            <div style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--font-m)"}}>AWARDS</div>

        </div>
        {myPoints.length===0?<div style={{textAlign:"center",padding:40,color:"var(--text3)"}}>No awards recorded for you yet.</div>:
        myPoints.map(p=>(
          <div key={p.id} style={{background:"#fff",border:"1px solid var(--border)",borderRadius:10,padding:"12px 16px",marginBottom:8,display:"flex",alignItems:"center",gap:14}}>
            <div style={{background:"var(--gold)",borderRadius:8,padding:"8px 12px",textAlign:"center",minWidth:48}}>
              <div style={{fontSize:18,fontWeight:700,color:"#fff"}}>{p.points}</div>

            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:13,color:"var(--burg)"}}>{p.category}</div>

      {/* Add Award Modal */}

          <div><label style={{fontSize:12,color:"var(--text3)",display:"block",marginBottom:4}}>Member *</label>
            <select value={form.memberId||""} onChange={e=>setForm({...form,memberId:e.target.value})} style={{width:"100%",border:"1px solid var(--border)",borderRadius:6,padding:"8px 10px",fontFamily:"var(--font-b)",fontSize:13}}>
              <option value="">Select member...</option>
              {members.filter(m=>m.status==="active").sort((a,b)=>a.name.localeCompare(b.name)).map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
            </select></div>
          <div><label style={{fontSize:12,color:"var(--text3)",display:"block",marginBottom:4}}>Category *</label>
            <select value={form.category||""} onChange={e=>setForm({...form,category:e.target.value})} style={{width:"100%",border:"1px solid var(--border)",borderRadius:6,padding:"8px 10px",fontFamily:"var(--font-b)",fontSize:13}}>

          <div><label style={{fontSize:12,color:"var(--text3)",display:"block",marginBottom:4}}>Points *</label>

            <input type="date" value={form.date||""} onChange={e=>setForm({...form,date:e.target.value})} style={{width:"100%",border:"1px solid var(--border)",borderRadius:6,padding:"8px 10px",fontFamily:"var(--font-b)",fontSize:13,boxSizing:"border-box"}}/></div>

}

// PERMISSIONS SECTION (admin only - manage restricted admins)
// ══════════════════════════════════════════════════════════════════════════════
const ALL_PERMISSIONS = [
  {id:"members",label:"Member Records & Applications",desc:"View, add, edit member records and process applications"},
  {id:"dues",label:"Dues & Renewals",desc:"Record and manage annual membership dues"},
  {id:"cars",label:"Vehicle Register & Transfers",desc:"Manage all vehicle records across the club"},
  {id:"permits",label:"Club Permit Scheme",desc:"Manage permit enrolment and log books"},
  {id:"events",label:"Events Management",desc:"Create and manage events and RSVPs"},
  {id:"meetings",label:"Meetings & Minutes",desc:"Schedule meetings and record minutes"},
  {id:"tasks",label:"Tasks & Workflow",desc:"Create and assign tasks to committee members"},
  {id:"qualitydocs",label:"Quality System",desc:"Upload, review and approve governance documents"},
  {id:"archive",label:"Club Archive",desc:"Manage the searchable historical document archive"},
  {id:"parts",label:"Spare Parts Inventory",desc:"Manage parts stock and publish to the shop"},
  {id:"shop",label:"Club Shop & Regalia",desc:"Manage shop listings, orders and stock"},
  {id:"marketplace",label:"Marketplace Moderation",desc:"Moderate and approve member listings"},
  {id:"library",label:"Library",desc:"Manage the book catalogue and loan requests"},
  {id:"finance",label:"Finance & Reporting",desc:"View financial reports and record expenses"},
  {id:"news",label:"News & Website Content",desc:"Write and publish news and website content"},
  {id:"import",label:"Bulk Data Import",desc:"Import member and vehicle data in bulk"},
  {id:"points",label:"Points & Awards",desc:"Award and manage member points and recognition"},
];

function PermissionsSection({user,members,setMembers}) {
  const [selMember,setSelMember] = React.useState(null);
  const [search,setSearch] = React.useState("");
  const [saving,setSaving] = React.useState(false);
  const [editPerms,setEditPerms] = React.useState(null);

  const restricted = members.filter(m=>m.role==="restricted_admin"||m.role==="admin").filter(m=>m.id!==user.id);
  const allNonFull = members.filter(m=>m.role!=="admin"&&m.id!==user.id);

  const openMember = (m) => {
    setSelMember(m);
    setEditPerms(m.permissions||[]);
  };

  const savePerms = () => {
    setSaving(true);
    const updated = members.map(m=>m.id===selMember.id?{...m,permissions:editPerms}:m);
    setMembers(updated); dbSet(SK.members, updated);
    setSelMember({...selMember,permissions:editPerms});
    setTimeout(()=>setSaving(false),600);
  };

  const setRole = (memberId, role) => {
    const updated = members.map(m=>m.id===memberId?{...m,role,permissions:role==="admin"?ALL_PERMISSIONS.map(p=>p.id):(m.permissions||[])}:m);
    setMembers(updated); dbSet(SK.members, updated);
    if(selMember?.id===memberId) setSelMember({...selMember,role,permissions:role==="admin"?ALL_PERMISSIONS.map(p=>p.id):(selMember.permissions||[])});
  };

  const togglePerm = (id) => {
    setEditPerms(prev=>prev.includes(id)?prev.filter(p=>p!==id):[...prev,id]);
  };

  const roleColour = (role) => role==="admin"?"var(--burg)":role==="restricted_admin"?"var(--blue)":"var(--text3)";
  const roleLabel = (role) => role==="admin"?"Full Admin":role==="restricted_admin"?"Restricted Admin":"Member";

  const filteredMembers = members.filter(m=>m.id!==user.id&&m.name.toLowerCase().includes(search.toLowerCase()));

  return (
    <div>
      <div style={{marginBottom:20}}>
        <h2 style={{fontFamily:"var(--font-d)",fontSize:22,color:"var(--burg)",margin:0}}>Permission Control</h2>
        <p style={{color:"var(--text3)",fontSize:13,margin:"4px 0 0"}}>Manage member access levels and admin function assignments</p>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1.4fr",gap:16,alignItems:"start"}}>
        {/* Member list */}
        <div>
          <div style={{background:"#fff",border:"1px solid var(--border)",borderRadius:10,overflow:"hidden"}}>
            <div style={{padding:"12px 14px",borderBottom:"1px solid var(--border)",background:"var(--bg3)"}}>
              <div style={{fontSize:11,fontFamily:"var(--font-m)",fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>All Members</div>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search members..." style={{width:"100%",border:"1px solid var(--border)",borderRadius:6,padding:"6px 10px",fontFamily:"var(--font-b)",fontSize:12,boxSizing:"border-box"}}/>
            </div>
            <div style={{maxHeight:500,overflowY:"auto"}}>
              {filteredMembers.sort((a,b)=>a.name.localeCompare(b.name)).map(m=>(
                <div key={m.id} onClick={()=>openMember(m)} style={{padding:"10px 14px",cursor:"pointer",borderBottom:"1px solid var(--border)",background:selMember?.id===m.id?"var(--bg3)":"#fff",transition:"background .15s"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{fontWeight:600,fontSize:13,color:"var(--text)"}}>{m.name}</div>
                    <div style={{fontSize:10,fontWeight:700,color:roleColour(m.role),background:m.role==="admin"?"#ffeaea":m.role==="restricted_admin"?"#e8f0ff":"var(--bg3)",padding:"2px 7px",borderRadius:10}}>{roleLabel(m.role)}</div>
                  </div>
                  <div style={{fontSize:11,color:"var(--text3)"}}>{m.email}</div>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* Permission editor */}
        <div>
          {!selMember?<div style={{background:"var(--bg3)",borderRadius:10,padding:30,textAlign:"center",color:"var(--text3)"}}>
            <div style={{fontSize:28,marginBottom:8}}>🔑</div>
            <div style={{fontWeight:600}}>Select a member to manage their access</div>
          </div>:
          <div style={{background:"#fff",border:"1px solid var(--border)",borderRadius:10,overflow:"hidden"}}>
            <div style={{padding:"14px 16px",borderBottom:"1px solid var(--border)",background:"var(--bg3)"}}>
              <div style={{fontWeight:700,fontSize:15,color:"var(--text)"}}>{selMember.name}</div>
              <div style={{fontSize:12,color:"var(--text3)",marginBottom:10}}>{selMember.email}</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {["member","restricted_admin","admin"].map(role=>(
                  <button key={role} onClick={()=>setRole(selMember.id,role)} style={{background:selMember.role===role?roleColour(role):"#fff",color:selMember.role===role?"#fff":roleColour(role),border:`1.5px solid ${roleColour(role)}`,borderRadius:6,padding:"5px 12px",fontFamily:"var(--font-b)",fontSize:11,fontWeight:700,cursor:"pointer"}}>
                    {roleLabel(role)}
                  </button>
                ))}
              </div>
            </div>

            {selMember.role==="restricted_admin"&&<div style={{padding:"12px 16px"}}>
              <div style={{fontSize:11,fontFamily:"var(--font-m)",fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:12}}>Assigned Functions</div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {ALL_PERMISSIONS.map(p=>{
                  const checked=(editPerms||[]).includes(p.id);
                  return (
                    <div key={p.id} onClick={()=>togglePerm(p.id)} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"8px 10px",borderRadius:7,background:checked?"var(--bg3)":"transparent",border:`1px solid ${checked?"var(--burg)":"var(--border)"}`,cursor:"pointer"}}>
                      <div style={{width:16,height:16,borderRadius:3,background:checked?"var(--burg)":"#fff",border:`2px solid ${checked?"var(--burg)":"var(--border)"}`,flexShrink:0,marginTop:1,display:"flex",alignItems:"center",justifyContent:"center"}}>
                        {checked&&<span style={{color:"#fff",fontSize:10,lineHeight:1}}>✓</span>}
                      </div>
                      <div>
                        <div style={{fontWeight:600,fontSize:12,color:checked?"var(--burg)":"var(--text)"}}>{p.label}</div>
                        <div style={{fontSize:11,color:"var(--text3)"}}>{p.desc}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
              <div style={{display:"flex",justifyContent:"flex-end",gap:10,marginTop:14}}>
                <button onClick={()=>{setEditPerms(ALL_PERMISSIONS.map(p=>p.id));}} style={{background:"none",border:"1px solid var(--border)",borderRadius:6,padding:"7px 16px",fontFamily:"var(--font-b)",fontSize:12,cursor:"pointer"}}>Select All</button>
                <button onClick={()=>setEditPerms([])} style={{background:"none",border:"1px solid var(--border)",borderRadius:6,padding:"7px 16px",fontFamily:"var(--font-b)",fontSize:12,cursor:"pointer"}}>Clear All</button>
                <button onClick={savePerms} style={{background:"var(--burg)",color:"#fff",border:"none",borderRadius:6,padding:"7px 20px",fontFamily:"var(--font-b)",fontSize:12,fontWeight:700,cursor:"pointer"}}>{saving?"Saved ✓":"Save Permissions"}</button>
              </div>
            </div>}

            {selMember.role==="admin"&&<div style={{padding:16,color:"var(--text3)",fontSize:13,textAlign:"center"}}>Full Admins have access to all functions.</div>}
            {selMember.role==="member"&&<div style={{padding:16,color:"var(--text3)",fontSize:13,textAlign:"center"}}>This member has standard member access only. Change their role to Restricted Admin to assign specific functions.</div>}
          </div>}
        </div>
      </div>
    </div>
  );
}

// QUALITY SYSTEM SECTION
// ══════════════════════════════════════════════════════════════════════════════
function QualitySystemSection({user,members,qualityDocs,setQualityDocs}) {
  const isAdmin = user&&(user.role==="admin"||(user.permissions||[]).includes("qualitydocs"));
  const [tab,setTab] = React.useState("current");
  const [modal,setModal] = React.useState(null);
  const [form,setForm] = React.useState({});
  const [search,setSearch] = React.useState("");

  const DOC_TYPES = ["Constitution","Code of Conduct","Position Description","Risk Management Plan","Financial Procedure","Event Procedure","Privacy Policy","Club Permit Procedure","Membership Procedure","Meeting Procedure","Other Policy"];
  const VISIBILITY = [{v:"admin",label:"Admin Only",col:"var(--burg)"},{v:"members",label:"Members",col:"var(--blue)"},{v:"public",label:"Public",col:"var(--green)"}];

  const save = (docs) => { setQualityDocs(docs); dbSet(SK.qualityDocs, docs); };

  const addDoc = () => {
    if(!form.title||!form.docType) return;
    const doc = {id:uid("QD"),title:form.title,docType:form.docType,description:form.description||"",status:"draft",visibility:form.visibility||"admin",version:"1.0",createdBy:user.name,createdDate:new Date().toISOString().slice(0,10),updatedDate:new Date().toISOString().slice(0,10),approvedBy:null,approvedDate:null,comments:[],revisions:[{version:"1.0",date:new Date().toISOString().slice(0,10),by:user.name,note:"Initial draft"}]};
    save([...(qualityDocs||[]),doc]);
    setModal(null); setForm({});
  };

  const approveDoc = (docId) => {
    const updated = (qualityDocs||[]).map(d=>d.id===docId?{...d,status:"current",approvedBy:user.name,approvedDate:new Date().toISOString().slice(0,10)}:d);
    save(updated);
  };

  const addRevision = (docId) => {
    if(!form.revNote) return;
    const doc = (qualityDocs||[]).find(d=>d.id===docId);
    const parts = (doc.version||"1.0").split(".");
    const newVer = parts[0]+"."+(parseInt(parts[1]||0)+1);
    const rev = {version:newVer,date:new Date().toISOString().slice(0,10),by:user.name,note:form.revNote};
    const updated = (qualityDocs||[]).map(d=>d.id===docId?{...d,version:newVer,status:"draft",updatedDate:rev.date,revisions:[...(d.revisions||[]),rev]}:d);
    save(updated); setModal(null); setForm({});
  };

  const addComment = (docId) => {
    if(!form.comment) return;
    const comment = {id:uid("C"),by:user.name,date:new Date().toISOString().slice(0,10),text:form.comment};
    const updated = (qualityDocs||[]).map(d=>d.id===docId?{...d,comments:[...(d.comments||[]),comment]}:d);
    save(updated); setForm({...form,comment:""});
  };

  const visInfo = (v) => VISIBILITY.find(x=>x.v===v)||VISIBILITY[0];
  const statusCol = (s) => s==="current"?"var(--green)":s==="draft"?"var(--gold)":"var(--text3)";

  const filtered = (status) => (qualityDocs||[]).filter(d=>(status==="all"||d.status===status)&&(d.title+d.docType).toLowerCase().includes(search.toLowerCase()));

  const DocCard = ({doc}) => (
    <div style={{background:"#fff",border:"1px solid var(--border)",borderRadius:10,padding:16,marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
        <div>
          <div style={{fontWeight:700,fontSize:14,color:"var(--text)"}}>{doc.title}</div>
          <div style={{fontSize:12,color:"var(--text3)"}}>{doc.docType} · v{doc.version} · {doc.updatedDate}</div>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"flex-end"}}>
          <span style={{fontSize:10,fontWeight:700,color:statusCol(doc.status),background:"var(--bg3)",padding:"2px 8px",borderRadius:10,textTransform:"uppercase"}}>{doc.status}</span>
          <span style={{fontSize:10,fontWeight:700,color:visInfo(doc.visibility).col,background:"var(--bg3)",padding:"2px 8px",borderRadius:10}}>{visInfo(doc.visibility).label}</span>
        </div>
      </div>
      {doc.description&&<div style={{fontSize:12,color:"var(--text3)",marginBottom:10}}>{doc.description}</div>}
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <button onClick={()=>{setSelDoc(doc);setModal("view");}} style={{background:"none",border:"1px solid var(--border)",borderRadius:6,padding:"5px 12px",fontFamily:"var(--font-b)",fontSize:12,cursor:"pointer"}}>View Details</button>
        {isAdmin&&doc.status==="draft"&&<button onClick={()=>approveDoc(doc.id)} style={{background:"var(--green)",color:"#fff",border:"none",borderRadius:6,padding:"5px 12px",fontFamily:"var(--font-b)",fontSize:12,fontWeight:700,cursor:"pointer"}}>✓ Approve</button>}
        {isAdmin&&<button onClick={()=>{setSelDoc(doc);setForm({});setModal("revise");}} style={{background:"none",border:"1px solid var(--burg)",color:"var(--burg)",borderRadius:6,padding:"5px 12px",fontFamily:"var(--font-b)",fontSize:12,cursor:"pointer"}}>Add Revision</button>}
      </div>
    </div>
  );

  const [selDoc,setSelDoc] = React.useState(null);

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div>
          <h2 style={{fontFamily:"var(--font-d)",fontSize:22,color:"var(--burg)",margin:0}}>Quality System</h2>
          <p style={{color:"var(--text3)",fontSize:13,margin:"4px 0 0"}}>Club governance, policy and procedure documents</p>
        </div>
        {isAdmin&&<button onClick={()=>{setForm({visibility:"admin"});setModal("add");}} style={{background:"var(--burg)",color:"#fff",border:"none",borderRadius:8,padding:"10px 20px",fontFamily:"var(--font-b)",fontSize:13,fontWeight:700,cursor:"pointer"}}>+ New Document</button>}
      </div>

      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search documents..." style={{width:"100%",border:"1px solid var(--border)",borderRadius:8,padding:"10px 14px",fontFamily:"var(--font-b)",fontSize:13,marginBottom:16,boxSizing:"border-box"}}/>

      <div style={{display:"flex",gap:8,marginBottom:16,borderBottom:"2px solid var(--border)"}}>
        {[["current","✓ Current"],["draft","✎ Drafts"],["all","All Documents"]].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{background:"none",border:"none",borderBottom:tab===id?"3px solid var(--burg)":"3px solid transparent",color:tab===id?"var(--burg)":"var(--text3)",fontFamily:"var(--font-b)",fontSize:13,fontWeight:700,cursor:"pointer",padding:"8px 16px",marginBottom:-2}}>{label}</button>
        ))}
      </div>

      {filtered(tab).length===0?<div style={{textAlign:"center",padding:40,color:"var(--text3)"}}>No documents found.</div>:filtered(tab).map(doc=><DocCard key={doc.id} doc={doc}/>)}

      {modal==="add"&&<Modal title="New Document" onClose={()=>setModal(null)}>
        <div style={{display:"flex",flexDirection:"column",gap:12,padding:"4px 0"}}>
          <div><label style={{fontSize:12,color:"var(--text3)",display:"block",marginBottom:4}}>Document Title *</label>
            <input value={form.title||""} onChange={e=>setForm({...form,title:e.target.value})} placeholder="e.g. Code of Conduct" style={{width:"100%",border:"1px solid var(--border)",borderRadius:6,padding:"8px 10px",fontFamily:"var(--font-b)",fontSize:13,boxSizing:"border-box"}}/></div>
          <div><label style={{fontSize:12,color:"var(--text3)",display:"block",marginBottom:4}}>Document Type *</label>
            <select value={form.docType||""} onChange={e=>setForm({...form,docType:e.target.value})} style={{width:"100%",border:"1px solid var(--border)",borderRadius:6,padding:"8px 10px",fontFamily:"var(--font-b)",fontSize:13}}>
              <option value="">Select type...</option>
              {DOC_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
            </select></div>
          <div><label style={{fontSize:12,color:"var(--text3)",display:"block",marginBottom:4}}>Description</label>
            <textarea value={form.description||""} onChange={e=>setForm({...form,description:e.target.value})} rows={3} placeholder="Brief description..." style={{width:"100%",border:"1px solid var(--border)",borderRadius:6,padding:"8px 10px",fontFamily:"var(--font-b)",fontSize:13,boxSizing:"border-box",resize:"vertical"}}/></div>
          <div><label style={{fontSize:12,color:"var(--text3)",display:"block",marginBottom:4}}>Visibility</label>
            <select value={form.visibility||"admin"} onChange={e=>setForm({...form,visibility:e.target.value})} style={{width:"100%",border:"1px solid var(--border)",borderRadius:6,padding:"8px 10px",fontFamily:"var(--font-b)",fontSize:13}}>
              {VISIBILITY.map(v=><option key={v.v} value={v.v}>{v.label}</option>)}
            </select></div>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:4}}>
            <button onClick={()=>setModal(null)} style={{background:"none",border:"1px solid var(--border)",borderRadius:6,padding:"8px 20px",fontFamily:"var(--font-b)",fontSize:13,cursor:"pointer"}}>Cancel</button>
            <button onClick={addDoc} style={{background:"var(--burg)",color:"#fff",border:"none",borderRadius:6,padding:"8px 20px",fontFamily:"var(--font-b)",fontSize:13,fontWeight:700,cursor:"pointer"}}>Create Draft</button>
          </div>
        </div>
      </Modal>}

      {modal==="view"&&selDoc&&<Modal title={selDoc.title} onClose={()=>setModal(null)}>
        <div style={{padding:"4px 0"}}>
          <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
            <span style={{fontSize:11,fontWeight:700,color:statusCol(selDoc.status),background:"var(--bg3)",padding:"3px 10px",borderRadius:10,textTransform:"uppercase"}}>{selDoc.status}</span>
            <span style={{fontSize:11,fontWeight:700,color:visInfo(selDoc.visibility).col,background:"var(--bg3)",padding:"3px 10px",borderRadius:10}}>{visInfo(selDoc.visibility).label}</span>
            <span style={{fontSize:11,color:"var(--text3)",background:"var(--bg3)",padding:"3px 10px",borderRadius:10}}>v{selDoc.version}</span>
          </div>
          {selDoc.description&&<p style={{color:"var(--text3)",fontSize:13,marginBottom:14}}>{selDoc.description}</p>}
          <div style={{fontSize:12,color:"var(--text3)",marginBottom:6}}>Created by {selDoc.createdBy} on {selDoc.createdDate}</div>
          {selDoc.approvedBy&&<div style={{fontSize:12,color:"var(--green)",marginBottom:14}}>✓ Approved by {selDoc.approvedBy} on {selDoc.approvedDate}</div>}
          
          <div style={{fontWeight:700,fontSize:12,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8,marginTop:14}}>Revision History</div>
          {(selDoc.revisions||[]).map((r,i)=>(
            <div key={i} style={{fontSize:12,padding:"6px 0",borderBottom:"1px solid var(--border)",display:"flex",gap:12}}>
              <span style={{fontWeight:700,color:"var(--burg)",minWidth:30}}>v{r.version}</span>
              <span style={{color:"var(--text3)",minWidth:80}}>{r.date}</span>
              <span style={{color:"var(--text)"}}>{r.note}</span>
              <span style={{color:"var(--text3)"}}>— {r.by}</span>
            </div>
          ))}

          <div style={{fontWeight:700,fontSize:12,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8,marginTop:16}}>Comments ({(selDoc.comments||[]).length})</div>
          {(selDoc.comments||[]).map(c=>(
            <div key={c.id} style={{background:"var(--bg3)",borderRadius:8,padding:"10px 12px",marginBottom:8}}>
              <div style={{fontSize:11,color:"var(--text3)",marginBottom:4}}><b>{c.by}</b> · {c.date}</div>
              <div style={{fontSize:13}}>{c.text}</div>
            </div>
          ))}
          <div style={{display:"flex",gap:8,marginTop:8}}>
            <input value={form.comment||""} onChange={e=>setForm({...form,comment:e.target.value})} placeholder="Add a comment..." style={{flex:1,border:"1px solid var(--border)",borderRadius:6,padding:"7px 10px",fontFamily:"var(--font-b)",fontSize:13}}/>
            <button onClick={()=>addComment(selDoc.id)} style={{background:"var(--burg)",color:"#fff",border:"none",borderRadius:6,padding:"7px 14px",fontFamily:"var(--font-b)",fontSize:13,fontWeight:700,cursor:"pointer"}}>Post</button>
          </div>
        </div>
      </Modal>}

      {modal==="revise"&&selDoc&&<Modal title={`Add Revision — ${selDoc.title}`} onClose={()=>setModal(null)}>
        <div style={{padding:"4px 0"}}>
          <p style={{color:"var(--text3)",fontSize:13,marginBottom:14}}>Current version: v{selDoc.version}. Adding a revision will increment the version number and reset status to Draft for re-approval.</p>
          <label style={{fontSize:12,color:"var(--text3)",display:"block",marginBottom:4}}>Revision Notes *</label>
          <textarea value={form.revNote||""} onChange={e=>setForm({...form,revNote:e.target.value})} rows={4} placeholder="Describe what changed in this revision..." style={{width:"100%",border:"1px solid var(--border)",borderRadius:6,padding:"8px 10px",fontFamily:"var(--font-b)",fontSize:13,boxSizing:"border-box",resize:"vertical"}}/>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:12}}>
            <button onClick={()=>setModal(null)} style={{background:"none",border:"1px solid var(--border)",borderRadius:6,padding:"8px 20px",fontFamily:"var(--font-b)",fontSize:13,cursor:"pointer"}}>Cancel</button>
            <button onClick={()=>addRevision(selDoc.id)} style={{background:"var(--burg)",color:"#fff",border:"none",borderRadius:6,padding:"8px 20px",fontFamily:"var(--font-b)",fontSize:13,fontWeight:700,cursor:"pointer"}}>Save Revision</button>
          </div>
        </div>
      </Modal>}
    </div>
  );
}


// ══════════════════════════════════════════════════════════════════════════════
// CLUB ARCHIVE SECTION
// ══════════════════════════════════════════════════════════════════════════════
function ArchiveSection({user,archiveDocs,setArchiveDocs}) {
  const isAdmin = user&&(user.role==="admin"||(user.permissions||[]).includes("archive"));
  const [search,setSearch] = React.useState("");
  const [filterType,setFilterType] = React.useState("all");
  const [filterVis,setFilterVis] = React.useState("all");
  const [modal,setModal] = React.useState(null);
  const [form,setForm] = React.useState({});
  const [selDoc,setSelDoc] = React.useState(null);

  const DOC_TYPES = ["Meeting Minutes","AGM Minutes","Financial Report","Newsletter","Event Record","Correspondence","Photograph","Constitution (Historical)","Event Programme","Other"];
  const ROVER_MODELS = ["P3","P4","P5","P5B","P6","P6B","SD1","Range Rover","Defender","Discovery","All Models"];
  const VISIBILITY = [{v:"admin",label:"Admin Only",col:"var(--burg)"},{v:"members",label:"Members",col:"var(--blue)"},{v:"public",label:"Public",col:"var(--green)"}];

  const save = (docs) => { setArchiveDocs(docs); dbSet(SK.archiveDocs, docs); };

  const submitDoc = () => {
    if(!form.title) return;
    // Simulate AI categorisation
    const aiTags = [];
    if(form.title.toLowerCase().includes("agm")||form.title.toLowerCase().includes("annual")) aiTags.push("AGM");
    if(form.docType==="Meeting Minutes"||form.docType==="AGM Minutes") aiTags.push("Minutes");
    if(form.docType==="Newsletter") aiTags.push("Newsletter","Viking Torque");
    if(form.year) aiTags.push(form.year);
    if(form.roverModels?.length) aiTags.push(...form.roverModels);
    if(form.additionalTags) aiTags.push(...form.additionalTags.split(",").map(t=>t.trim()).filter(Boolean));
    const doc = {id:uid("AD"),title:form.title,docType:form.docType||"Other",description:form.description||"",year:form.year||new Date().getFullYear().toString(),date:form.date||"",tags:[...new Set(aiTags)],roverModels:form.roverModels||[],visibility:form.visibility||"admin",status:"pending",submittedBy:user.name,submittedDate:new Date().toISOString().slice(0,10),approvedBy:null,approvedDate:null,aiCategorised:true};
    save([...(archiveDocs||[]),doc]);
    setModal(null); setForm({});
  };

  const approveDoc = (docId) => {
    const updated = (archiveDocs||[]).map(d=>d.id===docId?{...d,status:"filed",approvedBy:user.name,approvedDate:new Date().toISOString().slice(0,10)}:d);
    save(updated);
  };

  const visInfo = (v) => VISIBILITY.find(x=>x.v===v)||VISIBILITY[0];

  const filtered = (archiveDocs||[]).filter(d=>{
    const matchSearch = (d.title+" "+(d.tags||[]).join(" ")+" "+d.docType+" "+(d.description||"")).toLowerCase().includes(search.toLowerCase());
    const matchType = filterType==="all"||d.docType===filterType;
    const matchVis = filterVis==="all"||d.visibility===filterVis;
    return matchSearch&&matchType&&matchVis;
  }).sort((a,b)=>(b.year||"").localeCompare(a.year||""));

  const pending = (archiveDocs||[]).filter(d=>d.status==="pending");

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div>
          <h2 style={{fontFamily:"var(--font-d)",fontSize:22,color:"var(--burg)",margin:0}}>Club Archive</h2>
          <p style={{color:"var(--text3)",fontSize:13,margin:"4px 0 0"}}>Historical records of the RCCA since 1964</p>
        </div>
        <div style={{display:"flex",gap:8}}>
          {isAdmin&&pending.length>0&&<button onClick={()=>setModal("review")} style={{background:"var(--gold)",color:"#fff",border:"none",borderRadius:8,padding:"10px 16px",fontFamily:"var(--font-b)",fontSize:13,fontWeight:700,cursor:"pointer"}}>Review Queue ({pending.length})</button>}
          <button onClick={()=>{setForm({visibility:"admin"});setModal("add");}} style={{background:"var(--burg)",color:"#fff",border:"none",borderRadius:8,padding:"10px 20px",fontFamily:"var(--font-b)",fontSize:13,fontWeight:700,cursor:"pointer"}}>+ Submit Document</button>
        </div>
      </div>

      {/* Search & filters */}
      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search archive — titles, tags, people, models..." style={{flex:1,minWidth:200,border:"1px solid var(--border)",borderRadius:8,padding:"10px 14px",fontFamily:"var(--font-b)",fontSize:13,boxSizing:"border-box"}}/>
        <select value={filterType} onChange={e=>setFilterType(e.target.value)} style={{border:"1px solid var(--border)",borderRadius:8,padding:"8px 12px",fontFamily:"var(--font-b)",fontSize:13}}>
          <option value="all">All Types</option>
          {DOC_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
        </select>
        {isAdmin&&<select value={filterVis} onChange={e=>setFilterVis(e.target.value)} style={{border:"1px solid var(--border)",borderRadius:8,padding:"8px 12px",fontFamily:"var(--font-b)",fontSize:13}}>
          <option value="all">All Visibility</option>
          {VISIBILITY.map(v=><option key={v.v} value={v.v}>{v.label}</option>)}
        </select>}
      </div>

      <div style={{fontSize:12,color:"var(--text3)",marginBottom:12}}>{filtered.length} document{filtered.length!==1?"s":""} found</div>

      {filtered.length===0?<div style={{textAlign:"center",padding:40,color:"var(--text3)"}}>
        <div style={{fontSize:28,marginBottom:8}}>📚</div>
        <div style={{fontWeight:600}}>No documents found</div>
        <div style={{fontSize:13,marginTop:4}}>Try a different search or submit a document to get started.</div>
      </div>:filtered.map(doc=>(
        <div key={doc.id} style={{background:"#fff",border:"1px solid var(--border)",borderRadius:10,padding:"14px 16px",marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:14,color:"var(--text)",marginBottom:3}}>{doc.title}</div>
              <div style={{fontSize:12,color:"var(--text3)",marginBottom:6}}>{doc.docType}{doc.year?" · "+doc.year:""}{doc.date?" · "+doc.date:""}</div>
              {(doc.tags||[]).length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                {doc.tags.map(t=><span key={t} style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:12,padding:"2px 8px",fontSize:10,color:"var(--text3)"}}>{t}</span>)}
              </div>}
            </div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}}>
              <span style={{fontSize:10,fontWeight:700,color:visInfo(doc.visibility).col,background:"var(--bg3)",padding:"2px 8px",borderRadius:10}}>{visInfo(doc.visibility).label}</span>
              <span style={{fontSize:10,fontWeight:700,color:doc.status==="filed"?"var(--green)":"var(--gold)",background:"var(--bg3)",padding:"2px 8px",borderRadius:10,textTransform:"uppercase"}}>{doc.status}</span>
            </div>
          </div>
          <div style={{display:"flex",gap:8,marginTop:10}}>
            <button onClick={()=>{setSelDoc(doc);setModal("view");}} style={{background:"none",border:"1px solid var(--border)",borderRadius:6,padding:"5px 12px",fontFamily:"var(--font-b)",fontSize:12,cursor:"pointer"}}>View</button>
          </div>
        </div>
      ))}

      {/* Submit Document Modal */}
      {modal==="add"&&<Modal title="Submit to Archive" onClose={()=>setModal(null)}>
        <div style={{display:"flex",flexDirection:"column",gap:12,padding:"4px 0"}}>
          <div style={{background:"var(--bg3)",borderRadius:8,padding:10,fontSize:12,color:"var(--text3)"}}>
            📧 You can also submit by emailing documents to <b>archive@rcca.com.au</b> — the system will process them automatically.
          </div>
          <div><label style={{fontSize:12,color:"var(--text3)",display:"block",marginBottom:4}}>Document Title *</label>
            <input value={form.title||""} onChange={e=>setForm({...form,title:e.target.value})} placeholder="e.g. AGM Minutes April 1989" style={{width:"100%",border:"1px solid var(--border)",borderRadius:6,padding:"8px 10px",fontFamily:"var(--font-b)",fontSize:13,boxSizing:"border-box"}}/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><label style={{fontSize:12,color:"var(--text3)",display:"block",marginBottom:4}}>Document Type</label>
              <select value={form.docType||""} onChange={e=>setForm({...form,docType:e.target.value})} style={{width:"100%",border:"1px solid var(--border)",borderRadius:6,padding:"8px 10px",fontFamily:"var(--font-b)",fontSize:13}}>
                <option value="">Select...</option>
                {DOC_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
              </select></div>
            <div><label style={{fontSize:12,color:"var(--text3)",display:"block",marginBottom:4}}>Year</label>
              <input value={form.year||""} onChange={e=>setForm({...form,year:e.target.value})} placeholder="e.g. 1989" style={{width:"100%",border:"1px solid var(--border)",borderRadius:6,padding:"8px 10px",fontFamily:"var(--font-b)",fontSize:13,boxSizing:"border-box"}}/></div>
          </div>
          <div><label style={{fontSize:12,color:"var(--text3)",display:"block",marginBottom:4}}>Description / Notes</label>
            <textarea value={form.description||""} onChange={e=>setForm({...form,description:e.target.value})} rows={2} placeholder="Brief description of the document..." style={{width:"100%",border:"1px solid var(--border)",borderRadius:6,padding:"8px 10px",fontFamily:"var(--font-b)",fontSize:13,boxSizing:"border-box",resize:"vertical"}}/></div>
          <div><label style={{fontSize:12,color:"var(--text3)",display:"block",marginBottom:4}}>Additional Tags (comma separated)</label>
            <input value={form.additionalTags||""} onChange={e=>setForm({...form,additionalTags:e.target.value})} placeholder="e.g. National Rove, Concours, P6" style={{width:"100%",border:"1px solid var(--border)",borderRadius:6,padding:"8px 10px",fontFamily:"var(--font-b)",fontSize:13,boxSizing:"border-box"}}/></div>
          <div><label style={{fontSize:12,color:"var(--text3)",display:"block",marginBottom:4}}>Visibility</label>
            <select value={form.visibility||"admin"} onChange={e=>setForm({...form,visibility:e.target.value})} style={{width:"100%",border:"1px solid var(--border)",borderRadius:6,padding:"8px 10px",fontFamily:"var(--font-b)",fontSize:13}}>
              {VISIBILITY.map(v=><option key={v.v} value={v.v}>{v.label}</option>)}
            </select></div>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:4}}>
            <button onClick={()=>setModal(null)} style={{background:"none",border:"1px solid var(--border)",borderRadius:6,padding:"8px 20px",fontFamily:"var(--font-b)",fontSize:13,cursor:"pointer"}}>Cancel</button>
            <button onClick={submitDoc} style={{background:"var(--burg)",color:"#fff",border:"none",borderRadius:6,padding:"8px 20px",fontFamily:"var(--font-b)",fontSize:13,fontWeight:700,cursor:"pointer"}}>Submit for Review</button>
          </div>
        </div>
      </Modal>}

      {/* Review queue modal */}
      {modal==="review"&&isAdmin&&<Modal title={`Review Queue (${pending.length})`} onClose={()=>setModal(null)}>
        <div style={{padding:"4px 0"}}>
          {pending.map(doc=>(
            <div key={doc.id} style={{background:"var(--bg3)",borderRadius:10,padding:14,marginBottom:12}}>
              <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{doc.title}</div>
              <div style={{fontSize:12,color:"var(--text3)",marginBottom:6}}>{doc.docType} · {doc.year} · Submitted by {doc.submittedBy}</div>
              {doc.description&&<div style={{fontSize:12,color:"var(--text3)",marginBottom:6}}>{doc.description}</div>}
              <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:10}}>
                {(doc.tags||[]).map(t=><span key={t} style={{background:"#fff",border:"1px solid var(--border)",borderRadius:12,padding:"2px 8px",fontSize:10,color:"var(--text3)"}}>{t}</span>)}
              </div>
              <div style={{fontSize:11,color:"var(--blue)",marginBottom:10}}>⚡ AI categorised — please review tags above before approving</div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>approveDoc(doc.id)} style={{background:"var(--green)",color:"#fff",border:"none",borderRadius:6,padding:"6px 16px",fontFamily:"var(--font-b)",fontSize:12,fontWeight:700,cursor:"pointer"}}>✓ Approve & File</button>
                <button onClick={()=>{const u=(archiveDocs||[]).filter(d=>d.id!==doc.id);save(u);}} style={{background:"none",border:"1px solid var(--red2)",color:"var(--red2)",borderRadius:6,padding:"6px 16px",fontFamily:"var(--font-b)",fontSize:12,cursor:"pointer"}}>Remove</button>
              </div>
            </div>
          ))}
        </div>
      </Modal>}

      {/* View modal */}
      {modal==="view"&&selDoc&&<Modal title={selDoc.title} onClose={()=>setModal(null)}>
        <div style={{padding:"4px 0"}}>
          <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
            <span style={{fontSize:11,fontWeight:700,color:visInfo(selDoc.visibility).col,background:"var(--bg3)",padding:"3px 10px",borderRadius:10}}>{visInfo(selDoc.visibility).label}</span>
            <span style={{fontSize:11,color:"var(--text3)",background:"var(--bg3)",padding:"3px 10px",borderRadius:10}}>{selDoc.docType}</span>
            {selDoc.year&&<span style={{fontSize:11,color:"var(--text3)",background:"var(--bg3)",padding:"3px 10px",borderRadius:10}}>{selDoc.year}</span>}
          </div>
          {selDoc.description&&<p style={{color:"var(--text3)",fontSize:13,marginBottom:12}}>{selDoc.description}</p>}
          <div style={{fontSize:12,color:"var(--text3)",marginBottom:4}}>Submitted by {selDoc.submittedBy} on {selDoc.submittedDate}</div>
          {selDoc.approvedBy&&<div style={{fontSize:12,color:"var(--green)",marginBottom:12}}>✓ Filed by {selDoc.approvedBy} on {selDoc.approvedDate}</div>}
