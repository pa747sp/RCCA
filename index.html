// TASKS (Kanban + List)
// ══════════════════════════════════════════════════════════════════════════════
const COLS=[{id:"todo",label:"To Do",colour:"var(--text3)"},{id:"inprogress",label:"In Progress",colour:"var(--blue2)"},{id:"done",label:"Done",colour:"var(--green2)"}];

function TasksSection({ user, members, tasks, setTasks }) {
  const isAdmin=user.role==="admin";
  const [view,setView]=useState("kanban"); const [filterMine,setFilterMine]=useState(false);
  const [modal,setModal]=useState(null); const [form,setForm]=useState({});
  const vis=filterMine?tasks.filter(t=>t.assigneeId===user.id):tasks;
  function openAdd(status="todo"){setForm({title:"",description:"",status,priority:"medium",assigneeId:user.id,createdBy:user.id,created:today,due:"",tags:""});setModal("add");}
  function openEdit(t){setForm({...t,tags:(t.tags||[]).join(",")});setModal({edit:t});}
  async function save2(){
    if(!form.title)return alert("Title required.");
    const t={...form,tags:form.tags?form.tags.split(",").map(s=>s.trim()).filter(Boolean):[]};
    const u=modal==="add"?[...tasks,{...t,id:uid("T")}]:tasks.map(tk=>tk.id===t.id?t:tk);
    setTasks(u);await dbSet(SK.tasks,u);setModal(null);
  }
  async function move(id,status){const u=tasks.map(t=>t.id===id?{...t,status}:t);setTasks(u);await dbSet(SK.tasks,u);}
  async function del(id){const u=tasks.filter(t=>t.id!==id);setTasks(u);await dbSet(SK.tasks,u);setModal(null);}
  const aName=id=>members.find(m=>m.id===id)?.name||"Unassigned";
  const canEdit=t=>isAdmin||t.assigneeId===user.id||t.createdBy===user.id;
  return (
    <div className="fade-up">
      <SectionHeader title="Task Management"
        action={<Row gap={8}><Btn variant="ghost" size="sm" onClick={()=>setView(v=>v==="kanban"?"list":"kanban")}>{view==="kanban"?"List View":"Kanban View"}</Btn><Btn variant="ghost" size="sm" onClick={()=>setFilterMine(!filterMine)}>{filterMine?"All Tasks":"My Tasks"}</Btn><Btn onClick={()=>openAdd()}>+ Add Task</Btn></Row>}/>

      {view==="kanban"?(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14,alignItems:"start"}}>
          {COLS.map(col=>{
            const ct=vis.filter(t=>t.status===col.id);
            return (<div key={col.id}>
              <Row justify="space-between" align="center" style={{marginBottom:10}}>
                <Row gap={8}><div style={{width:9,height:9,borderRadius:"50%",background:col.colour}}/><span style={{fontFamily:"var(--font-m)",fontSize:11,color:col.colour,textTransform:"uppercase",letterSpacing:"0.1em"}}>{col.label}</span><span style={{fontFamily:"var(--font-m)",fontSize:9.5,color:"var(--text3)",background:"var(--bg3)",borderRadius:8,padding:"1px 6px"}}>{ct.length}</span></Row>
                <button onClick={()=>openAdd(col.id)} style={{background:"none",border:"1px dashed var(--border2)",color:"var(--text3)",borderRadius:4,padding:"1px 8px",fontSize:16,cursor:"pointer",lineHeight:1}}>+</button>
              </Row>
              <Col gap={10}>
                {ct.map(t=>(
                  <Card key={t.id} style={{padding:13}}>
                    <Row justify="space-between" align="flex-start" style={{marginBottom:7}}><div style={{fontSize:13,fontWeight:700,color:"var(--text)",flex:1,marginRight:8,lineHeight:1.3,fontFamily:"var(--font-d)"}}>{t.title}</div><Badge status={t.priority}/></Row>
                    {t.description&&<p style={{fontSize:11,color:"var(--text3)",marginBottom:8,lineHeight:1.4}}>{t.description}</p>}
                    <Row gap={4} wrap style={{marginBottom:8}}>
                      {(t.tags||[]).map(tag=><span key={tag} style={{fontSize:9,fontFamily:"var(--font-m)",color:"var(--gold)",background:"rgba(201,146,42,.1)",border:"1px solid rgba(201,146,42,.2)",borderRadius:3,padding:"1px 5px"}}>{tag}</span>)}
                    </Row>
                    <Row justify="space-between" align="center" style={{fontSize:10.5,color:"var(--text3)"}}>
                      <Row gap={5} align="center"><Avatar name={aName(t.assigneeId)} size={16}/><span style={{fontFamily:"var(--font-m)"}}>{aName(t.assigneeId).split(" ")[0]}</span></Row>
                      {t.due&&<span style={{fontFamily:"var(--font-m)"}}>📅 {t.due}</span>}
                    </Row>
                    {canEdit(t)&&<Row gap={4} wrap style={{marginTop:9,borderTop:"1px solid var(--border)",paddingTop:8}}>
                      {COLS.filter(c=>c.id!==col.id).map(c=><Btn key={c.id} variant="ghost" size="sm" onClick={()=>move(t.id,c.id)}>→ {c.label}</Btn>)}
                      <Btn variant="ghost" size="sm" onClick={()=>openEdit(t)}>Edit</Btn>
                    </Row>}
                  </Card>
                ))}
                {ct.length===0&&<div style={{border:"1px dashed var(--border)",borderRadius:6,padding:"20px 12px",textAlign:"center",color:"var(--text3)",fontSize:11,fontFamily:"var(--font-m)"}}>No tasks</div>}
              </Col>
            </div>);
          })}
        </div>
      ):(
        <Card style={{overflow:"hidden"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12.5}}>
            <thead><tr style={{background:"var(--bg3)",borderBottom:"1px solid var(--border)"}}>{["Title","Status","Priority","Assigned To","Due","Tags","Actions"].map(h=><th key={h} style={{padding:"10px 12px",textAlign:"left",fontFamily:"var(--font-m)",fontSize:9.5,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.1em",whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
            <tbody>{vis.length===0&&<tr><td colSpan={7}><EmptyState icon="☑" text="No tasks"/></td></tr>}
            {vis.map((t,i)=>(
              <tr key={t.id} style={{borderBottom:"1px solid var(--border)",background:i%2===0?"transparent":"rgba(255,255,255,.01)"}}>
                <td style={{padding:"9px 12px"}}><div style={{fontWeight:700,color:"var(--text)",fontFamily:"var(--font-d)",fontSize:13}}>{t.title}</div><div style={{fontSize:10,color:"var(--text3)",fontFamily:"var(--font-m)",marginTop:2}}>{t.description?.slice(0,50)}{t.description?.length>50?"…":""}</div></td>
                <td style={{padding:"9px 12px"}}><Badge status={t.status}/></td>
                <td style={{padding:"9px 12px"}}><Badge status={t.priority}/></td>
                <td style={{padding:"9px 12px"}}><Row gap={6} align="center"><Avatar name={aName(t.assigneeId)} size={20}/><span style={{color:"var(--text2)"}}>{aName(t.assigneeId)}</span></Row></td>
                <td style={{padding:"9px 12px",fontFamily:"var(--font-m)",fontSize:11,color:"var(--text3)"}}>{t.due||"—"}</td>
                <td style={{padding:"9px 12px"}}><Row gap={4} wrap>{(t.tags||[]).map(tag=><span key={tag} style={{fontSize:9,fontFamily:"var(--font-m)",color:"var(--gold)",background:"rgba(201,146,42,.1)",border:"1px solid rgba(201,146,42,.2)",borderRadius:3,padding:"1px 5px"}}>{tag}</span>)}</Row></td>
                <td style={{padding:"9px 12px"}}>{canEdit(t)&&<Row gap={5}>{COLS.filter(c=>c.id!==t.status).map(c=><Btn key={c.id} variant="ghost" size="sm" onClick={()=>move(t.id,c.id)}>→ {c.label.split(" ")[0]}</Btn>)}<Btn variant="ghost" size="sm" onClick={()=>openEdit(t)}>Edit</Btn></Row>}</td>
              </tr>
            ))}</tbody>
          </table>
        </Card>
      )}

      {(modal==="add"||modal?.edit)&&<Modal title={modal==="add"?"Add Task":"Edit Task"} onClose={()=>setModal(null)}>
        <Field label="Title"><Input value={form.title||""} onChange={e=>setForm({...form,title:e.target.value})}/></Field>
        <Field label="Description"><Textarea value={form.description||""} onChange={e=>setForm({...form,description:e.target.value})}/></Field>
        <Row gap={12} wrap style={{justifyContent:"space-between"}}>
          <Field label="Status" half><Select value={form.status||"todo"} onChange={e=>setForm({...form,status:e.target.value})}>{COLS.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}</Select></Field>
          <Field label="Priority" half><Select value={form.priority||"medium"} onChange={e=>setForm({...form,priority:e.target.value})}>{["high","medium","low"].map(p=><option key={p}>{p}</option>)}</Select></Field>
        </Row>
        <Row gap={12} wrap style={{justifyContent:"space-between"}}>
          <Field label="Assigned To" half><Select value={form.assigneeId||""} onChange={e=>setForm({...form,assigneeId:e.target.value})}>{members.filter(m=>m.status==="active").map(m=><option key={m.id} value={m.id}>{m.name}</option>)}</Select></Field>
          <Field label="Due Date" half><Input type="date" value={form.due||""} onChange={e=>setForm({...form,due:e.target.value})}/></Field>
        </Row>
        <Field label="Tags (comma-separated)"><Input value={form.tags||""} onChange={e=>setForm({...form,tags:e.target.value})} placeholder="admin, events, nationals"/></Field>
        <Row gap={8} justify="space-between">
          {modal?.edit&&<Btn variant="danger" size="sm" onClick={()=>setModal({confirm:{msg:"Delete task?",fn:()=>del(form.id)}})}>Delete</Btn>}
          <Row gap={8} style={{marginLeft:"auto"}}><Btn variant="ghost" onClick={()=>setModal(null)}>Cancel</Btn><Btn onClick={save2}>Save</Btn></Row>
        </Row>
      </Modal>}
      {modal?.confirm&&<Confirm message={modal.confirm.msg} onConfirm={modal.confirm.fn} onCancel={()=>setModal(null)}/>}
    </div>
  );
}

// MARKETPLACE
// ══════════════════════════════════════════════════════════════════════════════
// ── ContactSeller ─────────────────────────────────────────────────────────────
// Shown on listings where the seller has hidden their details.
// Logged-in members can send a message; guests are prompted to log in.
function ContactSeller({ listing, user, messages, setMessages }) {
  const [open, setOpen] = React.useState(false);
  const [form, setForm] = React.useState({ name:"", email:"", phone:"", note:"" });
  const [sent, setSent] = React.useState(false);
  const [err, setErr] = React.useState({});

  // Check if user already sent a message for this listing
  const alreadySent = (messages||[]).some(m => m.listingId===listing.id && m.fromMemberId===user?.id);

  async function send() {
    const e = {};
    if(!form.name.trim()) e.name="Required";
    if(!form.email.trim()) e.email="Required";
    if(Object.keys(e).length){setErr(e);return;}
    const msg = {
      id: "MSG"+Date.now().toString(36).toUpperCase(),
      listingId: listing.id,
      listingTitle: listing.title,
      toMemberId: listing.memberId,
      fromMemberId: user?.id||null,
      fromName: form.name||user?.name||"",
      fromEmail: form.email||user?.email||"",
      fromPhone: form.phone||"",
      note: form.note||"",
      sent: new Date().toISOString().slice(0,10),
      read: false,
    };
    const updated = [...(Array.isArray(messages)?messages:[]), msg];
    setMessages(updated);
    await dbSet(SK.messages, updated);
    setSent(true);
    setOpen(false);
  }

  const iSt = (k) => ({
    width:"100%", padding:"9px 12px", border:`1px solid ${err[k]?"var(--burg)":"var(--border2)"}`,
    borderRadius:6, fontSize:13, fontFamily:"var(--font-b)", color:"var(--text)",
    background:"var(--bg2)", outline:"none", boxSizing:"border-box"
  });

  if(sent||alreadySent) return (
    <div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:8,padding:"12px 16px",marginBottom:12,fontSize:13,color:"#166534"}}>
      ✓ Your message has been sent. The seller will see it when they next log in.
    </div>
  );

  return (
    <div style={{marginBottom:12}}>
      <div style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:8,padding:"12px 16px",marginBottom:open?0:0}}>
        <div style={{fontSize:12,color:"var(--text3)",marginBottom:10,lineHeight:1.5}}>
          🔒 The seller has kept their contact details private. You can send them an anonymous message and they'll be notified next time they log in.
        </div>
        {!open
          ?<button onClick={()=>setOpen(true)}
            style={{background:"var(--burg)",border:"none",borderRadius:7,padding:"10px 22px",color:"#fff",fontFamily:"var(--font-b)",fontSize:13,fontWeight:700,cursor:"pointer"}}>
            ✉ Message Seller
          </button>
          :<div style={{marginTop:12,borderTop:"1px solid var(--border)",paddingTop:14}}>
            <div style={{fontWeight:700,fontSize:13,color:"var(--text)",marginBottom:12}}>Your contact details</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
              <div>
                <label style={{fontSize:12,fontWeight:600,color:"var(--text2)",display:"block",marginBottom:4}}>Your Name *</label>
                <input style={iSt("name")} value={form.name} onChange={e=>{setForm(f=>({...f,name:e.target.value}));setErr(v=>({...v,name:null}));}} placeholder="Your full name"/>
                {err.name&&<div style={{fontSize:11,color:"var(--burg)",marginTop:2}}>{err.name}</div>}
              </div>
              <div>
                <label style={{fontSize:12,fontWeight:600,color:"var(--text2)",display:"block",marginBottom:4}}>Your Email *</label>
                <input style={iSt("email")} type="email" value={form.email} onChange={e=>{setForm(f=>({...f,email:e.target.value}));setErr(v=>({...v,email:null}));}} placeholder="your@email.com"/>
                {err.email&&<div style={{fontSize:11,color:"var(--burg)",marginTop:2}}>{err.email}</div>}
              </div>
            </div>
            <div style={{marginBottom:10}}>
              <label style={{fontSize:12,fontWeight:600,color:"var(--text2)",display:"block",marginBottom:4}}>Phone <span style={{fontWeight:400,color:"var(--text3)"}}>(optional)</span></label>
              <input style={iSt()} value={form.phone} onChange={e=>setForm(f=>({...f,phone:e.target.value}))} placeholder="04xx xxx xxx"/>
            </div>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:12,fontWeight:600,color:"var(--text2)",display:"block",marginBottom:4}}>Message <span style={{fontWeight:400,color:"var(--text3)"}}>(optional)</span></label>
              <textarea style={{...iSt(),minHeight:72,resize:"vertical"}} value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} placeholder="Any questions or information for the seller…"/>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={send}
                style={{background:"var(--burg)",border:"none",borderRadius:7,padding:"10px 22px",color:"#fff",fontFamily:"var(--font-b)",fontSize:13,fontWeight:700,cursor:"pointer"}}>
                Send Message →

// ── ListingPhotoUploader ──────────────────────────────────────────────────────
// Resizes photos to max 900px wide, JPEG @ 0.72 quality ≈ 80-130KB each
// 5 photos × ~110KB ≈ 550KB max per listing — reasonable for storage
function ListingPhotoUploader({ photos, onChange }) {
  const MAX = 5;
  const MAX_PX = 900;   // max dimension in pixels
  const QUALITY = 0.72; // JPEG quality — good balance of size vs clarity
  const [dragging, setDragging] = React.useRef(false);
  const [lightbox, setLightbox] = React.useState(null);
  const [processing, setProcessing] = React.useState(false);
  const inputRef = React.useRef();

  async function resizeAndEncode(file) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        URL.revokeObjectURL(url);
        let w = img.width, h = img.height;
        if (w > MAX_PX || h > MAX_PX) {
          if (w > h) { h = Math.round(h * MAX_PX / w); w = MAX_PX; }
          else       { w = Math.round(w * MAX_PX / h); h = MAX_PX; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL("image/jpeg", QUALITY);
        const kb = Math.round(dataUrl.length * 0.75 / 1024);
        resolve({ id: "LP" + Date.now() + Math.random().toString(36).slice(2,6), url: dataUrl, size: kb });
      };
      img.onerror = reject;
      img.src = url;
    });
  }

  async function handleFiles(files) {
    const remaining = MAX - photos.length;
    if (remaining <= 0) return;
    const toProcess = Array.from(files).slice(0, remaining);
    setProcessing(true);
    const results = [];
    for (const f of toProcess) {
      if (!f.type.startsWith("image/")) continue;
      try { results.push(await resizeAndEncode(f)); } catch(e) {}
    }
    setProcessing(false);
    if (results.length) onChange([...photos, ...results]);
  }

  function remove(id) { onChange(photos.filter(p => p.id !== id)); }
  function move(i, dir) {
    const a = [...photos]; const j = i + dir;
    if (j < 0 || j >= a.length) return;
    [a[i], a[j]] = [a[j], a[i]]; onChange(a);
  }

  return (
    <div>
      {/* Thumbnails */}
      {photos.length > 0 && (
        <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:6, marginBottom:10 }}>
          {photos.map((p,i) => (
            <div key={p.id} style={{ position:"relative", aspectRatio:"4/3", borderRadius:6, overflow:"hidden", border:"2px solid var(--border)", cursor:"pointer" }}
              onClick={() => setLightbox(i)}>
              <img src={p.url} alt="" style={{ width:"100%", height:"100%", objectFit:"cover" }}/>
              {i === 0 && <div style={{ position:"absolute", top:3, left:3, background:"var(--burg)", color:"#fff", fontSize:8, fontFamily:"var(--font-m)", padding:"1px 5px", borderRadius:2, letterSpacing:"0.05em" }}>MAIN</div>}
              <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0)", transition:"background .15s" }}
                onMouseEnter={e=>e.currentTarget.style.background="rgba(0,0,0,.18)"}
                onMouseLeave={e=>e.currentTarget.style.background="rgba(0,0,0,0)"}/>
              <div style={{ position:"absolute", top:2, right:2, display:"flex", flexDirection:"column", gap:2 }}
                onClick={e=>e.stopPropagation()}>
                <button onClick={()=>remove(p.id)} title="Remove"
                  style={{ background:"rgba(180,30,30,.85)", border:"none", color:"#fff", width:16, height:16, borderRadius:2, cursor:"pointer", fontSize:10, lineHeight:1, padding:0 }}>×</button>
              </div>
              <div style={{ position:"absolute", bottom:2, left:"50%", transform:"translateX(-50%)", display:"flex", gap:2 }}
                onClick={e=>e.stopPropagation()}>
                {i > 0 && <button onClick={()=>move(i,-1)} title="Move left"
                  style={{ background:"rgba(0,0,0,.6)", border:"none", color:"#fff", width:14, height:14, borderRadius:2, cursor:"pointer", fontSize:9, padding:0 }}>‹</button>}
                {i < photos.length-1 && <button onClick={()=>move(i,1)} title="Move right"
                  style={{ background:"rgba(0,0,0,.6)", border:"none", color:"#fff", width:14, height:14, borderRadius:2, cursor:"pointer", fontSize:9, padding:0 }}>›</button>}
              </div>
              <div style={{ position:"absolute", bottom:2, right:2, background:"rgba(0,0,0,.55)", color:"#fff", fontSize:8, fontFamily:"var(--font-m)", padding:"1px 4px", borderRadius:2 }}>{p.size}KB</div>
            </div>
          ))}
          {/* Empty slots */}
          {Array.from({length: MAX - photos.length}).map((_,i) => (
            <div key={"e"+i} style={{ aspectRatio:"4/3", borderRadius:6, border:"2px dashed var(--border2)", display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", background:"var(--bg3)" }}
              onClick={() => inputRef.current?.click()}>
              <span style={{ fontSize:20, opacity:0.3 }}>+</span>
            </div>
          ))}
        </div>
      )}

      {/* Drop zone (only shown when no photos yet) */}
      {photos.length === 0 && (
        <div style={{ border:"2px dashed var(--border2)", borderRadius:8, padding:"24px 16px", textAlign:"center", background:"var(--bg3)", cursor:"pointer", marginBottom:8 }}
          onClick={() => inputRef.current?.click()}
          onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor="var(--gold)";}}
          onDragLeave={e=>{e.currentTarget.style.borderColor="var(--border2)";}}
          onDrop={e=>{e.preventDefault();e.currentTarget.style.borderColor="var(--border2)";handleFiles(e.dataTransfer.files);}}>
          <div style={{ fontSize:28, marginBottom:6, opacity:0.4 }}>📷</div>
          <div style={{ fontSize:12, color:"var(--text3)", fontFamily:"var(--font-m)" }}>Click or drag photos here</div>
          <div style={{ fontSize:10, color:"var(--text4)", fontFamily:"var(--font-m)", marginTop:3 }}>Up to 5 photos · Auto-resized to ~900px · ~100KB each</div>
        </div>
      )}

      {/* Add more button when there are some but not max */}
      {photos.length > 0 && photos.length < MAX && (
        <button onClick={() => inputRef.current?.click()} style={{ background:"none", border:"1px dashed var(--border2)", borderRadius:6, padding:"5px 14px", fontSize:11, color:"var(--text3)", fontFamily:"var(--font-m)", cursor:"pointer", marginBottom:4 }}>
          {processing ? "Processing…" : `+ Add more (${MAX - photos.length} remaining)`}
        </button>
      )}
      {processing && <div style={{ fontSize:11, color:"var(--gold)", fontFamily:"var(--font-m)", marginTop:4 }}>⟳ Resizing photos…</div>}

      <input ref={inputRef} type="file" accept="image/*" multiple style={{ display:"none" }}
        onChange={e => { handleFiles(e.target.files); e.target.value=""; }}/>

      {/* Lightbox */}
      {lightbox !== null && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.92)", zIndex:9999, display:"flex", alignItems:"center", justifyContent:"center" }}
          onClick={() => setLightbox(null)}>
          <div style={{ maxWidth:"90vw", textAlign:"center" }} onClick={e=>e.stopPropagation()}>
            <img src={photos[lightbox].url} alt="" style={{ maxHeight:"82vh", maxWidth:"88vw", objectFit:"contain", borderRadius:8 }}/>
            <div style={{ color:"rgba(255,255,255,.5)", fontSize:11, marginTop:6, fontFamily:"var(--font-m)" }}>{lightbox+1} / {photos.length} · {photos[lightbox].size}KB</div>
            <div style={{ display:"flex", gap:16, justifyContent:"center", marginTop:10 }}>
              {lightbox > 0 && <button onClick={()=>setLightbox(lightbox-1)}
                style={{ background:"rgba(255,255,255,.2)", border:"none", color:"#fff", padding:"8px 22px", borderRadius:6, cursor:"pointer", fontSize:14 }}>‹ Prev</button>}
              {lightbox < photos.length-1 && <button onClick={()=>setLightbox(lightbox+1)}
                style={{ background:"rgba(255,255,255,.2)", border:"none", color:"#fff", padding:"8px 22px", borderRadius:6, cursor:"pointer", fontSize:14 }}>Next ›</button>}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

                      <Row gap={8} style={{flexShrink:0}}>
                        <Btn variant="success" size="sm" onClick={async()=>{
                          const u=listings.map(x=>x.id===l.id?{...x,status:"active"}:x);
                          setListings(u);await dbSet(SK.listings,u);
                        }}>✓ Approve</Btn>
                        <Btn variant="danger" size="sm" onClick={async()=>{
                          const u=listings.filter(x=>x.id!==l.id);
                          setListings(u);await dbSet(SK.listings,u);
                        }}>✗ Reject</Btn>
                      </Row>
                    </Row>
                    {l.images&&l.images.length>0&&(
                      <div style={{marginTop:12,display:"flex",gap:6}}>
                        {l.images.slice(0,5).map((img,i)=>(
                          <div key={i} style={{width:64,height:48,borderRadius:4,overflow:"hidden",border:"1px solid var(--border)",flexShrink:0}}>
                            <img src={img.url} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                          </div>
                        ))}
                      </div>
                    )}
                  </Card>
                );
              })}
            </div>
          }
        </div>
      )}

      {view&&<Modal title={view.title} onClose={()=>setView(null)} wide>
        {view.images&&view.images.length>0&&<ListingGallery images={view.images}/>}
        <Row gap={8} wrap style={{marginBottom:10}}><Badge status={view.type} label={view.type==="sell"?"FOR SALE":"WANTED"}/><Badge status={view.category}/>{view.condition&&<Badge status={view.condition}/>}</Row>
        {view.price?<div style={{fontFamily:"var(--font-m)",fontSize:22,color:"var(--gold2)",fontWeight:700,marginBottom:4}}>A${view.price.toLocaleString()}{view.negotiable&&<span style={{fontSize:13,color:"var(--text3)",fontWeight:400}}> — Negotiable</span>}</div>
          :<div style={{fontFamily:"var(--font-m)",fontSize:15,color:"var(--gold)",marginBottom:4}}>Price on request</div>}
        <Divider/>
        <div style={{fontSize:13.5,color:"var(--text2)",lineHeight:1.7,marginBottom:16,whiteSpace:"pre-wrap"}}>{view.description}</div>
        {view.category==="car"&&(view.mileage||view.colour||view.transmission||view.bodyStyle||view.extras||view.rego||view.vin)&&(
          <div style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:8,padding:16,marginBottom:16}}>
            <div style={{fontSize:10,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.1em",color:"var(--burg)",marginBottom:12}}>Vehicle Details</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,fontSize:12.5}}>
              {view.mileage&&<div><span style={{color:"var(--text3)",fontSize:9.5,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.08em"}}>Odometer: </span><span style={{color:"var(--text)",fontWeight:600}}>{view.mileage}</span></div>}
              {view.colour&&<div><span style={{color:"var(--text3)",fontSize:9.5,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.08em"}}>Colour: </span><span style={{color:"var(--text)",fontWeight:600}}>{view.colour}</span></div>}
              {view.transmission&&<div><span style={{color:"var(--text3)",fontSize:9.5,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.08em"}}>Transmission: </span><span style={{color:"var(--text)",fontWeight:600}}>{view.transmission}</span></div>}
              {view.bodyStyle&&<div><span style={{color:"var(--text3)",fontSize:9.5,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.08em"}}>Body Style: </span><span style={{color:"var(--text)",fontWeight:600}}>{view.bodyStyle}</span></div>}
              {view.rego&&<div><span style={{color:"var(--text3)",fontSize:9.5,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.08em"}}>Rego: </span><span style={{color:"var(--text)",fontWeight:600}}>{view.rego}</span></div>}
              {view.vin&&<div><span style={{color:"var(--text3)",fontSize:9.5,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.08em"}}>VIN / Chassis: </span><span style={{color:"var(--text)",fontWeight:600}}>{view.vin}</span></div>}
            </div>
            {view.extras&&<div style={{marginTop:10,paddingTop:10,borderTop:"1px solid var(--border)",fontSize:12.5}}><span style={{color:"var(--text3)",fontSize:9.5,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.08em"}}>Extras / Features: </span><span style={{color:"var(--text)"}}>{view.extras}</span></div>}
          </div>
        )}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16,fontSize:12.5}}>
          {[["Posted by",sellerName(view.memberId)],["Location",view.location],["Listed",view.created]].map(([k,v])=>v?(
            <div key={k}><span style={{color:"var(--text3)",fontFamily:"var(--font-m)",fontSize:9.5,textTransform:"uppercase",letterSpacing:"0.08em"}}>{k}: </span><span style={{color:"var(--text)"}}>{v}</span></div>
          ):null)}
        </div>
        {view.hideContact
          ?<ContactSeller listing={view} user={user} messages={messages} setMessages={setMessages}/>
          :view.contact&&<div style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:8,padding:"12px 16px",marginBottom:12,fontSize:13}}>
            <span style={{color:"var(--text3)",fontFamily:"var(--font-m)",fontSize:9.5,textTransform:"uppercase",letterSpacing:"0.08em"}}>Contact: </span>
            <span style={{color:"var(--burg)",fontWeight:600}}>{view.contact}</span>
          </div>
        }
        {(user.role==="admin"||view.memberId===user.id)&&(
          <Row gap={8} justify="flex-end">
            <Btn variant="danger" size="sm" onClick={()=>setModal({confirm:{msg:"Delete listing?",fn:()=>del(view.id)}})}>Delete</Btn>
            {view.type==="sell"&&view.status==="active"&&<Btn variant="ghost" size="sm" onClick={()=>markSold(view.id)}>Mark Sold</Btn>}
            <Btn variant="ghost" size="sm" onClick={()=>{setView(null);openEdit(view);}}>Edit</Btn>
          </Row>
        )}
      </Modal>}

      {(modal==="add"||modal?.edit)&&<Modal title={modal==="add"?"Post Listing":"Edit Listing"} onClose={()=>setModal(null)}>
        <Row gap={12} wrap style={{justifyContent:"space-between"}}>
          <Field label="Type" half><Select value={form.type||"sell"} onChange={e=>setForm({...form,type:e.target.value})}>{getCats(cats).listingType.map(t=><option key={t} value={t}>{t.charAt(0).toUpperCase()+t.slice(1)}</option>)}</Select></Field>
          <Field label="Category" half><Select value={form.category||"parts"} onChange={e=>setForm({...form,category:e.target.value})}>{["car","parts","memorabilia","manuals","tools","other"].map(c=><option key={c}>{c}</option>)}</Select></Field>
        </Row>
        <Field label="Title"><Input value={form.title||""} onChange={e=>setForm({...form,title:e.target.value})} placeholder="1972 Rover P6 — Project Car"/></Field>
        <Field label="Description"><Textarea value={form.description||""} onChange={e=>setForm({...form,description:e.target.value})} style={{minHeight:100}} placeholder="Full description…"/></Field>
        {form.type!=="wanted"&&<Row gap={12} wrap style={{justifyContent:"space-between"}}>
          <Field label="Price (A$)" half><Input type="number" value={form.price||""} onChange={e=>setForm({...form,price:e.target.value})}/></Field>
          <Field label="Condition" half><Select value={form.condition||"good"} onChange={e=>setForm({...form,condition:e.target.value})}>{["excellent","good","fair","project","parts only"].map(c=><option key={c}>{c}</option>)}</Select></Field>
        </Row>}
        {form.category==="car"&&<div style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:6,padding:"12px 14px",marginBottom:14}}>
          <div style={{fontSize:10,fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.1em",color:"var(--burg)",marginBottom:10}}>Vehicle Details</div>
          <Row gap={12} wrap style={{justifyContent:"space-between"}}>
            <Field label="Odometer / Mileage" half><Input value={form.mileage||""} onChange={e=>setForm({...form,mileage:e.target.value})} placeholder="e.g. 62,000 miles or 99,000 km"/></Field>
            <Field label="Colour" half><Input value={form.colour||""} onChange={e=>setForm({...form,colour:e.target.value})} placeholder="e.g. Zircon Blue"/></Field>
          </Row>
          <Row gap={12} wrap style={{justifyContent:"space-between"}}>
            <Field label="Transmission" half><Select value={form.transmission||""} onChange={e=>setForm({...form,transmission:e.target.value})}>
              <option value="">— Not specified —</option>
              {["Manual","Automatic","Manual (converted)","Automatic (converted)"].map(t=><option key={t}>{t}</option>)}
            </Select></Field>
            <Field label="Body Style" half><Select value={form.bodyStyle||""} onChange={e=>setForm({...form,bodyStyle:e.target.value})}>
              <option value="">— Not specified —</option>
              {["Saloon","Estate","Coupe","Hatchback","SUV / 4WD","Convertible","Van","Ute","Other"].map(s=><option key={s}>{s}</option>)}
            </Select></Field>
          </Row>
          <Field label="Extras / Options / Notable Features"><Textarea value={form.extras||""} onChange={e=>setForm({...form,extras:e.target.value})} style={{minHeight:70}} placeholder="e.g. Original matching numbers, overdrive, P&O leather, recent engine rebuild, new tyres…"/></Field>
          <Row gap={12} wrap style={{justifyContent:"space-between"}}>
            <Field label="Registration / Rego" half><Input value={form.rego||""} onChange={e=>setForm({...form,rego:e.target.value})} placeholder="e.g. ABC-123 or Unregistered"/></Field>
            <Field label="VIN / Chassis No." half><Input value={form.vin||""} onChange={e=>setForm({...form,vin:e.target.value})} placeholder="Optional"/></Field>
          </Row>
        </div>}
        <Row gap={12} wrap style={{justifyContent:"space-between"}}>
          <Field label="Location" half><Input value={form.location||""} onChange={e=>setForm({...form,location:e.target.value})} placeholder="Melbourne, VIC"/></Field>
          <Field label="Contact Email" half><Input value={form.contact||""} onChange={e=>setForm({...form,contact:e.target.value})}/></Field>
        </Row>
        <Row gap={12} wrap style={{justifyContent:"space-between"}}>
          <Field label="Seller Name" half><Input value={form.sellerName||""} onChange={e=>setForm({...form,sellerName:e.target.value})} placeholder="Name shown on listing"/></Field>
        </Row>
        <div style={{background:form.hideContact?"rgba(192,40,42,.07)":"var(--bg3)",border:`1px solid ${form.hideContact?"var(--burg)":"var(--border)"}`,borderRadius:8,padding:"12px 16px",marginBottom:12,display:"flex",alignItems:"flex-start",gap:14,cursor:"pointer"}} onClick={()=>setForm({...form,hideContact:!form.hideContact})}>
          <input type="checkbox" checked={!!form.hideContact} onChange={e=>setForm({...form,hideContact:e.target.checked})} style={{width:18,height:18,accentColor:"var(--burg)",marginTop:2,flexShrink:0,cursor:"pointer"}}/>
          <div>
            <div style={{fontWeight:700,fontSize:14,color:"var(--text)",marginBottom:2}}>Hide my contact details</div>
            <div style={{fontSize:12,color:"var(--text3)",lineHeight:1.5}}>Your name, email and phone won't be shown on the listing. Interested buyers can send you a message through the portal — you'll see it when you next log in.</div>
          </div>
        </div>
        <Field label="Negotiable?"><Select value={form.negotiable?"yes":"no"} onChange={e=>setForm({...form,negotiable:e.target.value==="yes"})}><option value="no">Fixed Price</option><option value="yes">Negotiable / ONO</option></Select></Field>
        <Field label="Photos (up to 5)">
          <ListingPhotoUploader photos={form.images||[]} onChange={imgs=>setForm({...form,images:imgs})}/>
        </Field>
        <Row gap={8} justify="flex-end"><Btn variant="ghost" onClick={()=>setModal(null)}>Cancel</Btn><Btn onClick={handleSave}>Post Listing</Btn></Row>
      </Modal>}
      {modal?.confirm&&<Confirm message={modal.confirm.msg} onConfirm={modal.confirm.fn} onCancel={()=>setModal(null)}/>}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// SHOP
// ══════════════════════════════════════════════════════════════════════════════
function ShopSection({ user, shopItems, setShopItems, orders, setOrders }) {
  const isAdmin=user.role==="admin";
  const [cart,setCart]=useState({});
  const [tab2,setTab2]=useState("shop");
  const [modal,setModal]=useState(null); const [form,setForm]=useState({});
  const [view,setView]=useState(null);
  const [selVariant,setSelVariant]=useState({});
  const cartCount=Object.values(cart).reduce((s,v)=>s+(v.qty||0),0);
  const cartTotal=Object.entries(cart).reduce((s,[id,{qty}])=>{const item=shopItems.find(x=>x.id===id);return s+(item?item.price*qty:0);},0);

  function addToCart(item,variant=""){
    const key=item.id+(variant?"_"+variant:"");
    setCart(c=>({...c,[key]:{itemId:item.id,variant,qty:(c[key]?.qty||0)+1}}));
  }
  function removeFromCart(key){setCart(c=>{const n={...c};delete n[key];return n;});}
  function adjustQty(key,delta){setCart(c=>{const n={...c};if(!n[key])return n;n[key]={...n[key],qty:Math.max(0,n[key].qty+delta)};if(n[key].qty===0)delete n[key];return n;});}

  async function placeOrder(){
    if(cartCount===0)return;
    const items=Object.entries(cart).map(([key,{itemId,variant,qty}])=>{const item=shopItems.find(x=>x.id===itemId);return{itemId,itemName:item?.name||itemId,variant,qty,unitPrice:item?.price||0};});
    const order={id:uid("ORD"),memberId:user.id,memberName:user.name,items,total:cartTotal,status:"pending",placed:today,notes:""};
    const u=[...orders,order]; setOrders(u); await dbSet(SK.orders,u);
    // Deduct stock
    const updatedShop=shopItems.map(item=>{const sold=items.filter(x=>x.itemId===item.id).reduce((s,x)=>s+x.qty,0);return sold>0?{...item,stock:Math.max(0,item.stock-sold)}:item;});
    setShopItems(updatedShop); await dbSet(SK.shopItems,updatedShop);
    setCart({}); setModal({orderPlaced:order});
  }

  async function handleSaveItem(){
    if(!form.name||!form.price)return alert("Name and price required.");
    const u=modal==="addItem"?[...shopItems,{...form,id:uid("S"),price:Number(form.price),stock:Number(form.stock)||0,variants:form.variants?form.variants.split(",").map(s=>s.trim()).filter(Boolean):[]}]
      :shopItems.map(x=>x.id===form.id?{...form,price:Number(form.price),stock:Number(form.stock)||0,variants:form.variants?form.variants.split(",").map(s=>s.trim()).filter(Boolean):x.variants}:x);
    setShopItems(u);await dbSet(SK.shopItems,u);setModal(null);
  }

  async function updateOrderStatus(id,status){const u=orders.map(o=>o.id===id?{...o,status}:o);setOrders(u);await dbSet(SK.orders,u);}

  const myOrders=orders.filter(o=>o.memberId===user.id);
  const cats=[...new Set(shopItems.map(x=>x.category))];

  const STATUS_ORDER_COL={pending:"var(--gold)",processing:"var(--blue2)",dispatched:"var(--green2)",delivered:"var(--green2)",cancelled:"var(--red2)"};

  return (
    <div className="fade-up">
      <Row justify="space-between" align="center" style={{marginBottom:22}}>
        <div>
          <h2 style={{fontFamily:"var(--font-d)",fontSize:26,color:"var(--gold3)",fontWeight:700,margin:0,lineHeight:1}}>Club Shop</h2>
          <p style={{margin:"5px 0 0",fontSize:11,color:"var(--text3)",fontFamily:"var(--font-m)"}}>Official RCCA merchandise & publications</p>
        </div>
        <Row gap={10} align="center">
          {cartCount>0&&<button onClick={()=>setTab2("cart")} style={{background:"var(--burg)",border:"1px solid var(--burg2)",borderRadius:6,padding:"8px 16px",cursor:"pointer",color:"#ffffff",fontFamily:"var(--font-b)",fontWeight:700,fontSize:13}}>
            🛒 Cart ({cartCount}) — A${cartTotal.toFixed(2)}
          </button>}
          {isAdmin&&<Btn variant="ghost" size="sm" onClick={()=>setTab2("orders")}>Orders</Btn>}
          <Btn variant="ghost" size="sm" onClick={()=>setTab2("myorders")}>My Orders</Btn>
          {isAdmin&&<Btn size="sm" onClick={()=>{setForm({name:"",description:"",price:"",stock:"",category:"merchandise",sku:"",image:"📦",variants:"",status:"active"});setModal("addItem");}}>+ Add Item</Btn>}
        </Row>
      </Row>

      {/* Sub-tabs */}
      <Row gap={0} style={{marginBottom:20,borderBottom:"1px solid var(--border)"}}>
        {[{id:"shop",label:"Shop"},{id:"cart",label:`Cart (${cartCount})`},{id:"myorders",label:"My Orders"},{...(isAdmin?{id:"orders",label:"All Orders"}:{id:null})}].filter(x=>x.id).map(t=>(
          <button key={t.id} onClick={()=>setTab2(t.id)} style={{background:"none",border:"none",borderBottom:tab2===t.id?"2px solid var(--gold)":"2px solid transparent",color:tab2===t.id?"var(--gold2)":"var(--text3)",padding:"8px 18px",fontFamily:"var(--font-b)",fontSize:13,cursor:"pointer",marginBottom:-1,fontWeight:tab2===t.id?700:400}}>
            {t.label}
          </button>
        ))}
      </Row>

      {tab2==="shop"&&(
        <>
          {cats.map(cat=>{
            const catItems=shopItems.filter(x=>x.category===cat&&x.status==="active");
            if(!catItems.length)return null;
            return (<div key={cat} style={{marginBottom:28}}>
              <div style={{fontFamily:"var(--font-m)",fontSize:10.5,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:12,paddingBottom:6,borderBottom:"1px solid var(--border)"}}>{cat}</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:12}}>
                {catItems.map(item=>{
                  const sv=selVariant[item.id]||"";
                  return (
                    <Card key={item.id} className="hover-lift" style={{padding:16,display:"flex",flexDirection:"column",gap:10}}>
                      <div style={{textAlign:"center",fontSize:44,lineHeight:1,marginBottom:4}}>{item.image}</div>
                      <div>
                        <div style={{fontFamily:"var(--font-d)",fontSize:14.5,fontWeight:700,color:"var(--text)",lineHeight:1.3,marginBottom:4}}>{item.name}</div>
                        <div style={{fontSize:11,color:"var(--text3)",lineHeight:1.5}}>{item.description}</div>
                      </div>
                      <div style={{marginTop:"auto"}}>
                        <Row justify="space-between" align="center" style={{marginBottom:8}}>
                          <span style={{fontFamily:"var(--font-m)",fontSize:18,color:"var(--gold2)",fontWeight:700}}>A${item.price}</span>
                          <span style={{fontSize:10.5,color:item.stock>0?"var(--green2)":"var(--red2)",fontFamily:"var(--font-m)"}}>{item.stock>0?`${item.stock} in stock`:"Out of stock"}</span>
                        </Row>
                        {item.variants?.length>0&&<Select value={sv} onChange={e=>setSelVariant({...selVariant,[item.id]:e.target.value})} style={{marginBottom:8,fontSize:12}}>
                          <option value="">Select size/variant…</option>
                          {item.variants.map(v=><option key={v} value={v}>{v}</option>)}
                        </Select>}
                        <Row gap={6}>
                          <Btn onClick={()=>{if(item.variants?.length>0&&!sv){alert("Please select a variant.");return;}addToCart(item,sv);}} style={{flex:1,justifyContent:"center"}} size="sm" variant={item.stock>0?"primary":"ghost"} disabled={item.stock===0}>
                            {item.stock>0?"Add to Cart":"Unavailable"}
                          </Btn>
                          {isAdmin&&<Btn variant="ghost" size="sm" onClick={()=>{setForm({...item,variants:(item.variants||[]).join(",")});setModal({editItem:item});}}>✏</Btn>}
                        </Row>
                      </div>
                    </Card>
                  );
                })}
              </div>
            </div>);
          })}
        </>
      )}

      {tab2==="cart"&&(
        <div style={{maxWidth:600}}>
          {cartCount===0?<EmptyState icon="🛒" text="Your cart is empty" sub="Browse the shop and add items"/>:(
            <>
              <Col gap={10} style={{marginBottom:20}}>
                {Object.entries(cart).map(([key,{itemId,variant,qty}])=>{
                  const item=shopItems.find(x=>x.id===itemId);
                  if(!item)return null;
                  return (
                    <Card key={key} style={{padding:"14px 18px"}}>
                      <Row justify="space-between" align="center">
                        <Row gap={12} align="center">
                          <span style={{fontSize:28}}>{item.image}</span>
                          <div><div style={{fontFamily:"var(--font-d)",fontSize:14,fontWeight:700,color:"var(--text)"}}>{item.name}</div>{variant&&<div style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--font-m)"}}>Variant: {variant}</div>}<div style={{fontSize:12,color:"var(--gold2)",fontFamily:"var(--font-m)"}}>A${item.price} each</div></div>
                        </Row>
                        <Row gap={8} align="center">
                          <button onClick={()=>adjustQty(key,-1)} style={{background:"var(--bg3)",border:"1px solid var(--border2)",color:"var(--text2)",width:26,height:26,borderRadius:4,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                          <span style={{fontFamily:"var(--font-m)",fontSize:14,color:"var(--text)",minWidth:20,textAlign:"center"}}>{qty}</span>
                          <button onClick={()=>adjustQty(key,1)} style={{background:"var(--bg3)",border:"1px solid var(--border2)",color:"var(--text2)",width:26,height:26,borderRadius:4,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                          <span style={{fontFamily:"var(--font-m)",fontSize:14,color:"var(--gold2)",minWidth:60,textAlign:"right"}}>A${(item.price*qty).toFixed(2)}</span>
                          <button onClick={()=>removeFromCart(key)} style={{background:"none",border:"none",color:"var(--red2)",cursor:"pointer",fontSize:16}}>✕</button>
                        </Row>
                      </Row>
                    </Card>
                  );
                })}
              </Col>
              <Card style={{padding:20,background:"linear-gradient(135deg,var(--bg2),var(--bg3))"}}>
                <Row justify="space-between" align="center" style={{marginBottom:16}}>
                  <div style={{fontFamily:"var(--font-d)",fontSize:16,color:"var(--text2)"}}>Order Total</div>
                  <div style={{fontFamily:"var(--font-m)",fontSize:22,color:"var(--gold2)",fontWeight:700}}>A${cartTotal.toFixed(2)}</div>
                </Row>
                <div style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--font-m)",marginBottom:16}}>Payment will be arranged separately. You will be contacted by the club treasurer.</div>
                <Btn size="lg" style={{width:"100%"}} onClick={placeOrder}>Place Order →</Btn>
              </Card>
            </>
          )}
        </div>
      )}

      {tab2==="myorders"&&(
        <Col gap={12}>
          {myOrders.length===0?<EmptyState icon="📦" text="No orders yet" sub="Your order history will appear here"/>:
            myOrders.map(o=>(
              <Card key={o.id} style={{padding:18}}>
                <Row justify="space-between" align="flex-start" style={{marginBottom:10}}>
                  <div><div style={{fontFamily:"var(--font-m)",fontSize:11,color:"var(--text3)",marginBottom:3}}>Order {o.id} · {o.placed}</div><div style={{fontFamily:"var(--font-m)",fontSize:18,color:"var(--gold2)",fontWeight:700}}>A${o.total.toFixed(2)}</div></div>
                  <span style={{background:"var(--bg3)",border:`1px solid ${STATUS_ORDER_COL[o.status]||"var(--border)"}`,color:STATUS_ORDER_COL[o.status]||"var(--text3)",fontSize:10,fontFamily:"var(--font-m)",borderRadius:4,padding:"3px 8px",letterSpacing:"0.1em",textTransform:"uppercase"}}>{o.status}</span>

function ProfileSection({ user, setUser, members, setMembers, dues, cars, setCars }) {
  var fState=useState({...user}); var form=fState[0]; var setForm=fState[1];
  var svState=useState(false); var saved=svState[0]; var setSaved=svState[1];
  var cmState=useState(null); var carModal=cmState[0]; var setCarModal=cmState[1];
  var cfState=useState({}); var carForm=cfState[0]; var setCarForm=cfState[1];
  var myDues=dues.filter(function(d){return d.memberId===user.id;}).sort(function(a,b){return b.year-a.year;});
  var myCars=cars.filter(function(c){return c.ownerId===user.id;});
  var MAX_CARS=100;
  async function handleSave(){
    if(!form.name||!form.email)return alert("Name and email required.");
    var final=Object.assign({},form,{password:form.newPassword||form.password});delete final.newPassword;
    var u=members.map(function(m){return m.id===user.id?Object.assign({},final):m;});
    setMembers(u);await dbSet(SK.members,u);setUser(Object.assign({},final));setSaved(true);setTimeout(function(){setSaved(false);},2500);
  }
  function openAddCar(){
    if(myCars.length>=MAX_CARS)return alert("Maximum "+MAX_CARS+" vehicles reached.");
    setCarForm({make:"Rover",model:"",year:new Date().getFullYear(),colour:"",reg:"",chassis:"",status:"active",notes:""});
    setCarModal("add");
  }
  async function saveCar(){
    if(!carForm.make||!carForm.model)return alert("Make and model required.");
    var isNew=carModal==="add";
    var updated=isNew?cars.concat([Object.assign({},carForm,{id:uid("C"),ownerId:user.id,registered:today,photos:[]})]):cars.map(function(c){return c.id===carForm.id?Object.assign({},carForm):c;});
    setCars(updated);await dbSet(SK.cars,updated);setCarModal(null);
  }
  async function removeCar(id){
    var updated=cars.map(function(c){return c.id===id?Object.assign({},c,{status:"sold"}):c;});
    setCars(updated);await dbSet(SK.cars,updated);
  }
  return (
    <div className="fade-up" style={{maxWidth:760}}>
      <SectionHeader title="My Profile" subtitle="Manage your account, vehicles and membership details"/>
      <div style={{display:"grid",gridTemplateColumns:"auto 1fr",gap:24,marginBottom:20,alignItems:"start"}}>
        <Avatar name={user.name} size={80}/>
        <div>
          <div style={{fontFamily:"var(--font-d)",fontSize:24,fontWeight:700}}>{user.name}</div>
          <Row gap={6} style={{marginTop:7}} wrap><Badge status={user.role}/><Badge status={user.status}/></Row>
          <div style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--font-m)",marginTop:8}}>Member No. {user.memberNumber||user.id} · Joined {user.joined}</div>
        </div>
      </div>
      <Card style={{padding:22,marginBottom:16}}>
        <div style={{fontFamily:"var(--font-d)",fontSize:16,fontWeight:600,marginBottom:16}}>Personal Details</div>
        <Row gap={12} wrap style={{justifyContent:"space-between"}}>
          <Field label="Full Name" half><Input value={form.name||""} onChange={function(e){setForm(Object.assign({},form,{name:e.target.value}));}}/></Field>
          <Field label="Email" half><Input type="email" value={form.email||""} onChange={function(e){setForm(Object.assign({},form,{email:e.target.value}));}}/></Field>
        </Row>
        <Row gap={12} wrap style={{justifyContent:"space-between"}}>
          <Field label="Phone" half><Input value={form.phone||""} onChange={function(e){setForm(Object.assign({},form,{phone:e.target.value}));}}/></Field>
          <Field label="State" half><Select value={form.state||"VIC"} onChange={function(e){setForm(Object.assign({},form,{state:e.target.value}));}}>{["ACT","NSW","NT","QLD","SA","TAS","VIC","WA"].map(function(s){return <option key={s}>{s}</option>;})}</Select></Field>
        </Row>
        <Field label="New Password"><Input type="password" value={form.newPassword||""} onChange={function(e){setForm(Object.assign({},form,{newPassword:e.target.value}));}} placeholder="leave blank to keep current"/></Field>
        <Field label="Bio"><Textarea value={form.bio||""} onChange={function(e){setForm(Object.assign({},form,{bio:e.target.value}));}} placeholder="Tell us about yourself"/></Field>
        <Row gap={10}><Btn onClick={handleSave}>Save Changes</Btn>{saved&&<span style={{fontSize:12,color:"var(--green2)"}}>Saved</span>}</Row>
      </Card>
      <Card style={{padding:22,marginBottom:16}}>
        <Row justify="space-between" align="center" style={{marginBottom:14}}>
          <div style={{fontFamily:"var(--font-d)",fontSize:16,fontWeight:600}}>My Vehicles ({myCars.length}/{MAX_CARS})</div>
          <Btn size="sm" onClick={openAddCar}>+ Add Vehicle</Btn>
        </Row>
        {myCars.length===0&&<EmptyState icon="car" text="No vehicles registered yet"/>}
        {myCars.map(function(car){
          return (
            <div key={car.id} style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:8,padding:14,marginBottom:10,borderLeft:"4px solid "+(car.status==="active"?"var(--green2)":"var(--border2)")}}>
              <Row justify="space-between">
                <div>
                  <div style={{fontFamily:"var(--font-d)",fontSize:14,fontWeight:700}}>{car.year} {car.make} {car.model}</div>
                  <div style={{fontSize:12,color:"var(--text3)",marginTop:4}}>{car.colour}{car.reg?" · "+car.reg:""}</div>
                  {car.notes&&<div style={{fontSize:11,color:"var(--text3)",marginTop:4,fontStyle:"italic"}}>{car.notes}</div>}
                </div>
                <Row gap={6}>
                  <Btn variant="ghost" size="sm" onClick={function(){setCarForm(Object.assign({},car));setCarModal(car);}}>Edit</Btn>
                  {car.status==="active"&&<Btn variant="ghost" size="sm" onClick={function(){removeCar(car.id);}}>Remove</Btn>}
                </Row>
              </Row>
            </div>
          );
        })}
      </Card>
      <Card style={{padding:22}}>
        <div style={{fontFamily:"var(--font-d)",fontSize:16,fontWeight:600,marginBottom:14}}>Dues History</div>
        {myDues.length===0?<EmptyState icon="dues" text="No dues records"/>:myDues.map(function(d){
          return (
            <Row key={d.id} justify="space-between" style={{padding:"9px 14px",background:"var(--bg3)",borderRadius:6,marginBottom:8}}>
              <span style={{fontFamily:"var(--font-m)",fontSize:12}}>{d.year}</span>
              <span style={{fontFamily:"var(--font-m)",fontSize:13,color:"var(--burg)",fontWeight:700}}>A${d.amount}</span>
              <Badge status={d.paid?"paid":"overdue"} label={d.paid?"PAID":"OUTSTANDING"}/>
              <span style={{fontSize:11,color:"var(--text3)"}}>{d.paidDate||"unpaid"}</span>
            </Row>
          );
        })}
      </Card>
      {carModal&&(
        <Modal title={carModal==="add"?"Add Vehicle":"Edit Vehicle"} onClose={function(){setCarModal(null);}}>
          <Row gap={12} wrap style={{justifyContent:"space-between"}}>
            <Field label="Make" half><Input value={carForm.make||""} onChange={function(e){setCarForm(Object.assign({},carForm,{make:e.target.value}));}}/></Field>
            <Field label="Model" half><Input value={carForm.model||""} onChange={function(e){setCarForm(Object.assign({},carForm,{model:e.target.value}));}}/></Field>
          </Row>
          <Row gap={12} wrap style={{justifyContent:"space-between"}}>
            <Field label="Year" half><Input type="number" value={carForm.year||""} onChange={function(e){setCarForm(Object.assign({},carForm,{year:Number(e.target.value)}));}}/></Field>
            <Field label="Colour" half><Input value={carForm.colour||""} onChange={function(e){setCarForm(Object.assign({},carForm,{colour:e.target.value}));}}/></Field>
          </Row>
          <Row gap={12} wrap style={{justifyContent:"space-between"}}>
            <Field label="Rego" half><Input value={carForm.reg||""} onChange={function(e){setCarForm(Object.assign({},carForm,{reg:e.target.value}));}}/></Field>
            <Field label="Chassis" half><Input value={carForm.chassis||""} onChange={function(e){setCarForm(Object.assign({},carForm,{chassis:e.target.value}));}}/></Field>
          </Row>
          <Field label="Status"><Select value={carForm.status||"active"} onChange={function(e){setCarForm(Object.assign({},carForm,{status:e.target.value}));}}>{["active","sold","destroyed"].map(function(s){return <option key={s}>{s}</option>;})}</Select></Field>
          <Field label="Notes"><Textarea value={carForm.notes||""} onChange={function(e){setCarForm(Object.assign({},carForm,{notes:e.target.value}));}}/></Field>
          <Row gap={10} justify="flex-end">
            <Btn variant="ghost" onClick={function(){setCarModal(null);}}>Cancel</Btn>
            <Btn onClick={saveCar}>{carModal==="add"?"Add":"Save"}</Btn>
          </Row>
        </Modal>
      )}
    </div>
  );
}

          </p>
          <button onClick={()=>setPage("membership")} style={{background:"#ffffff",border:"2px solid #ffffff",borderRadius:8,padding:"14px 36px",color:"var(--burg-xdk)",fontFamily:"var(--font-b)",fontSize:15,fontWeight:700,cursor:"pointer"}}>
            📋 Apply Online Now

      </div>
    </div>
  );
}

// ── PUBLIC NEWS PAGE ──────────────────────────────────────────────────────────
function PublicNews({ news, selectedArticle, setSelectedArticle }) {
  const published = news.filter(n=>n.status==="published").sort((a,b)=>b.date.localeCompare(a.date));
  const catColour = { event:"var(--burg2)", news:"var(--blue2)", merchandise:"var(--green2)", technical:"var(--gold)" };
  const catLabel = { event:"Event", news:"Club News", merchandise:"Merchandise", technical:"Technical" };

  if (selectedArticle) {
    const art = news.find(n=>n.id===selectedArticle);
    if (!art) { setSelectedArticle(null); return null; }
    return (
      <div>
        <div style={{background:"linear-gradient(160deg,var(--burg-xdk),#0a0608)",padding:"48px 24px 36px"}}>
          <div style={{maxWidth:760,margin:"0 auto"}}>
            <button onClick={()=>setSelectedArticle(null)} style={{background:"none",border:"none",color:"var(--text3)",fontFamily:"var(--font-b)",fontSize:13,cursor:"pointer",marginBottom:16,display:"flex",alignItems:"center",gap:6}}>← Back to News</button>
            <div style={{display:"flex",gap:10,marginBottom:12}}>
              <span style={{background:catColour[art.category]||"var(--burg)",color:"white",fontSize:10,fontFamily:"var(--font-m)",padding:"3px 8px",borderRadius:4,textTransform:"uppercase",letterSpacing:"0.08em"}}>{catLabel[art.category]||art.category}</span>
              {art.pinned&&<span style={{background:"var(--gold)",color:"var(--burg-xdk)",fontSize:10,fontFamily:"var(--font-m)",padding:"3px 8px",borderRadius:4,textTransform:"uppercase",letterSpacing:"0.08em"}}>📌 Featured</span>}
            </div>
            <h1 style={{fontFamily:"var(--font-d)",fontSize:36,color:"var(--gold3)",fontWeight:700,lineHeight:1.15,margin:"0 0 12px"}}>{art.title}</h1>
            <div style={{fontSize:12,color:"var(--text3)",fontFamily:"var(--font-m)"}}>By {art.authorName} · {art.date}</div>
          </div>
        </div>
        <div style={{maxWidth:760,margin:"0 auto",padding:"40px 24px"}}>
          <div style={{fontSize:34,marginBottom:20,textAlign:"center"}}>{art.image}</div>
          <div style={{fontSize:15,color:"var(--text2)",lineHeight:1.9,whiteSpace:"pre-wrap"}}>{art.body}</div>
        </div>
      </div>
    );
  }

  return (
    <div>
      <div style={{background:"linear-gradient(160deg,var(--burg-xdk),var(--burg))",padding:"72px 24px 52px",textAlign:"center"}}>
        <div style={{fontFamily:"var(--font-m)",fontSize:10,color:"rgba(255,255,255,.7)",textTransform:"uppercase",letterSpacing:"0.2em",marginBottom:12}}>From the Club</div>
        <h1 style={{fontFamily:"var(--font-d)",fontSize:48,color:"#ffffff",fontWeight:700,margin:"0 0 16px"}}>News &amp; Announcements</h1>
        <p style={{fontSize:14,color:"rgba(255,255,255,.85)",maxWidth:480,margin:"0 auto",lineHeight:1.7}}>The latest from the Rover Car Club of Australia — events, member news, and club announcements.</p>
      </div>

      <div style={{maxWidth:1000,margin:"0 auto",padding:"52px 24px"}}>
        {/* Featured article */}
        {published.find(n=>n.pinned) && (() => {
          const featured = published.find(n=>n.pinned);
          return (
            <div style={{background:"linear-gradient(135deg,var(--burg-dk),var(--bg2))",border:"1px solid var(--gold)",borderRadius:10,padding:28,marginBottom:32,cursor:"pointer"}} onClick={()=>setSelectedArticle(featured.id)}>
              <div style={{display:"flex",gap:10,marginBottom:10}}>
                <span style={{background:"var(--gold)",color:"var(--burg-xdk)",fontSize:10,fontFamily:"var(--font-m)",padding:"3px 8px",borderRadius:4,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em"}}>📌 Featured</span>
                <span style={{background:catColour[featured.category]||"var(--burg)",color:"white",fontSize:10,fontFamily:"var(--font-m)",padding:"3px 8px",borderRadius:4,textTransform:"uppercase"}}>{catLabel[featured.category]}</span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:20,alignItems:"center"}}>
                <div>
                  <h2 style={{fontFamily:"var(--font-d)",fontSize:26,color:"var(--gold3)",fontWeight:700,marginBottom:10,lineHeight:1.2}}>{featured.title}</h2>
                  <p style={{fontSize:13.5,color:"var(--text2)",lineHeight:1.7,marginBottom:12}}>{featured.excerpt}</p>
                  <div style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--font-m)"}}>{featured.authorName} · {featured.date}</div>
                </div>
                <div style={{fontSize:56,opacity:.7}}>{featured.image}</div>
              </div>
            </div>
          );
        })()}

        {/* News grid */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:16}}>
          {published.filter(n=>!n.pinned).map(n=>(
            <div key={n.id} style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:8,padding:20,cursor:"pointer",transition:"border-color .15s"}}
              onClick={()=>setSelectedArticle(n.id)}
              onMouseEnter={e=>e.currentTarget.style.borderColor="var(--gold)"}
              onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                <div style={{fontSize:28}}>{n.image}</div>
                <span style={{background:catColour[n.category]||"var(--burg)",color:"white",fontSize:9.5,fontFamily:"var(--font-m)",padding:"2px 7px",borderRadius:3,textTransform:"uppercase"}}>{catLabel[n.category]||n.category}</span>
              </div>
              <h3 style={{fontFamily:"var(--font-d)",fontSize:16,color:"var(--gold3)",fontWeight:700,lineHeight:1.3,marginBottom:8}}>{n.title}</h3>
              <p style={{fontSize:12.5,color:"var(--text2)",lineHeight:1.6,marginBottom:12}}>{n.excerpt}</p>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontSize:10.5,color:"var(--text3)",fontFamily:"var(--font-m)"}}>{n.authorName.split(" ")[0]} · {n.date}</div>

// ── NEWS ADMIN (inside portal) ────────────────────────────────────────────────
function NewsAdminSection({ user, news, setNews }) {
  const [modal,setModal]=useState(null); const [form,setForm]=useState({}); const [view,setView]=useState(null);
  function openAdd(){setForm({title:"",category:"news",body:"",excerpt:"",image:"📰",pinned:false,status:"published",authorId:user.id,authorName:user.name,date:today,slug:""});setModal("add");}
  function openEdit(n){setForm({...n});setModal({edit:n});}
  async function handleSave(){
    if(!form.title||!form.body)return alert("Title and body required.");
    const slug=form.slug||form.title.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
    const article={...form,slug,excerpt:form.excerpt||form.body.slice(0,160)+"…"};
    const u=modal==="add"?[...news,{...article,id:uid("N")}]:news.map(n=>n.id===article.id?article:n);
    setNews(u);await dbSet(SK.news,u);setModal(null);
  }
  async function del(id){const u=news.filter(n=>n.id!==id);setNews(u);await dbSet(SK.news,u);setModal(null);setView(null);}
  async function togglePin(id){const u=news.map(n=>n.id===id?{...n,pinned:!n.pinned}:n);setNews(u);await dbSet(SK.news,u);}
  async function toggleStatus(id){const u=news.map(n=>n.id===id?{...n,status:n.status==="published"?"draft":"published"}:n);setNews(u);await dbSet(SK.news,u);}
  const catColour={event:"var(--burg2)",news:"var(--blue2)",merchandise:"var(--green2)",technical:"var(--gold)"};
  const sorted=[...news].sort((a,b)=>b.date.localeCompare(a.date));
  return (
    <div className="fade-up">
      <SectionHeader title="News &amp; Articles" subtitle={`${news.filter(n=>n.status==="published").length} published · ${news.filter(n=>n.status==="draft").length} drafts`}
        action={<Btn onClick={openAdd}>+ Write Article</Btn>}/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:20}}>
        <StatCard label="Published" value={news.filter(n=>n.status==="published").length} colour="var(--green2)" icon="📰"/>
        <StatCard label="Drafts" value={news.filter(n=>n.status==="draft").length} colour="var(--gold2)" icon="✏"/>
        <StatCard label="Pinned" value={news.filter(n=>n.pinned).length} colour="var(--gold2)" icon="📌"/>
      </div>
      <Col gap={10}>
        {sorted.length===0&&<EmptyState icon="📰" text="No articles yet" sub="Click 'Write Article' to get started"/>}
        {sorted.map(n=>(
          <Card key={n.id} style={{padding:"14px 20px",cursor:"pointer"}} onClick={()=>setView(n)}>
            <Row justify="space-between" align="center" wrap gap={12}>
              <Row gap={12} align="center" style={{flex:1,minWidth:0}}>
                <div style={{fontSize:26,flexShrink:0}}>{n.image}</div>
                <div style={{minWidth:0}}>
                  <Row gap={8} align="center" style={{marginBottom:4}}>
                    <div style={{fontFamily:"var(--font-d)",fontSize:15,color:"var(--gold3)",fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{n.title}</div>
                    {n.pinned&&<span style={{fontSize:9,background:"var(--gold)",color:"var(--burg-xdk)",borderRadius:3,padding:"1px 6px",fontFamily:"var(--font-m)",flexShrink:0}}>PINNED</span>}
                    {n.status==="draft"&&<span style={{fontSize:9,background:"var(--bg4)",color:"var(--text3)",border:"1px solid var(--border2)",borderRadius:3,padding:"1px 6px",fontFamily:"var(--font-m)",flexShrink:0}}>DRAFT</span>}
                  </Row>
                  <Row gap={8}>
                    <span style={{fontSize:9.5,background:catColour[n.category]||"var(--burg)",color:"white",borderRadius:3,padding:"1px 6px",fontFamily:"var(--font-m)",textTransform:"uppercase",letterSpacing:"0.06em"}}>{n.category}</span>
                    <span style={{fontSize:10.5,color:"var(--text3)",fontFamily:"var(--font-m)"}}>{n.date} · {n.authorName}</span>
                  </Row>
                </div>
              </Row>
              <Row gap={5} onClick={e=>e.stopPropagation()}>
                <Btn variant="ghost" size="sm" onClick={()=>togglePin(n.id)}>{n.pinned?"Unpin":"Pin"}</Btn>
                <Btn variant="ghost" size="sm" onClick={()=>toggleStatus(n.id)}>{n.status==="published"?"Unpublish":"Publish"}</Btn>
                <Btn variant="ghost" size="sm" onClick={()=>openEdit(n)}>Edit</Btn>
              </Row>
            </Row>
          </Card>
        ))}
      </Col>

      {view&&<Modal title={view.title} onClose={()=>setView(null)} wide>
        <Row gap={8} wrap style={{marginBottom:12}}>
          <span style={{fontSize:9.5,background:catColour[view.category]||"var(--burg)",color:"white",borderRadius:3,padding:"2px 7px",fontFamily:"var(--font-m)",textTransform:"uppercase"}}>{view.category}</span>
          <span style={{fontSize:10,color:"var(--text3)",fontFamily:"var(--font-m)"}}>{view.date} · {view.authorName}</span>
          {view.pinned&&<span style={{fontSize:9,background:"var(--gold)",color:"var(--burg-xdk)",borderRadius:3,padding:"2px 7px",fontFamily:"var(--font-m)"}}>📌 PINNED</span>}
        </Row>
        <div style={{fontSize:28,textAlign:"center",marginBottom:12}}>{view.image}</div>
        <p style={{fontSize:13,color:"var(--text2)",fontStyle:"italic",marginBottom:14,lineHeight:1.6,borderLeft:"3px solid var(--burg2)",paddingLeft:12}}>{view.excerpt}</p>
        <div style={{fontSize:13.5,color:"var(--text2)",lineHeight:1.8,whiteSpace:"pre-wrap",maxHeight:300,overflowY:"auto",background:"var(--bg3)",borderRadius:6,padding:14,marginBottom:14}}>{view.body}</div>
        <Row gap={8} justify="flex-end">
          <Btn variant="danger" size="sm" onClick={()=>setModal({confirm:{msg:"Delete this article?",fn:()=>del(view.id)}})}>Delete</Btn>
          <Btn variant="ghost" size="sm" onClick={()=>{setView(null);openEdit(view);}}>Edit</Btn>
        </Row>
      </Modal>}

      {(modal==="add"||modal?.edit)&&<Modal title={modal==="add"?"Write Article":"Edit Article"} onClose={()=>setModal(null)} wide>
        <Field label="Headline"><Input value={form.title||""} onChange={e=>setForm({...form,title:e.target.value})} placeholder="Article headline…"/></Field>
        <Row gap={12} wrap style={{justifyContent:"space-between"}}>
          <Field label="Category" half>
            <Select value={form.category||"news"} onChange={e=>setForm({...form,category:e.target.value})}>
              {["news","event","merchandise","technical"].map(c=><option key={c}>{c}</option>)}
            </Select>
          </Field>
          <Field label="Date" half><Input type="date" value={form.date||""} onChange={e=>setForm({...form,date:e.target.value})}/></Field>
        </Row>
        <Field label="Excerpt (shown in listings — leave blank to auto-generate)"><Textarea value={form.excerpt||""} onChange={e=>setForm({...form,excerpt:e.target.value})} style={{minHeight:60}} placeholder="Brief summary shown on news cards…"/></Field>
        <Field label="Full Article Body"><Textarea value={form.body||""} onChange={e=>setForm({...form,body:e.target.value})} style={{minHeight:200}} placeholder="Full article text…"/></Field>
        <Row gap={12} wrap style={{justifyContent:"space-between"}}>
          <Field label="Emoji Icon" half><Input value={form.image||""} onChange={e=>setForm({...form,image:e.target.value})} placeholder="📰"/></Field>
          <Field label="Status" half><Select value={form.status||"published"} onChange={e=>setForm({...form,status:e.target.value})}><option value="published">Published</option><option value="draft">Draft</option></Select></Field>
        </Row>
        <Field label="Pin to top of news page?">
          <Select value={form.pinned?"yes":"no"} onChange={e=>setForm({...form,pinned:e.target.value==="yes"})}>
            <option value="no">No</option><option value="yes">Yes — Feature this article</option>
          </Select>
        </Field>
        <Row gap={8} justify="flex-end"><Btn variant="ghost" onClick={()=>setModal(null)}>Cancel</Btn><Btn onClick={handleSave}>Save Article</Btn></Row>
      </Modal>}
      {modal?.confirm&&<Confirm message={modal.confirm.msg} onConfirm={modal.confirm.fn} onCancel={()=>setModal(null)}/>}
    </div>
  );
}

function PublicMarketplace({ listings, setListings, members, user, onLoginClick }) {
  const active = listings.filter(l=>l.status==="active");
  const typeIcon = { sell:"💰", wanted:"🔍", swap:"🔄" };
  const catLabel = { car:"Vehicle", parts:"Parts", memorabilia:"Memorabilia", manuals:"Manuals", tools:"Tools", other:"Other" };
  const [showForm, setShowForm] = React.useState(false);
  const [submitted, setSubmitted] = React.useState(false);
  const BLANK = {type:"sell",category:"parts",title:"",description:"",price:"",negotiable:false,condition:"good",location:"",contact:"",sellerName:"",images:[]};
  const [form, setForm] = React.useState(BLANK);
  const [errors, setErrors] = React.useState({});
  const [processing, setProcessing] = React.useState(false);

  React.useEffect(()=>{
    if(user&&showForm){
      setForm(f=>({...f,
        sellerName:f.sellerName||user.name||"",
        contact:f.contact||user.email||"",
        location:f.location||(user.state?"Melbourne, "+user.state:""),
      }));
    }
  },[user,showForm]);

  function validate(){
    const e={};
    if(!form.title.trim())e.title="Required";
    if(!form.description.trim())e.description="Required";
    if(!form.contact.trim())e.contact="Required";
    if(!form.sellerName.trim())e.sellerName="Required";
    return e;
  }

  async function handleSubmit(){
    const e=validate();
    if(Object.keys(e).length){setErrors(e);return;}
    setProcessing(true);
    const listing={
      id:"L"+Date.now().toString(36).toUpperCase(),
      ...form,
      price:form.type==="wanted"?null:(Number(form.price)||null),
      memberId:user?.id||null,
      status:"pending",
      created:new Date().toISOString().slice(0,10),
    };
    const existing=await window.storage.get("rcca:listings").catch(()=>null);
    const all=existing?JSON.parse(existing.value):listings;
    const updated=[...all,listing];
    await window.storage.set("rcca:listings",JSON.stringify(updated));
    if(setListings)setListings(updated);
    setProcessing(false);
    setSubmitted(true);
  }

  function fld(key,val){setForm(p=>({...p,[key]:val}));setErrors(p=>({...p,[key]:undefined}));}

  const iSt=(k)=>({width:"100%",background:"#fff",border:`1px solid ${errors[k]?"#c0282a":"var(--border2)"}`,borderRadius:6,padding:"10px 12px",color:"var(--text)",fontFamily:"var(--font-b)",fontSize:14,outline:"none",boxSizing:"border-box"});
  const lSt={fontSize:13,fontWeight:600,color:"var(--text2)",marginBottom:5,display:"block"};
  const eSt={fontSize:11,color:"#c0282a",marginTop:3,fontFamily:"var(--font-m)"};
  const secSt={background:"#fff",border:"1px solid var(--border)",borderRadius:10,padding:24,marginBottom:20};
  const secHead={fontFamily:"var(--font-d)",fontSize:17,fontWeight:700,color:"var(--text)",marginBottom:16,paddingBottom:10,borderBottom:"1px solid var(--border)"};

  if(showForm) return (
    <div>

            return (

                    {l.images.length>1&&<div style={{position:"absolute",bottom:6,right:6,background:"rgba(0,0,0,.65)",color:"#fff",fontSize:10,fontFamily:"var(--font-m)",padding:"2px 7px",borderRadius:3}}>+{l.images.length-1} more</div>}

                  <div style={{fontSize:13,color:"var(--text2)",lineHeight:1.6,marginBottom:12}}>{l.description?.slice(0,120)}{l.description?.length>120?"…":""}</div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12,color:"var(--text3)"}}>

                    {l.hideContact

                    <button onClick={()=>setShowForm(true)} style={{background:"none",border:"1px solid var(--burg)",borderRadius:5,padding:"5px 12px",color:"var(--burg)",fontFamily:"var(--font-b)",fontSize:12,fontWeight:700,cursor:"pointer"}}>{l.hideContact?"View in portal →":"Enquire →"}</button>

        <div style={{marginTop:40,textAlign:"center",padding:24,background:"var(--bg3)",borderRadius:10,border:"1px solid var(--border)"}}>
          <div style={{fontFamily:"var(--font-d)",fontSize:18,fontWeight:700,color:"var(--text)",marginBottom:8}}>Have something to sell or swap?</div>
          <div style={{fontSize:13,color:"var(--text3)",marginBottom:16}}>Anyone can post — no membership required. All listings are reviewed before going live.</div>
